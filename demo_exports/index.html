<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRC Toolkit — Compliance Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f9fb;--surface:#fff;--surface2:#f4f4f5;--surface3:#e4e4e7;
  --border:#e4e4e7;--border-light:#d4d4d8;
  --text:#18181b;--text2:#3f3f46;--text3:#71717a;--text4:#a1a1aa;
  --blue:#2563eb;--blue-light:#dbeafe;--blue-dark:#1d4ed8;
  --green:#059669;--green-light:#d1fae5;--green-bg:#ecfdf5;
  --red:#dc2626;--red-light:#fee2e2;--red-bg:#fef2f2;
  --amber:#d97706;--amber-light:#fef3c7;--amber-bg:#fffbeb;
  --orange:#ea580c;--purple:#7c3aed;--purple-light:#ede9fe;--purple-bg:#f5f3ff;
  --cyan:#0891b2;--cyan-light:#cffafe;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-lg:0 4px 12px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Layout ──────────────────────────────── */
.app{display:flex;min-height:100vh}
.sidebar{width:250px;min-width:250px;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:50;overflow-y:auto}
.main{margin-left:250px;flex:1;min-height:100vh}

/* ── Sidebar ─────────────────────────────── */
.sb-brand{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-brand .shield{width:30px;height:30px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800}
.sb-brand span{font-size:15px;font-weight:700;letter-spacing:-.3px}
.sb-section{padding:16px 12px 4px}
.sb-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text4);padding:0 8px 6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text3);transition:all .12s;user-select:none}
.sb-item:hover{background:var(--surface2);color:var(--text)}
.sb-item.active{background:var(--blue-light);color:var(--blue);font-weight:600}
.sb-item .icon{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.sb-item .badge{margin-left:auto;font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;background:var(--surface2);color:var(--text4)}
.sb-item.active .badge{background:rgba(37,99,235,.12);color:var(--blue)}
.sb-divider{height:1px;background:var(--border);margin:8px 16px}
.sb-trust{color:var(--purple)!important}
.sb-trust.active{background:var(--purple-light)!important;color:var(--purple)!important}
.sb-footer{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--text4);display:flex;align-items:center;gap:6px}
.sb-footer .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}

/* ── Content ─────────────────────────────── */
.crumbs{padding:16px 28px 0;font-size:13px;color:var(--text3);display:flex;align-items:center;gap:6px}
.crumbs a{color:var(--blue);text-decoration:none;cursor:pointer;font-weight:500}
.crumbs a:hover{text-decoration:underline}
.crumbs .sep{color:var(--border-light)}
.page{max-width:1100px;margin:0 auto;padding:24px 28px 60px}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.page-sub{font-size:14px;color:var(--text3);margin-bottom:28px;line-height:1.5}

/* ── Stats / Summary ─────────────────────── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
.stat .label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;color:var(--text4);margin-bottom:6px}
.stat .num{font-size:32px;font-weight:900;letter-spacing:-2px;line-height:1}
.stat .sub{font-size:12px;color:var(--text4);margin-top:4px}
.summary-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px;box-shadow:var(--shadow)}
.summary-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:16px}
.summary-stat .num{font-size:32px;font-weight:900;letter-spacing:-2px;line-height:1}
.summary-stat .lbl{font-size:12px;color:var(--text3);margin-top:4px;font-weight:500}
.pbar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin:8px 0}
.pbar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── Section labels ──────────────────────── */
.section{margin-bottom:32px}
.section-head{font-size:16px;font-weight:700;margin-bottom:4px}
.section-sub{font-size:13px;color:var(--text3);margin-bottom:16px}

/* ── Cards / Grids ───────────────────────── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.card:hover{border-color:var(--blue);box-shadow:var(--shadow-lg)}
.card h4{font-size:14px;font-weight:700;margin-bottom:2px}
.card .card-sub{font-size:12px;color:var(--text3);margin-bottom:12px}
.card .card-stats{display:flex;gap:16px;font-size:13px;font-weight:600}
.fw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.fw-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:24px;cursor:pointer;transition:all .2s;text-align:center}
.fw-card:hover{border-color:var(--blue);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.fw-card.active{border-color:var(--blue);background:var(--blue-light)}
.fw-card h3{font-size:15px;font-weight:700;margin-bottom:6px}
.fw-card p{font-size:12px;color:var(--text3);line-height:1.4}
.fw-card .fw-icon{font-size:32px;margin-bottom:12px}

/* ── Pills / Badges ──────────────────────── */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.pill-pass{background:var(--green-bg);color:var(--green);border:1px solid #a7f3d0}
.pill-fail{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}
.pill-open{background:var(--amber-bg);color:var(--amber);border:1px solid #fde68a}
.pill-info{background:var(--blue-light);color:var(--blue);border:1px solid #93c5fd}
.pill-purple{background:var(--purple-light);color:var(--purple);border:1px solid #c4b5fd}
.pill-cyan{background:var(--cyan-light);color:var(--cyan);border:1px solid #67e8f9}
.pill-sm{padding:2px 8px;font-size:10px}

/* ── Classification tags ─────────────────── */
.tag{display:inline-flex;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px;margin-right:4px}
.tag-pii{background:#dbeafe;color:#1d4ed8}
.tag-phi{background:#d1fae5;color:#059669}
.tag-pci{background:#fef3c7;color:#d97706}
.tag-conf{background:#ede9fe;color:#7c3aed}
.tag-low{background:#f4f4f5;color:#71717a}

/* ── Severity ────────────────────────────── */
.sev-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.sev-critical .sev-dot{background:var(--red)}.sev-critical{color:var(--red);font-weight:600}
.sev-high .sev-dot{background:var(--orange)}.sev-high{color:var(--orange);font-weight:600}
.sev-medium .sev-dot{background:var(--amber)}.sev-medium{color:var(--amber)}
.sev-low .sev-dot{background:var(--text4)}.sev-low{color:var(--text3)}

/* ── Tables ──────────────────────────────── */
.tbl{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.tbl thead{background:var(--surface2)}
.tbl th{text-align:left;padding:10px 14px;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border)}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:top}
.tbl tbody tr{cursor:pointer;transition:background .08s}
.tbl tbody tr:hover{background:var(--surface2)}
.tbl tbody tr:last-child td{border-bottom:none}

/* ── Expandable cards ────────────────────── */
.xcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);transition:border-color .12s}
.xcard:hover{border-color:var(--border-light)}
.xcard-head{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none}
.xcard-head .chevron{color:var(--text4);font-size:11px;transition:transform .15s;flex-shrink:0}
.xcard.open .xcard-head .chevron{transform:rotate(90deg)}
.xcard-body{display:none;padding:0 18px 18px;border-top:1px solid var(--border)}
.xcard.open .xcard-body{display:block}

/* ── Info blocks ─────────────────────────── */
.info{background:var(--surface2);border-radius:8px;padding:14px;margin-bottom:10px}
.info h5{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px}
.info p,.info li{font-size:13px;color:var(--text2);line-height:1.6}
.info ul{padding-left:16px}
.info.green{background:var(--green-bg);border:1px solid #a7f3d0}.info.green h5{color:var(--green)}
.info.red{background:var(--red-bg);border:1px solid #fecaca}.info.red h5{color:var(--red)}
.info.amber{background:var(--amber-bg);border:1px solid #fde68a}.info.amber h5{color:var(--amber)}

/* ── KV grid ─────────────────────────────── */
.kv{display:grid;grid-template-columns:150px 1fr;gap:4px 14px;font-size:13px;margin-bottom:14px}
.kv dt{color:var(--text3);font-weight:500}.kv dd{color:var(--text)}

/* ── Evidence attach ─────────────────────── */
.ev-attach{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-top:10px;overflow:hidden}
.ev-attach-head{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;background:var(--surface2);font-size:12px;font-weight:500}
.ev-attach-head:hover{background:var(--surface3)}
.ev-attach-head .chevron{color:var(--text4);font-size:10px;transition:transform .15s}
.ev-attach.open .ev-attach-head .chevron{transform:rotate(90deg)}
.ev-attach-body{display:none;padding:12px 14px;border-top:1px solid var(--border)}
.ev-attach.open .ev-attach-body{display:block}

/* ── Code / JSON ─────────────────────────── */
.code{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:350px;overflow-y:auto;color:var(--text2)}
.jk{color:var(--blue)}.js{color:var(--green)}.jn{color:var(--orange)}.jb{color:var(--purple)}.jnl{color:var(--text4)}

/* ── Crosswalk ───────────────────────────── */
.xw-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px}
.xw-row:last-child{border-bottom:none}
.xw-tag{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace}
.xw-src{background:var(--blue-light);color:var(--blue)}
.xw-tgt{background:var(--green-light);color:var(--green)}

/* ── Buttons ─────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .12s;font-family:inherit;box-shadow:var(--shadow)}
.btn:hover{border-color:var(--border-light);background:var(--surface2)}
.btn-blue{background:var(--blue);border-color:var(--blue);color:#fff}.btn-blue:hover{background:var(--blue-dark)}
.btn-purple{background:var(--purple);border-color:var(--purple);color:#fff}.btn-purple:hover{opacity:.9}

/* ── Toggle tabs ─────────────────────────── */
.tabs{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow)}
.tab-b{padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--text3);border:none;border-right:1px solid var(--border);transition:all .12s;font-family:inherit}
.tab-b:last-child{border-right:none}
.tab-b.active{background:var(--blue);color:#fff}
.tab-b:hover:not(.active){background:var(--surface2);color:var(--text2)}

/* ── Risk score bar ──────────────────────── */
.risk-bar{display:flex;align-items:center;gap:8px}
.risk-track{flex:1;height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;max-width:100px}
.risk-fill{height:100%;border-radius:4px}
.risk-label{font-size:12px;font-weight:700;min-width:28px}

/* ── Integration card ────────────────────── */
.int-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)}
.int-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.int-info{flex:1}
.int-info h4{font-size:14px;font-weight:600;margin-bottom:2px}
.int-info p{font-size:12px;color:var(--text3)}
.int-toggle{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border);cursor:pointer;transition:all .12s}
.int-toggle.on{background:var(--green-bg);color:var(--green);border-color:#a7f3d0}
.int-toggle.off{background:var(--surface2);color:var(--text4)}

/* ── Trust Hub ───────────────────────────── */
.th-header{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);color:#fff;border-radius:var(--radius);padding:40px 32px;margin-bottom:28px;text-align:center}
.th-header h1{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
.th-header p{font-size:14px;opacity:.8}
.th-header .th-date{font-size:12px;opacity:.6;margin-top:12px}
.cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:28px}
.cert-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;box-shadow:var(--shadow)}
.cert-card .cert-icon{font-size:36px;margin-bottom:8px}
.cert-card h4{font-size:13px;font-weight:700;margin-bottom:4px}
.cert-card p{font-size:11px;color:var(--text3)}
.cert-card .cert-status{margin-top:8px}

/* ── Form elements ───────────────────────── */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text2)}
.form-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);transition:border-color .12s}
.form-input:focus{outline:none;border-color:var(--blue)}
select.form-input{cursor:pointer}
textarea.form-input{min-height:100px;resize:vertical}
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;padding:14px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);z-index:200;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.hidden{display:none!important}
</style>
</head>

  <div class="sb-section"><div class="sb-label">Platform</div>

    <div class="sb-item" data-view="settings"><span class="icon">⚙</span>Settings</div>
  </div>
  <div class="sb-divider"></div>
  <div class="sb-section"><div class="sb-label" style="color:var(--purple)">External</div>

  <div class="sb-footer"><div class="dot"></div>Acme Cloud Corp</div>
</aside>
<div class="main">

</div>

/* ── State ─────────────────────────────── */
let view='home',fw=null,drillFam=null,drillCtrl=null,drillSilo=null;
const FW={nist_800_53:{label:'NIST SP 800-53',desc:'Federal information systems baseline',icon:'🏛️'},soc2:{label:'SOC 2 Type II',desc:'Trust service criteria for service orgs',icon:'🔒'},iso27001:{label:'ISO 27001:2022',desc:'International infosec management',icon:'🌐'},cmmc_l2:{label:'CMMC Level 2',desc:'Cybersecurity maturity for defense',icon:'🛡️'},hipaa:{label:'HIPAA Security Rule',desc:'Healthcare data protection',icon:'🏥'}};
const FNAMES={AC:'Access Control',AU:'Audit & Accountability',SC:'System & Comm Protection',IA:'Identification & Auth',CM:'Configuration Mgmt',SI:'System & Info Integrity',CC6:'Logical & Physical Access',CC7:'System Operations',CC8:'Change Management'};
const h=s=>s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const $=id=>document.getElementById(id);
const $$=(s,el)=>(el||document).querySelectorAll(s);
function jhl(o){return JSON.stringify(o,null,2).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"([^"]+)":/g,'<span class="jk">"$1"</span>:').replace(/: "([^"]*)"/g,': <span class="js">"$1"</span>').replace(/: (\d+\.?\d*)/g,': <span class="jn">$1</span>').replace(/: (true|false)/g,': <span class="jb">$1</span>').replace(/: (null)/g,': <span class="jnl">null</span>')}
function pc(r){return r>=80?'var(--green)':r>=60?'var(--amber)':'var(--red)'}
function rc(s){return s>=80?'var(--red)':s>=50?'var(--amber)':s>=20?'var(--blue)':'var(--green)'}
function sl(r){const ft=((r.findings||[]).join(' ')).toLowerCase();if(['root','wildcard','0.0.0.0/0','admin','unencrypted'].some(k=>ft.includes(k)))return'Critical';const f=(r.control_id||'').split('-')[0];if(['AC','SC','SI','IA'].includes(f))return'High';if(['AU','CA','CM'].includes(f))return'Medium';return'Low'}
function fl(k){return FNAMES[k]||k}
function getR(){if(!fw||fw==='nist_800_53')return D.sample_results;const p=D.poam_json[fw];if(!p)return D.sample_results;const m=[];for(const r of D.sample_results){if(r.status==='fail'){const mi=p.items.filter(i=>i.original_control_id===r.control_id&&i.check_id===r.check_id);for(const x of mi)m.push({...r,control_id:x.control_id,original_control_id:x.original_control_id});if(!mi.length)m.push({...r})}else m.push({...r,original_control_id:r.control_id})}return m}
function getE(){if(!fw||fw==='nist_800_53')return D.evidence_all.evidence;if(fw==='soc2')return D.evidence_soc2.evidence;return D.evidence_all.evidence}
function gF(results){const f={};for(const r of results){const c=r.control_id||'',k=c.includes('-')?c.split('-')[0]:c.replace(/\.\d+$/,'');if(!f[k])f[k]={pass:0,fail:0,total:0,results:[]};f[k][r.status]=(f[k][r.status]||0)+1;f[k].total++;f[k].results.push(r)}return f}
function dl(n,c,t='text/plain'){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=n;a.click()}
function toast(msg){const d=document.createElement('div');d.className='toast';d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),3000)}
function tagHtml(t){const m={PII:'tag-pii',PHI:'tag-phi',PCI:'tag-pci',Confidential:'tag-conf'};return`<span class="tag ${m[t]||'tag-low'}">${t}</span>`}
function fmtNum(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':n.toString()}
function fmtSize(mb){return mb>=1e3?(mb/1e3).toFixed(1)+' GB':mb+' MB'}

/* ── Nav ───────────────────────────────── */
function nav(v,e1,e2){view=v;drillFam=e1||null;drillCtrl=e2||null;
  $$('.sb-item').forEach(t=>{const sv=t.dataset.view;t.classList.toggle('active',sv===v||(v==='fw'&&sv==='home')||(v==='family'&&sv==='controls')||(v==='check'&&sv==='controls')||(v==='silo-detail'&&sv==='silos')||(v==='trusthub-fw'&&sv==='trusthub')||(v==='trusthub-req'&&sv==='trusthub'))});
  render();window.scrollTo(0,0)}
$$('.sb-item').forEach(t=>t.addEventListener('click',()=>{const v=t.dataset.view;if(v==='home')fw=null;if(['controls','findings','evidence','reports'].includes(v)&&!fw)fw='nist_800_53';nav(v)}));

function fwBtns(v){return Object.entries(FW).map(([k,vi])=>`<button class="btn${k===fw?' btn-blue':''}" onclick="fw='${k}';nav('${v}')" style="font-size:12px">${vi.icon} ${vi.label}</button>`).join('')}
function ring(pct,color,sz=100){const r=(sz-8)/2,c=2*Math.PI*r,o=c*(1-pct/100);return`<svg width="${sz}" height="${sz}" style="flex-shrink:0"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="8"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${o}" transform="rotate(-90 ${sz/2} ${sz/2})" style="transition:stroke-dashoffset .8s"/><text x="${sz/2}" y="${sz/2-4}" text-anchor="middle" fill="${color}" font-size="${sz>80?'24':'18'}" font-weight="800" font-family="Inter">${pct}%</text><text x="${sz/2}" y="${sz/2+12}" text-anchor="middle" fill="var(--text3)" font-size="10" font-weight="500" font-family="Inter">pass</text></svg>`}

/* ── Render ─────────────────────────────── */

  const p=$('page'),bc=$('crumbs'),L=fw?FW[fw].label:'';
  switch(view){
    case'home':bc.innerHTML='';rHome(p);break;
    case'fw':bc.innerHTML=`<a onclick="nav('home')">Home</a><span class="sep">›</span><span>${L}</span>`;rFw(p);break;
    case'controls':bc.innerHTML=`<a onclick="nav('home')">Home</a><span class="sep">›</span><span>Controls</span>`;rControls(p);break;
    case'family':bc.innerHTML=`<a onclick="nav('home')">Home</a><span class="sep">›</span><a onclick="nav('controls')">Controls</a><span class="sep">›</span><span>${fl(drillFam)}</span>`;rFamily(p);break;
    case'check':bc.innerHTML=`<a onclick="nav('home')">Home</a><span class="sep">›</span><a onclick="nav('controls')">Controls</a><span class="sep">›</span><a onclick="nav('family','${drillFam}')">${fl(drillFam)}</a><span class="sep">›</span><span>${drillCtrl}</span>`;rCheck(p);break;
    case'findings':bc.innerHTML=`<a onclick="nav('home')">Home</a><span class="sep">›</span><span>Findings</span>`;rFindings(p);break;
    case'evidence':bc.innerHTML=`<a onclick="nav('home')">Home</a><span class="sep">›</span><span>Evidence</span>`;rEvidence(p);break;
    case'reports':bc.innerHTML=`<a onclick="nav('home')">Home</a><span class="sep">›</span><span>Reports</span>`;rReports(p);break;
    case'crosswalk':bc.innerHTML=`<a onclick="nav('home')">Home</a><span class="sep">›</span><span>Crosswalk</span>`;rCrosswalk(p);break;
    case'silos':bc.innerHTML=`<a onclick="nav('home')">Home</a><span class="sep">›</span><span>Data Silos</span>`;rSilos(p);break;
    case'silo-detail':bc.innerHTML=`<a onclick="nav('home')">Home</a><span class="sep">›</span><a onclick="nav('silos')">Data Silos</a><span class="sep">›</span><span>${drillFam}</span>`;rSiloDetail(p);break;
    case'integrations':bc.innerHTML=`<a onclick="nav('home')">Home</a><span class="sep">›</span><span>Integrations</span>`;rIntegrations(p);break;
    case'settings':bc.innerHTML=`<a onclick="nav('home')">Home</a><span class="sep">›</span><span>Settings</span>`;rSettings(p);break;
    case'trusthub':bc.innerHTML=`<span>Customer Trust Hub</span>`;rTrustHub(p);break;
    case'trusthub-fw':bc.innerHTML=`<a onclick="nav('trusthub')">Trust Hub</a><span class="sep">›</span><span>${drillFam}</span>`;rTrustHubFw(p);break;
    case'trusthub-req':bc.innerHTML=`<a onclick="nav('trusthub')">Trust Hub</a><span class="sep">›</span><span>Request Evidence</span>`;rTrustHubReq(p);break;
  }
}

  const allR=D.sample_results,ps=allR.filter(r=>r.status==='pass').length,fl2=allR.filter(r=>r.status==='fail').length,T=allR.length,rate=T?Math.round(ps/T*100):0;
  const silosCrit=D.data_silos.filter(s=>s.riskLevel==='Critical').length,silosTotal=D.data_silos.length;
  const piiCount=D.data_silos.filter(s=>s.tags.includes('PII')).length;
  p.innerHTML=`<h1 class="page-title">Dashboard</h1><p class="page-sub">Compliance posture across all frameworks, data discovery, and platform status at a glance.</p>
  <div class="stats">
    <div class="stat"><div class="label">Compliance Rate</div><div class="num" style="color:${pc(rate)}">${rate}%</div><div class="sub">${ps}/${T} controls passing</div></div>
    <div class="stat"><div class="label">Open Findings</div><div class="num" style="color:var(--red)">${fl2}</div><div class="sub">require remediation</div></div>
    <div class="stat"><div class="label">Evidence Records</div><div class="num" style="color:var(--blue)">${D.evidence_all.evidence.length}</div><div class="sub">machine-collected</div></div>
    <div class="stat"><div class="label">Data Silos Scanned</div><div class="num" style="color:var(--purple)">${silosTotal}</div><div class="sub">${silosCrit} critical risk</div></div>
    <div class="stat"><div class="label">PII Sources</div><div class="num" style="color:var(--amber)">${piiCount}</div><div class="sub">containing personal data</div></div>
  </div>
  <div class="section"><div class="section-head">Frameworks</div><div class="section-sub">Select a framework to view detailed compliance posture.</div>
  <div class="fw-grid">${Object.entries(FW).map(([k,v])=>`<div class="fw-card" onclick="fw='${k}';nav('fw')"><div class="fw-icon">${v.icon}</div><h3>${v.label}</h3><p>${v.desc}</p></div>`).join('')}</div></div>
  <div class="section"><div class="section-head">Quick Access</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">${[
    ['⚑','Open Findings','findings',`${fl2} issues requiring remediation action`],
    ['⊡','Data Silos','silos',`${silosTotal} data stores scanned, ${silosCrit} critical`],
    ['🌐','Customer Trust Hub','trusthub','External compliance portal for your customers'],
    ['⚡','Integrations','integrations','Connected cloud providers and security tools'],
  ].map(([i,t,v,d])=>`<div class="card" onclick="nav('${v}')"><div style="font-size:22px;margin-bottom:8px">${i}</div><h4>${t}</h4><div class="card-sub">${d}</div></div>`).join('')}</div></div>`;
}

/* ═══ FRAMEWORK OVERVIEW ═════════════════ */
function rFw(p){
  const R=getR(),ps=R.filter(r=>r.status==='pass').length,fl2=R.filter(r=>r.status==='fail').length,T=R.length,rate=T?Math.round(ps/T*100):0,E=getE(),F=gF(R);
  let fc='';for(const[n,d]of Object.entries(F).sort((a,b)=>b[1].fail-a[1].fail)){const pct=d.total?Math.round(d.pass/d.total*100):0;fc+=`<div class="card" onclick="nav('family','${h(n)}')"><h4>${fl(n)}</h4><div class="card-sub">${n} · ${d.total} controls</div><div class="card-stats"><span style="color:var(--green)">✓ ${d.pass}</span><span style="color:var(--red)">✗ ${d.fail}</span></div><div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${pc(pct)}"></div></div></div>`}
  const tf=R.filter(r=>r.status==='fail').slice(0,3).map(r=>{const s=sl(r);return`<div class="xcard" onclick="this.classList.toggle('open')"><div class="xcard-head"><span class="chevron">▶</span><span class="sev-${s.toLowerCase()}"><span class="sev-dot"></span>${s}</span><strong>${h(r.control_id)}</strong><span style="color:var(--text3);flex:1">${h(r.assertion)}</span><span class="pill pill-fail pill-sm">FAIL</span></div><div class="xcard-body"><div class="info red"><h5>What was found</h5><ul>${(r.findings||[]).map(f=>`<li>${h(f)}</li>`).join('')}</ul></div>${r.remediation?`<div class="info green"><h5>How to fix it</h5><p>${h(r.remediation)}</p></div>`:''}</div></div>`}).join('');
  p.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:28px">${FW[fw].icon}</span><h1 class="page-title">${FW[fw].label}</h1></div><p class="page-sub">${FW[fw].desc}</p>
  <div class="summary-banner"><div style="display:flex;align-items:center;gap:28px;flex-wrap:wrap">${ring(rate,pc(rate),110)}<div class="summary-stats" style="flex:1"><div class="summary-stat"><div class="num">${T}</div><div class="lbl">Controls Tested</div></div><div class="summary-stat"><div class="num" style="color:var(--green)">${ps}</div><div class="lbl">Passing</div></div><div class="summary-stat"><div class="num" style="color:var(--red)">${fl2}</div><div class="lbl">Failing</div></div><div class="summary-stat"><div class="num" style="color:var(--blue)">${E.length}</div><div class="lbl">Evidence</div></div></div></div></div>
  <div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap"><button class="btn btn-blue" onclick="nav('controls')">📋 All Controls</button><button class="btn" onclick="nav('findings')">⚑ ${fl2} Findings</button><button class="btn" onclick="nav('evidence')">◆ Evidence</button><button class="btn" onclick="nav('reports')">★ Reports</button></div>
  <div class="section"><div class="section-head">Control Families</div><div class="section-sub">Click to drill down into individual controls.</div><div class="card-grid">${fc}</div></div>
  <div class="section"><div class="section-head">Top Findings</div><div class="section-sub">Click to expand details and remediation.</div>${tf}</div>`;
}

/* ═══ CONTROLS / FAMILY / CHECK ══════════ */
function rControls(p){const R=getR(),F=gF(R);let c='';for(const[n,d]of Object.entries(F).sort()){const pct=d.total?Math.round(d.pass/d.total*100):0;c+=`<div class="card" onclick="nav('family','${h(n)}')"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><h4>${fl(n)}</h4><span style="font-size:18px;font-weight:800;color:${pc(pct)}">${pct}%</span></div><div class="card-sub">${d.total} controls</div><div class="card-stats"><span style="color:var(--green)">✓ ${d.pass}</span><span style="color:var(--red)">✗ ${d.fail}</span></div><div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${pc(pct)}"></div></div></div>`}
  p.innerHTML=`<h1 class="page-title">Controls</h1><p class="page-sub">Assessment results grouped by control family. Click to drill into individual checks.</p><div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">${fwBtns('controls')}</div><div class="card-grid">${c}</div>`}

function rFamily(p){const R=getR(),F=gF(R),d=F[drillFam];if(!d){nav('controls');return}const pct=d.total?Math.round(d.pass/d.total*100):0;
  let rows=d.results.map(r=>{const s=sl(r),ev=getE().filter(e=>e.control_id===r.control_id||e.control_id===(r.original_control_id||r.control_id)||e.check_id===r.check_id);const orig=r.original_control_id&&r.original_control_id!==r.control_id?` <span style="font-size:11px;color:var(--text4)">(${h(r.original_control_id)})</span>`:'';return`<tr onclick="nav('check','${drillFam}','${r.check_id}')"><td><strong>${h(r.control_id)}</strong>${orig}</td><td>${h(r.assertion)}</td><td><span class="pill pill-${r.status} pill-sm">${r.status.toUpperCase()}</span></td><td><span class="sev-${s.toLowerCase()}"><span class="sev-dot"></span>${s}</span></td><td>${ev.length?`<span class="pill pill-info pill-sm">${ev.length}</span>`:'—'}</td></tr>`}).join('');
  p.innerHTML=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:4px"><h1 class="page-title">${fl(drillFam)}</h1><span style="font-size:24px;font-weight:800;color:${pc(pct)}">${pct}%</span></div><p class="page-sub">${d.total} controls. Click any row for details and evidence.</p>
  <div class="summary-banner" style="padding:18px"><div class="summary-stats" style="grid-template-columns:repeat(4,1fr)"><div class="summary-stat"><div class="num">${d.total}</div><div class="lbl">Total</div></div><div class="summary-stat"><div class="num" style="color:var(--green)">${d.pass}</div><div class="lbl">Pass</div></div><div class="summary-stat"><div class="num" style="color:var(--red)">${d.fail}</div><div class="lbl">Fail</div></div><div class="summary-stat"><div class="num" style="color:${pc(pct)}">${pct}%</div><div class="lbl">Rate</div></div></div></div>
  <table class="tbl"><thead><tr><th>Control</th><th>What's Being Tested</th><th>Result</th><th>Severity</th><th>Evidence</th></tr></thead><tbody>${rows}</tbody></table>`}

function rCheck(p){const R=getR(),r=R.find(x=>x.check_id===drillCtrl);if(!r){nav('family',drillFam);return}const s=sl(r),orig=r.original_control_id&&r.original_control_id!==r.control_id?`<dt>Original (NIST)</dt><dd>${h(r.original_control_id)}</dd>`:'';
  const ev=getE().filter(e=>e.control_id===r.control_id||e.control_id===(r.original_control_id||r.control_id)||e.check_id===r.check_id);
  let eC=ev.map(e=>`<div class="ev-attach" onclick="this.classList.toggle('open')"><div class="ev-attach-head"><span class="chevron">▶</span><strong>${h(e.service||e.provider)} — ${h(e.resource_type)}</strong><span class="pill pill-${e.status} pill-sm" style="margin-left:auto">${(e.status||'').toUpperCase()}</span></div><div class="ev-attach-body"><dl class="kv"><dt>Provider</dt><dd>${h(e.provider)} — ${h(e.region)}</dd><dt>Account</dt><dd>${h(e.account_id)}</dd><dt>Collected</dt><dd>${h((e.collected_at||'').replace('T',' ').split('.')[0])}</dd></dl><div class="code">${jhl(e.normalized_data||{})}</div></div></div>`).join('');
  p.innerHTML=`<h1 class="page-title">${h(r.control_id)} — ${h(r.check_id)}</h1><p class="page-sub">${h(r.assertion)}</p>
  <div class="summary-banner" style="padding:18px;display:flex;align-items:center;gap:16px"><span class="pill pill-${r.status}" style="font-size:14px;padding:6px 18px">${r.status==='pass'?'✓ PASSING':'✗ FAILING'}</span><span class="sev-${s.toLowerCase()}" style="font-size:14px"><span class="sev-dot"></span>${s}</span></div>

/* ═══ FINDINGS ═══════════════════════════ */
function rFindings(p){const pm=D.poam_json[fw],pt=D.poam_txt[fw];if(!pm){p.innerHTML='<p>No findings.</p>';return}
  let cards=pm.items.map(i=>{const s=i.severity||'medium',orig=i.original_control_id&&i.original_control_id!==i.control_id?`<span style="font-size:10px;color:var(--text4);margin-left:4px">from ${h(i.original_control_id)}</span>`:'',findings=(i.findings||[]).map(f=>`<li>${h(f)}</li>`).join('');
    const ev=getE().filter(e=>e.control_id===i.control_id||e.control_id===(i.original_control_id||i.control_id)||e.check_id===i.check_id);
    let eH=ev.map(e=>`<div class="ev-attach" onclick="event.stopPropagation();this.classList.toggle('open')"><div class="ev-attach-head"><span class="chevron">▶</span><strong>${h(e.service)} — ${h(e.resource_type)}</strong><span class="pill pill-${e.status} pill-sm" style="margin-left:auto">${(e.status||'').toUpperCase()}</span></div><div class="ev-attach-body"><div class="code">${jhl(e.normalized_data||{})}</div></div></div>`).join('');
    const sr=D.sample_results.find(r=>r.check_id===i.check_id);const steps=(sr&&sr.remediation_steps||[]).map(s=>`<li style="font-size:12px;color:#166534;margin-bottom:4px"><code style="background:#dcfce7;padding:2px 6px;border-radius:4px;font-size:11px">${h(s)}</code></li>`).join('');const consolePath=sr&&sr.aws_console_path;
    return`<div class="xcard" onclick="this.classList.toggle('open')"><div class="xcard-head"><span class="chevron">▶</span><span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text4);width:65px">${h(i.poam_id)}</span><span class="sev-${s.toLowerCase()}"><span class="sev-dot"></span>${h(s)}</span><strong>${h(i.control_id)}</strong>${orig}<span class="pill pill-open pill-sm" style="margin-left:auto">OPEN</span>${ev.length?`<span class="pill pill-info pill-sm">${ev.length} evidence</span>`:''}</div><div class="xcard-body"><dl class="kv"><dt>Check</dt><dd>${h(i.check_id)}</dd><dt>Provider</dt><dd>${h(i.provider)} — ${h(i.region)}</dd></dl>${findings?`<div class="info red"><h5>What was found</h5><ul>${findings}</ul></div>`:''}<div class="info green"><h5>How to fix it</h5><p style="font-weight:600">${h(i.remediation)}</p>${steps?`<div style="margin-top:12px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#15803d;font-weight:700;margin-bottom:8px">Step-by-Step Remediation</div><ol style="margin:0;padding-left:20px">${steps}</ol></div>`:''}${consolePath?`<div style="margin-top:10px;padding:8px 12px;background:#dcfce7;border-radius:6px"><span style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#15803d;font-weight:700">AWS Console: </span><span style="font-size:12px;color:#166534">${h(consolePath)}</span></div>`:''}</div>${ev.length?`<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin:14px 0 6px">Supporting Evidence</div>${eH}`:''}</div></div>`}).join('');
  p.innerHTML=`<h1 class="page-title">Findings & Remediation</h1><p class="page-sub">${pm.total_findings} open findings. Click to see details, remediation, and evidence.</p>
  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">${fwBtns('findings')}</div>
  <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap"><div class="tabs" id="pf"><button class="tab-b active" data-f="cards">Findings</button><button class="tab-b" data-f="json">JSON</button><button class="tab-b" data-f="txt">Document</button></div><div style="margin-left:auto;display:flex;gap:6px"><button class="btn" onclick="dl('poam_${fw}.json',JSON.stringify(D.poam_json['${fw}'],null,2),'application/json')">↓ JSON</button><button class="btn" onclick="dl('poam_${fw}.txt',D.poam_txt['${fw}'])">↓ Text</button></div></div>
  <div id="pf-cards">${cards}</div><div id="pf-json" class="hidden"><div class="code" style="max-height:none">${jhl(pm)}</div></div><div id="pf-txt" class="hidden"><pre style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;color:var(--text2)">${h(pt)}</pre></div>`;
  $$('#pf .tab-b').forEach(b=>b.addEventListener('click',()=>{$$('#pf .tab-b').forEach(x=>x.classList.remove('active'));b.classList.add('active');['cards','json','txt'].forEach(f=>{const el=$('pf-'+f);if(el)el.classList.toggle('hidden',f!==b.dataset.f)})}))}

/* ═══ EVIDENCE ═══════════════════════════ */
function rEvidence(p){const all=D.evidence_all.evidence,ac=D.evidence_ac.evidence,s2=D.evidence_soc2.evidence;
  function bL(ev){return ev.map(e=>{const orig=e.original_control_id&&e.original_control_id!==e.control_id?` <span style="font-size:10px;color:var(--text4)">from ${h(e.original_control_id)}</span>`:'';const conf=e.mapping_confidence?`<span class="pill pill-sm" style="background:${e.mapping_confidence==='high'?'var(--green-bg)':'var(--amber-bg)'};color:${e.mapping_confidence==='high'?'var(--green)':'var(--amber)'};border:1px solid ${e.mapping_confidence==='high'?'#a7f3d0':'#fde68a'}">${e.mapping_confidence}</span>`:'';return`<div class="xcard" onclick="this.classList.toggle('open')"><div class="xcard-head"><span class="chevron">▶</span><strong>${h(e.control_id)}</strong>${orig}<span style="color:var(--text3);font-size:12px">${h(e.service||'')} — ${h(e.resource_type||'')}</span><span class="pill pill-${e.status} pill-sm" style="margin-left:auto">${(e.status||'').toUpperCase()}</span>${conf}</div><div class="xcard-body"><dl class="kv"><dt>Check</dt><dd>${h(e.check_id)}</dd><dt>Provider</dt><dd>${h(e.provider||'')} — ${h(e.region||'')}</dd><dt>Account</dt><dd>${h(e.account_id||'')}</dd><dt>Collected</dt><dd>${h((e.collected_at||'').replace('T',' ').split('.')[0])}</dd></dl><div class="code">${jhl(e.normalized_data||{})}</div></div></div>`}).join('')}
  p.innerHTML=`<h1 class="page-title">Evidence Records</h1><p class="page-sub">Machine-collected evidence from AWS APIs. Click any record to see raw data.</p>
  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">${fwBtns('evidence')}</div>
  <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap"><div class="tabs" id="ef"><button class="tab-b active" data-s="all">All (${all.length})</button><button class="tab-b" data-s="ac">Access Control (${ac.length})</button><button class="tab-b" data-s="soc2">Mapped → SOC 2 (${s2.length})</button></div><div style="margin-left:auto;display:flex;gap:6px"><button class="btn" onclick="dl('evidence.json',JSON.stringify(D.evidence_all,null,2),'application/json')">↓ JSON</button><button class="btn" onclick="dl('evidence.csv',D.evidence_csv)">↓ CSV</button></div></div>
  <div id="el">${bL(all)}</div>`;
  $$('#ef .tab-b').forEach(b=>b.addEventListener('click',()=>{$$('#ef .tab-b').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('el').innerHTML=bL(b.dataset.s==='ac'?ac:b.dataset.s==='soc2'?s2:all)}))}

/* ═══ REPORTS ════════════════════════════ */
function rReports(p){const tx=D.exec_summaries[fw]||'';const lines=tx.split('\n');let secs=[],cur=null;for(const l of lines){if(l.match(/^[A-Z ]{5,}$/)){if(cur)secs.push(cur);cur={title:l.trim(),lines:[]}}else if(l.match(/^[-=]{3,}$/)){}else if(cur)cur.lines.push(l)}if(cur)secs.push(cur);
  let sc=secs.map(s=>{const b=s.lines.join('\n').trim();if(!b)return'';return`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px;box-shadow:var(--shadow)"><h4 style="font-size:14px;font-weight:600;margin-bottom:8px">${h(s.title)}</h4><pre style="background:transparent;border:none;padding:0;margin:0;font-family:Inter,sans-serif;font-size:13px;line-height:1.7;color:var(--text2);white-space:pre-wrap">${h(b)}</pre></div>`}).join('');
  let pkgs=Object.entries(FW).map(([k,v])=>`<div class="xcard" onclick="this.classList.toggle('open')"><div class="xcard-head"><span class="chevron">▶</span><span style="font-size:18px">${v.icon}</span><strong>${v.label}</strong><span class="pill pill-pass pill-sm" style="margin-left:auto">Ready</span></div><div class="xcard-body"><div style="font-size:12px;color:var(--text2)">${['📄 assessment_results.json','📄 summary.json','📄 poam.txt','📄 executive_summary.txt','📁 evidence/ (per-control files)','📄 manifest.json'].map(f=>`<div style="padding:2px 0">${f}</div>`).join('')}</div></div></div>`).join('');
  p.innerHTML=`<h1 class="page-title">Reports & Downloads</h1><p class="page-sub">Summaries, POA&M documents, and audit packages.</p><div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">${fwBtns('reports')}</div>
  <div class="section"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><div class="section-head">Executive Summary</div><button class="btn" onclick="dl('summary_${fw}.txt',D.exec_summaries['${fw}'])">↓ Download</button></div>${sc}</div>
  <div class="section"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><div class="section-head">POA&M</div><div style="display:flex;gap:6px"><button class="btn" onclick="dl('poam_${fw}.json',JSON.stringify(D.poam_json['${fw}'],null,2),'application/json')">↓ JSON</button><button class="btn" onclick="dl('poam_${fw}.txt',D.poam_txt['${fw}'])">↓ Text</button></div></div><button class="btn btn-blue" onclick="nav('findings')">View findings →</button></div>
  <div class="section"><div class="section-head">Audit Packages</div><div class="section-sub">Complete ZIP packages for auditor delivery.</div>${pkgs}</div>`}

/* ═══ CROSSWALK ══════════════════════════ */
function rCrosswalk(p){let secs='';for(const[k,v]of Object.entries(FW)){if(k==='nist_800_53')continue;const pm=D.poam_json[k];if(!pm)continue;const seen=new Set();let rows='';for(const i of pm.items){const key=`${i.original_control_id}→${i.control_id}`;if(seen.has(key))continue;seen.add(key);rows+=`<div class="xw-row"><span class="xw-tag xw-src">${h(i.original_control_id)}</span><span style="color:var(--text4);font-weight:600">→</span><span class="xw-tag xw-tgt">${h(i.control_id)}</span><span style="font-size:11px;color:var(--text4);margin-left:auto">high</span></div>`}
  secs+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow)"><div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px"><span style="font-size:18px">${v.icon}</span><strong style="font-size:13px">NIST 800-53 → ${v.label}</strong><span class="pill pill-info pill-sm" style="margin-left:auto">${seen.size} mappings</span></div><div style="padding:6px 18px">${rows}</div></div>`}
  p.innerHTML=`<h1 class="page-title">Framework Crosswalk</h1><p class="page-sub">Assess once, report everywhere. See how controls map between frameworks.</p>
  <div class="summary-banner"><div style="display:flex;gap:10px;flex-wrap:wrap">${Object.entries(FW).map(([k,v])=>`<div style="display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--surface2);border-radius:8px;cursor:pointer;font-size:12px;font-weight:600" onclick="fw='${k}';nav('fw')">${v.icon} ${v.label}</div>`).join('')}</div></div>${secs}`}

/* ═══ DATA SILOS ═════════════════════════ */
function rSilos(p){
  const silos=D.data_silos,crit=silos.filter(s=>s.riskLevel==='Critical').length,high=silos.filter(s=>s.riskLevel==='High').length,totalRec=silos.reduce((a,s)=>a+s.records,0);

    return`<div class="card" onclick="drillFam='${s.id}';nav('silo-detail','${s.id}')"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:20px">${s.icon}</span><div><h4 style="font-size:13px">${h(s.name)}</h4><div class="card-sub" style="margin:0">${s.type} · ${s.region}</div></div></div><div style="margin-bottom:8px">${s.tags.map(t=>tagHtml(t)).join('')}${!s.tags.length?'<span class="tag tag-low">No sensitive data</span>':''}</div><div class="risk-bar"><span style="font-size:11px;color:var(--text3)">Risk</span><div class="risk-track"><div class="risk-fill" style="width:${s.riskScore}%;background:${riskColor}"></div></div><span class="risk-label" style="color:${riskColor}">${s.riskScore}</span></div><div style="font-size:11px;color:var(--text4);margin-top:6px">${fmtNum(s.records)} records · ${fmtSize(s.sizeMB)}</div></div>`}).join('');

  p.innerHTML=`<h1 class="page-title">Data Silo Scanner</h1><p class="page-sub">Discover and classify sensitive data across your infrastructure. ${silos.length} data stores scanned.</p>
  <div class="stats">
    <div class="stat"><div class="label">Data Stores</div><div class="num" style="color:var(--blue)">${silos.length}</div></div>
    <div class="stat"><div class="label">Critical Risk</div><div class="num" style="color:var(--red)">${crit}</div></div>
    <div class="stat"><div class="label">High Risk</div><div class="num" style="color:var(--orange)">${high}</div></div>
    <div class="stat"><div class="label">Total Records</div><div class="num" style="color:var(--purple)">${fmtNum(totalRec)}</div></div>
    <div class="stat"><div class="label">Classifications</div><div class="num">${allTags.length}</div><div class="sub">${allTags.map(t=>tagHtml(t)).join('')}</div></div>
  </div>
  <div class="section"><div class="section-head">Scanned Data Stores</div><div class="section-sub">Click any data store to see sensitive fields, recommendations, and compliance impact.</div><div class="card-grid">${cards}</div></div>`}

  </div>
  <div class="section"><div class="section-head">Classifications</div><div style="display:flex;gap:6px;margin-bottom:16px">${s.tags.map(t=>tagHtml(t)).join('')}${!s.tags.length?'<span class="tag tag-low">None detected</span>':''}</div>

function rSettings(p){
  p.innerHTML=`<h1 class="page-title">Settings</h1><p class="page-sub">Platform configuration, API keys, and team management.</p>
  <div class="tabs" id="stabs"><button class="tab-b active" data-t="api">API Keys</button><button class="tab-b" data-t="notif">Notifications</button><button class="tab-b" data-t="team">Team</button></div>
  <div style="margin-top:20px">
  <div id="st-api"><div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)"><div class="form-group"><label>Active API Key</label><div style="display:flex;gap:8px"><input class="form-input" value="grc_key_••••••••••••3f8a" readonly style="font-family:'JetBrains Mono',monospace;flex:1"><button class="btn" onclick="toast('API key copied!')">Copy</button></div></div><div class="form-group"><label>Environment</label><select class="form-input"><option>Production</option><option>Staging</option></select></div><div class="form-group"><label>Scan Schedule</label><select class="form-input"><option>Daily at 2:00 AM UTC</option><option>Weekly (Sunday)</option><option>Manual only</option></select></div></div></div>
  <div id="st-notif" class="hidden"><div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)">${['New findings detected','Scan completed','Evidence collection errors','Compliance score changes','Data silo risk threshold exceeded'].map(n=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px">${n}</span><label style="position:relative;width:40px;height:22px;cursor:pointer"><input type="checkbox" checked style="opacity:0;width:0;height:0"><span style="position:absolute;inset:0;background:var(--blue);border-radius:11px;transition:.3s"></span></label></div>`).join('')}</div></div>
  <div id="st-team" class="hidden"><div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)"><table class="tbl"><thead><tr><th>Name</th><th>Role</th><th>Last Active</th></tr></thead><tbody>${[['Sarah Chen','GRC Lead','Today'],['Mike Rodriguez','Security Engineer','Today'],['Lisa Park','Compliance Analyst','Yesterday'],['David Kim','DevSecOps','2 days ago']].map(([n,r,a])=>`<tr style="cursor:default"><td><strong>${n}</strong></td><td>${r}</td><td style="color:var(--text3)">${a}</td></tr>`).join('')}</tbody></table></div></div></div>`;
  $$('#stabs .tab-b').forEach(b=>b.addEventListener('click',()=>{$$('#stabs .tab-b').forEach(x=>x.classList.remove('active'));b.classList.add('active');['api','notif','team'].forEach(t=>{const el=$('st-'+t);if(el)el.classList.toggle('hidden',t!==b.dataset.t)})}))}

/* ═══ CUSTOMER TRUST HUB ════════════════ */
function rTrustHub(p){
  const certs=[
    {name:'SOC 2 Type II',icon:'🔒',status:'Certified',date:'Valid through Dec 2026',color:'var(--green)'},
    {name:'ISO 27001:2022',icon:'🌐',status:'Certified',date:'Valid through Mar 2027',color:'var(--green)'},
    {name:'HIPAA',icon:'🏥',status:'Assessed',date:'Annual review Mar 2026',color:'var(--blue)'},
    {name:'CMMC Level 2',icon:'🛡️',status:'In Progress',date:'Expected Q2 2026',color:'var(--amber)'},
  ];
  // Build compliance overview using real data
  const overviewCards=Object.entries(FW).map(([k,v])=>{
    const R=(() => {const old=fw;fw=k;const r=getR();fw=old;return r})();
    const ps=R.filter(r=>r.status==='pass').length,T=R.length,rate=T?Math.round(ps/T*100):0;
    return`<div class="card" onclick="drillFam='${k}';nav('trusthub-fw','${k}')" style="text-align:center"><div style="margin-bottom:8px">${ring(rate,pc(rate),80)}</div><h4>${v.label}</h4><div class="card-sub">${ps}/${T} controls passing</div></div>`
  }).join('');

  p.innerHTML=`
  <div class="th-header"><h1>Acme Cloud Corp</h1><p>Security & Compliance Trust Center</p><div class="th-date">Last assessed: March 14, 2026</div></div>
  <div class="section"><div class="section-head">Certifications & Attestations</div><div class="section-sub">Current compliance certifications and assessment status.</div>
  <div class="cert-grid">${certs.map(c=>`<div class="cert-card"><div class="cert-icon">${c.icon}</div><h4>${c.name}</h4><p>${c.date}</p><div class="cert-status"><span class="pill pill-sm" style="background:${c.color}12;color:${c.color};border:1px solid ${c.color}30">${c.status}</span></div></div>`).join('')}</div></div>
  <div class="section"><div class="section-head">Compliance Overview</div><div class="section-sub">Click any framework to see control family breakdown.</div><div class="card-grid">${overviewCards}</div></div>
  <div class="section" style="text-align:center;padding:32px 0"><button class="btn btn-purple" onclick="nav('trusthub-req')" style="font-size:14px;padding:12px 28px">📩 Request Evidence or Documentation</button><p style="font-size:12px;color:var(--text4);margin-top:8px">Submit a request and our compliance team will respond within 2 business days.</p></div>`}

function rTrustHubFw(p){
  const k=drillFam,v=FW[k];if(!v){nav('trusthub');return}
  const old=fw;fw=k;const R=getR(),F=gF(R);fw=old;
  const ps=R.filter(r=>r.status==='pass').length,T=R.length,rate=T?Math.round(ps/T*100):0;
  let families=Object.entries(F).sort().map(([n,d])=>{const pct=d.total?Math.round(d.pass/d.total*100):0;return`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><h4 style="font-size:14px">${fl(n)}</h4><span style="font-size:18px;font-weight:800;color:${pc(pct)}">${pct}%</span></div><div style="display:flex;gap:14px;font-size:13px;font-weight:600;margin-bottom:6px"><span style="color:var(--green)">✓ ${d.pass}</span><span style="color:var(--red)">✗ ${d.fail}</span></div><div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${pc(pct)}"></div></div></div>`}).join('');
  p.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:28px">${v.icon}</span><h1 class="page-title">${v.label}</h1></div><p class="page-sub">${v.desc}</p>
  <div class="summary-banner" style="text-align:center">${ring(rate,pc(rate),120)}<div style="margin-top:8px;font-size:14px;color:var(--text2)">${ps} of ${T} controls passing</div></div>
  <div class="section"><div class="section-head">Control Family Status</div><div class="card-grid">${families}</div></div>
  <div style="text-align:center;padding:20px 0"><button class="btn btn-purple" onclick="nav('trusthub-req')">📩 Request specific evidence</button></div>`}

function rTrustHubReq(p){
  p.innerHTML=`<h1 class="page-title">Request Evidence</h1><p class="page-sub">Submit a request and our compliance team will respond within 2 business days.</p>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:600px;box-shadow:var(--shadow)">
  <div class="form-group"><label>Your Name</label><input class="form-input" placeholder="Jane Smith"></div>
  <div class="form-group"><label>Email</label><input class="form-input" type="email" placeholder="jane@company.com"></div>
  <div class="form-group"><label>Company</label><input class="form-input" placeholder="Your Company Inc."></div>
  <div class="form-group"><label>Framework</label><select class="form-input"><option>Select a framework...</option>${Object.values(FW).map(v=>`<option>${v.label}</option>`).join('')}</select></div>
  <div class="form-group"><label>What do you need?</label><textarea class="form-input" placeholder="Describe the evidence or documentation you're looking for...&#10;&#10;Examples:&#10;• SOC 2 Type II report&#10;• Penetration test results&#10;• Data processing agreement&#10;• Specific control evidence"></textarea></div>
  <button class="btn btn-purple" onclick="toast('✓ Request submitted! Our team will respond within 2 business days.');setTimeout(()=>nav('trusthub'),1500)" style="width:100%;justify-content:center;padding:12px">Submit Request</button>
  </div>`}

/* ═══ INIT ═══════════════════════════════ */
render();
</script>
