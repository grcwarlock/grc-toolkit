name: GRC Toolkit CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.2-alpine
        env:
          POSTGRES_DB: grc_test
          POSTGRES_USER: grc
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint with ruff
        run: ruff check .
      - name: Type check
        run: mypy modules/ api/ db/ --ignore-missing-imports
      - name: Run Python tests
        env:
          GRC_DATABASE_URL: postgresql://grc:${{ secrets.CI_DB_PASSWORD }}@localhost:5432/grc_test
        run: pytest tests/ -v --cov=modules --cov=api --cov=db --cov-report=xml --cov-fail-under=60
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python security linter (SAST)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Bandit SAST scan
        run: bandit -r modules/ api/ db/ -ll -ii
      - name: Dependency vulnerability scan
        run: pip-audit -r requirements.txt --desc || true

      # Secrets detection
      - name: Check for hardcoded secrets
        run: |
          if grep -rn 'password\|secret\|api_key' config/ --include="*.yaml" | grep -vE '""$|env var|CHANGE_ME|GRC_|NEVER|# '; then
            echo "::warning::Potential hardcoded secrets detected in config files"
          fi

      # Container scanning
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Build Docker image for scanning
        run: docker build -t grc-toolkit:scan .
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: grc-toolkit:scan
          severity: HIGH,CRITICAL
          exit-code: 1

  opa-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: 0.62.1
      - name: Run OPA tests
        run: opa test policies/ -v
      - name: OPA policy format check
        run: opa fmt --diff policies/

  terraform-validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - terraform/modules/aws/secure-account-baseline
          - terraform/modules/aws/compliant-vpc
          - terraform/modules/aws/iam-baseline
          - terraform/modules/azure/secure-subscription-baseline
          - terraform/modules/gcp/secure-project-baseline
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform -chdir=${{ matrix.module }} init -backend=false
      - name: Terraform Validate
        run: terraform -chdir=${{ matrix.module }} validate

  conftest:
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    steps:
      - uses: actions/checkout@v4
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: 0.62.1
      - name: Setup conftest
        run: |
          CONFTEST_VERSION="0.50.0"
          wget -q "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar xzf "conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          sudo mv conftest /usr/local/bin/
      - name: Validate Terraform policies
        run: |
          opa check policies/terraform/
          conftest verify --policy policies/terraform/
