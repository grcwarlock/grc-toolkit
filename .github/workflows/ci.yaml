name: GRC Toolkit CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: grc_test
          POSTGRES_USER: grc
          POSTGRES_PASSWORD: test_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint with ruff
        run: ruff check .
      - name: Type check
        run: mypy modules/ api/ db/ --ignore-missing-imports
      - name: Run Python tests
        env:
          GRC_DATABASE_URL: postgresql://grc:test_secret@localhost:5432/grc_test
        run: pytest tests/ -v --cov=modules --cov=api --cov=db --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  opa-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest
      - name: Run OPA tests
        run: opa test policies/ -v

  terraform-validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - terraform/modules/aws/secure-account-baseline
          - terraform/modules/aws/compliant-vpc
          - terraform/modules/aws/iam-baseline
          - terraform/modules/azure/secure-subscription-baseline
          - terraform/modules/gcp/secure-project-baseline
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform -chdir=${{ matrix.module }} init -backend=false
      - name: Terraform Validate
        run: terraform -chdir=${{ matrix.module }} validate

  conftest:
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    steps:
      - uses: actions/checkout@v4
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest
      - name: Setup conftest
        run: |
          CONFTEST_VERSION=$(curl -s https://api.github.com/repos/open-policy-agent/conftest/releases/latest | grep '"tag_name"' | sed 's/.*"v\(.*\)".*/\1/')
          wget -q "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar xzf "conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          sudo mv conftest /usr/local/bin/
      - name: Run policy checks
        run: echo "Conftest validation would run here against terraform plan output"

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
