# settings.yaml
# Environment configuration for the GRC toolkit
# Copy this file and fill in your actual values

environment:
  name: "production"
  organization: "Your Organization"
  timezone: "America/Denver"

# Cloud provider configurations
cloud_providers:
  aws:
    enabled: true
    # Uses default credential chain: env vars, ~/.aws/credentials, or IAM role
    regions:
      - "us-east-1"
      - "us-west-2"
    assume_role_arn: ""  # Optional: cross-account role for auditing

  azure:
    enabled: false
    subscription_id: ""
    tenant_id: ""
    # Uses DefaultAzureCredential: env vars, managed identity, or CLI auth

  gcp:
    enabled: false
    project_id: ""
    # Uses Application Default Credentials

# Evidence storage
evidence:
  local_path: "./evidence"
  retention_days: 365
  format: "json"  # json or yaml
  timestamp_format: "%Y-%m-%dT%H:%M:%SZ"

# Reporting
reports:
  output_path: "./reports"
  formats:
    - "docx"
    - "xlsx"
  templates_path: "./templates"

# Risk analysis
risk:
  monte_carlo_iterations: 10000
  confidence_levels:
    - 0.90
    - 0.95
    - 0.99
  currency: "USD"

# Notifications (optional)
notifications:
  enabled: false
  slack_webhook_url: ""
  email:
    smtp_server: ""
    smtp_port: 587
    sender: ""
    recipients: []

# Logging
logging:
  level: "INFO"
  file: "grc-toolkit.log"
  max_size_mb: 50
  backup_count: 5
