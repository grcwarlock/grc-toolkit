# NIST SP 800-53 Rev 5 - Complete Control Catalog
# All 20 control families with all active base controls (withdrawn controls excluded)

nist_800_53:
  name: NIST SP 800-53 Rev 5
  version: '5.1'
  control_families:
    AC:
      name: Access Control
      controls:
        AC-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate access control policies and procedures.
          checks:
          - id: AC-1.a
            description: Verify access control policy exists and is current
            evidence_type: policy_doc
            remediation:
              summary: Create or update the access control policy document and ensure it is reviewed annually.
              steps:
                aws:
                - 'Review AWS Organizations SCPs: aws organizations list-policies --filter SERVICE_CONTROL_POLICY'
                - 'Check IAM password policy: aws iam get-account-password-policy'
                - Verify policies are documented in your GRC system and reviewed within the last 12 months
              console_path:
                aws: IAM → Account settings → Password policy
            cloud_checks:
              aws:
              - service: iam
                method: get_account_password_policy
                assertion: password_policy_configured
        AC-2:
          title: Account Management
          description: Manage system accounts including establishing, activating, modifying, reviewing, disabling, and removing accounts.
          checks:
          - id: AC-2.a
            description: Identify and select account types
            evidence_type: iam_policy
            remediation:
              summary: Ensure all IAM users have MFA enabled and root access keys are removed.
              steps:
                aws:
                - 'Run: aws iam generate-credential-report && aws iam get-credential-report --output text --query Content | base64 -d to audit all users'
                - 'For each user without MFA: aws iam create-virtual-mfa-device --virtual-mfa-device-name <user>-mfa --outfile qr.png'
                - 'Enable MFA: aws iam enable-mfa-device --user-name <user> --serial-number <arn> --authentication-code1 <code1> --authentication-code2 <code2>'
                - For privileged accounts, use hardware tokens registered via IAM console under Security Credentials
                - Add IAM policy condition aws:MultiFactorAuthPresent to enforce MFA for sensitive operations
                - Create AWS Config rule iam-user-mfa-enabled for continuous monitoring
                azure:
                - Navigate to Entra ID > Security > MFA > Getting started to configure MFA policies
                - Create a Conditional Access policy requiring MFA for all users
                - Use az ad user list --query '[?!strongAuthenticationDetail]' to find users without MFA
                gcp:
                - Enable 2-Step Verification enforcement in Google Workspace Admin > Security > 2-Step Verification
                - Use gcloud identity groups memberships list to audit group-based access
              console_path:
                aws: IAM → Users → Select user → Security credentials → Assign MFA device
                azure: Entra ID → Security → MFA → Getting started
                gcp: Admin Console → Security → 2-Step Verification
            cloud_checks:
              aws:
              - service: iam
                method: list_users
                assertion: all_users_have_mfa
              - service: iam
                method: get_account_summary
                assertion: no_root_access_keys
              azure:
              - service: entra_id
                method: list_users
                assertion: all_users_have_mfa
              gcp:
              - service: iam
                method: list_service_accounts
                assertion: no_user_managed_keys_over_90_days
          - id: AC-2.d
            description: Specify authorized users and access authorizations
            evidence_type: iam_roles
            remediation:
              summary: Replace overly permissive IAM policies with scoped, least-privilege policies.
              steps:
                aws:
                - 'Identify attached policies: aws iam list-attached-user-policies --user-name <user>'
                - 'Detach AdministratorAccess: aws iam detach-user-policy --user-name <user> --policy-arn arn:aws:iam::aws:policy/AdministratorAccess'
                - 'Generate least-privilege policy via IAM Access Analyzer: aws accessanalyzer start-policy-generation'
                - 'Create scoped policy and attach: aws iam put-user-policy or aws iam attach-user-policy'
                - 'Migrate users to IAM roles with session duration limits: aws iam create-role --max-session-duration 3600'
                - Audit activity via CloudTrail to verify correct permissions during transition
              console_path:
                aws: IAM → Users → Permissions → Remove AdministratorAccess → Attach scoped policy
            cloud_checks:
              aws:
              - service: iam
                method: list_roles
                assertion: least_privilege_enforced
              - service: iam
                method: list_attached_user_policies
                assertion: no_inline_admin_policies
        AC-3:
          title: Access Enforcement
          description: Enforce approved authorizations for logical access to information and system resources.
          checks:
          - id: AC-3.a
            description: Verify access enforcement mechanisms are in place
            evidence_type: iam_policy
            remediation:
              summary: Ensure IAM policies enforce approved access and deny by default.
              steps:
                aws:
                - 'Review IAM policies for explicit deny statements: aws iam get-policy-version --policy-arn <arn> --version-id <v>'
                - 'Verify S3 bucket policies block public access: aws s3api get-public-access-block --bucket <bucket>'
                - 'Check for SCP guardrails: aws organizations list-policies-for-target --target-id <ou-id> --filter SERVICE_CONTROL_POLICY'
              console_path:
                aws: IAM → Policies → Review attached policies for deny statements
            cloud_checks:
              aws:
              - service: iam
                method: list_policies
                assertion: explicit_deny_configured
        AC-4:
          title: Information Flow Enforcement
          description: Enforce approved authorizations for controlling the flow of information within the system and between systems.
          checks:
          - id: AC-4.a
            description: Verify information flow controls
            evidence_type: network_config
            remediation:
              summary: Implement VPC flow logs and security group rules to control data flow between tiers.
              steps:
                aws:
                - 'Enable VPC Flow Logs: aws ec2 create-flow-logs --resource-type VPC --resource-ids <vpc-id> --traffic-type ALL --log-destination-type cloud-watch-logs --log-group-name vpc-flow-logs'
                - 'Review security group rules: aws ec2 describe-security-groups --filters Name=vpc-id,Values=<vpc-id>'
                - 'Implement network ACLs for subnet-level controls: aws ec2 create-network-acl-entry'
              console_path:
                aws: VPC → Flow logs → Create flow log
            cloud_checks:
              aws:
              - service: ec2
                method: describe_flow_logs
                assertion: vpc_flow_logs_enabled
        AC-5:
          title: Separation of Duties
          description: Separate duties of individuals to prevent malicious activity and reduce errors.
          checks:
          - id: AC-5.a
            description: Verify separation of duties is defined and enforced
            evidence_type: iam_policy
            remediation:
              summary: Implement IAM permission boundaries and SCPs to enforce separation of duties.
              steps:
                aws:
                - 'Create permission boundaries: aws iam create-policy --policy-name dev-boundary --policy-document file://boundary.json'
                - 'Attach boundary to users: aws iam put-user-permissions-boundary --user-name <user> --permissions-boundary <arn>'
                - 'Ensure no single user has both billing and IAM admin: review with aws iam list-attached-user-policies'
              console_path:
                aws: IAM → Users → Permissions boundary → Set boundary
            cloud_checks:
              aws:
              - service: iam
                method: list_users
                assertion: separation_of_duties_enforced
        AC-6:
          title: Least Privilege
          description: Employ the principle of least privilege, allowing only authorized accesses necessary to accomplish assigned tasks.
          checks:
          - id: AC-6.1
            description: Authorize access for security functions
            evidence_type: iam_policy
            remediation:
              summary: Remove wildcard admin policies and disable unused credentials.
              steps:
                aws:
                - 'List custom policies: aws iam list-policies --scope Local --query ''Policies[?contains(PolicyName,`Admin`) || contains(PolicyName,`FullAccess`)]'''
                - 'Get policy document: aws iam get-policy-version --policy-arn <arn> --version-id <v> to inspect for Action:* or Resource:*'
                - Replace with scoped policies using IAM Access Analyzer policy generation
                - 'Disable unused credentials: aws iam update-access-key --access-key-id <key> --status Inactive --user-name <user>'
                - 'Delete unused login profiles: aws iam delete-login-profile --user-name <user>'
                - Set up AWS Config rule iam-user-unused-credentials-check with maxCredentialUsageAge=90
              console_path:
                aws: IAM → Policies → Filter by 'Customer managed' → Review policy JSON for wildcard permissions
            cloud_checks:
              aws:
              - service: iam
                method: list_policies
                assertion: no_wildcard_admin_policies
              - service: iam
                method: get_credential_report
                assertion: unused_credentials_disabled
        AC-7:
          title: Unsuccessful Logon Attempts
          description: Enforce a limit of consecutive invalid logon attempts by a user.
          checks:
          - id: AC-7.a
            description: Verify lockout policy after failed logon attempts
            evidence_type: iam_policy
            remediation:
              summary: Configure account lockout via IAM password policy and Cognito/SSO settings.
              steps:
                aws:
                - 'Review password policy: aws iam get-account-password-policy'
                - 'For SSO: configure lockout in IAM Identity Center Settings'
                - 'For Cognito: aws cognito-idp update-user-pool --user-pool-id <id> --policies ''{"PasswordPolicy":{"MinimumLength":14}}'''
              console_path:
                aws: IAM → Account settings → Password policy
            cloud_checks:
              aws:
              - service: iam
                method: get_account_password_policy
                assertion: lockout_policy_configured
        AC-8:
          title: System Use Notification
          description: Display system use notification message or banner before granting access to the system that provides privacy and security notices consistent with applicable laws, directives, regulations,
            policies, standards, and guidelines.
          checks:
          - id: AC-8.a
            description: Verify system use notification banner is displayed before granting access
            evidence_type: configuration
            remediation:
              summary: Configure login banners on all systems and services to display approved system use notification messages.
              steps:
                aws:
                - 'List managed instances: aws ssm describe-instance-information --query ''InstanceInformationList[].InstanceId'''
                - 'Configure login banner via SSM: aws ssm send-command --targets Key=InstanceIds,Values=<id> --document-name AWS-RunShellScript --parameters commands=[''echo "Authorized users only. All
                  activity is monitored." > /etc/issue'']'
                - 'Configure SSH banner: aws ssm send-command --targets Key=InstanceIds,Values=<id> --document-name AWS-RunShellScript --parameters commands=[''echo Banner /etc/issue >> /etc/ssh/sshd_config
                  && systemctl restart sshd'']'
                - 'For AWS Console, configure a custom sign-in banner via AWS IAM Identity Center: aws sso-admin list-instances'
              console_path:
                aws: Systems Manager → Run Command → AWS-RunShellScript
            cloud_checks:
              aws:
              - service: ssm
                method: describe_instance_information
                assertion: instances_managed
              - service: ssm
                method: list_compliance_items
                assertion: banner_compliance_met
        AC-9:
          title: Previous Logon Notification
          description: Notify the user, upon successful logon, of the date and time of the last logon, the number of unsuccessful logon attempts since the last successful logon, and any changes to the account
            since the last logon.
          checks:
          - id: AC-9.a
            description: Verify system displays previous logon information upon successful authentication
            evidence_type: configuration
            remediation:
              summary: Enable previous logon notification on systems and review CloudTrail for console sign-in events.
              steps:
                aws:
                - 'Check last console login: aws iam get-user --user-name <username> --query ''User.PasswordLastUsed'''
                - 'Query recent login events: aws cloudtrail lookup-events --lookup-attributes AttributeKey=EventName,AttributeValue=ConsoleLogin --max-results 10'
                - 'Enable pam_lastlog on instances: aws ssm send-command --targets Key=InstanceIds,Values=<id> --document-name AWS-RunShellScript --parameters commands=[''pam-auth-update --enable lastlog'']'
              console_path:
                aws: CloudTrail → Event history → Filter by ConsoleLogin
            cloud_checks:
              aws:
              - service: cloudtrail
                method: lookup_events
                assertion: console_login_events_logged
        AC-10:
          title: Concurrent Session Control
          description: Limit the number of concurrent sessions for each system account to a defined number of sessions.
          checks:
          - id: AC-10.a
            description: Verify concurrent session limits are enforced
            evidence_type: configuration
            remediation:
              summary: Configure concurrent session limits via IAM policies and instance-level controls.
              steps:
                aws:
                - 'Create IAM policy to restrict concurrent sessions: aws iam create-policy --policy-name ConcurrentSessionLimit --policy-document file://concurrent-session-policy.json'
                - 'Configure SSO session duration: aws sso-admin update-instance-access-control-attribute-configuration --instance-arn <arn>'
                - 'Set session limits on instances: aws ssm send-command --targets Key=InstanceIds,Values=<id> --document-name AWS-RunShellScript --parameters commands=[''echo "* hard maxlogins 2" >> /etc/security/limits.conf'']'
                - 'Verify STS session token duration: aws sts get-session-token --duration-seconds 3600'
              console_path:
                aws: IAM Identity Center → Settings → Session duration
            cloud_checks:
              aws:
              - service: iam
                method: list_policies
                assertion: concurrent_session_policy_attached
              - service: sso-admin
                method: describe_instance_access_control_attribute_configuration
                assertion: session_limits_configured
        AC-11:
          title: Device Lock
          description: Prevent further access to the system by initiating a device lock after a defined inactivity period.
          checks:
          - id: AC-11.a
            description: Verify session lock after inactivity
            evidence_type: session_config
            remediation:
              summary: Configure session timeouts on console and CLI access.
              steps:
                aws:
                - 'Set console session duration: via IAM Role trust policy with MaxSessionDuration'
                - 'Configure SSO session timeout: IAM Identity Center → Settings → Session duration'
                - 'For CLI: configure credential expiry in ~/.aws/config with duration_seconds'
              console_path:
                aws: IAM Identity Center → Settings → Session settings
            cloud_checks:
              aws:
              - service: iam
                method: list_roles
                assertion: session_timeout_configured
        AC-12:
          title: Session Termination
          description: Automatically terminate a user session after a defined period of inactivity or when conditions require session disconnect.
          checks:
          - id: AC-12.a
            description: Verify automatic session termination is configured for inactive sessions
            evidence_type: configuration
            remediation:
              summary: Configure session timeout policies across all AWS services and managed instances.
              steps:
                aws:
                - 'Check IAM role maximum session duration: aws iam get-role --role-name <role-name> --query ''Role.MaxSessionDuration'''
                - 'Configure SSO session timeout: aws sso-admin update-instance-access-control-attribute-configuration --instance-arn <arn>'
                - 'Set SSH timeout on instances: aws ssm send-command --targets Key=InstanceIds,Values=<id> --document-name AWS-RunShellScript --parameters commands=[''echo "ClientAliveInterval 300" >>
                  /etc/ssh/sshd_config && echo "ClientAliveCountMax 0" >> /etc/ssh/sshd_config && systemctl restart sshd'']'
                - 'Verify Console session duration: aws iam list-roles --query ''Roles[].MaxSessionDuration'''
              console_path:
                aws: IAM → Roles → Select role → Edit → Maximum session duration
            cloud_checks:
              aws:
              - service: iam
                method: list_roles
                assertion: session_duration_within_policy
              - service: sso-admin
                method: list_instances
                assertion: session_timeout_configured
        AC-14:
          title: Permitted Actions Without Identification or Authentication
          description: Identify specific user actions that can be performed on the system without identification or authentication consistent with organizational mission and business functions.
          checks:
          - id: AC-14.a
            description: Verify that only approved actions are permitted without authentication
            evidence_type: configuration
            remediation:
              summary: Review and restrict public access to AWS resources, ensuring only intentional unauthenticated actions are permitted.
              steps:
                aws:
                - 'Check S3 public access settings: aws s3control get-public-access-block --account-id <account-id>'
                - 'List public S3 buckets: aws s3api list-buckets --query ''Buckets[].Name'' | xargs -I {} aws s3api get-bucket-policy-status --bucket {}'
                - 'Check for public API Gateway endpoints: aws apigateway get-rest-apis --query ''items[?endpointConfiguration.types[0]==`EDGE`]'''
                - 'Review CloudFront distributions for unauthenticated access: aws cloudfront list-distributions --query ''DistributionList.Items[].{Id:Id,Origins:Origins}'''
                - 'Check for public Lambda function URLs: aws lambda list-function-url-configs --function-name <name>'
              console_path:
                aws: S3 → Block Public Access settings → Account level
            cloud_checks:
              aws:
              - service: s3control
                method: get_public_access_block
                assertion: public_access_blocked
              - service: accessanalyzer
                method: list_findings
                assertion: no_unintended_public_access
        AC-16:
          title: Security and Privacy Attributes
          description: Provide the means to associate security and privacy attributes with information in storage, in process, and in transmission, and ensure that the attributes are maintained with the
            information.
          checks:
          - id: AC-16.a
            description: Verify security attributes are associated with information
            evidence_type: configuration
            remediation:
              summary: Implement resource tagging policies and data classification labels across AWS resources.
              steps:
                aws:
                - 'List tag policies: aws organizations list-policies --filter TAG_POLICY'
                - 'Check resource tagging compliance: aws resourcegroupstaggingapi get-resources --tag-filters Key=Classification'
                - 'Create a tag policy for data classification: aws organizations create-policy --name DataClassification --type TAG_POLICY --content file://tag-policy.json'
                - 'Enable AWS Config rule required-tags: aws configservice put-config-rule --config-rule file://required-tags-rule.json'
                - 'Check Macie classification: aws macie2 list-findings --finding-criteria ''{"criterion":{"classificationDetails.result.sensitiveData.category":{"exists":true}}}'''
              console_path:
                aws: AWS Organizations → Policies → Tag policies
            cloud_checks:
              aws:
              - service: resourcegroupstaggingapi
                method: get_resources
                assertion: resources_tagged_with_classification
              - service: organizations
                method: list_policies
                assertion: tag_policy_enabled
        AC-17:
          title: Remote Access
          description: Establish and document usage restrictions and implementation guidance for remote access.
          checks:
          - id: AC-17.a
            description: Verify remote access controls are implemented
            evidence_type: network_config
            remediation:
              summary: Use SSM Session Manager instead of direct SSH. Enforce VPN or PrivateLink for API access.
              steps:
                aws:
                - 'Enable SSM Session Manager: attach AmazonSSMManagedInstanceCore policy to EC2 instance roles'
                - 'Close SSH (port 22) in security groups: aws ec2 revoke-security-group-ingress --group-id <sg-id> --protocol tcp --port 22 --cidr 0.0.0.0/0'
                - 'Create VPC endpoints for private API access: aws ec2 create-vpc-endpoint --vpc-id <vpc-id> --service-name com.amazonaws.<region>.ssm'
                - 'Enable CloudTrail logging for Session Manager: already included in management events'
              console_path:
                aws: Systems Manager → Session Manager → Preferences → Configure
            cloud_checks:
              aws:
              - service: ec2
                method: describe_security_groups
                assertion: no_direct_ssh_access
        AC-18:
          title: Wireless Access
          description: Establish and document usage restrictions and implementation guidance for wireless access.
          checks:
          - id: AC-18.a
            description: Verify wireless access restrictions
            evidence_type: network_config
            remediation:
              summary: Ensure corporate wireless uses WPA3/Enterprise and is segmented from production networks.
              steps:
                aws:
                - For cloud workloads, wireless is N/A — document this in SSP
                - 'For corporate offices using AWS networking: segment wireless via separate VPC/subnet'
              console_path:
                aws: N/A — Wireless is a physical/on-prem control
            cloud_checks:
              aws:
              - service: ec2
                method: describe_vpcs
                assertion: network_segmentation_configured
        AC-19:
          title: Access Control for Mobile Devices
          description: Establish and document usage restrictions for mobile devices.
          checks:
          - id: AC-19.a
            description: Verify mobile device management controls
            evidence_type: policy_doc
            remediation:
              summary: Enforce MDM enrollment and conditional access policies for mobile device access.
              steps:
                aws:
                - 'Use AWS WorkSpaces for managed mobile access: aws workspaces create-workspaces'
                - Configure conditional access via IAM Identity Center policies
              console_path:
                aws: WorkSpaces → Directory → Configure mobile policies
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: mobile_device_policy_exists
        AC-20:
          title: Use of External Systems
          description: Establish terms and conditions for authorized individuals to access the system from external systems.
          checks:
          - id: AC-20.a
            description: Verify external system access restrictions
            evidence_type: policy_doc
            remediation:
              summary: Document approved external systems and enforce access via IAM conditions.
              steps:
                aws:
                - 'Add IP-based conditions to IAM policies: aws:SourceIp condition key'
                - Use VPC endpoints to restrict API access to known networks
                - 'Implement SCPs to deny actions from outside approved regions: aws:RequestedRegion'
              console_path:
                aws: IAM → Policies → Edit → Add Condition → aws:SourceIp
            cloud_checks:
              aws:
              - service: iam
                method: list_policies
                assertion: external_access_restricted
        AC-21:
          title: Information Sharing
          description: Employ automated mechanisms or manual processes to assist users in making information sharing and collaboration decisions, and enforce access authorizations to support information
            sharing.
          checks:
          - id: AC-21.a
            description: Verify information sharing controls and authorization mechanisms are in place
            evidence_type: configuration
            remediation:
              summary: Configure cross-account access controls, resource sharing policies, and data sharing agreements in AWS.
              steps:
                aws:
                - 'List RAM resource shares: aws ram get-resource-shares --resource-owner SELF'
                - 'Review cross-account IAM roles: aws iam list-roles --query ''Roles[?AssumeRolePolicyDocument.Statement[?Principal.AWS]]'''
                - 'Check S3 bucket policies for cross-account access: aws s3api get-bucket-policy --bucket <bucket-name>'
                - 'List Lake Formation permissions: aws lakeformation list-permissions'
                - 'Review KMS key policies for cross-account grants: aws kms list-grants --key-id <key-id>'
              console_path:
                aws: Resource Access Manager → Resource shares
            cloud_checks:
              aws:
              - service: ram
                method: get_resource_shares
                assertion: shares_authorized_and_documented
              - service: accessanalyzer
                method: list_findings
                assertion: no_unintended_cross_account_access
        AC-22:
          title: Publicly Accessible Content
          description: Designate individuals authorized to post information onto publicly accessible systems.
          checks:
          - id: AC-22.a
            description: Verify controls over publicly accessible content
            evidence_type: s3_config
            remediation:
              summary: Enable S3 Block Public Access at the account level and audit CloudFront distributions.
              steps:
                aws:
                - 'Enable account-level S3 block public access: aws s3control put-public-access-block --account-id <id> --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'
                - 'Audit public buckets: aws s3api list-buckets | jq -r ''.Buckets[].Name'' | xargs -I{} aws s3api get-public-access-block --bucket {}'
                - 'Review CloudFront distributions: aws cloudfront list-distributions'
              console_path:
                aws: S3 → Block Public Access settings for this account → Edit → Block all
            cloud_checks:
              aws:
              - service: s3control
                method: get_public_access_block
                assertion: s3_public_access_blocked
        AC-23:
          title: Data Mining Protection
          description: Employ data mining prevention and detection techniques for organization-defined data storage objects to detect and protect against unauthorized data mining.
          checks:
          - id: AC-23.a
            description: Verify data mining prevention and detection controls are implemented
            evidence_type: configuration
            remediation:
              summary: Enable Amazon Macie for sensitive data discovery and configure GuardDuty for anomalous data access detection.
              steps:
                aws:
                - 'Enable Macie: aws macie2 enable-macie'
                - 'Create Macie classification job: aws macie2 create-classification-job --job-type SCHEDULED --s3-job-definition ''{"bucketDefinitions":[{"accountId":"<account-id>","buckets":["<bucket>"]}]}''
                  --name DataMiningDetection'
                - 'Enable GuardDuty: aws guardduty create-detector --enable'
                - 'Check for anomalous API activity: aws guardduty list-findings --detector-id <id> --finding-criteria ''{"criterion":{"type":{"eq":["Recon:IAMUser/TorIPCaller","UnauthorizedAccess:IAMUser/InstanceCredentialExfiltration.OutsideAWS"]}}}'''
                - 'Configure VPC Flow Logs for network-level data exfiltration detection: aws ec2 create-flow-logs --resource-type VPC --resource-ids <vpc-id> --traffic-type ALL --log-destination-type s3
                  --log-destination <bucket-arn>'
              console_path:
                aws: Amazon Macie → Jobs → Create job
            cloud_checks:
              aws:
              - service: macie2
                method: get_macie_session
                assertion: macie_enabled
              - service: guardduty
                method: list_detectors
                assertion: guardduty_enabled
        AC-24:
          title: Access Control Decisions
          description: Establish procedures to ensure access control decisions are applied to each access request prior to access enforcement, using a reference monitor or equivalent mechanism.
          checks:
          - id: AC-24.a
            description: Verify access control decisions are enforced for each access request
            evidence_type: configuration
            remediation:
              summary: Implement centralized policy evaluation using IAM Access Analyzer, SCPs, and permission boundaries.
              steps:
                aws:
                - 'List SCPs: aws organizations list-policies --filter SERVICE_CONTROL_POLICY'
                - 'Verify SCP enforcement: aws organizations describe-policy --policy-id <policy-id>'
                - 'Check IAM policy simulator for access decisions: aws iam simulate-principal-policy --policy-source-arn <arn> --action-names s3:GetObject ec2:RunInstances'
                - 'List permission boundaries: aws iam list-users --query ''Users[].PermissionsBoundary'''
                - 'Enable IAM Access Analyzer: aws accessanalyzer create-analyzer --analyzer-name OrgAnalyzer --type ORGANIZATION'
              console_path:
                aws: IAM → Access Analyzer → Analyzers
            cloud_checks:
              aws:
              - service: organizations
                method: list_policies
                assertion: scps_attached_to_all_ous
              - service: accessanalyzer
                method: list_analyzers
                assertion: analyzer_active
        AC-25:
          title: Reference Monitor
          description: Implement a reference monitor for organization-defined access control policies that is tamperproof, always invoked, and small enough to be subject to analysis and testing.
          checks:
          - id: AC-25.a
            description: Verify reference monitor mechanism is implemented and always invoked
            evidence_type: configuration
            remediation:
              summary: Ensure AWS IAM and SCPs act as the reference monitor, with CloudTrail logging all access decisions.
              steps:
                aws:
                - 'Verify CloudTrail is enabled in all regions: aws cloudtrail describe-trails --query ''trailList[].{Name:Name,IsMultiRegion:IsMultiRegionTrail,IsLogging:IsLogging}'''
                - 'Check SCP enforcement at organization root: aws organizations list-policies-for-target --target-id <root-id> --filter SERVICE_CONTROL_POLICY'
                - 'Verify IAM policy evaluation logging: aws cloudtrail lookup-events --lookup-attributes AttributeKey=EventName,AttributeValue=AssumeRole --max-results 5'
                - 'Ensure AWS Config is recording: aws configservice describe-configuration-recorder-status'
              console_path:
                aws: CloudTrail → Trails → Verify multi-region trail is active
            cloud_checks:
              aws:
              - service: cloudtrail
                method: describe_trails
                assertion: multi_region_trail_enabled
              - service: configservice
                method: describe_configuration_recorder_status
                assertion: config_recorder_active
    AT:
      name: Awareness and Training
      controls:
        AT-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate awareness and training policy and procedures.
          checks:
          - id: AT-1.a
            description: Verify security awareness training policy exists
            evidence_type: policy_doc
            remediation:
              summary: Create a security awareness training policy with annual review cadence.
              steps:
                aws:
                - Document training policy requirements in your GRC system
                - Track completion via AWS SSO groups or training platform integration
              console_path:
                aws: N/A — Training policy is an organizational control
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: training_policy_documented
        AT-2:
          title: Literacy Training and Awareness
          description: Provide security literacy training to system users, including awareness of security risks.
          checks:
          - id: AT-2.a
            description: Verify security awareness training is provided to all users
            evidence_type: training_records
            remediation:
              summary: Deploy annual security awareness training and track completion.
              steps:
                aws:
                - Use AWS Training and Certification for cloud security training
                - Track completion via LMS integration or manual CSV uploads
                - Create AWS Config custom rule to verify training tag on IAM users
              console_path:
                aws: N/A — Training tracked in LMS or GRC platform
            cloud_checks:
              aws:
              - service: iam
                method: list_users
                assertion: training_completion_tracked
        AT-3:
          title: Role-Based Training
          description: Provide role-based security training to personnel with assigned security roles.
          checks:
          - id: AT-3.a
            description: Verify role-based training is provided
            evidence_type: training_records
            remediation:
              summary: Ensure privileged users receive additional security training specific to their roles.
              steps:
                aws:
                - 'Identify privileged users: aws iam list-users then check attached policies'
                - Ensure admin/security team members complete AWS Security Specialty training
                - Track role-based training completion per NIST requirements
              console_path:
                aws: IAM → Users → Filter by admin groups → Verify training records
            cloud_checks:
              aws:
              - service: iam
                method: list_groups
                assertion: role_based_training_tracked
        AT-4:
          title: Training Records
          description: Document and monitor security training activities including completion.
          checks:
          - id: AT-4.a
            description: Verify training records are maintained
            evidence_type: training_records
            remediation:
              summary: Maintain training records with dates, topics, and completion status.
              steps:
                aws:
                - Export training completion data from LMS
                - Store records in compliance-tagged S3 bucket with versioning enabled
              console_path:
                aws: N/A — Training records in LMS
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: training_records_maintained
        AT-6:
          title: Training Feedback
          description: Provide feedback on organizational training results to designated personnel at a defined frequency.
          checks:
          - id: AT-6.a
            description: Verify training feedback mechanisms are in place and results are reported
            evidence_type: policy_doc
            remediation:
              summary: Configure automated training compliance reporting and feedback collection.
              steps:
                aws:
                - 'Check IAM credential report for user training compliance: aws iam generate-credential-report && aws iam get-credential-report --output text --query Content | base64 -d'
                - 'Review Security Hub findings related to user access: aws securityhub get-findings --filters ''{"Type":[{"Value":"Software and Configuration Checks/AWS Security Best Practices","Comparison":"PREFIX"}]}''
                  --max-results 10'
                - 'Use SNS to send training reminders: aws sns publish --topic-arn <arn> --message ''Security training feedback required'' --subject ''Training Feedback Request'''
              console_path:
                aws: Security Hub → Findings → Filter by user compliance
            cloud_checks:
              aws:
              - service: iam
                method: generate_credential_report
                assertion: credential_report_generated
    AU:
      name: Audit and Accountability
      controls:
        AU-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate audit and accountability policy and procedures.
          checks:
          - id: AU-1.a
            description: Verify audit policy exists
            evidence_type: policy_doc
            remediation:
              summary: Create audit and accountability policy defining logging requirements.
              steps:
                aws:
                - Document audit policy covering CloudTrail, CloudWatch, and VPC Flow Logs requirements
                - 'Verify CloudTrail is enabled: aws cloudtrail describe-trails'
              console_path:
                aws: CloudTrail → Trails → Verify trail exists
            cloud_checks:
              aws:
              - service: cloudtrail
                method: describe_trails
                assertion: audit_policy_implemented
        AU-2:
          title: Event Logging
          description: Identify events that the system is capable of logging in support of the audit function.
          checks:
          - id: AU-2.a
            description: Identify event types for logging
            evidence_type: logging_config
            remediation:
              summary: Enable multi-region CloudTrail with log file validation and delivery to a secured S3 bucket.
              steps:
                aws:
                - 'Create multi-region trail: aws cloudtrail create-trail --name org-trail --s3-bucket-name <bucket> --is-multi-region-trail --enable-log-file-validation'
                - 'Start logging: aws cloudtrail start-logging --name org-trail'
                - 'Verify: aws cloudtrail get-trail-status --name org-trail (check IsLogging=true)'
                - 'Enable data events for S3 and Lambda: aws cloudtrail put-event-selectors --trail-name org-trail --event-selectors ''[{"DataResources":[{"Type":"AWS::S3::Object","Values":["arn:aws:s3"]}]}]'''
                - 'Configure log delivery to CloudWatch: aws cloudtrail update-trail --name org-trail --cloud-watch-logs-log-group-arn <arn> --cloud-watch-logs-role-arn <role-arn>'
                azure:
                - 'Enable diagnostic settings: az monitor diagnostic-settings create --name audit-logs --resource <id> --logs ''[{"category":"AuditEvent","enabled":true}]'''
              console_path:
                aws: CloudTrail → Trails → Create trail → Enable multi-region → Enable log file validation
                azure: Monitor → Diagnostic settings → Add diagnostic setting
            cloud_checks:
              aws:
              - service: cloudtrail
                method: describe_trails
                assertion: cloudtrail_enabled_all_regions
              - service: cloudtrail
                method: get_trail_status
                assertion: cloudtrail_logging_active
              azure:
              - service: monitor
                method: list_diagnostic_settings
                assertion: activity_log_enabled
        AU-3:
          title: Content of Audit Records
          description: Ensure audit records contain information needed to establish what events occurred.
          checks:
          - id: AU-3.a
            description: Verify audit records contain required fields
            evidence_type: logging_config
            remediation:
              summary: Verify CloudTrail records include who, what, when, where, and outcome fields.
              steps:
                aws:
                - 'Check trail configuration: aws cloudtrail get-trail --name <trail>'
                - Verify event selectors include management and data events
                - 'CloudTrail records automatically include: eventTime, eventSource, eventName, userIdentity, sourceIPAddress, responseElements'
              console_path:
                aws: CloudTrail → Event history → Verify record detail fields
            cloud_checks:
              aws:
              - service: cloudtrail
                method: describe_trails
                assertion: audit_record_content_complete
        AU-4:
          title: Audit Log Storage Capacity
          description: Allocate audit log storage capacity to accommodate anticipated log volume.
          checks:
          - id: AU-4.a
            description: Verify sufficient log storage capacity
            evidence_type: storage_config
            remediation:
              summary: Configure S3 lifecycle policies for log retention and ensure bucket has no size limits.
              steps:
                aws:
                - 'Check CloudTrail S3 bucket: aws s3api get-bucket-lifecycle-configuration --bucket <trail-bucket>'
                - 'Configure lifecycle rules for log tiering: aws s3api put-bucket-lifecycle-configuration'
                - 'Set up CloudWatch alarms for S3 bucket size: aws cloudwatch put-metric-alarm'
              console_path:
                aws: S3 → Trail bucket → Management → Lifecycle rules
            cloud_checks:
              aws:
              - service: s3
                method: list_buckets
                assertion: log_storage_adequate
        AU-5:
          title: Response to Audit Logging Process Failures
          description: Alert personnel in the event of an audit logging process failure.
          checks:
          - id: AU-5.a
            description: Verify alerting on audit logging failures
            evidence_type: monitoring_config
            remediation:
              summary: Configure CloudWatch alarms and SNS notifications for CloudTrail delivery failures.
              steps:
                aws:
                - Create CloudWatch metric filter for CloudTrail failures
                - 'Create alarm: aws cloudwatch put-metric-alarm --alarm-name cloudtrail-failure --metric-name DeliveryErrors'
                - 'Configure SNS notification: aws sns create-topic --name audit-failures'
              console_path:
                aws: CloudWatch → Alarms → Create alarm → CloudTrail metrics
            cloud_checks:
              aws:
              - service: cloudwatch
                method: describe_alarms
                assertion: audit_failure_alerts_configured
        AU-6:
          title: Audit Record Review, Analysis, and Reporting
          description: Review and analyze system audit records for indications of inappropriate or unusual activity.
          checks:
          - id: AU-6.a
            description: Review audit records for inappropriate activity
            evidence_type: log_review
            remediation:
              summary: Enable GuardDuty for threat detection and Security Hub for centralized findings aggregation.
              steps:
                aws:
                - 'Enable GuardDuty: aws guardduty create-detector --enable --finding-publishing-frequency FIFTEEN_MINUTES'
                - 'Enable S3 protection: aws guardduty update-detector --detector-id <id> --data-sources S3Logs={Enable=true}'
                - 'Enable Security Hub: aws securityhub enable-security-hub --enable-default-standards'
                - 'Subscribe to findings via SNS: aws securityhub create-action-target --name notify --description ''Send to SNS'''
                - 'Set up EventBridge rule for high-severity findings: aws events put-rule --name critical-findings --event-pattern ''{"source":["aws.securityhub"]}'''
              console_path:
                aws: GuardDuty → Get started → Enable GuardDuty; Security Hub → Go to Security Hub → Enable
            cloud_checks:
              aws:
              - service: guardduty
                method: list_detectors
                assertion: guardduty_enabled
              - service: securityhub
                method: describe_hub
                assertion: security_hub_enabled
        AU-7:
          title: Audit Record Reduction and Report Generation
          description: Provide and implement audit record reduction and report generation capability.
          checks:
          - id: AU-7.a
            description: Verify audit record reduction and report generation capability
            evidence_type: logging_config
            remediation:
              summary: Use CloudWatch Logs Insights and Athena for log analysis and reporting.
              steps:
                aws:
                - Set up CloudWatch Logs Insights queries for common audit scenarios
                - 'Create Athena table for CloudTrail logs: CREATE EXTERNAL TABLE cloudtrail_logs ...'
                - Schedule regular audit reports via AWS Lambda and S3
              console_path:
                aws: CloudWatch → Logs Insights → Run query
            cloud_checks:
              aws:
              - service: logs
                method: describe_log_groups
                assertion: log_analysis_capability_exists
        AU-8:
          title: Time Stamps
          description: Use internal system clocks to generate time stamps for audit records.
          checks:
          - id: AU-8.a
            description: Verify time synchronization for audit records
            evidence_type: system_config
            remediation:
              summary: AWS services use NTP automatically. Verify EC2 instances use Amazon Time Sync Service.
              steps:
                aws:
                - 'Verify Amazon Time Sync is configured on EC2: chronyc tracking (should show 169.254.169.123)'
                - 'For ECS/EKS: time sync is inherited from the host'
                - CloudTrail timestamps are UTC and automatically synchronized
              console_path:
                aws: EC2 → Instance → Connect → Verify chrony config
            cloud_checks:
              aws:
              - service: ec2
                method: describe_instances
                assertion: time_sync_configured
        AU-9:
          title: Protection of Audit Information
          description: Protect audit information and audit logging tools from unauthorized access, modification, and deletion.
          checks:
          - id: AU-9.a
            description: Verify audit log protection
            evidence_type: s3_config
            remediation:
              summary: Enable S3 Object Lock, versioning, and restrict access to CloudTrail log buckets.
              steps:
                aws:
                - 'Enable versioning: aws s3api put-bucket-versioning --bucket <trail-bucket> --versioning-configuration Status=Enabled'
                - 'Enable Object Lock: aws s3api put-object-lock-configuration --bucket <bucket> --object-lock-configuration ''{"ObjectLockEnabled":"Enabled","Rule":{"DefaultRetention":{"Mode":"COMPLIANCE","Days":365}}}'''
                - Restrict bucket policy to CloudTrail service principal only
                - 'Enable access logging on the trail bucket: aws s3api put-bucket-logging'
              console_path:
                aws: S3 → Trail bucket → Properties → Object Lock → Enable
            cloud_checks:
              aws:
              - service: s3
                method: list_buckets
                assertion: audit_log_protection_enabled
        AU-10:
          title: Non-repudiation
          description: Provide irrefutable evidence that a user performed a particular action, protecting against false claims of not having performed the action.
          checks:
          - id: AU-10.a
            description: Verify non-repudiation controls are in place for defined actions
            evidence_type: configuration
            remediation:
              summary: Ensure CloudTrail log integrity validation is enabled and logs are protected from modification.
              steps:
                aws:
                - 'Enable CloudTrail log file validation: aws cloudtrail update-trail --name <trail-name> --enable-log-file-validation'
                - 'Verify log file integrity: aws cloudtrail validate-logs --trail-arn <trail-arn> --start-time 2024-01-01T00:00:00Z'
                - 'Configure S3 Object Lock for CloudTrail bucket: aws s3api put-object-lock-configuration --bucket <trail-bucket> --object-lock-configuration ''{"ObjectLockEnabled":"Enabled","Rule":{"DefaultRetention":{"Mode":"COMPLIANCE","Days":365}}}'''
                - 'Enable CloudTrail Insights for anomaly detection: aws cloudtrail put-insight-selectors --trail-name <trail-name> --insight-selectors ''[{"InsightType":"ApiCallRateInsight"},{"InsightType":"ApiErrorRateInsight"}]'''
              console_path:
                aws: CloudTrail → Trails → Select trail → Edit → Enable log file validation
            cloud_checks:
              aws:
              - service: cloudtrail
                method: describe_trails
                assertion: log_file_validation_enabled
              - service: s3
                method: get_object_lock_configuration
                assertion: object_lock_enabled_on_trail_bucket
        AU-11:
          title: Audit Record Retention
          description: Retain audit records for a defined period to provide support for after-the-fact investigations.
          checks:
          - id: AU-11.a
            description: Verify audit log retention meets requirements
            evidence_type: storage_config
            remediation:
              summary: Configure S3 lifecycle policies and CloudWatch log retention to meet minimum retention period.
              steps:
                aws:
                - 'Set CloudWatch log group retention: aws logs put-retention-policy --log-group-name <group> --retention-in-days 365'
                - 'Configure S3 Glacier transition: aws s3api put-bucket-lifecycle-configuration with Glacier transition after 90 days'
              console_path:
                aws: CloudWatch → Log groups → Select group → Edit retention setting
            cloud_checks:
              aws:
              - service: logs
                method: describe_log_groups
                assertion: log_retention_configured
        AU-12:
          title: Audit Record Generation
          description: Provide audit record generation capability for auditable events defined in AU-2.
          checks:
          - id: AU-12.a
            description: Verify audit record generation is enabled
            evidence_type: logging_config
            remediation:
              summary: Enable CloudTrail in all regions with management and data event logging.
              steps:
                aws:
                - 'Verify multi-region trail: aws cloudtrail describe-trails --query ''trailList[?IsMultiRegionTrail==`true`]'''
                - 'Enable data event logging: aws cloudtrail put-event-selectors'
                - 'Enable organization-wide trail: aws cloudtrail create-trail --is-organization-trail'
              console_path:
                aws: CloudTrail → Trails → Verify multi-region and organization trail
            cloud_checks:
              aws:
              - service: cloudtrail
                method: describe_trails
                assertion: cloudtrail_enabled_all_regions
        AU-13:
          title: Monitoring for Information Disclosure
          description: Monitor open-source information and information-sharing sites for evidence of unauthorized disclosure of organizational information.
          checks:
          - id: AU-13.a
            description: Verify monitoring for unauthorized information disclosure is implemented
            evidence_type: configuration
            remediation:
              summary: Enable Amazon Macie for data loss detection and GuardDuty for monitoring unauthorized disclosures.
              steps:
                aws:
                - 'Enable Macie for S3 bucket monitoring: aws macie2 enable-macie'
                - 'Create Macie discovery job: aws macie2 create-classification-job --job-type SCHEDULED --s3-job-definition ''{"bucketDefinitions":[{"accountId":"<account-id>","buckets":["<bucket>"]}]}''
                  --name InfoDisclosureMonitor'
                - 'Check for public S3 objects: aws s3api list-buckets --query ''Buckets[].Name'' | xargs -I {} aws s3api get-bucket-acl --bucket {}'
                - 'Review Access Analyzer external access findings: aws accessanalyzer list-findings --analyzer-arn <arn> --filter ''{"isPublic":{"eq":["true"]}}'''
                - 'Enable GuardDuty S3 protection: aws guardduty update-detector --detector-id <id> --data-sources ''{"S3Logs":{"Enable":true}}'''
              console_path:
                aws: Amazon Macie → Summary → Review findings
            cloud_checks:
              aws:
              - service: macie2
                method: get_macie_session
                assertion: macie_enabled
              - service: accessanalyzer
                method: list_findings
                assertion: no_public_resources_unintended
        AU-14:
          title: Session Audit
          description: Provide and implement the capability to capture, record, and log all content related to user sessions, and remotely view all content related to an established user session in real
            time.
          checks:
          - id: AU-14.a
            description: Verify session audit and recording capabilities are implemented
            evidence_type: configuration
            remediation:
              summary: Enable AWS Systems Manager Session Manager logging and configure session recording.
              steps:
                aws:
                - 'Check Session Manager logging configuration: aws ssm describe-document --name SSM-SessionManagerRunShell'
                - 'Enable session logging to S3: aws ssm update-document --name SSM-SessionManagerRunShell --content ''{"schemaVersion":"1.0","description":"Session Manager Settings","sessionType":"Standard_Stream","inputs":{"s3BucketName":"<bucket>","s3EncryptionEnabled":true,"cloudWatchLogGroupName":"/aws/ssm/sessions","cloudWatchEncryptionEnabled":true}}''
                  --document-version ''$LATEST'''
                - 'Enable CloudWatch logging for sessions: aws logs create-log-group --log-group-name /aws/ssm/sessions'
                - 'Review active sessions: aws ssm describe-sessions --state Active'
              console_path:
                aws: Systems Manager → Session Manager → Preferences → Edit
            cloud_checks:
              aws:
              - service: ssm
                method: describe_document
                assertion: session_logging_enabled
              - service: logs
                method: describe_log_groups
                assertion: session_log_group_exists
        AU-16:
          title: Cross-organizational Audit Logging
          description: Employ defined methods for coordinating audit logging information among external organizations when audit information is transmitted across organizational boundaries.
          checks:
          - id: AU-16.a
            description: Verify cross-organizational audit logging coordination is in place
            evidence_type: configuration
            remediation:
              summary: Configure organization-wide CloudTrail and centralized logging for cross-account audit coordination.
              steps:
                aws:
                - 'Create organization trail: aws cloudtrail create-trail --name OrgTrail --s3-bucket-name <bucket> --is-organization-trail --is-multi-region-trail --enable-log-file-validation'
                - 'Verify organization trail status: aws cloudtrail get-trail-status --name OrgTrail'
                - 'Configure cross-account log delivery: aws logs put-destination --destination-name CrossAccountLogs --target-arn <kinesis-arn> --role-arn <role-arn>'
                - 'Set up cross-account CloudWatch subscription: aws logs put-subscription-filter --log-group-name <group> --filter-name CrossOrgFilter --filter-pattern '''' --destination-arn <destination-arn>'
              console_path:
                aws: CloudTrail → Trails → Create trail → Enable for all accounts in organization
            cloud_checks:
              aws:
              - service: cloudtrail
                method: describe_trails
                assertion: organization_trail_enabled
              - service: cloudtrail
                method: get_trail_status
                assertion: organization_trail_logging
    CA:
      name: Assessment, Authorization, and Monitoring
      controls:
        CA-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate security assessment and authorization policies and procedures that address purpose, scope, roles, responsibilities, management commitment, coordination
            among organizational entities, and compliance.
          checks:
          - id: CA-1.a
            description: Verify security assessment and authorization policy exists and is current
            evidence_type: policy_doc
            remediation:
              summary: Establish and maintain security assessment and authorization policies documented and reviewed periodically.
              steps:
                aws:
                - 'Review AWS Audit Manager frameworks: aws auditmanager list-assessment-frameworks --framework-type Standard'
                - 'List active assessments: aws auditmanager list-assessments --status ACTIVE'
                - 'Check Security Hub standards enabled: aws securityhub get-enabled-standards'
                - 'Verify AWS Config conformance packs: aws configservice describe-conformance-packs'
              console_path:
                aws: Audit Manager → Assessment frameworks
            cloud_checks:
              aws:
              - service: auditmanager
                method: list_assessments
                assertion: active_assessment_exists
              - service: securityhub
                method: get_enabled_standards
                assertion: security_standards_enabled
        CA-2:
          title: Control Assessments
          description: Assess the controls in the system to determine effectiveness.
          checks:
          - id: CA-2.a
            description: Verify control assessments are conducted
            evidence_type: assessment_report
            remediation:
              summary: Conduct annual control assessments using Security Hub compliance standards.
              steps:
                aws:
                - 'Enable Security Hub standards: aws securityhub batch-enable-standards --standards-subscription-requests ''[{"StandardsArn":"arn:aws:securityhub:::ruleset/cis-aws-foundations-benchmark/v/1.4.0"}]'''
                - 'Review findings: aws securityhub get-findings --filters ''{"ComplianceStatus":[{"Value":"FAILED","Comparison":"EQUALS"}]}'''
                - 'Export compliance report: aws securityhub get-findings --query ''Findings[].{Title:Title,Status:Compliance.Status}'''
              console_path:
                aws: Security Hub → Security standards → View results
            cloud_checks:
              aws:
              - service: securityhub
                method: describe_hub
                assertion: security_hub_enabled
        CA-3:
          title: Information Exchange
          description: Approve and manage the exchange of information between the system and other systems.
          checks:
          - id: CA-3.a
            description: Verify system interconnection agreements exist
            evidence_type: interconnection_agreement
            remediation:
              summary: Document all system interconnections with ISAs/MOUs and enforce via VPC peering rules.
              steps:
                aws:
                - 'List VPC peering connections: aws ec2 describe-vpc-peering-connections'
                - 'List Transit Gateway attachments: aws ec2 describe-transit-gateway-attachments'
                - Document each interconnection with ISA/MOU in GRC system
              console_path:
                aws: VPC → Peering connections → Review active connections
            cloud_checks:
              aws:
              - service: ec2
                method: describe_vpc_peering_connections
                assertion: interconnections_documented
        CA-5:
          title: Plan of Action and Milestones
          description: Develop and update a plan of action and milestones for the system.
          checks:
          - id: CA-5.a
            description: Verify POA&M exists and is current
            evidence_type: poam_doc
            remediation:
              summary: Maintain a POA&M tracking all open findings with remediation timelines.
              steps:
                aws:
                - Use this GRC toolkit to generate POA&M from assessment results
                - Track remediation progress via Security Hub custom actions
                - Set target remediation dates based on risk severity
              console_path:
                aws: Security Hub → Findings → Custom actions → Track in POA&M
            cloud_checks:
              aws:
              - service: securityhub
                method: get_findings
                assertion: poam_tracking_active
        CA-6:
          title: Authorization
          description: Assign a senior official as the authorizing official for the system, ensure the authorizing official authorizes the system before commencing operations, and update the authorization
            on a defined frequency.
          checks:
          - id: CA-6.a
            description: Verify system authorization is documented and current
            evidence_type: policy_doc
            remediation:
              summary: Document system authorization decisions and ensure authorization to operate (ATO) is current and tracked.
              steps:
                aws:
                - 'Review Audit Manager assessment reports: aws auditmanager list-assessment-reports'
                - 'Check Security Hub compliance summary: aws securityhub get-findings-statistics'
                - 'List AWS Config compliance by resource: aws configservice describe-compliance-by-resource --compliance-types NON_COMPLIANT'
                - 'Generate evidence for ATO: aws auditmanager get-evidence-folder --assessment-id <id> --control-set-id <set-id> --evidence-folder-id <folder-id>'
              console_path:
                aws: Audit Manager → Assessments → Generate assessment report
            cloud_checks:
              aws:
              - service: auditmanager
                method: list_assessment_reports
                assertion: current_assessment_report_exists
              - service: configservice
                method: describe_compliance_by_resource
                assertion: compliance_status_documented
        CA-7:
          title: Continuous Monitoring
          description: Develop and implement a continuous monitoring strategy.
          checks:
          - id: CA-7.a
            description: Verify continuous monitoring is implemented
            evidence_type: monitoring_config
            remediation:
              summary: Implement continuous monitoring via AWS Config, Security Hub, and GuardDuty.
              steps:
                aws:
                - 'Enable AWS Config: aws configservice put-configuration-recorder --configuration-recorder name=default,roleARN=<arn>'
                - 'Enable Config rules: aws configservice put-config-rule --config-rule file://rule.json'
                - Verify Security Hub is aggregating findings from all services
                - Enable GuardDuty across all regions
              console_path:
                aws: Config → Dashboard → Verify recorder is on
            cloud_checks:
              aws:
              - service: config
                method: describe_configuration_recorders
                assertion: config_recorder_enabled
        CA-8:
          title: Penetration Testing
          description: Conduct penetration testing on the system at a defined frequency.
          checks:
          - id: CA-8.a
            description: Verify penetration testing is conducted
            evidence_type: pentest_report
            remediation:
              summary: Conduct annual penetration testing and address findings in POA&M.
              steps:
                aws:
                - Submit AWS penetration testing notification (no longer requires approval for most services)
                - 'Use AWS Inspector for automated vulnerability assessment: aws inspector2 enable'
                - Track pentest findings in Security Hub via custom findings
              console_path:
                aws: Inspector → Get started → Enable Inspector
            cloud_checks:
              aws:
              - service: inspector2
                method: batch_get_account_status
                assertion: inspector_enabled
        CA-9:
          title: Internal System Connections
          description: Authorize internal connections of organization-defined system components or classes of components to the system, document the interface characteristics, security and privacy requirements,
            and the nature of the information communicated for each connection.
          checks:
          - id: CA-9.a
            description: Verify internal system connections are authorized and documented
            evidence_type: configuration
            remediation:
              summary: Document and authorize all internal network connections including VPC peering, Transit Gateway attachments, and PrivateLink endpoints.
              steps:
                aws:
                - 'List VPC peering connections: aws ec2 describe-vpc-peering-connections --query ''VpcPeeringConnections[].{Id:VpcPeeringConnectionId,Status:Status.Code,Requester:RequesterVpcInfo.VpcId,Accepter:AccepterVpcInfo.VpcId}'''
                - 'List Transit Gateway attachments: aws ec2 describe-transit-gateway-attachments --query ''TransitGatewayAttachments[].{Id:TransitGatewayAttachmentId,ResourceType:ResourceType,State:State}'''
                - 'List VPC endpoints: aws ec2 describe-vpc-endpoints --query ''VpcEndpoints[].{Id:VpcEndpointId,ServiceName:ServiceName,VpcId:VpcId,State:State}'''
                - 'Review security group rules for internal connectivity: aws ec2 describe-security-groups --query ''SecurityGroups[?IpPermissions[?UserIdGroupPairs]]'''
                - 'Check PrivateLink services: aws ec2 describe-vpc-endpoint-services --query ''ServiceDetails[?Owner!=`amazon`]'''
              console_path:
                aws: VPC → Peering connections; VPC → Endpoints; Transit Gateway → Attachments
            cloud_checks:
              aws:
              - service: ec2
                method: describe_vpc_peering_connections
                assertion: peering_connections_authorized
              - service: ec2
                method: describe_vpc_endpoints
                assertion: vpc_endpoints_documented
    CM:
      name: Configuration Management
      controls:
        CM-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate configuration management policies and procedures.
          checks:
          - id: CM-1.a
            description: Verify configuration management policy exists and is current
            evidence_type: policy_doc
            remediation:
              summary: Create and disseminate configuration management policy and procedures.
              steps:
                aws:
                - aws configservice describe-configuration-recorders
                - aws configservice describe-delivery-channels
                - aws configservice describe-compliance-by-config-rule
              console_path:
                aws: AWS Config → Settings
            cloud_checks:
              aws:
              - service: config
                method: describe_configuration_recorders
                assertion: recorder_configured
        CM-2:
          title: Baseline Configuration
          description: Develop, document, and maintain a current baseline configuration of the system.
          checks:
          - id: CM-2.a
            description: Verify baseline configuration is documented
            evidence_type: config_baseline
            remediation:
              summary: Use AWS Config to capture and track baseline configurations.
              steps:
                aws:
                - 'Enable AWS Config recording: aws configservice put-configuration-recorder'
                - 'Capture configuration snapshots: aws configservice deliver-config-snapshot --delivery-channel-name default'
                - 'Use Systems Manager State Manager for desired state: aws ssm create-association'
              console_path:
                aws: Config → Resources → View configuration timeline
            cloud_checks:
              aws:
              - service: config
                method: describe_configuration_recorders
                assertion: config_recorder_enabled
        CM-3:
          title: Configuration Change Control
          description: Determine and document the types of changes to the system that are configuration-controlled.
          checks:
          - id: CM-3.a
            description: Verify configuration change control process
            evidence_type: change_records
            remediation:
              summary: Use AWS Config rules and CloudTrail to detect and audit configuration changes.
              steps:
                aws:
                - 'Enable AWS Config rules for change detection: aws configservice put-config-rule'
                - Set up CloudTrail event notifications via EventBridge for critical resource changes
                - 'Use AWS Service Catalog for approved configurations: aws servicecatalog create-product'
              console_path:
                aws: Config → Rules → Add rule → Detect configuration changes
            cloud_checks:
              aws:
              - service: config
                method: describe_config_rules
                assertion: change_detection_rules_active
        CM-4:
          title: Impact Analysis
          description: Analyze changes to the system to determine potential security and privacy impacts.
          checks:
          - id: CM-4.a
            description: Verify impact analysis is performed for changes
            evidence_type: change_records
            remediation:
              summary: Implement change impact analysis via CloudFormation change sets and Config conformance packs.
              steps:
                aws:
                - 'Use CloudFormation change sets: aws cloudformation create-change-set'
                - 'Review changes before deployment: aws cloudformation describe-change-set'
                - 'Implement Config conformance packs: aws configservice put-conformance-pack'
              console_path:
                aws: CloudFormation → Change sets → Review before executing
            cloud_checks:
              aws:
              - service: cloudformation
                method: list_stacks
                assertion: change_sets_used
        CM-5:
          title: Access Restrictions for Change
          description: Define, document, approve, and enforce restrictions associated with changes to the system.
          checks:
          - id: CM-5.a
            description: Verify access restrictions for system changes
            evidence_type: iam_policy
            remediation:
              summary: Restrict deployment permissions to authorized CI/CD roles with approval gates.
              steps:
                aws:
                - 'Create deployment IAM role with minimal permissions: aws iam create-role'
                - 'Require MFA for deployment: add aws:MultiFactorAuthPresent condition'
                - 'Use CodePipeline approval actions: aws codepipeline put-approval-result'
              console_path:
                aws: IAM → Roles → Deployment role → Verify permissions
            cloud_checks:
              aws:
              - service: iam
                method: list_roles
                assertion: deployment_access_restricted
        CM-6:
          title: Configuration Settings
          description: Establish and document configuration settings for components of the system.
          checks:
          - id: CM-6.a
            description: Verify secure configuration settings
            evidence_type: config_settings
            remediation:
              summary: Apply CIS Benchmarks via AWS Config conformance packs and Systems Manager.
              steps:
                aws:
                - 'Deploy CIS conformance pack: aws configservice put-conformance-pack --conformance-pack-name CIS-AWS'
                - 'Use SSM documents for configuration: aws ssm create-document'
                - 'Verify compliance: aws configservice get-compliance-details-by-config-rule'
              console_path:
                aws: Config → Conformance packs → Deploy CIS pack
            cloud_checks:
              aws:
              - service: config
                method: describe_compliance_by_config_rule
                assertion: cis_benchmark_compliant
        CM-7:
          title: Least Functionality
          description: Configure the system to provide only mission-essential capabilities.
          checks:
          - id: CM-7.a
            description: Verify least functionality is implemented
            evidence_type: system_config
            remediation:
              summary: Disable unnecessary services and ports. Use SCPs to restrict unused AWS services.
              steps:
                aws:
                - 'Create SCP to deny unused services: aws organizations create-policy --content file://deny-unused-services.json'
                - 'Audit running services: aws ec2 describe-instances --query ''Reservations[].Instances[].SecurityGroups'''
                - 'Remove unused security group rules: aws ec2 revoke-security-group-ingress'
              console_path:
                aws: Organizations → Policies → Service control policies → Create policy
            cloud_checks:
              aws:
              - service: organizations
                method: list_policies
                assertion: least_functionality_scp_active
        CM-8:
          title: System Component Inventory
          description: Develop and document an inventory of system components.
          checks:
          - id: CM-8.a
            description: Verify system component inventory exists
            evidence_type: asset_inventory
            remediation:
              summary: Use AWS Config and Systems Manager Inventory to maintain a complete asset inventory.
              steps:
                aws:
                - 'Enable Systems Manager Inventory: aws ssm create-resource-data-sync'
                - 'Configure Config aggregator: aws configservice put-configuration-aggregator'
                - 'Use Resource Explorer: aws resource-explorer-2 create-index'
              console_path:
                aws: Systems Manager → Inventory → Setup inventory → Select targets
            cloud_checks:
              aws:
              - service: ssm
                method: describe_instance_information
                assertion: inventory_collection_active
        CM-9:
          title: Configuration Management Plan
          description: Develop, document, and implement a configuration management plan that addresses roles, responsibilities, and processes for managing the configuration of the system.
          checks:
          - id: CM-9.a
            description: Verify configuration management plan exists and identifies configuration items
            evidence_type: policy_doc
            remediation:
              summary: Develop a configuration management plan covering system components and baseline configurations.
              steps:
                aws:
                - aws configservice describe-configuration-recorders
                - aws configservice get-discovered-resource-counts
                - aws ssm describe-document --name 'AWS-ConfigureAWSPackage'
                - aws configservice describe-config-rules
              console_path:
                aws: AWS Config → Rules → Add Rule
            cloud_checks:
              aws:
              - service: config
                method: describe_configuration_recorders
                assertion: recorder_configured
              - service: config
                method: describe_config_rules
                assertion: rules_exist
        CM-10:
          title: Software Usage Restrictions
          description: Use software and associated documentation in accordance with contract agreements and copyright laws. Track and document the use of software and associated documentation protected
            by quantity licenses. Control and document the use of peer-to-peer file sharing technology.
          checks:
          - id: CM-10.a
            description: Verify software usage complies with license agreements and restrictions
            evidence_type: config_check
            remediation:
              summary: Implement controls to enforce software usage restrictions and license compliance.
              steps:
                aws:
                - aws license-manager list-license-configurations
                - aws license-manager list-licenses
                - aws ssm list-inventory-entries --instance-id <instance-id> --type-name 'AWS:Application'
                - aws license-manager list-usage-for-license-configuration --license-configuration-arn <arn>
              console_path:
                aws: AWS License Manager → License configurations
            cloud_checks:
              aws:
              - service: license-manager
                method: list_license_configurations
                assertion: configurations_exist
        CM-11:
          title: User-installed Software
          description: Establish and enforce policies governing the installation of software by users. Enforce software installation policies through automated methods. Alert designated personnel when unauthorized
            software is installed.
          checks:
          - id: CM-11.a
            description: Verify policies governing user-installed software are enforced
            evidence_type: config_check
            remediation:
              summary: Implement controls to restrict and monitor user-installed software.
              steps:
                aws:
                - aws ssm describe-instance-information
                - aws ssm list-compliance-items --resource-ids <instance-id> --resource-types 'ManagedInstance'
                - aws ssm list-inventory-entries --instance-id <instance-id> --type-name 'AWS:Application'
                - aws configservice get-compliance-details-by-config-rule --config-rule-name ec2-managedinstance-applications-required
              console_path:
                aws: AWS Systems Manager → Inventory → Managed Instances
            cloud_checks:
              aws:
              - service: ssm
                method: describe_instance_information
                assertion: instances_managed
              - service: config
                method: get_compliance_details_by_config_rule
                assertion: compliant
        CM-12:
          title: Information Location
          description: Identify and document the location of system components on which information is processed and stored. Identify and document the users who have access to the system and system components.
          checks:
          - id: CM-12.a
            description: Verify information processing and storage locations are identified and documented
            evidence_type: config_check
            remediation:
              summary: Document and track locations where information is processed and stored.
              steps:
                aws:
                - aws resourcegroupstaggingapi get-resources --tag-filters Key=DataClassification
                - aws macie2 describe-buckets
                - aws config select-aggregate-resource-counts --expression 'resourceType' --configuration-aggregator-name <name>
                - aws ec2 describe-instances --query 'Reservations[*].Instances[*].[InstanceId,Placement.AvailabilityZone]'
              console_path:
                aws: AWS Config → Resources → Resource inventory
            cloud_checks:
              aws:
              - service: config
                method: get_discovered_resource_counts
                assertion: resources_tracked
              - service: macie2
                method: describe_buckets
                assertion: buckets_classified
        CM-13:
          title: Data Action Mapping
          description: Develop and document a map of system data actions that identifies the processing of personally identifiable information.
          checks:
          - id: CM-13.a
            description: Verify data action mapping documents PII processing activities
            evidence_type: policy_doc
            remediation:
              summary: Create a data action map identifying where and how PII is processed.
              steps:
                aws:
                - aws macie2 list-findings --finding-criteria '{"criterion":{"classificationDetails.result.sensitiveData.category":{"eq":["PERSONAL_INFORMATION"]}}}'
                - aws macie2 get-finding-statistics --group-by 'classificationDetails.result.sensitiveData.category'
                - aws macie2 describe-buckets
              console_path:
                aws: Amazon Macie → Findings → By bucket
            cloud_checks:
              aws:
              - service: macie2
                method: describe_buckets
                assertion: buckets_monitored
        CM-14:
          title: Signed Components
          description: Prevent the installation of software and firmware components without verification that the component has been digitally signed using a recognized and approved certificate.
          checks:
          - id: CM-14.a
            description: Verify that only digitally signed software and firmware components are installed
            evidence_type: config_check
            remediation:
              summary: Enforce digital signature verification for all software and firmware installations.
              steps:
                aws:
                - aws ecr describe-repositories
                - aws ecr get-repository-policy --repository-name <repo>
                - aws signer list-signing-profiles
                - aws signer list-signing-jobs
                - aws lambda get-code-signing-config --code-signing-config-arn <arn>
              console_path:
                aws: AWS Signer → Signing profiles
            cloud_checks:
              aws:
              - service: signer
                method: list_signing_profiles
                assertion: profiles_configured
              - service: lambda
                method: list_code_signing_configs
                assertion: signing_configs_exist
    CP:
      name: Contingency Planning
      controls:
        CP-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate contingency planning policy and procedures.
          checks:
          - id: CP-1.a
            description: Verify contingency planning policy exists
            evidence_type: policy_doc
            remediation:
              summary: Create a contingency planning policy defining BCP/DR requirements.
              steps:
                aws:
                - Document BCP/DR policy with RTO/RPO targets
                - Map critical AWS services and their recovery capabilities
              console_path:
                aws: N/A — Policy is an organizational control
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: contingency_policy_documented
        CP-2:
          title: Contingency Plan
          description: Develop and implement a contingency plan for the system.
          checks:
          - id: CP-2.a
            description: Verify contingency plan exists and covers essential missions
            evidence_type: bcp_doc
            remediation:
              summary: Create a contingency plan with recovery procedures, contact information, and roles.
              steps:
                aws:
                - Document recovery procedures for each critical AWS service
                - 'Define RTO/RPO for each tier: aws backup describe-backup-vault'
                - 'Test with AWS Resilience Hub: review resilience score'
              console_path:
                aws: Resilience Hub → Applications → Add application → Assess
            cloud_checks:
              aws:
              - service: backup
                method: list_backup_vaults
                assertion: backup_vaults_configured
        CP-3:
          title: Contingency Training
          description: Provide contingency training to system users consistent with assigned roles and responsibilities within the time period specified; when required by system changes; and at a defined
            frequency thereafter.
          checks:
          - id: CP-3.a
            description: Verify contingency training is provided to personnel with contingency roles
            evidence_type: policy_doc
            remediation:
              summary: Establish and deliver contingency training program for assigned personnel.
              steps:
                aws:
                - aws iam list-groups --query 'Groups[?contains(GroupName, `contingency`) || contains(GroupName, `disaster`)]'
                - aws iam get-group --group-name contingency-team
                - aws organizations list-accounts
              console_path:
                aws: AWS IAM → User groups → Contingency team
            cloud_checks:
              aws:
              - service: iam
                method: list_groups
                assertion: contingency_group_exists
        CP-4:
          title: Contingency Plan Testing
          description: Test the contingency plan at a defined frequency to determine its effectiveness.
          checks:
          - id: CP-4.a
            description: Verify contingency plan is tested regularly
            evidence_type: test_results
            remediation:
              summary: Conduct annual DR tests and document results.
              steps:
                aws:
                - 'Use AWS Resilience Hub fault injection: simulate failures'
                - 'Test backup restoration: aws backup start-restore-job'
                - Document test results and update contingency plan
              console_path:
                aws: Resilience Hub → Assessments → Run assessment
            cloud_checks:
              aws:
              - service: backup
                method: list_restore_jobs
                assertion: dr_tests_conducted
        CP-6:
          title: Alternate Storage Site
          description: Establish an alternate storage site and initiate agreements to store backup information.
          checks:
          - id: CP-6.a
            description: Verify alternate storage site is established
            evidence_type: infrastructure_config
            remediation:
              summary: Configure cross-region S3 replication for backup data.
              steps:
                aws:
                - 'Enable cross-region replication: aws s3api put-bucket-replication --bucket <bucket> --replication-configuration file://replication.json'
                - 'Verify replication status: aws s3api get-bucket-replication --bucket <bucket>'
              console_path:
                aws: S3 → Bucket → Management → Replication rules
            cloud_checks:
              aws:
              - service: s3
                method: list_buckets
                assertion: cross_region_replication_enabled
        CP-7:
          title: Alternate Processing Site
          description: Establish an alternate processing site and agreements for transfer of operations.
          checks:
          - id: CP-7.a
            description: Verify alternate processing site is available
            evidence_type: infrastructure_config
            remediation:
              summary: Configure multi-region deployment or warm standby in alternate AWS region.
              steps:
                aws:
                - 'Set up multi-region active-passive: deploy infrastructure in DR region via CloudFormation'
                - 'Configure Route 53 health checks and failover: aws route53 create-health-check'
                - 'Use Aurora Global Database for database failover: aws rds create-global-cluster'
              console_path:
                aws: Route 53 → Health checks → Create → Configure failover
            cloud_checks:
              aws:
              - service: ec2
                method: describe_regions
                assertion: multi_region_deployment_exists
        CP-8:
          title: Telecommunications Services
          description: Establish alternate telecommunications services including necessary agreements to permit the resumption of system operations for essential mission and business functions within the
            time period specified when the primary telecommunications capabilities are unavailable.
          checks:
          - id: CP-8.a
            description: Verify alternate telecommunications services are established
            evidence_type: config_check
            remediation:
              summary: Establish alternate telecommunications services and provider agreements.
              steps:
                aws:
                - aws directconnect describe-connections
                - aws ec2 describe-vpn-connections
                - aws ec2 describe-transit-gateways
                - aws networkmanager get-sites --global-network-id <id>
                - aws directconnect describe-direct-connect-gateways
              console_path:
                aws: AWS Direct Connect → Connections
            cloud_checks:
              aws:
              - service: directconnect
                method: describe_connections
                assertion: redundant_connections_exist
              - service: ec2
                method: describe_vpn_connections
                assertion: vpn_backup_configured
        CP-9:
          title: System Backup
          description: Conduct backups of user-level, system-level, and system documentation at a defined frequency.
          checks:
          - id: CP-9.a
            description: Verify regular backups are performed
            evidence_type: backup_config
            remediation:
              summary: Configure AWS Backup with automated backup plans for all critical resources.
              steps:
                aws:
                - 'Create backup plan: aws backup create-backup-plan --backup-plan file://plan.json'
                - 'Assign resources: aws backup create-backup-selection --backup-plan-id <id> --backup-selection file://selection.json'
                - 'Verify backup jobs: aws backup list-backup-jobs --by-state COMPLETED'
                - 'Test restore: aws backup start-restore-job --recovery-point-arn <arn>'
              console_path:
                aws: AWS Backup → Backup plans → Create plan
            cloud_checks:
              aws:
              - service: backup
                method: list_backup_plans
                assertion: backup_plans_configured
        CP-10:
          title: System Recovery and Reconstitution
          description: Provide for the recovery and reconstitution of the system to a known state.
          checks:
          - id: CP-10.a
            description: Verify system recovery capabilities
            evidence_type: recovery_config
            remediation:
              summary: Document and test recovery procedures using AWS Backup and infrastructure-as-code.
              steps:
                aws:
                - Verify CloudFormation templates exist for full infrastructure rebuild
                - 'Test RDS point-in-time recovery: aws rds restore-db-instance-to-point-in-time'
                - 'Verify EBS snapshot restore capability: aws ec2 create-volume --snapshot-id <snap-id>'
              console_path:
                aws: RDS → Databases → Actions → Restore to point in time
            cloud_checks:
              aws:
              - service: backup
                method: list_recovery_points_by_backup_vault
                assertion: recovery_points_available
        CP-11:
          title: Alternate Communications Protocols
          description: Provide the capability to employ alternative communications protocols in support of maintaining continuity of operations.
          checks:
          - id: CP-11.a
            description: Verify alternative communications protocols are available for continuity
            evidence_type: config_check
            remediation:
              summary: Implement alternative communications protocols for continuity of operations.
              steps:
                aws:
                - aws ec2 describe-vpn-connections
                - aws directconnect describe-connections
                - aws ec2 describe-transit-gateway-route-tables
                - aws route53 list-health-checks
              console_path:
                aws: VPC → VPN Connections
            cloud_checks:
              aws:
              - service: ec2
                method: describe_vpn_connections
                assertion: alternate_connections_exist
        CP-12:
          title: Safe Mode
          description: When a specific set of conditions are detected, the system enters a safe mode of operation with the capability to restrict or limit which functions, ports, protocols, and services
            can be activated.
          checks:
          - id: CP-12.a
            description: Verify system can enter safe mode restricting operations under defined conditions
            evidence_type: config_check
            remediation:
              summary: Configure safe mode capabilities to restrict operations under adverse conditions.
              steps:
                aws:
                - aws ec2 describe-security-groups --filters Name=group-name,Values=safe-mode*
                - aws wafv2 list-web-acls --scope REGIONAL
                - aws lambda list-functions --query 'Functions[?contains(FunctionName, `safe-mode`) || contains(FunctionName, `lockdown`)]'
                - aws sns list-topics
              console_path:
                aws: AWS WAF → Web ACLs
            cloud_checks:
              aws:
              - service: wafv2
                method: list_web_acls
                assertion: safe_mode_acl_exists
        CP-13:
          title: Alternative Security Mechanisms
          description: Employ alternative or supplemental security mechanisms for satisfying security requirements when the primary means of implementing the security function is unavailable or compromised.
          checks:
          - id: CP-13.a
            description: Verify alternative security mechanisms are available as fallback
            evidence_type: config_check
            remediation:
              summary: Implement alternative security mechanisms for when primary controls are unavailable.
              steps:
                aws:
                - aws iam list-mfa-devices
                - aws kms list-keys
                - aws kms describe-key --key-id <key-id>
                - aws guardduty list-detectors
                - aws securityhub describe-hub
              console_path:
                aws: AWS Security Hub → Summary
            cloud_checks:
              aws:
              - service: securityhub
                method: describe_hub
                assertion: hub_enabled
              - service: guardduty
                method: list_detectors
                assertion: detectors_active
    IA:
      name: Identification and Authentication
      controls:
        IA-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate identification and authentication policies and procedures that address purpose, scope, roles, responsibilities, management commitment, coordination,
            and compliance.
          checks:
          - id: IA-1.a
            description: Verify identification and authentication policy exists and is current
            evidence_type: policy_doc
            remediation:
              summary: Create and disseminate identification and authentication policy and procedures.
              steps:
                aws:
                - aws iam get-account-password-policy
                - aws iam generate-credential-report
                - aws iam get-credential-report
                - aws iam list-account-aliases
              console_path:
                aws: IAM → Account settings → Password policy
            cloud_checks:
              aws:
              - service: iam
                method: get_account_password_policy
                assertion: password_policy_configured
        IA-2:
          title: Identification and Authentication (Organizational Users)
          description: Uniquely identify and authenticate organizational users.
          checks:
          - id: IA-2.a
            description: Verify unique identification and MFA for all users
            evidence_type: iam_config
            remediation:
              summary: Enforce unique user IDs and MFA for all interactive users.
              steps:
                aws:
                - 'Audit IAM users: aws iam generate-credential-report'
                - 'Enforce MFA: create IAM policy requiring MFA for all actions'
                - Use IAM Identity Center for centralized user management
              console_path:
                aws: IAM → Users → Verify each user is unique and has MFA
            cloud_checks:
              aws:
              - service: iam
                method: list_users
                assertion: all_users_have_mfa
        IA-3:
          title: Device Identification and Authentication
          description: Uniquely identify and authenticate devices before establishing a connection using bidirectional authentication between devices that is cryptographically based.
          checks:
          - id: IA-3.a
            description: Verify devices are uniquely identified and authenticated before connection
            evidence_type: config_check
            remediation:
              summary: Implement device identification and authentication mechanisms.
              steps:
                aws:
                - aws iot list-things
                - aws iot list-certificates
                - aws iot describe-certificate --certificate-id <cert-id>
                - aws ec2 describe-client-vpn-endpoints
                - aws ec2 describe-client-vpn-connections --client-vpn-endpoint-id <endpoint-id>
              console_path:
                aws: AWS IoT → Manage → Things
            cloud_checks:
              aws:
              - service: iot
                method: list_certificates
                assertion: device_certificates_exist
              - service: ec2
                method: describe_client_vpn_endpoints
                assertion: mutual_auth_enabled
        IA-4:
          title: Identifier Management
          description: Manage system identifiers by receiving authorization, assigning, and preventing reuse.
          checks:
          - id: IA-4.a
            description: Verify identifier management controls
            evidence_type: iam_config
            remediation:
              summary: Implement identifier lifecycle management via IAM Identity Center.
              steps:
                aws:
                - Use IAM Identity Center for centralized identity management
                - 'Disable inactive users: aws iam update-login-profile --user-name <user> --no-password-reset-required'
                - Review credential report for unused accounts
              console_path:
                aws: IAM Identity Center → Users → Review user lifecycle
            cloud_checks:
              aws:
              - service: iam
                method: get_credential_report
                assertion: unused_credentials_disabled
        IA-5:
          title: Authenticator Management
          description: Manage system authenticators including passwords, tokens, and certificates.
          checks:
          - id: IA-5.a
            description: Verify authenticator management controls
            evidence_type: iam_config
            remediation:
              summary: Enforce strong password policies and credential rotation.
              steps:
                aws:
                - 'Set password policy: aws iam update-account-password-policy --minimum-password-length 14 --require-symbols --require-numbers --require-uppercase-characters --require-lowercase-characters
                  --max-password-age 90 --password-reuse-prevention 24'
                - 'Rotate access keys: aws iam create-access-key then aws iam delete-access-key for old key'
                - 'Use AWS Secrets Manager for application credentials: aws secretsmanager create-secret'
              console_path:
                aws: IAM → Account settings → Password policy → Edit
            cloud_checks:
              aws:
              - service: iam
                method: get_account_password_policy
                assertion: strong_password_policy
        IA-6:
          title: Authentication Feedback
          description: Obscure feedback of authentication information during the authentication process to protect the information from possible exploitation and use by unauthorized individuals.
          checks:
          - id: IA-6.a
            description: Verify authentication feedback is obscured during the authentication process
            evidence_type: config_check
            remediation:
              summary: Ensure authentication processes obscure credentials and feedback.
              steps:
                aws:
                - aws cognito-idp describe-user-pool --user-pool-id <pool-id>
                - aws cognito-idp describe-user-pool-client --user-pool-id <pool-id> --client-id <client-id>
                - aws secretsmanager list-secrets
              console_path:
                aws: Amazon Cognito → User pools → App client settings
            cloud_checks:
              aws:
              - service: cognito-idp
                method: describe_user_pool
                assertion: auth_feedback_obscured
        IA-7:
          title: Cryptographic Module Authentication
          description: Implement mechanisms for authentication to a cryptographic module that meet applicable federal laws, executive orders, directives, policies, regulations, standards, and guidelines
            for such authentication.
          checks:
          - id: IA-7.a
            description: Verify cryptographic modules use approved authentication mechanisms
            evidence_type: config_check
            remediation:
              summary: Ensure cryptographic modules meet FIPS 140 validation requirements.
              steps:
                aws:
                - aws kms list-keys
                - aws kms describe-key --key-id <key-id>
                - aws cloudhsm describe-clusters
                - aws acm list-certificates
                - aws elbv2 describe-ssl-policies
              console_path:
                aws: AWS KMS → Customer managed keys
            cloud_checks:
              aws:
              - service: kms
                method: list_keys
                assertion: kms_keys_exist
              - service: cloudhsmv2
                method: describe_clusters
                assertion: fips_validated_modules
        IA-8:
          title: Identification and Authentication (Non-Organizational Users)
          description: Uniquely identify and authenticate non-organizational users.
          checks:
          - id: IA-8.a
            description: Verify non-organizational user identification
            evidence_type: iam_config
            remediation:
              summary: Use IAM roles for cross-account access and Cognito for external users.
              steps:
                aws:
                - 'Create cross-account roles: aws iam create-role with trust policy for external accounts'
                - 'Use Cognito for customer-facing authentication: aws cognito-idp create-user-pool'
                - 'Enforce MFA for external access: add MFA condition to trust policy'
              console_path:
                aws: IAM → Roles → Create role → Another AWS account
            cloud_checks:
              aws:
              - service: iam
                method: list_roles
                assertion: external_access_via_roles
        IA-9:
          title: Service Identification and Authentication
          description: Uniquely identify and authenticate organizational services and applications before establishing communications with those services.
          checks:
          - id: IA-9.a
            description: Verify services are uniquely identified and authenticated
            evidence_type: config_check
            remediation:
              summary: Implement service identification and authentication for inter-service communications.
              steps:
                aws:
                - aws servicediscovery list-namespaces
                - aws servicediscovery list-services
                - aws appmesh list-meshes
                - aws acm-pca list-certificate-authorities
                - aws iam list-roles --query 'Roles[?contains(AssumeRolePolicyDocument, `sts:AssumeRole`)]'
              console_path:
                aws: AWS Cloud Map → Namespaces
            cloud_checks:
              aws:
              - service: servicediscovery
                method: list_namespaces
                assertion: service_namespaces_exist
              - service: acm-pca
                method: list_certificate_authorities
                assertion: private_ca_exists
        IA-10:
          title: Adaptive Authentication
          description: Require individuals accessing the system to employ supplemental authentication techniques or mechanisms under specific conditions as defined by the organization.
          checks:
          - id: IA-10.a
            description: Verify adaptive authentication is applied under defined circumstances
            evidence_type: config_check
            remediation:
              summary: Implement adaptive or risk-based authentication for defined conditions.
              steps:
                aws:
                - aws cognito-idp describe-user-pool --user-pool-id <pool-id>
                - aws cognito-idp describe-risk-configuration --user-pool-id <pool-id>
                - aws cognito-idp get-user-pool-mfa-config --user-pool-id <pool-id>
                - aws iam list-virtual-mfa-devices
              console_path:
                aws: Amazon Cognito → User pools → Advanced security
            cloud_checks:
              aws:
              - service: cognito-idp
                method: describe_risk_configuration
                assertion: risk_based_auth_enabled
        IA-11:
          title: Re-authentication
          description: Require users to re-authenticate when defined circumstances or situations require re-authentication, such as changes in roles, privilege escalation, or after a defined time period.
          checks:
          - id: IA-11.a
            description: Verify re-authentication is enforced under defined conditions
            evidence_type: config_check
            remediation:
              summary: Configure re-authentication requirements for privilege changes and session timeouts.
              steps:
                aws:
                - aws iam get-account-password-policy
                - aws cognito-idp describe-user-pool-client --user-pool-id <pool-id> --client-id <client-id>
                - aws sts get-session-token
                - aws iam list-roles --query 'Roles[*].[RoleName,MaxSessionDuration]'
              console_path:
                aws: IAM → Roles → Maximum session duration
            cloud_checks:
              aws:
              - service: iam
                method: list_roles
                assertion: session_duration_configured
              - service: cognito-idp
                method: describe_user_pool_client
                assertion: token_expiry_configured
        IA-12:
          title: Identity Proofing
          description: Identity proof users that require accounts for logical access to systems based on appropriate identity assurance level requirements. Resolve user identities to a unique individual
            and collect, validate, and verify identity evidence.
          checks:
          - id: IA-12.a
            description: Verify identity proofing processes exist for account provisioning
            evidence_type: policy_doc
            remediation:
              summary: Establish identity proofing procedures aligned with assurance level requirements.
              steps:
                aws:
                - aws iam list-users
                - aws iam get-user --user-name <username>
                - aws sso-admin list-instances
                - aws identitystore list-users --identity-store-id <store-id>
                - aws cognito-idp list-user-pools --max-results 10
              console_path:
                aws: AWS IAM Identity Center → Users
            cloud_checks:
              aws:
              - service: sso-admin
                method: list_instances
                assertion: sso_configured
              - service: identitystore
                method: list_users
                assertion: identity_store_populated
    IR:
      name: Incident Response
      controls:
        IR-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate incident response policy and procedures.
          checks:
          - id: IR-1.a
            description: Verify incident response policy exists
            evidence_type: policy_doc
            remediation:
              summary: Create IR policy with escalation procedures and communication plans.
              steps:
                aws:
                - Document IR procedures including AWS-specific runbooks
                - 'Configure SNS topics for incident notifications: aws sns create-topic --name incident-alerts'
              console_path:
                aws: N/A — IR policy is an organizational control
            cloud_checks:
              aws:
              - service: sns
                method: list_topics
                assertion: incident_notification_configured
        IR-2:
          title: Incident Response Training
          description: Provide incident response training to system users.
          checks:
          - id: IR-2.a
            description: Verify IR training is provided
            evidence_type: training_records
            remediation:
              summary: Conduct annual incident response training and tabletop exercises.
              steps:
                aws:
                - Train team on AWS IR procedures and tools (GuardDuty, Detective, Security Hub)
                - Conduct tabletop exercises using realistic AWS scenarios
              console_path:
                aws: N/A — Training tracked externally
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: ir_training_conducted
        IR-3:
          title: Incident Response Testing
          description: Test the incident response capability at a defined frequency.
          checks:
          - id: IR-3.a
            description: Verify incident response testing is conducted
            evidence_type: test_results
            remediation:
              summary: Conduct annual IR tabletop or simulation exercises.
              steps:
                aws:
                - Run AWS GameDay-style incident simulations
                - 'Use AWS Fault Injection Simulator: aws fis create-experiment-template'
                - Document test results and update IR plan
              console_path:
                aws: FIS → Experiment templates → Create template
            cloud_checks:
              aws:
              - service: fis
                method: list_experiment_templates
                assertion: ir_testing_conducted
        IR-4:
          title: Incident Handling
          description: Implement an incident handling capability including preparation, detection, analysis, containment, eradication, and recovery.
          checks:
          - id: IR-4.a
            description: Verify incident handling process is implemented
            evidence_type: ir_procedures
            remediation:
              summary: Implement automated incident handling with GuardDuty, Security Hub, and Lambda remediation.
              steps:
                aws:
                - Configure GuardDuty auto-remediation via EventBridge + Lambda
                - Use Security Hub automated response actions
                - 'Create incident runbooks in Systems Manager: aws ssm create-document --document-type Automation'
                - 'Enable Detective for investigation: aws detective create-graph'
              console_path:
                aws: GuardDuty → Settings → Configure EventBridge rules for auto-response
            cloud_checks:
              aws:
              - service: guardduty
                method: list_detectors
                assertion: guardduty_enabled
        IR-5:
          title: Incident Monitoring
          description: Track and document incidents on an ongoing basis.
          checks:
          - id: IR-5.a
            description: Verify incident monitoring and tracking
            evidence_type: ir_records
            remediation:
              summary: Use Security Hub findings and CloudWatch dashboards for incident tracking.
              steps:
                aws:
                - Configure Security Hub custom insights for incident tracking
                - Create CloudWatch dashboard for security metrics
                - Set up SNS notifications for new findings
              console_path:
                aws: Security Hub → Insights → Create custom insight for incident tracking
            cloud_checks:
              aws:
              - service: securityhub
                method: get_findings
                assertion: incident_tracking_active
        IR-6:
          title: Incident Reporting
          description: Require personnel to report suspected incidents to the incident response capability.
          checks:
          - id: IR-6.a
            description: Verify incident reporting mechanisms exist
            evidence_type: ir_procedures
            remediation:
              summary: Configure automated incident reporting via SNS and Security Hub.
              steps:
                aws:
                - Configure SNS topics for incident reporting
                - Create EventBridge rules for high-severity findings
                - Integrate with incident management platform (PagerDuty, Opsgenie)
              console_path:
                aws: EventBridge → Rules → Create rule → Security Hub findings
            cloud_checks:
              aws:
              - service: events
                method: list_rules
                assertion: incident_reporting_configured
        IR-7:
          title: Incident Response Assistance
          description: Provide an incident response support resource, integral to the organizational incident response capability, that offers advice and assistance to users of the system for the handling
            and reporting of security and privacy incidents.
          checks:
          - id: IR-7.a
            description: Verify incident response support resources are available to system users
            evidence_type: config_check
            remediation:
              summary: Establish incident response assistance capabilities and communication channels.
              steps:
                aws:
                - aws support describe-trusted-advisor-checks --language en
                - aws sns list-topics --query 'Topics[*].TopicArn'
                - aws sns list-subscriptions-by-topic --topic-arn <incident-topic-arn>
                - aws securityhub describe-hub
              console_path:
                aws: AWS Security Hub → Findings
            cloud_checks:
              aws:
              - service: sns
                method: list_topics
                assertion: incident_notification_topic_exists
              - service: securityhub
                method: describe_hub
                assertion: hub_enabled
        IR-8:
          title: Incident Response Plan
          description: Develop and implement an incident response plan.
          checks:
          - id: IR-8.a
            description: Verify incident response plan exists
            evidence_type: ir_plan
            remediation:
              summary: Create a comprehensive IR plan with AWS-specific procedures.
              steps:
                aws:
                - Document IR plan including AWS service-specific procedures
                - Create Systems Manager automation runbooks for common incidents
                - Review and update annually
              console_path:
                aws: Systems Manager → Documents → Create automation runbook
            cloud_checks:
              aws:
              - service: ssm
                method: list_documents
                assertion: ir_runbooks_exist
        IR-9:
          title: Information Spillage Response
          description: Respond to information spills by identifying the specific information involved in the system contamination, alerting designated personnel, isolating the contaminated system or component,
            and eradicating the information from the contaminated system or component.
          checks:
          - id: IR-9.a
            description: Verify information spillage response procedures are established
            evidence_type: policy_doc
            remediation:
              summary: Develop information spillage response procedures including identification, isolation, and eradication steps.
              steps:
                aws:
                - aws macie2 list-findings --finding-criteria '{"criterion":{"severity.description":{"eq":["High"]}}}'
                - aws macie2 get-finding-statistics --group-by 'type'
                - aws s3api get-bucket-versioning --bucket <bucket-name>
                - aws cloudtrail lookup-events --lookup-attributes AttributeKey=EventName,AttributeValue=PutObject
              console_path:
                aws: Amazon Macie → Findings
            cloud_checks:
              aws:
              - service: macie2
                method: list_findings
                assertion: spillage_monitoring_active
        IR-10:
          title: Integrated Information Security Analysis Team
          description: Establish an integrated team of forensic and analytical personnel who are available to investigate and respond to incidents and provide support to the incident response process.
          checks:
          - id: IR-10.a
            description: Verify integrated security analysis team is established and available
            evidence_type: policy_doc
            remediation:
              summary: Establish an integrated incident analysis team with defined roles and access.
              steps:
                aws:
                - aws iam list-groups --query 'Groups[?contains(GroupName, `incident`) || contains(GroupName, `security`)]'
                - aws iam get-group --group-name incident-response-team
                - aws detective list-graphs
                - aws securityhub list-members
              console_path:
                aws: Amazon Detective → Search → Overview
            cloud_checks:
              aws:
              - service: detective
                method: list_graphs
                assertion: detective_enabled
              - service: iam
                method: list_groups
                assertion: ir_team_group_exists
    MA:
      name: Maintenance
      controls:
        MA-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate maintenance policies and procedures that address purpose, scope, roles, responsibilities, management commitment, coordination, and compliance.
          checks:
          - id: MA-1.a
            description: Verify maintenance policy exists and is current
            evidence_type: policy_doc
            remediation:
              summary: Create maintenance policy document covering system maintenance procedures and schedules.
              steps:
                aws:
                - aws ssm describe-maintenance-windows
                - aws ssm describe-maintenance-window-targets --window-id <window-id>
                - Review documented maintenance policy for annual review date
              console_path:
                aws: Systems Manager → Maintenance Windows
            cloud_checks:
              aws:
              - service: ssm
                method: describe_maintenance_windows
                assertion: maintenance_windows_configured
        MA-2:
          title: Controlled Maintenance
          description: Schedule, document, and review records of maintenance and repairs.
          checks:
          - id: MA-2.a
            description: Verify controlled maintenance processes
            evidence_type: maintenance_records
            remediation:
              summary: Use Systems Manager Maintenance Windows for scheduled patching.
              steps:
                aws:
                - 'Create maintenance window: aws ssm create-maintenance-window --name weekly-patching --schedule ''cron(0 2 ? * SUN *)'' --duration 4 --cutoff 1'
                - 'Register targets: aws ssm register-target-with-maintenance-window'
                - 'Register patch task: aws ssm register-task-with-maintenance-window --task-type RUN_COMMAND'
              console_path:
                aws: Systems Manager → Maintenance Windows → Create maintenance window
            cloud_checks:
              aws:
              - service: ssm
                method: describe_maintenance_windows
                assertion: maintenance_windows_configured
        MA-3:
          title: Maintenance Tools
          description: Approve, control, and monitor the use of system maintenance tools.
          checks:
          - id: MA-3.a
            description: Verify approved maintenance tools are documented and controlled
            evidence_type: policy_doc
            remediation:
              summary: Maintain an approved list of maintenance tools and audit their usage.
              steps:
                aws:
                - aws ssm list-documents --document-filter-list key=DocumentType,value=Command
                - aws ssm describe-instance-information
                - Review SSM Agent versions and approved run commands
              console_path:
                aws: Systems Manager → Documents → Owned by me
            cloud_checks:
              aws:
              - service: ssm
                method: list_documents
                assertion: maintenance_documents_approved
          - id: MA-3.b
            description: Verify maintenance tools are checked for improper modifications
            evidence_type: config_check
            remediation:
              summary: Implement integrity verification for maintenance tools.
              steps:
                aws:
                - aws ssm describe-instance-information --query 'InstanceInformationList[*].[InstanceId,PingStatus,AgentVersion]'
                - aws inspector2 list-findings --filter-criteria resourceType=[{comparison=EQUALS,value=AWS_EC2_INSTANCE}]
              console_path:
                aws: Systems Manager → Fleet Manager → Managed instances
            cloud_checks:
              aws:
              - service: ssm
                method: describe_instance_information
                assertion: ssm_agents_current_version
        MA-4:
          title: Nonlocal Maintenance
          description: Approve, monitor, and control nonlocal maintenance and diagnostic activities.
          checks:
          - id: MA-4.a
            description: Verify nonlocal maintenance controls
            evidence_type: access_records
            remediation:
              summary: Use SSM Session Manager for all remote maintenance with full audit logging.
              steps:
                aws:
                - 'Use Session Manager instead of SSH: aws ssm start-session --target <instance-id>'
                - 'Configure Session Manager logging: log to CloudWatch and S3'
                - Require IAM permissions for session access
              console_path:
                aws: Systems Manager → Session Manager → Preferences → Enable logging
            cloud_checks:
              aws:
              - service: ssm
                method: describe_sessions
                assertion: session_manager_logging_enabled
        MA-5:
          title: Maintenance Personnel
          description: Establish a process for maintenance personnel authorization.
          checks:
          - id: MA-5.a
            description: Verify maintenance personnel authorization
            evidence_type: personnel_records
            remediation:
              summary: Restrict maintenance access to authorized roles with time-limited credentials.
              steps:
                aws:
                - Create maintenance IAM role with time-limited sessions
                - Use IAM Identity Center temporary access for vendor maintenance
                - Audit all maintenance sessions via CloudTrail
              console_path:
                aws: IAM → Roles → Create maintenance role with session duration limits
            cloud_checks:
              aws:
              - service: iam
                method: list_roles
                assertion: maintenance_roles_scoped
        MA-6:
          title: Timely Maintenance
          description: Obtain maintenance support and spare parts for system components within a defined time period of failure.
          checks:
          - id: MA-6.a
            description: Verify timely maintenance support agreements are in place
            evidence_type: policy_doc
            remediation:
              summary: Establish maintenance SLAs and ensure spare parts availability for critical components.
              steps:
                aws:
                - aws support describe-trusted-advisor-checks --language en
                - aws health describe-events --filter eventTypeCategories=scheduledChange
                - 'Verify AWS Support plan level: aws support describe-severity-levels'
              console_path:
                aws: Support Center → Support plan
            cloud_checks:
              aws:
              - service: support
                method: describe_severity_levels
                assertion: support_plan_adequate
        MA-7:
          title: Field Maintenance
          description: Restrict or prohibit field maintenance on system components to authorized facilities.
          checks:
          - id: MA-7.a
            description: Verify field maintenance restrictions are defined and enforced
            evidence_type: policy_doc
            remediation:
              summary: Document field maintenance restrictions and ensure components are serviced only at authorized facilities.
              steps:
                aws:
                - aws ssm describe-maintenance-windows --query 'MainWindowIdentities[*].[WindowId,Name,Enabled]'
                - Review AWS shared responsibility model - physical maintenance is AWS responsibility
                - Document any on-premises or hybrid component maintenance procedures
              console_path:
                aws: Systems Manager → Maintenance Windows
            cloud_checks:
              aws:
              - service: ssm
                method: describe_maintenance_windows
                assertion: maintenance_windows_defined
    MP:
      name: Media Protection
      controls:
        MP-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate media protection policies and procedures that address purpose, scope, roles, responsibilities, management commitment, coordination, and compliance.
          checks:
          - id: MP-1.a
            description: Verify media protection policy exists and is current
            evidence_type: policy_doc
            remediation:
              summary: Create media protection policy covering handling, storage, transport, and sanitization of media.
              steps:
                aws:
                - aws s3api get-bucket-encryption --bucket <bucket-name>
                - aws ec2 describe-volumes --query 'Volumes[*].[VolumeId,Encrypted,State]'
                - Review documented media protection policy for annual review date
              console_path:
                aws: S3 → Buckets → Properties → Default encryption
            cloud_checks:
              aws:
              - service: s3
                method: get_bucket_encryption
                assertion: default_encryption_enabled
        MP-2:
          title: Media Access
          description: Restrict access to media to authorized individuals.
          checks:
          - id: MP-2.a
            description: Verify media access restrictions
            evidence_type: s3_config
            remediation:
              summary: Enforce S3 bucket policies and EBS encryption to protect stored media.
              steps:
                aws:
                - 'Encrypt EBS volumes: aws ec2 enable-ebs-encryption-by-default'
                - 'Enforce S3 encryption: aws s3api put-bucket-encryption'
                - 'Block public S3 access: aws s3api put-public-access-block'
              console_path:
                aws: EC2 → EBS → Encryption → Enable default encryption
            cloud_checks:
              aws:
              - service: ec2
                method: get_ebs_encryption_by_default
                assertion: ebs_encryption_enabled
        MP-3:
          title: Media Marking
          description: Mark system media indicating distribution limitations, handling caveats, and applicable security markings.
          checks:
          - id: MP-3.a
            description: Verify media marking procedures are defined and implemented
            evidence_type: policy_doc
            remediation:
              summary: Implement media marking through resource tagging and classification labels.
              steps:
                aws:
                - aws resourcegroupstaggingapi get-resources --tag-filters Key=Classification
                - aws s3api get-bucket-tagging --bucket <bucket-name>
                - aws ec2 describe-volumes --query 'Volumes[?!Tags].[VolumeId]' --output table
              console_path:
                aws: Resource Groups → Tag Editor
            cloud_checks:
              aws:
              - service: resourcegroupstaggingapi
                method: get_resources
                assertion: resources_have_classification_tags
        MP-4:
          title: Media Storage
          description: Physically control and securely store digital and non-digital media within controlled areas.
          checks:
          - id: MP-4.a
            description: Verify media is stored securely with encryption and access controls
            evidence_type: config_check
            remediation:
              summary: Enable encryption at rest for all storage media and restrict access.
              steps:
                aws:
                - aws ec2 describe-volumes --query 'Volumes[?Encrypted==`false`].[VolumeId,State]'
                - aws s3api get-bucket-encryption --bucket <bucket-name>
                - aws rds describe-db-instances --query 'DBInstances[*].[DBInstanceIdentifier,StorageEncrypted]'
                - aws kms list-keys
              console_path:
                aws: EC2 → Volumes → Encryption status
            cloud_checks:
              aws:
              - service: ec2
                method: describe_volumes
                assertion: all_volumes_encrypted
              - service: rds
                method: describe_db_instances
                assertion: all_rds_storage_encrypted
        MP-5:
          title: Media Transport
          description: Protect and control digital and non-digital media during transport outside of controlled areas.
          checks:
          - id: MP-5.a
            description: Verify media transport protections including encryption in transit
            evidence_type: config_check
            remediation:
              summary: Enforce encryption in transit for all data transport mechanisms.
              steps:
                aws:
                - aws s3api get-bucket-policy --bucket <bucket-name> | grep -i ssl
                - aws elbv2 describe-listeners --load-balancer-arn <lb-arn> --query 'Listeners[*].[Protocol,Port]'
                - aws cloudfront get-distribution --id <dist-id> --query 'Distribution.DistributionConfig.ViewerCertificate'
              console_path:
                aws: S3 → Bucket policy → Enforce SSL
            cloud_checks:
              aws:
              - service: s3
                method: get_bucket_policy
                assertion: ssl_enforced_on_bucket
              - service: elbv2
                method: describe_listeners
                assertion: https_listeners_configured
        MP-6:
          title: Media Sanitization
          description: Sanitize media prior to disposal, release, or reuse.
          checks:
          - id: MP-6.a
            description: Verify media sanitization procedures
            evidence_type: disposal_records
            remediation:
              summary: AWS handles physical media destruction. Ensure EBS/S3 data is encrypted and keys are rotated.
              steps:
                aws:
                - AWS handles physical media sanitization per SOC 2/ISO 27001
                - 'For virtual media: delete EBS volumes and S3 objects with versioning cleanup'
                - 'Rotate KMS keys to cryptographically erase: aws kms schedule-key-deletion --key-id <id> --pending-window-in-days 7'
              console_path:
                aws: KMS → Customer managed keys → Schedule key deletion
            cloud_checks:
              aws:
              - service: kms
                method: list_keys
                assertion: key_rotation_enabled
        MP-7:
          title: Media Use
          description: Restrict the use of certain types of media on systems and prohibit the use of portable storage devices when such devices have no identifiable owner.
          checks:
          - id: MP-7.a
            description: Verify restrictions on media use are implemented
            evidence_type: config_check
            remediation:
              summary: Implement policies restricting removable media and unauthorized storage access.
              steps:
                aws:
                - aws ec2 describe-volume-status --query 'VolumeStatuses[*].[VolumeId,VolumeStatus.Status]'
                - aws s3api get-bucket-policy-status --bucket <bucket-name>
                - aws s3control get-public-access-block --account-id <account-id>
              console_path:
                aws: S3 → Block Public Access settings
            cloud_checks:
              aws:
              - service: s3control
                method: get_public_access_block
                assertion: public_access_blocked
        MP-8:
          title: Media Downgrading
          description: Downgrade system media prior to release to individuals without required authorization.
          checks:
          - id: MP-8.a
            description: Verify media downgrading procedures and approvals are in place
            evidence_type: policy_doc
            remediation:
              summary: Establish media downgrading procedures with proper review and approval workflow.
              steps:
                aws:
                - aws s3api get-object-tagging --bucket <bucket-name> --key <key>
                - Review data classification policies for downgrading criteria
                - Verify approval workflow exists in change management system
              console_path:
                aws: S3 → Object → Tags → Classification
            cloud_checks:
              aws:
              - service: s3
                method: get_object_tagging
                assertion: classification_tags_present
    PE:
      name: Physical and Environmental Protection
      controls:
        PE-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate physical and environmental protection policies and procedures.
          checks:
          - id: PE-1.a
            description: Verify physical and environmental protection policy exists and is current
            evidence_type: policy_doc
            remediation:
              summary: Create physical and environmental protection policy. For cloud, reference AWS shared responsibility model.
              steps:
                aws:
                - aws configservice describe-compliance-by-config-rule --config-rule-names restricted-ssh
                - Review AWS Artifact for AWS SOC 2 and ISO 27001 reports covering physical controls
                - Document organizational physical security policies for non-cloud assets
              console_path:
                aws: AWS Artifact → Reports → SOC 2 Type II
            cloud_checks:
              aws:
              - service: configservice
                method: describe_compliance_by_config_rule
                assertion: config_rules_compliant
        PE-2:
          title: Physical Access Authorizations
          description: Develop, approve, and maintain a list of individuals with authorized access to the facility.
          checks:
          - id: PE-2.a
            description: Verify physical access authorization list exists
            evidence_type: physical_access_list
            remediation:
              summary: 'For cloud: AWS manages physical security. Document your office/data center access lists.'
              steps:
                aws:
                - AWS handles data center physical security (SOC 2 reports available)
                - 'Request AWS SOC 2 report via AWS Artifact: aws artifact'
                - 'For your offices: maintain authorized personnel list for server rooms'
              console_path:
                aws: Artifact → Reports → Download SOC 2 report
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: physical_access_documented
        PE-3:
          title: Physical Access Control
          description: Enforce physical access authorizations at entry and exit points.
          checks:
          - id: PE-3.a
            description: Verify physical access controls are in place
            evidence_type: physical_access_records
            remediation:
              summary: For cloud environments, verify AWS physical security via Artifact compliance reports.
              steps:
                aws:
                - Download AWS compliance reports from Artifact
                - Review AWS data center physical security documentation
              console_path:
                aws: Artifact → Reports → AWS SOC reports
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: physical_security_inherited
        PE-4:
          title: Access Control for Transmission
          description: Control physical access to system distribution and transmission lines within organizational facilities.
          checks:
          - id: PE-4.a
            description: Verify physical access controls for transmission infrastructure
            evidence_type: physical_inspection
            remediation:
              summary: For cloud workloads, AWS manages physical transmission security. For on-premises, secure cabling and distribution frames.
              steps:
                aws:
                - Review AWS Artifact reports for physical transmission security attestations
                - aws directconnect describe-connections --query 'connections[*].[connectionId,connectionState,location]'
                - aws ec2 describe-vpc-endpoints --query 'VpcEndpoints[*].[VpcEndpointId,VpcEndpointType,ServiceName]'
              console_path:
                aws: AWS Artifact → Reports → SOC 2 Type II
            cloud_checks:
              aws:
              - service: directconnect
                method: describe_connections
                assertion: direct_connect_connections_secure
        PE-5:
          title: Access Control for Output Devices
          description: Control physical access to output devices to prevent unauthorized individuals from obtaining the output.
          checks:
          - id: PE-5.a
            description: Verify access controls for output devices are in place
            evidence_type: physical_inspection
            remediation:
              summary: Control access to output devices. For cloud, ensure S3 and data export endpoints are secured.
              steps:
                aws:
                - aws s3control get-public-access-block --account-id <account-id>
                - aws s3api list-buckets --query 'Buckets[*].Name'
                - Verify no publicly accessible data export endpoints
              console_path:
                aws: S3 → Block Public Access → Account settings
            cloud_checks:
              aws:
              - service: s3control
                method: get_public_access_block
                assertion: account_public_access_blocked
        PE-6:
          title: Monitoring Physical Access
          description: Monitor physical access to the facility to detect and respond to incidents.
          checks:
          - id: PE-6.a
            description: Verify physical access monitoring
            evidence_type: physical_access_logs
            remediation:
              summary: AWS monitors data center access. Implement monitoring for your offices.
              steps:
                aws:
                - Verify via AWS SOC 2 report that AWS monitors physical access
                - 'For offices: configure badge access logging and camera monitoring'
              console_path:
                aws: Artifact → Reports → Verify physical monitoring attestation
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: physical_monitoring_active
        PE-8:
          title: Visitor Access Records
          description: Maintain visitor access records to the facility where the system resides.
          checks:
          - id: PE-8.a
            description: Verify visitor access records are maintained
            evidence_type: physical_inspection
            remediation:
              summary: Maintain visitor logs. For cloud, review CloudTrail for console and API access by external parties.
              steps:
                aws:
                - aws cloudtrail lookup-events --lookup-attributes AttributeKey=EventName,AttributeValue=ConsoleLogin --max-results 50
                - aws iam list-users --query 'Users[?Tags[?Key==`external`]]'
                - Review AWS Artifact for AWS data center visitor access controls
              console_path:
                aws: CloudTrail → Event history → ConsoleLogin
            cloud_checks:
              aws:
              - service: cloudtrail
                method: lookup_events
                assertion: console_logins_logged
        PE-9:
          title: Power Equipment and Cabling
          description: Protect power equipment and power cabling for the system from damage and destruction.
          checks:
          - id: PE-9.a
            description: Verify power equipment and cabling protections
            evidence_type: physical_inspection
            remediation:
              summary: For cloud, AWS manages power infrastructure. Review AWS compliance reports for attestations.
              steps:
                aws:
                - Review AWS Artifact for SOC 2 Type II report covering physical infrastructure
                - aws health describe-events --filter eventTypeCategories=accountNotification
                - Document on-premises power protection measures
              console_path:
                aws: AWS Artifact → Reports → SOC 2 Type II
            cloud_checks:
              aws:
              - service: health
                method: describe_events
                assertion: no_active_infrastructure_events
        PE-10:
          title: Emergency Shutoff
          description: Provide the capability of shutting off power to the system or individual system components in emergency situations.
          checks:
          - id: PE-10.a
            description: Verify emergency shutoff capability exists
            evidence_type: physical_inspection
            remediation:
              summary: For cloud, use AWS account-level controls for emergency isolation. Document on-premises emergency shutoff procedures.
              steps:
                aws:
                - aws organizations describe-organization
                - aws organizations list-policies --filter SERVICE_CONTROL_POLICY
                - Ensure emergency SCP exists to deny all actions for rapid account isolation
              console_path:
                aws: AWS Organizations → Policies → Service control policies
            cloud_checks:
              aws:
              - service: organizations
                method: list_policies
                assertion: emergency_scp_exists
        PE-11:
          title: Emergency Power
          description: Provide an uninterruptible power supply to facilitate an orderly shutdown of the system in the event of a primary power source loss.
          checks:
          - id: PE-11.a
            description: Verify emergency power provisions
            evidence_type: physical_inspection
            remediation:
              summary: For cloud, AWS provides redundant power. Review compliance reports. For on-premises, verify UPS systems.
              steps:
                aws:
                - Review AWS Artifact for infrastructure resilience attestations
                - aws ec2 describe-availability-zones --query 'AvailabilityZones[*].[ZoneName,State]'
                - Verify multi-AZ deployments for critical workloads
              console_path:
                aws: AWS Artifact → Reports → SOC 2 Type II
            cloud_checks:
              aws:
              - service: ec2
                method: describe_availability_zones
                assertion: multi_az_available
        PE-12:
          title: Emergency Lighting
          description: Employ and maintain automatic emergency lighting that activates in the event of a power outage or disruption.
          checks:
          - id: PE-12.a
            description: Verify emergency lighting provisions
            evidence_type: physical_inspection
            remediation:
              summary: For cloud, AWS manages facility lighting. Review compliance reports. Document on-premises emergency lighting.
              steps:
                aws:
                - Review AWS Artifact for SOC 2 Type II report covering facility controls
                - Document on-premises emergency lighting inspection records
              console_path:
                aws: AWS Artifact → Reports → SOC 2 Type II
            cloud_checks:
              aws:
              - service: artifact
                method: get_report
                assertion: physical_controls_attested
        PE-13:
          title: Fire Protection
          description: Employ and maintain fire detection and suppression systems that are supported by an independent energy source.
          checks:
          - id: PE-13.a
            description: Verify fire protection systems are in place
            evidence_type: physical_inspection
            remediation:
              summary: For cloud, AWS manages fire protection in data centers. Review compliance reports for attestation.
              steps:
                aws:
                - Review AWS Artifact for SOC 2 Type II report covering fire protection
                - aws health describe-events --filter eventTypeCategories=accountNotification
                - Document on-premises fire protection systems and inspection schedules
              console_path:
                aws: AWS Artifact → Reports → SOC 2 Type II
            cloud_checks:
              aws:
              - service: health
                method: describe_events
                assertion: no_fire_related_events
        PE-14:
          title: Environmental Controls
          description: Maintain temperature and humidity levels within the facility where the system resides at acceptable levels and monitor environmental conditions.
          checks:
          - id: PE-14.a
            description: Verify temperature and humidity controls and monitoring
            evidence_type: physical_inspection
            remediation:
              summary: For cloud, AWS manages environmental controls. Review compliance reports. Monitor on-premises HVAC systems.
              steps:
                aws:
                - Review AWS Artifact for SOC 2 Type II report covering environmental controls
                - aws cloudwatch describe-alarms --alarm-name-prefix Environment
                - Document on-premises environmental monitoring and thresholds
              console_path:
                aws: AWS Artifact → Reports → SOC 2 Type II
            cloud_checks:
              aws:
              - service: cloudwatch
                method: describe_alarms
                assertion: environmental_alarms_configured
        PE-15:
          title: Water Damage Protection
          description: Protect the system from damage resulting from water leakage by providing master shutoff or isolation valves.
          checks:
          - id: PE-15.a
            description: Verify water damage protection measures
            evidence_type: physical_inspection
            remediation:
              summary: For cloud, AWS manages water protection in data centers. Document on-premises water damage prevention.
              steps:
                aws:
                - Review AWS Artifact for SOC 2 Type II report covering water damage protection
                - Document on-premises water detection sensors and shutoff procedures
              console_path:
                aws: AWS Artifact → Reports → SOC 2 Type II
            cloud_checks:
              aws:
              - service: artifact
                method: get_report
                assertion: physical_controls_attested
        PE-16:
          title: Delivery and Removal
          description: Authorize and control system components entering and exiting the facility and maintain records of the components.
          checks:
          - id: PE-16.a
            description: Verify delivery and removal controls and records
            evidence_type: physical_inspection
            remediation:
              summary: For cloud, track asset provisioning and decommissioning via CloudTrail and Config.
              steps:
                aws:
                - aws cloudtrail lookup-events --lookup-attributes AttributeKey=EventName,AttributeValue=RunInstances --max-results 20
                - aws cloudtrail lookup-events --lookup-attributes AttributeKey=EventName,AttributeValue=TerminateInstances --max-results 20
                - aws configservice get-resource-config-history --resource-type AWS::EC2::Instance --resource-id <instance-id>
              console_path:
                aws: CloudTrail → Event history
            cloud_checks:
              aws:
              - service: cloudtrail
                method: lookup_events
                assertion: resource_lifecycle_logged
        PE-17:
          title: Alternate Work Site
          description: Employ controls at alternate work sites and assess the effectiveness of controls at those sites.
          checks:
          - id: PE-17.a
            description: Verify security controls at alternate work sites
            evidence_type: policy_doc
            remediation:
              summary: Implement remote access controls and VPN requirements for alternate work sites.
              steps:
                aws:
                - aws ec2 describe-vpn-connections --query 'VpnConnections[*].[VpnConnectionId,State]'
                - aws ec2 describe-client-vpn-endpoints --query 'ClientVpnEndpoints[*].[ClientVpnEndpointId,Status.Code]'
                - Review remote work security policies and MFA enforcement
              console_path:
                aws: VPC → Client VPN endpoints
            cloud_checks:
              aws:
              - service: ec2
                method: describe_client_vpn_endpoints
                assertion: client_vpn_endpoints_active
        PE-18:
          title: Location of System Components
          description: Position system components within the facility to minimize potential damage from physical and environmental hazards and to minimize the opportunity for unauthorized access.
          checks:
          - id: PE-18.a
            description: Verify system components are positioned to minimize risk
            evidence_type: physical_inspection
            remediation:
              summary: For cloud, leverage multi-AZ and multi-region deployments. Document on-premises component placement rationale.
              steps:
                aws:
                - aws ec2 describe-instances --query 'Reservations[*].Instances[*].[InstanceId,Placement.AvailabilityZone]' --output table
                - aws rds describe-db-instances --query 'DBInstances[*].[DBInstanceIdentifier,MultiAZ,AvailabilityZone]'
                - aws elasticache describe-cache-clusters --query 'CacheClusters[*].[CacheClusterId,PreferredAvailabilityZone]'
              console_path:
                aws: EC2 → Instances → Availability Zone
            cloud_checks:
              aws:
              - service: ec2
                method: describe_instances
                assertion: instances_distributed_across_azs
        PE-19:
          title: Information Leakage
          description: Protect the system from information leakage due to electromagnetic signals emanations.
          checks:
          - id: PE-19.a
            description: Verify information leakage protections are in place
            evidence_type: physical_inspection
            remediation:
              summary: For cloud, AWS manages TEMPEST protections. For on-premises, assess electromagnetic emanation risks.
              steps:
                aws:
                - Review AWS Artifact for compliance reports addressing emanation security
                - aws ec2 describe-instances --filters Name=instance-type,Values=*.metal --query 'Reservations[*].Instances[*].[InstanceId,InstanceType]'
                - Document on-premises TEMPEST countermeasures if applicable
              console_path:
                aws: AWS Artifact → Reports
            cloud_checks:
              aws:
              - service: artifact
                method: get_report
                assertion: emanation_controls_attested
        PE-20:
          title: Asset Monitoring and Tracking
          description: Employ asset location technologies to track and monitor the location and movement of system components within organizational facilities.
          checks:
          - id: PE-20.a
            description: Verify asset monitoring and tracking capabilities
            evidence_type: config_check
            remediation:
              summary: Use AWS Config and resource inventory to track cloud assets. Implement CMDB for on-premises.
              steps:
                aws:
                - aws configservice describe-configuration-recorders
                - aws configservice get-discovered-resource-counts
                - aws ssm describe-instance-information --query 'InstanceInformationList[*].[InstanceId,PingStatus,LastPingDateTime]'
              console_path:
                aws: AWS Config → Resources → Inventory
            cloud_checks:
              aws:
              - service: configservice
                method: describe_configuration_recorders
                assertion: config_recorder_enabled
              - service: ssm
                method: describe_instance_information
                assertion: all_instances_managed
        PE-21:
          title: Electromagnetic Pulse Protection
          description: Employ protective measures against electromagnetic pulse damage for the system and system components.
          checks:
          - id: PE-21.a
            description: Verify electromagnetic pulse protections
            evidence_type: physical_inspection
            remediation:
              summary: For cloud, AWS manages EMP protection at data centers. Document on-premises EMP countermeasures.
              steps:
                aws:
                - Review AWS Artifact for compliance reports covering EMP protections
                - Verify multi-region disaster recovery deployment for critical workloads
                - aws ec2 describe-regions --query 'Regions[*].RegionName'
              console_path:
                aws: AWS Artifact → Reports → SOC 2 Type II
            cloud_checks:
              aws:
              - service: ec2
                method: describe_regions
                assertion: multi_region_available
        PE-22:
          title: Component Marking
          description: Mark system components indicating the impact level or classification of the information permitted to be processed, stored, or transmitted by the component.
          checks:
          - id: PE-22.a
            description: Verify system components are marked with classification levels
            evidence_type: config_check
            remediation:
              summary: Tag all cloud resources with classification and impact level labels.
              steps:
                aws:
                - aws resourcegroupstaggingapi get-resources --tag-filters Key=DataClassification
                - aws resourcegroupstaggingapi get-resources --tag-filters Key=ImpactLevel
                - aws configservice describe-config-rules --config-rule-names required-tags
              console_path:
                aws: Resource Groups → Tag Editor
            cloud_checks:
              aws:
              - service: resourcegroupstaggingapi
                method: get_resources
                assertion: resources_have_classification_and_impact_tags
              - service: configservice
                method: describe_config_rules
                assertion: required_tags_rule_exists
        PE-23:
          title: Facility Location
          description: Plan the location of the facility where the system resides considering physical and environmental hazards and for existing facilities consider the physical and environmental hazards
            in the risk mitigation strategy.
          checks:
          - id: PE-23.a
            description: Verify facility location risk assessment is documented
            evidence_type: physical_inspection
            remediation:
              summary: For cloud, select AWS regions based on risk profile. Document region selection rationale and disaster risk assessment.
              steps:
                aws:
                - aws ec2 describe-regions --query 'Regions[*].[RegionName,OptInStatus]' --output table
                - aws ec2 describe-availability-zones --query 'AvailabilityZones[*].[RegionName,ZoneName,State]'
                - Document region selection criteria including latency, compliance, and environmental risk factors
              console_path:
                aws: EC2 → Dashboard → Region selector
            cloud_checks:
              aws:
              - service: ec2
                method: describe_regions
                assertion: regions_documented_and_justified
    PL:
      name: Planning
      controls:
        PL-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate security planning policies and procedures.
          checks:
          - id: PL-1.a
            description: Verify security planning policy exists and is current
            evidence_type: policy_doc
            remediation:
              summary: Create security planning policy covering system security plan development, review, and update.
              steps:
                aws:
                - aws securityhub describe-hub
                - aws securityhub get-findings --filters ProductName=[{Value=Security Hub,Comparison=EQUALS}] --max-items 10
                - Review documented security planning policy for annual review date
              console_path:
                aws: Security Hub → Summary
            cloud_checks:
              aws:
              - service: securityhub
                method: describe_hub
                assertion: security_hub_enabled
        PL-2:
          title: System Security and Privacy Plans
          description: Develop, document, and maintain security and privacy plans for the system.
          checks:
          - id: PL-2.a
            description: Verify system security plan exists
            evidence_type: ssp_doc
            remediation:
              summary: Create and maintain a System Security Plan documenting all security controls.
              steps:
                aws:
                - Use this GRC toolkit to generate SSP components from assessment results
                - Document system boundary including all AWS services in scope
                - Map controls to AWS services using this framework
              console_path:
                aws: N/A — SSP is an organizational document
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: ssp_documented
        PL-4:
          title: Rules of Behavior
          description: Establish and make available rules describing responsibilities and expected behavior.
          checks:
          - id: PL-4.a
            description: Verify rules of behavior are established and acknowledged
            evidence_type: policy_doc
            remediation:
              summary: Create acceptable use policy and require annual acknowledgment.
              steps:
                aws:
                - Document acceptable use policy for AWS resources
                - Configure IAM login banner referencing the policy
                - Track acknowledgments via HR system or GRC platform
              console_path:
                aws: N/A — AUP is an organizational document
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: rules_of_behavior_documented
        PL-7:
          title: Concept of Operations
          description: Develop a concept of operations for the system describing how the organization intends to operate the system from the perspective of information security and privacy.
          checks:
          - id: PL-7.a
            description: Verify concept of operations document exists and addresses security
            evidence_type: policy_doc
            remediation:
              summary: Develop concept of operations document describing system security architecture and operational procedures.
              steps:
                aws:
                - aws wellarchitected list-workloads
                - Review AWS Well-Architected Framework security pillar documentation
                - Document operational security concept including roles, responsibilities, and workflows
              console_path:
                aws: AWS Well-Architected Tool → Workloads
            cloud_checks:
              aws:
              - service: wellarchitected
                method: list_workloads
                assertion: workloads_defined
        PL-8:
          title: Security and Privacy Architectures
          description: Develop security and privacy architectures for the system that describe the requirements and approach to protecting the confidentiality, integrity, and availability of the information.
          checks:
          - id: PL-8.a
            description: Verify security architecture documentation exists and is current
            evidence_type: policy_doc
            remediation:
              summary: Develop and maintain security architecture documentation aligned with enterprise architecture.
              steps:
                aws:
                - aws wellarchitected list-workloads --query 'WorkloadSummaries[*].[WorkloadId,WorkloadName]'
                - aws wellarchitected list-lens-reviews --workload-id <workload-id>
                - Document security architecture including network diagrams, data flows, and trust boundaries
              console_path:
                aws: AWS Well-Architected Tool → Workloads → Lens reviews
            cloud_checks:
              aws:
              - service: wellarchitected
                method: list_workloads
                assertion: security_architecture_reviewed
        PL-9:
          title: Central Management
          description: Centrally manage security controls and related processes.
          checks:
          - id: PL-9.a
            description: Verify centralized management of security controls
            evidence_type: config_check
            remediation:
              summary: Implement centralized security management using AWS Organizations and Security Hub.
              steps:
                aws:
                - aws organizations describe-organization
                - aws securityhub describe-hub
                - aws securityhub list-members --query 'Members[*].[AccountId,MemberStatus]'
                - aws guardduty list-detectors
              console_path:
                aws: AWS Organizations → Accounts
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: organization_configured
              - service: securityhub
                method: describe_hub
                assertion: security_hub_centralized
        PL-10:
          title: Baseline Selection
          description: Select a control baseline for the system.
          checks:
          - id: PL-10.a
            description: Verify a security control baseline has been selected and documented
            evidence_type: policy_doc
            remediation:
              summary: Select and document the applicable security control baseline based on system categorization.
              steps:
                aws:
                - aws securityhub describe-standards
                - aws securityhub get-enabled-standards
                - aws securityhub describe-standards-controls --standards-subscription-arn <arn>
              console_path:
                aws: Security Hub → Security standards
            cloud_checks:
              aws:
              - service: securityhub
                method: get_enabled_standards
                assertion: security_standards_enabled
        PL-11:
          title: Baseline Tailoring
          description: Tailor the selected control baseline by applying specified tailoring actions.
          checks:
          - id: PL-11.a
            description: Verify control baseline tailoring is documented with rationale
            evidence_type: policy_doc
            remediation:
              summary: Document tailoring decisions for the selected baseline including justification for any modifications.
              steps:
                aws:
