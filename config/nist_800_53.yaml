                aws: AWS Cost Explorer → Cost and Usage Reports
            cloud_checks:
              aws:
              - service: ce
                method: get_cost_and_usage
                assertion: cost_data_available
        PM-4:
          title: Plan of Action and Milestones Process
          description: Implement a process to create, track, and manage plans of action and milestones for the information security and privacy programs.
          checks:
          - id: PM-4.a
            description: Verify POA&M process exists and findings are tracked
            evidence_type: poam_doc
            remediation:
              summary: Create a POA&M tracking process using Security Hub findings and remediation timelines.
              steps:
                aws:
                - aws securityhub get-findings --filters '{"WorkflowStatus":[{"Value":"NEW","Comparison":"EQUALS"}]}'
                - aws securityhub get-findings --filters '{"SeverityLabel":[{"Value":"CRITICAL","Comparison":"EQUALS"}]}'
                - aws securityhub batch-update-findings --finding-identifiers '[{"Id":"<finding-id>","ProductArn":"<product-arn>"}]' --workflow '{"Status":"NOTIFIED"}'
              console_path:
                aws: Security Hub → Findings → Filter by status
            cloud_checks:
              aws:
              - service: securityhub
                method: get_findings
                assertion: poam_findings_tracked
        PM-5:
