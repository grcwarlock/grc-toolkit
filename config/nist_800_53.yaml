          checks:
          - id: PM-6.a
            description: Verify security performance metrics are defined and tracked
            evidence_type: metrics_report
            remediation:
              summary: Define and track security KPIs using Security Hub security scores and CloudWatch dashboards.
              steps:
                aws:
                - aws securityhub get-findings --filters '{"ComplianceStatus":[{"Value":"PASSED","Comparison":"EQUALS"}]}' --query 'Findings | length(@)'
                - aws securityhub get-findings --filters '{"ComplianceStatus":[{"Value":"FAILED","Comparison":"EQUALS"}]}' --query 'Findings | length(@)'
                - aws cloudwatch get-metric-statistics --namespace AWS/SecurityHub --metric-name SecurityScore --period 86400 --start-time 2025-01-01T00:00:00Z --end-time 2025-12-31T00:00:00Z --statistics
                  Average
