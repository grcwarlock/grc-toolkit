                azure: Azure Stack Hub → Access control
                gcp: Google Distributed Cloud → Site management
            cloud_checks:
              aws:
              - service: outposts
                method: list_sites
                assertion: physical_sites_documented
        PE-6:
          title: Monitoring Physical Access
          description: Monitor physical access to the facility where the system resides to detect and respond to physical security incidents.
          checks:
          - id: PE-6.a
            description: Monitor physical access to facilities
            evidence_type: monitoring_config
            remediation:
              summary: Implement physical access monitoring and integrate with cloud security monitoring.
              steps:
                aws:
                - AWS data centers have 24/7 physical monitoring - review via AWS Artifact SOC reports
                - 'For hybrid environments, integrate physical access logs with CloudWatch: aws logs create-log-group --log-group-name /physical-access/building-access'
                - 'Create alarms for physical access anomalies: aws cloudwatch put-metric-alarm --alarm-name UnauthorizedPhysicalAccess'
                azure:
                - Azure data centers have continuous physical monitoring per Microsoft compliance certifications
                - Integrate on-premises physical access logs with Azure Monitor
                gcp:
                - Google data centers have multilayer physical security - review via compliance reports
                - Integrate physical access logs with Cloud Logging for hybrid environments
              console_path:
