            description: Verify system inventory is maintained
            evidence_type: system_inventory
            remediation:
              summary: Maintain a complete inventory of systems using AWS Systems Manager and resource tagging.
              steps:
                aws:
                - aws ssm describe-instance-information --query 'InstanceInformationList[*].[InstanceId,PlatformType,PlatformName]'
                - aws configservice get-discovered-resource-counts
                - aws resourcegroupstaggingapi get-resources --tag-filters Key=SystemOwner
                - aws organizations list-accounts
              console_path:
                aws: Systems Manager → Managed Instances → View inventory
            cloud_checks:
              aws:
              - service: ssm
                method: describe_instance_information
                assertion: system_inventory_current
        PM-6:
          title: Measures of Performance
