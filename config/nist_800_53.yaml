              summary: Document security resource allocation in budget and capital planning submissions.
              steps:
                aws:
                - aws ce get-cost-and-usage --time-period Start=2025-01-01,End=2025-12-31 --granularity MONTHLY --metrics BlendedCost --group-by Type=TAG,Key=Project
                - aws ce get-cost-and-usage --time-period Start=2025-01-01,End=2025-12-31 --granularity MONTHLY --metrics BlendedCost --filter '{"Tags":{"Key":"CostCenter","Values":["Security"]}}'
                - aws budgets describe-budgets --account-id <account-id>
