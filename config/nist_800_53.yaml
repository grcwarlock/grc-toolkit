                aws:
                - aws iam get-account-password-policy
                - aws iam generate-credential-report && aws iam get-credential-report --output text --query Content | base64 -d
                - aws organizations list-policies --filter SERVICE_CONTROL_POLICY
              console_path:
                aws: IAM → Account settings → Password policy
            cloud_checks:
              aws:
              - service: iam
                method: get_account_password_policy
                assertion: password_policy_configured
        PS-2:
          title: Position Risk Designation
          description: Assign a risk designation to all organizational positions, establish screening criteria, and review designations periodically.
          checks:
          - id: PS-2.a
            description: Verify position risk designations are assigned
            evidence_type: position_risk_doc
            remediation:
              summary: Assign risk designations to positions and map to IAM permission levels.
              steps:
                aws:
                - aws iam list-users --query 'Users[*].[UserName,CreateDate]'
                - aws iam list-user-tags --user-name <user> to check risk designation tags
                - aws iam tag-user --user-name <user> --tags Key=PositionRisk,Value=High
              console_path:
                aws: IAM → Users → Select user → Tags → Add PositionRisk tag
            cloud_checks:
              aws:
              - service: iam
                method: list_user_tags
                assertion: position_risk_designated
        PS-3:
          title: Personnel Screening
          description: Screen individuals prior to authorizing access to the system.
          checks:
          - id: PS-3.a
            description: Verify personnel screening is conducted
            evidence_type: hr_records
            remediation:
              summary: Conduct background checks before granting system access.
              steps:
                aws:
                - Verify HR screening process before creating IAM accounts
                - 'Tag IAM users with screening status: aws iam tag-user'
              console_path:
                aws: IAM → Users → Tags → Verify screening-status tag
            cloud_checks:
              aws:
              - service: iam
                method: list_users
                assertion: personnel_screening_tracked
        PS-4:
          title: Personnel Termination
          description: Upon termination of employment, disable access within the required timeframe.
          checks:
          - id: PS-4.a
            description: Verify terminated personnel access is revoked
            evidence_type: access_records
            remediation:
              summary: Immediately disable IAM access upon termination. Automate via Identity Center SCIM.
              steps:
                aws:
                - 'Deactivate IAM user: aws iam delete-login-profile --user-name <user> && aws iam update-access-key --access-key-id <key> --status Inactive --user-name <user>'
                - 'Remove from all groups: aws iam remove-user-from-group'
                - 'Revoke active sessions: aws iam put-user-policy with explicit deny'
                - 'For SSO: disable in IAM Identity Center or disconnect SCIM'
              console_path:
                aws: IAM → Users → Select user → Security credentials → Deactivate
            cloud_checks:
              aws:
              - service: iam
                method: get_credential_report
                assertion: terminated_access_revoked
        PS-5:
          title: Personnel Transfer
          description: Review and adjust access authorizations when personnel are reassigned or transferred.
          checks:
          - id: PS-5.a
            description: Verify access is adjusted upon personnel transfer
            evidence_type: access_records
            remediation:
              summary: Update IAM group memberships and role assignments upon role changes.
              steps:
                aws:
                - 'Review current access: aws iam list-groups-for-user --user-name <user>'
                - 'Update group memberships: aws iam add-user-to-group / remove-user-from-group'
                - Use IAM Identity Center permission sets for role-based access
              console_path:
                aws: IAM Identity Center → Users → Manage access
            cloud_checks:
              aws:
              - service: iam
                method: list_users
                assertion: access_reviews_current
        PS-6:
          title: Access Agreements
          description: Require access agreements for individuals requiring access to organizational information.
          checks:
          - id: PS-6.a
            description: Verify access agreements are signed
            evidence_type: agreement_records
            remediation:
              summary: Require signed acceptable use agreements before granting AWS access.
              steps:
                aws:
                - Track agreements in GRC platform before IAM account creation
                - Tag IAM users with agreement status
              console_path:
                aws: IAM → Users → Tags → agreement-signed
            cloud_checks:
              aws:
              - service: iam
                method: list_users
                assertion: access_agreements_signed
        PS-7:
          title: External Personnel Security
          description: Establish personnel security requirements for external providers and monitor compliance.
          checks:
          - id: PS-7.a
            description: Verify external personnel security requirements are established
            evidence_type: vendor_security_doc
            remediation:
              summary: Enforce external personnel security through IAM roles with restricted access and session monitoring.
              steps:
                aws:
                - aws iam list-roles --query 'Roles[?starts_with(RoleName, `External`)]'
                - aws iam get-role --role-name <external-role> --query 'Role.MaxSessionDuration'
                - aws cloudtrail lookup-events --lookup-attributes AttributeKey=EventName,AttributeValue=AssumeRole
                - aws iam list-saml-providers
              console_path:
                aws: IAM → Roles → Filter external roles → Review trust policies
            cloud_checks:
              aws:
              - service: iam
                method: list_roles
                assertion: external_roles_scoped
        PS-8:
          title: Personnel Sanctions
          description: Employ a formal sanctions process for individuals failing to comply with established security and privacy policies and procedures.
          checks:
          - id: PS-8.a
            description: Verify formal sanctions process exists
            evidence_type: sanctions_policy
            remediation:
              summary: Implement sanctions process with automated access restriction for policy violations.
              steps:
                aws:
                - aws iam put-user-policy --user-name <user> --policy-name DenyAll --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Deny","Action":"*","Resource":"*"}]}'
                - aws iam update-login-profile --user-name <user> --password-reset-required
                - aws cloudtrail lookup-events --lookup-attributes AttributeKey=Username,AttributeValue=<user>
              console_path:
                aws: IAM → Users → Select user → Add inline deny-all policy
            cloud_checks:
              aws:
              - service: iam
                method: list_user_policies
                assertion: sanctions_process_documented
        PS-9:
          title: Position Descriptions
          description: Incorporate security and privacy role requirements into organizational position descriptions.
          checks:
          - id: PS-9.a
            description: Verify position descriptions include security responsibilities
            evidence_type: position_descriptions
            remediation:
              summary: Update position descriptions to include security and privacy responsibilities.
              steps:
                aws:
                - aws iam list-roles --query 'Roles[*].[RoleName,Description]'
                - aws iam tag-role --role-name <role> --tags Key=SecurityResponsibility,Value=<description>
                - Document security responsibilities in HR position descriptions
              console_path:
                aws: IAM → Roles → Edit role description to include security duties
            cloud_checks:
              aws:
              - service: iam
                method: list_roles
                assertion: roles_include_security_duties
    PT:
      name: PII Processing and Transparency
      controls:
        PT-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate PII processing and transparency policy.
          checks:
          - id: PT-1.a
            description: Verify PII processing policy exists
            evidence_type: privacy_policy
            remediation:
              summary: Create privacy policy covering PII collection, use, retention, and disposal.
              steps:
                aws:
                - Document PII processing in privacy policy
                - 'Tag S3 buckets containing PII: aws s3api put-bucket-tagging with data-classification=PII'
                - 'Use Macie to discover PII: aws macie2 enable-macie'
              console_path:
                aws: Macie → Get started → Enable Macie
            cloud_checks:
              aws:
              - service: macie2
                method: get_macie_session
                assertion: macie_enabled
        PT-2:
          title: Authority to Process Personally Identifiable Information
          description: Determine and document the legal authority that permits the collection, use, maintenance, and sharing of PII.
          checks:
          - id: PT-2.a
            description: Verify legal authority for PII processing is documented
            evidence_type: legal_authority_doc
            remediation:
              summary: Document legal authorities for PII processing and map to data stores.
              steps:
                aws:
                - aws macie2 list-findings --finding-criteria '{"criterion":{"category":{"eq":["CLASSIFICATION"]}}}'
                - aws s3api get-bucket-tagging --bucket <bucket> to verify legal-authority tags
                - aws s3api put-bucket-tagging --bucket <bucket> --tagging '{"TagSet":[{"Key":"LegalAuthority","Value":"PrivacyAct"}]}'
              console_path:
                aws: S3 → Bucket → Properties → Tags → Add LegalAuthority tag
            cloud_checks:
              aws:
              - service: macie2
                method: list_findings
                assertion: pii_authority_documented
        PT-3:
          title: PII Processing Purposes
          description: Identify and document the purposes for processing PII.
          checks:
          - id: PT-3.a
            description: Verify PII processing purposes are documented
            evidence_type: privacy_doc
            remediation:
              summary: Document data processing purposes and legal basis per regulation.
              steps:
                aws:
                - 'Conduct Macie data discovery scan: aws macie2 create-classification-job'
                - Document findings and processing purposes
              console_path:
                aws: Macie → Jobs → Create job → Discover PII
            cloud_checks:
              aws:
              - service: macie2
                method: list_classification_jobs
                assertion: pii_discovery_active
        PT-4:
          title: Consent
          description: Implement mechanisms to obtain consent from individuals for the processing of their PII.
          checks:
          - id: PT-4.a
            description: Verify consent mechanisms are implemented
            evidence_type: consent_records
            remediation:
              summary: Implement consent collection and management for PII processing.
              steps:
                aws:
                - aws dynamodb describe-table --table-name consent-records
                - aws dynamodb scan --table-name consent-records --select COUNT
                - aws apigateway get-rest-apis --query 'items[?name==`ConsentAPI`]'
              console_path:
                aws: DynamoDB → Tables → consent-records → View items
            cloud_checks:
              aws:
              - service: dynamodb
                method: describe_table
                assertion: consent_tracking_exists
        PT-5:
          title: Privacy Notice
          description: Provide notice to individuals about the processing of PII at the time and location of collection.
          checks:
          - id: PT-5.a
            description: Verify privacy notices are provided at point of collection
            evidence_type: privacy_notice
            remediation:
              summary: Implement privacy notices at all PII collection points.
              steps:
                aws:
                - aws s3 ls s3://<website-bucket>/privacy-notice/
                - aws cloudfront list-distributions --query 'DistributionList.Items[*].[Id,DomainName]'
                - aws apigateway get-rest-apis to verify privacy notice endpoints
              console_path:
                aws: S3 → Website bucket → Verify privacy notice page exists
            cloud_checks:
              aws:
              - service: s3
                method: list_objects_v2
                assertion: privacy_notice_published
        PT-6:
          title: System of Records Notice
          description: Publish system of records notices (SORNs) in the Federal Register for systems containing PII.
          checks:
          - id: PT-6.a
            description: Verify SORNs are published for PII-containing systems
            evidence_type: sorn_doc
            remediation:
              summary: Publish SORNs for all systems containing PII and maintain an inventory.
              steps:
                aws:
                - aws macie2 list-classification-jobs --query 'items[*].[jobId,name,jobStatus]'
                - aws resourcegroupstaggingapi get-resources --tag-filters Key=ContainsPII,Values=True
                - Document SORN publication dates and Federal Register citations
              console_path:
                aws: Macie → Jobs → Review PII discovery results for SORN coverage
            cloud_checks:
              aws:
              - service: macie2
                method: list_classification_jobs
                assertion: sorn_coverage_verified
        PT-7:
          title: Specific Categories of Personally Identifiable Information
          description: Apply processing conditions for specific categories of PII including Social Security numbers.
          checks:
          - id: PT-7.a
            description: Verify special handling for sensitive PII categories
            evidence_type: sensitive_pii_policy
            remediation:
              summary: Implement enhanced protections for sensitive PII categories like SSNs.
              steps:
                aws:
                - aws macie2 get-findings --query 'findings[?classificationDetails.result.sensitiveData[?category==`PERSONAL_INFORMATION`]]'
                - aws kms list-aliases --query 'Aliases[?starts_with(AliasName, `alias/pii`)]'
                - aws s3api get-bucket-encryption --bucket <pii-bucket>
                - aws macie2 create-custom-data-identifier --name SSN-Detector --regex '\d{3}-\d{2}-\d{4}'
              console_path:
                aws: Macie → Custom data identifiers → Create SSN detection rule
            cloud_checks:
              aws:
              - service: macie2
                method: list_custom_data_identifiers
                assertion: sensitive_pii_identifiers_configured
        PT-8:
          title: Computer Matching Requirements
          description: Comply with computer matching requirements when conducting computer matching activities.
          checks:
          - id: PT-8.a
            description: Verify computer matching agreements are maintained
            evidence_type: matching_agreement
            remediation:
              summary: Document computer matching agreements and ensure Data Integrity Board oversight.
              steps:
                aws:
                - aws glue get-crawlers --query 'Crawlers[*].[Name,State,Targets]'
                - aws athena list-named-queries
                - Document all computer matching agreements with partner agencies
              console_path:
                aws: AWS Glue → Crawlers → Review data matching jobs
            cloud_checks:
              aws:
              - service: glue
                method: get_crawlers
                assertion: matching_agreements_documented
    RA:
      name: Risk Assessment
      controls:
        RA-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate risk assessment policy and procedures.
          checks:
          - id: RA-1.a
            description: Verify risk assessment policy exists and is current
            evidence_type: policy_doc
            remediation:
              summary: Create or update risk assessment policy defining methodology, frequency, and roles.
              steps:
                aws:
                - aws securityhub get-enabled-standards
                - aws inspector2 batch-get-account-status
                - aws configservice describe-compliance-by-config-rule --query 'ComplianceByConfigRules[?Compliance.ComplianceType==`NON_COMPLIANT`]'
              console_path:
                aws: Security Hub → Security standards → Review enabled standards
            cloud_checks:
              aws:
              - service: securityhub
                method: get_enabled_standards
                assertion: risk_assessment_standards_enabled
        RA-2:
          title: Security Categorization
          description: Categorize the system and information processed, stored, and transmitted.
          checks:
          - id: RA-2.a
            description: Verify system is categorized per FIPS 199
            evidence_type: categorization_doc
            remediation:
              summary: Document system security categorization based on FIPS 199 impact levels.
              steps:
                aws:
                - Classify data stored in each AWS service by impact level (Low/Moderate/High)
                - 'Tag resources with security categorization: aws ec2 create-tags'
                - Document overall system categorization in SSP
              console_path:
                aws: Resource Groups → Tag Editor → Add categorization tags
            cloud_checks:
              aws:
              - service: resourcegroupstaggingapi
                method: get_resources
                assertion: resources_categorized
        RA-3:
          title: Risk Assessment
          description: Conduct risk assessments and document the results.
          checks:
          - id: RA-3.a
            description: Verify risk assessment is conducted
            evidence_type: risk_assessment
            remediation:
              summary: Conduct annual risk assessment using AWS Inspector and Security Hub findings.
              steps:
                aws:
                - 'Run Inspector assessment: aws inspector2 enable'
                - 'Export Security Hub findings for risk analysis: aws securityhub get-findings'
                - Document risk assessment results with risk ratings and mitigations
              console_path:
                aws: Inspector → Dashboard → View vulnerability findings
            cloud_checks:
              aws:
              - service: inspector2
                method: batch_get_account_status
                assertion: inspector_enabled
        RA-5:
          title: Vulnerability Monitoring and Scanning
          description: Monitor and scan for vulnerabilities in the system at a defined frequency.
          checks:
          - id: RA-5.a
            description: Verify vulnerability scanning is performed
            evidence_type: vuln_scan_results
            remediation:
              summary: Enable Inspector for continuous vulnerability scanning of EC2 and ECR.
              steps:
                aws:
                - 'Enable Inspector: aws inspector2 enable --resource-types EC2 ECR LAMBDA'
                - 'Review findings: aws inspector2 list-findings --filter-criteria ''{"severity":[{"comparison":"EQUALS","value":"CRITICAL"}]}'''
                - Configure auto-remediation for critical findings via SSM
              console_path:
                aws: Inspector → Findings → Filter by severity
            cloud_checks:
              aws:
              - service: inspector2
                method: list_findings
                assertion: vulnerability_scanning_active
        RA-6:
          title: Technical Surveillance Countermeasures Survey
          description: Employ technical surveillance countermeasures at selected locations on a defined frequency.
          checks:
          - id: RA-6.a
            description: Verify technical surveillance countermeasures are employed
            evidence_type: tscm_report
            remediation:
              summary: Conduct technical surveillance countermeasures surveys for sensitive areas.
              steps:
                aws:
                - aws guardduty get-detector --detector-id <detector-id>
                - aws guardduty list-findings --detector-id <detector-id> --finding-criteria '{"Criterion":{"type":{"Eq":["Recon:EC2/PortProbeUnprotectedPort"]}}}'
                - aws ec2 describe-flow-logs --query 'FlowLogs[*].[FlowLogId,ResourceId,LogGroupName]'
              console_path:
                aws: GuardDuty → Findings → Filter by reconnaissance type
            cloud_checks:
              aws:
              - service: guardduty
                method: list_findings
                assertion: surveillance_monitoring_active
        RA-7:
          title: Risk Response
          description: Respond to findings from security and privacy assessments, monitoring, and audits.
          checks:
          - id: RA-7.a
            description: Verify risk response process is implemented
            evidence_type: risk_response_plan
            remediation:
              summary: Implement risk response workflow using Security Hub automated actions.
              steps:
                aws:
                - aws securityhub get-findings --filters '{"WorkflowStatus":[{"Value":"NEW","Comparison":"EQUALS"}]}'
                - aws securityhub batch-update-findings --finding-identifiers '[{"Id":"<finding-id>","ProductArn":"<product-arn>"}]' --workflow '{"Status":"RESOLVED"}' --note '{"Text":"Risk accepted","UpdatedBy":"SecurityTeam"}'
                - aws events list-rules --name-prefix SecurityHub
              console_path:
                aws: Security Hub → Findings → Select finding → Workflow status → Update
            cloud_checks:
              aws:
              - service: securityhub
                method: get_findings
                assertion: risk_responses_documented
        RA-8:
          title: Privacy Impact Assessments
          description: Conduct privacy impact assessments for systems processing PII.
          checks:
          - id: RA-8.a
            description: Verify privacy impact assessments are conducted
            evidence_type: pia_doc
            remediation:
              summary: Conduct PIAs for all systems processing PII using Macie data discovery.
              steps:
                aws:
                - aws macie2 list-classification-jobs --query 'items[*].[jobId,name,jobStatus]'
                - aws macie2 get-finding-statistics --group-by 'classificationDetails.result.sensitiveData.category'
                - aws resourcegroupstaggingapi get-resources --tag-filters Key=PIACompleted,Values=True
              console_path:
                aws: Macie → Jobs → Review PII findings for PIA input
            cloud_checks:
              aws:
              - service: macie2
                method: list_classification_jobs
                assertion: pia_assessments_current
        RA-9:
          title: Criticality Analysis
          description: Identify critical system components and functions by performing a criticality analysis.
          checks:
          - id: RA-9.a
            description: Verify criticality analysis is performed
            evidence_type: criticality_analysis
            remediation:
              summary: Perform criticality analysis using AWS Resilience Hub and resource dependency mapping.
              steps:
                aws:
                - aws resiliencehub list-apps
                - aws resiliencehub list-app-assessments --app-arn <app-arn>
                - aws resiliencehub list-app-component-compliances --assessment-arn <assessment-arn>
                - aws resourcegroupstaggingapi get-resources --tag-filters Key=Criticality,Values=High
              console_path:
                aws: Resilience Hub → Applications → Run assessment
            cloud_checks:
              aws:
              - service: resiliencehub
                method: list_app_assessments
                assertion: criticality_analysis_current
        RA-10:
          title: Threat Hunting
          description: Establish and maintain a cyber threat hunting capability to detect, track, and disrupt threats that evade existing controls.
          checks:
          - id: RA-10.a
            description: Verify threat hunting capability is established
            evidence_type: threat_hunting_plan
            remediation:
              summary: Implement threat hunting using GuardDuty, Detective, and CloudTrail Lake analytics.
              steps:
                aws:
                - aws guardduty list-detectors
                - aws detective list-graphs
                - aws cloudtrail list-event-data-stores
                - aws cloudtrail start-query --query-statement 'SELECT * FROM <event-data-store-id> WHERE eventName = \"ConsoleLogin\" AND errorCode IS NOT NULL'
                - aws securitylake list-data-lakes
              console_path:
                aws: Detective → Search → Investigate entities and findings
            cloud_checks:
              aws:
              - service: detective
                method: list_graphs
                assertion: threat_hunting_active
    SA:
      name: System and Services Acquisition
      controls:
        SA-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate system and services acquisition policies and procedures.
          checks:
          - id: SA-1.a
            description: Verify system and services acquisition policy exists and is current
            evidence_type: policy_doc
            remediation:
              summary: Create and maintain a system and services acquisition policy addressing purpose, scope, roles, responsibilities, and compliance.
              steps:
                aws:
                - aws organizations list-policies --filter SERVICE_CONTROL_POLICY
                - aws organizations list-policies --filter TAG_POLICY
                - Review acquisition policies in your GRC system for annual review compliance
              console_path:
                aws: AWS Organizations → Policies
            cloud_checks:
              aws:
              - service: organizations
                method: list_policies
                assertion: policies_exist
        SA-2:
          title: Allocation of Resources
          description: Determine the high-level information security and privacy requirements for the system or system service in mission and business process planning.
          checks:
          - id: SA-2.a
            description: Verify security resource allocation in capital planning
            evidence_type: budget_doc
            remediation:
              summary: Include security and privacy resource requirements in capital planning and investment requests.
              steps:
                aws:
                - aws ce get-cost-and-usage --time-period Start=2025-01-01,End=2025-12-31 --granularity MONTHLY --metrics BlendedCost --group-by Type=TAG,Key=SecurityProject
                - aws budgets describe-budgets --account-id $(aws sts get-caller-identity --query Account --output text)
                - Verify security budget line items exist in capital planning documents
              console_path:
                aws: AWS Billing → Cost Explorer → Filter by security tags
            cloud_checks:
              aws:
              - service: ce
                method: get_cost_and_usage
                assertion: security_budget_allocated
        SA-3:
          title: System Development Life Cycle
          description: Acquire, develop, and manage the system using a system development life cycle.
          checks:
          - id: SA-3.a
            description: Verify SDLC process is defined
            evidence_type: sdlc_doc
            remediation:
              summary: Implement security gates in CI/CD pipeline.
              steps:
                aws:
                - 'Configure CodePipeline with security stages: SAST, DAST, approval gates'
                - 'Use CodeBuild for automated security testing: aws codebuild create-project'
                - Require manual approval for production deployments
              console_path:
                aws: CodePipeline → Edit pipeline → Add security test stage
            cloud_checks:
              aws:
              - service: codepipeline
                method: list_pipelines
                assertion: cicd_security_gates_configured
        SA-4:
          title: Acquisition Process
          description: Include security and privacy requirements in system acquisition contracts.
          checks:
          - id: SA-4.a
            description: Verify security requirements in acquisition contracts
            evidence_type: contract_doc
            remediation:
              summary: Include security requirements in vendor contracts and evaluate via AWS Marketplace.
              steps:
                aws:
                - Use AWS Marketplace for pre-vetted solutions
                - Review vendor compliance on AWS Marketplace listing page
                - Include security SLA requirements in contracts
              console_path:
                aws: Marketplace → Discover → Filter by compliance certifications
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: acquisition_security_requirements
        SA-5:
          title: System Documentation
          description: Obtain or develop administrator and user documentation for the system, system component, or system service.
          checks:
          - id: SA-5.a
            description: Verify system documentation exists for administrators
            evidence_type: system_doc
            remediation:
              summary: Obtain and maintain administrator and user documentation describing secure configuration, installation, and operation.
              steps:
                aws:
                - aws ssm list-documents --document-filter-list key=Owner,value=Self
                - aws ssm describe-document --name <document-name>
                - Ensure architecture diagrams, runbooks, and operational procedures are documented and current
              console_path:
                aws: Systems Manager → Documents → Owned by me
            cloud_checks:
              aws:
              - service: ssm
                method: list_documents
                assertion: system_documentation_exists
        SA-8:
          title: Security and Privacy Engineering Principles
          description: Apply systems security and privacy engineering principles in the specification, design, development, implementation, and modification of the system and system components.
          checks:
          - id: SA-8.a
            description: Verify security engineering principles are applied in system design
            evidence_type: design_doc
            remediation:
              summary: Apply defense-in-depth, least privilege, and secure-by-design principles throughout the SDLC.
              steps:
                aws:
                - aws wellarchitected list-workloads
                - aws wellarchitected list-answers --workload-id <workload-id> --lens-alias wellarchitected --pillar-id security
                - Conduct threat modeling and document security engineering decisions in design reviews
              console_path:
                aws: AWS Well-Architected Tool → Workloads → Security pillar
            cloud_checks:
              aws:
              - service: wellarchitected
                method: list_workloads
                assertion: security_review_completed
        SA-9:
          title: External System Services
          description: Require external system service providers to comply with organizational security requirements.
          checks:
          - id: SA-9.a
            description: Verify external service provider compliance
            evidence_type: vendor_assessment
            remediation:
              summary: Assess third-party service providers and obtain compliance attestations.
              steps:
                aws:
                - 'Review AWS compliance programs: aws artifact list-reports'
                - 'For third-party SaaS: request SOC 2 reports and review'
                - Track vendor compliance in GRC platform
              console_path:
                aws: Artifact → Reports → Download AWS compliance reports
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: vendor_compliance_tracked
        SA-10:
          title: Developer Configuration Management
          description: Require the developer of the system, system component, or system service to perform configuration management during development, implementation, and operation.
          checks:
          - id: SA-10.a
            description: Verify developer configuration management processes
            evidence_type: config_mgmt_doc
            remediation:
              summary: Implement configuration management for development including change tracking, integrity verification, and flaw remediation.
              steps:
                aws:
                - aws codecommit list-repositories
                - aws codecommit get-branch --repository-name <repo-name> --branch-name main
                - aws codebuild list-projects
                - Verify branch protection, code review requirements, and change tracking are in place
              console_path:
                aws: CodeCommit → Repositories → Settings → Branch permissions
            cloud_checks:
              aws:
              - service: codecommit
                method: list_repositories
                assertion: repositories_with_branch_protection
        SA-11:
          title: Developer Testing and Evaluation
          description: Require the developer of the system, system component, or system service to create and implement a security and privacy assessment plan.
          checks:
          - id: SA-11.a
            description: Verify developer security testing plan and results
            evidence_type: test_results
            remediation:
              summary: Implement security testing including SAST, DAST, and penetration testing in the development pipeline.
              steps:
                aws:
                - aws codebuild list-projects
                - aws codebuild batch-get-projects --names <project-name>
                - aws inspector2 list-findings --filter-criteria resourceType=[{comparison=EQUALS,value=AWS_ECR_CONTAINER_IMAGE}]
                - Verify security testing tools (SAST/DAST) are integrated in CI/CD pipeline
              console_path:
                aws: CodeBuild → Build projects → Security test configurations
            cloud_checks:
              aws:
              - service: codebuild
                method: list_projects
                assertion: security_testing_configured
        SA-15:
          title: Development Process, Standards, and Tools
          description: Require the developer of the system, system component, or system service to follow a documented development process that addresses security and privacy.
          checks:
          - id: SA-15.a
            description: Verify documented development process with security requirements
            evidence_type: sdlc_doc
            remediation:
              summary: Establish and enforce documented development standards, tools, and processes that integrate security requirements.
              steps:
                aws:
                - aws codepipeline list-pipelines
                - aws codepipeline get-pipeline --name <pipeline-name>
                - Verify documented coding standards, approved tools list, and security review gates exist
              console_path:
                aws: CodePipeline → Pipelines → View pipeline stages
            cloud_checks:
              aws:
              - service: codepipeline
                method: list_pipelines
                assertion: development_standards_enforced
        SA-16:
          title: Developer-Provided Training
          description: Require the developer of the system, system component, or system service to provide training on the correct use and operation of implemented security and privacy functions.
          checks:
          - id: SA-16.a
            description: Verify developer-provided training on security functions
            evidence_type: training_doc
            remediation:
              summary: Require developers to provide security training materials for system administrators and users.
              steps:
                aws:
                - Review vendor training documentation on AWS Marketplace product pages
                - aws marketplace-catalog list-entities --catalog AWSMarketplace --entity-type ContainerProduct
                - Document training completion records for third-party system components
              console_path:
                aws: AWS Marketplace → Manage subscriptions → Product documentation
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: vendor_training_documented
        SA-17:
          title: Developer Security and Privacy Architecture and Design
          description: Require the developer of the system, system component, or system service to produce a design specification and security and privacy architecture.
          checks:
          - id: SA-17.a
            description: Verify developer security architecture documentation
            evidence_type: architecture_doc
            remediation:
              summary: Require developers to produce security architecture documentation consistent with organizational security architecture.
              steps:
                aws:
                - aws wellarchitected list-workloads
                - aws wellarchitected get-answer --workload-id <workload-id> --lens-alias wellarchitected --pillar-id security --question-id securely-operate
                - Verify security architecture artifacts including threat models and design documents
              console_path:
                aws: AWS Well-Architected Tool → Workloads → Review answers
            cloud_checks:
              aws:
              - service: wellarchitected
                method: list_workloads
                assertion: architecture_documentation_exists
        SA-20:
          title: Customized Development of Critical Components
          description: Re-implement or custom develop critical system components when standard components are not available or are deemed insufficiently trustworthy.
          checks:
          - id: SA-20.a
            description: Verify custom development process for critical components
            evidence_type: development_doc
            remediation:
              summary: Identify critical components requiring custom development and implement enhanced security controls for their development.
              steps:
                aws:
                - aws codecommit list-repositories
                - aws ecr describe-repositories
                - Document critical components requiring custom development and rationale for build-vs-buy decisions
              console_path:
                aws: CodeCommit → Repositories → Critical component repos
            cloud_checks:
              aws:
              - service: codecommit
                method: list_repositories
                assertion: critical_components_identified
        SA-21:
          title: Developer Screening
          description: Require that the developer of the system, system component, or system service satisfy organizational personnel screening requirements.
          checks:
          - id: SA-21.a
            description: Verify developer screening requirements are defined and enforced
            evidence_type: hr_doc
            remediation:
              summary: Define and enforce personnel screening requirements for developers of critical systems and components.
              steps:
                aws:
                - aws iam list-users
                - aws iam get-user --user-name <developer-user>
                - Verify background check completion records for developers with access to critical systems
              console_path:
                aws: IAM → Users → Developer accounts
            cloud_checks:
              aws:
              - service: iam
                method: list_users
                assertion: developer_screening_documented
        SA-22:
          title: Unsupported System Components
          description: Replace system components when support for the components is no longer available from the developer, vendor, or manufacturer.
          checks:
          - id: SA-22.a
            description: Verify unsupported system components are identified and managed
            evidence_type: inventory_report
            remediation:
              summary: Identify unsupported system components and plan for replacement or implement compensating controls.
              steps:
                aws:
                - aws ec2 describe-images --owners self --query 'Images[?CreationDate<`2023-01-01`].[ImageId,Name,CreationDate]' --output table
                - aws lambda list-functions --query 'Functions[?Runtime==`python3.7` || Runtime==`nodejs12.x` || Runtime==`dotnetcore3.1`].[FunctionName,Runtime]' --output table
                - aws rds describe-db-instances --query 'DBInstances[*].[DBInstanceIdentifier,Engine,EngineVersion]' --output table
                - Review AWS end-of-support schedule and plan migrations for deprecated runtimes
              console_path:
                aws: Lambda → Functions → Filter by deprecated runtimes
            cloud_checks:
              aws:
              - service: lambda
                method: list_functions
                assertion: no_deprecated_runtimes
              - service: rds
                method: describe_db_instances
                assertion: no_eol_engine_versions
        SA-23:
          title: Specialization
          description: Employ specialized system components with limited or focused functionality to reduce the attack surface.
          checks:
          - id: SA-23.a
            description: Verify system components employ specialization to reduce attack surface
            evidence_type: architecture_doc
            remediation:
              summary: Design systems using specialized, single-purpose components to minimize attack surface and limit blast radius.
              steps:
                aws:
                - aws ecs list-services --cluster <cluster-name>
                - aws lambda list-functions --query 'Functions[*].[FunctionName,Handler,MemorySize]' --output table
                - Verify microservice architecture with limited-purpose containers and serverless functions
              console_path:
                aws: ECS → Clusters → Services → Task definitions
            cloud_checks:
              aws:
              - service: ecs
                method: list_services
                assertion: specialized_components_deployed
    SC:
      name: System and Communications Protection
      controls:
        SC-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate system and communications protection policies and procedures.
          checks:
          - id: SC-1.a
            description: Verify system and communications protection policy exists and is current
            evidence_type: policy_doc
            remediation:
              summary: Create and maintain a system and communications protection policy addressing purpose, scope, roles, and compliance.
              steps:
                aws:
                - aws organizations list-policies --filter SERVICE_CONTROL_POLICY
                - aws ec2 describe-security-groups --query 'SecurityGroups[*].[GroupId,GroupName,Description]' --output table
                - Review and document communications protection policies with annual review dates
              console_path:
                aws: AWS Organizations → Policies → Service control policies
            cloud_checks:
              aws:
              - service: organizations
                method: list_policies
                assertion: sc_policies_exist
        SC-2:
          title: Separation of System and User Functionality
          description: Separate user functionality, including user interface services, from system management functionality.
          checks:
          - id: SC-2.a
            description: Verify separation of user and system management functionality
            evidence_type: architecture_doc
            remediation:
              summary: Implement separation between user-facing services and administrative/management functions.
              steps:
                aws:
                - aws ec2 describe-vpcs --query 'Vpcs[*].[VpcId,Tags[?Key==`Name`].Value|[0],CidrBlock]' --output table
                - aws ec2 describe-subnets --query 'Subnets[*].[SubnetId,VpcId,CidrBlock,Tags[?Key==`Name`].Value|[0]]' --output table
                - Verify management plane is isolated from user data plane via separate VPCs or subnets
              console_path:
                aws: VPC → Subnets → Verify management and user subnets are separated
            cloud_checks:
              aws:
              - service: ec2
                method: describe_vpcs
                assertion: management_plane_separated
        SC-3:
          title: Security Function Isolation
          description: Isolate security functions from nonsecurity functions.
          checks:
          - id: SC-3.a
            description: Verify security functions are isolated from nonsecurity functions
            evidence_type: architecture_doc
            remediation:
              summary: Isolate security-critical functions using separate execution domains, containers, or accounts.
              steps:
                aws:
                - aws organizations list-accounts --query 'Accounts[*].[Id,Name,Status]' --output table
                - aws ec2 describe-security-groups --filters Name=group-name,Values='*security*'
                - Verify security services (logging, monitoring, IAM) run in dedicated accounts or VPCs
              console_path:
                aws: AWS Organizations → Accounts → Security account
            cloud_checks:
              aws:
              - service: organizations
                method: list_accounts
                assertion: security_account_isolated
        SC-4:
          title: Information in Shared System Resources
          description: Prevent unauthorized and unintended information transfer via shared system resources.
          checks:
          - id: SC-4.a
            description: Verify controls prevent information leakage via shared resources
            evidence_type: config_check
            remediation:
              summary: Implement controls to prevent unauthorized information transfer through shared system resources.
              steps:
                aws:
                - aws ec2 describe-instances --query 'Reservations[*].Instances[*].[InstanceId,Placement.Tenancy]' --output table
                - aws s3api get-bucket-policy --bucket <bucket-name>
                - Verify dedicated tenancy for sensitive workloads and proper S3 bucket isolation
              console_path:
                aws: EC2 → Instances → Tenancy settings
            cloud_checks:
              aws:
              - service: ec2
                method: describe_instances
                assertion: dedicated_tenancy_for_sensitive
        SC-5:
          title: Denial-of-Service Protection
          description: Protect against or limit the effects of denial-of-service attacks.
          checks:
          - id: SC-5.a
            description: Verify DoS protections are in place
            evidence_type: network_config
            remediation:
              summary: Enable AWS Shield and WAF for DDoS protection.
              steps:
                aws:
                - AWS Shield Standard is automatically enabled
                - 'Enable Shield Advanced for enhanced protection: aws shield create-subscription'
                - 'Configure WAF rules: aws wafv2 create-web-acl'
                - Set up CloudFront with WAF for edge protection
              console_path:
                aws: Shield → Overview → Subscribe to Shield Advanced
            cloud_checks:
              aws:
              - service: shield
                method: describe_subscription
                assertion: shield_protection_enabled
        SC-6:
          title: Resource Availability
          description: Protect the availability of resources by allocating processor, memory, and storage capacity to adequately support system operations.
          checks:
          - id: SC-6.a
            description: Verify resource availability protections are in place
            evidence_type: config_check
            remediation:
              summary: Implement resource allocation controls including auto-scaling, throttling, and capacity management.
              steps:
                aws:
                - aws autoscaling describe-auto-scaling-groups --query 'AutoScalingGroups[*].[AutoScalingGroupName,MinSize,MaxSize,DesiredCapacity]' --output table
                - aws application-autoscaling describe-scalable-targets --service-namespace ecs
                - aws servicequotas list-service-quotas --service-code ec2
              console_path:
                aws: EC2 → Auto Scaling Groups → Capacity settings
            cloud_checks:
              aws:
              - service: autoscaling
                method: describe_auto_scaling_groups
                assertion: autoscaling_configured
        SC-7:
          title: Boundary Protection
          description: Monitor and control communications at the external managed interfaces to the system.
          checks:
          - id: SC-7.a
            description: Monitor communications at external interfaces
            evidence_type: network_config
            remediation:
              summary: Restrict security group ingress to known CIDR ranges and ensure NACLs have default deny.
              steps:
                aws:
                - 'Find open rules: aws ec2 describe-security-groups --filters Name=ip-permission.cidr,Values=0.0.0.0/0 --query ''SecurityGroups[*].[GroupId,GroupName]'''
                - 'Revoke open SSH: aws ec2 revoke-security-group-ingress --group-id <sg-id> --protocol tcp --port 22 --cidr 0.0.0.0/0'
                - 'Revoke open RDP: aws ec2 revoke-security-group-ingress --group-id <sg-id> --protocol tcp --port 3389 --cidr 0.0.0.0/0'
                - 'Add restricted rule: aws ec2 authorize-security-group-ingress --group-id <sg-id> --protocol tcp --port 22 --cidr <vpn-cidr>/32'
                - 'Use SSM Session Manager instead of SSH: install SSM Agent and attach AmazonSSMManagedInstanceCore role'
                - Create AWS Config rule restricted-ssh and restricted-common-ports for continuous monitoring
                azure:
                - 'List open NSG rules: az network nsg rule list --nsg-name <nsg> --query ''[?sourceAddressPrefix==`*` || sourceAddressPrefix==`Internet`]'''
                - 'Update rule: az network nsg rule update --nsg-name <nsg> --name <rule> --source-address-prefixes <cidr>'
              console_path:
                aws: VPC → Security Groups → Select group → Inbound rules → Edit → Remove 0.0.0.0/0 rules
                azure: Network Security Groups → Select NSG → Inbound security rules → Edit
            cloud_checks:
              aws:
              - service: ec2
                method: describe_security_groups
                assertion: no_unrestricted_ingress
              - service: ec2
                method: describe_network_acls
                assertion: default_deny_ingress
              azure:
              - service: network
                method: list_network_security_groups
                assertion: no_unrestricted_ingress
        SC-8:
          title: Transmission Confidentiality and Integrity
          description: Protect the confidentiality and integrity of transmitted information.
          checks:
          - id: SC-8.a
            description: Verify encryption in transit
            evidence_type: tls_config
            remediation:
              summary: Enforce TLS 1.2+ on all endpoints and enable HTTPS-only on load balancers.
              steps:
                aws:
                - 'Configure ALB HTTPS listener: aws elbv2 create-listener --protocol HTTPS --ssl-policy ELBSecurityPolicy-TLS13-1-2-2021-06'
                - 'Enforce S3 HTTPS: add bucket policy with aws:SecureTransport condition'
                - 'Configure CloudFront to require HTTPS: aws cloudfront update-distribution --viewer-protocol-policy redirect-to-https'
              console_path:
                aws: ELB → Listeners → Add HTTPS listener → Select TLS 1.2+ policy
            cloud_checks:
              aws:
              - service: elbv2
                method: describe_listeners
                assertion: tls_12_enforced
        SC-10:
          title: Network Disconnect
          description: Terminate the network connection associated with a communications session at the end of the session or after a defined period of inactivity.
          checks:
          - id: SC-10.a
            description: Verify network session timeout controls
            evidence_type: config_check
            remediation:
              summary: Configure session timeouts for network connections and idle sessions.
              steps:
                aws:
                - aws elbv2 describe-target-group-attributes --target-group-arn <tg-arn> --query 'Attributes[?Key==`deregistration_delay.timeout_seconds`]'
                - aws elbv2 describe-load-balancer-attributes --load-balancer-arn <lb-arn> --query 'Attributes[?Key==`idle_timeout.timeout_seconds`]'
                - aws iam get-role --role-name <role-name> --query 'Role.MaxSessionDuration'
              console_path:
                aws: EC2 → Load Balancers → Attributes → Idle timeout
            cloud_checks:
              aws:
              - service: elbv2
                method: describe_load_balancer_attributes
                assertion: idle_timeout_configured
        SC-12:
          title: Cryptographic Key Establishment and Management
          description: Establish and manage cryptographic keys when cryptography is employed.
          checks:
          - id: SC-12.a
            description: Verify key management practices
            evidence_type: kms_config
            remediation:
              summary: Use AWS KMS for centralized key management with automatic rotation.
              steps:
                aws:
                - 'Enable key rotation: aws kms enable-key-rotation --key-id <key-id>'
                - 'Review key policies: aws kms get-key-policy --key-id <key-id> --policy-name default'
                - 'Audit key usage: aws kms list-key-policies and CloudTrail KMS events'
              console_path:
                aws: KMS → Customer managed keys → Select key → Key rotation → Enable
            cloud_checks:
              aws:
              - service: kms
                method: list_keys
                assertion: key_rotation_enabled
        SC-13:
          title: Cryptographic Protection
          description: Implement cryptographic mechanisms to prevent unauthorized disclosure and modification.
          checks:
          - id: SC-13.a
            description: Verify FIPS-validated cryptographic modules
            evidence_type: crypto_config
            remediation:
              summary: Use AWS FIPS endpoints and KMS for cryptographic operations.
              steps:
                aws:
                - 'Use FIPS endpoints: configure SDK to use fips.<region>.amazonaws.com'
                - 'Verify KMS key spec supports FIPS: aws kms describe-key'
                - AWS KMS uses FIPS 140-2 Level 3 validated HSMs
              console_path:
                aws: KMS → Keys → Verify key algorithm and origin
            cloud_checks:
              aws:
              - service: kms
                method: list_keys
                assertion: fips_crypto_used
        SC-15:
          title: Collaborative Computing Devices and Applications
          description: Prohibit remote activation of collaborative computing devices and applications and provide an explicit indication of use to users.
          checks:
          - id: SC-15.a
            description: Verify collaborative computing device controls
            evidence_type: config_check
            remediation:
              summary: Implement controls for collaborative computing devices including disabling remote activation and providing usage indicators.
              steps:
                aws:
                - aws workspaces describe-workspaces --query 'Workspaces[*].[WorkspaceId,UserName,State]' --output table
                - aws chime list-accounts
                - Verify policies restrict remote activation of cameras and microphones on managed endpoints
              console_path:
                aws: WorkSpaces → Directories → Access control settings
            cloud_checks:
              aws:
              - service: workspaces
                method: describe_workspaces
                assertion: collaborative_device_controls
        SC-17:
          title: Public Key Infrastructure Certificates
          description: Issue public key certificates under an organizational-defined certificate policy or obtain public key certificates from an approved service provider.
          checks:
          - id: SC-17.a
            description: Verify PKI certificate management policy and implementation
            evidence_type: certificate_report
            remediation:
              summary: Implement certificate management using ACM with automated renewal and proper validation.
              steps:
                aws:
                - aws acm list-certificates --query 'CertificateSummaryList[*].[DomainName,Status,Type,NotAfter]' --output table
                - aws acm-pca list-certificate-authorities --query 'CertificateAuthorities[*].[Arn,Status,Type]' --output table
                - aws acm describe-certificate --certificate-arn <cert-arn>
              console_path:
                aws: ACM → Certificates → List all certificates
            cloud_checks:
              aws:
              - service: acm
                method: list_certificates
                assertion: certificates_valid_and_managed
              - service: acm-pca
                method: list_certificate_authorities
                assertion: private_ca_configured
        SC-18:
          title: Mobile Code
          description: Define acceptable and unacceptable mobile code and mobile code technologies and establish implementation guidance and usage restrictions.
          checks:
          - id: SC-18.a
            description: Verify mobile code usage restrictions and controls
            evidence_type: policy_doc
            remediation:
              summary: Define acceptable mobile code technologies and implement controls to prevent unauthorized mobile code execution.
              steps:
                aws:
                - aws wafv2 list-web-acls --scope REGIONAL --query 'WebACLs[*].[Name,Id]' --output table
                - aws wafv2 get-web-acl --name <acl-name> --scope REGIONAL --id <acl-id>
                - Verify WAF rules restrict dangerous content types and enforce content security policies
              console_path:
                aws: WAF → Web ACLs → Rules → Content filtering
            cloud_checks:
              aws:
              - service: wafv2
                method: list_web_acls
                assertion: mobile_code_restrictions_configured
        SC-20:
          title: Secure Name/Address Resolution Service (Authoritative Source)
          description: Provide additional data origin authentication and integrity verification artifacts along with the authoritative name resolution data returned in response to external queries.
          checks:
          - id: SC-20.a
            description: Verify DNSSEC is enabled for authoritative DNS zones
            evidence_type: config_check
            remediation:
              summary: Enable DNSSEC signing for authoritative hosted zones to provide data origin authentication.
              steps:
                aws:
                - aws route53 list-hosted-zones --query 'HostedZones[*].[Id,Name]' --output table
                - aws route53 get-dnssec --hosted-zone-id <zone-id>
                - aws route53 enable-hosted-zone-dnssec --hosted-zone-id <zone-id>
              console_path:
                aws: Route 53 → Hosted zones → DNSSEC signing
            cloud_checks:
              aws:
              - service: route53
                method: get_dnssec
                assertion: dnssec_enabled
        SC-21:
          title: Secure Name/Address Resolution Service (Recursive or Caching Resolver)
          description: Request and perform data origin authentication and data integrity verification on the name/address resolution responses from authoritative sources.
          checks:
          - id: SC-21.a
            description: Verify recursive DNS resolvers validate DNSSEC responses
            evidence_type: config_check
            remediation:
              summary: Configure DNS resolvers to request and validate DNSSEC signatures on responses.
              steps:
                aws:
                - aws route53resolver list-resolver-endpoints --query 'ResolverEndpoints[*].[Id,Name,Direction,Status]' --output table
                - aws route53resolver list-resolver-dnssec-configs --query 'ResolverDnssecConfigs[*].[Id,ResourceId,ValidationStatus]' --output table
                - aws ec2 describe-dhcp-options
              console_path:
                aws: Route 53 → Resolver → DNSSEC validation
            cloud_checks:
              aws:
              - service: route53resolver
                method: list_resolver_dnssec_configs
                assertion: dnssec_validation_enabled
        SC-22:
          title: Architecture and Provisioning for Name/Address Resolution Service
          description: Ensure the systems that collectively provide name and address resolution service are fault-tolerant and implement role separation.
          checks:
          - id: SC-22.a
            description: Verify DNS service is fault-tolerant with role separation
            evidence_type: config_check
            remediation:
              summary: Design DNS infrastructure with fault tolerance and separation between authoritative and recursive roles.
              steps:
                aws:
                - aws route53 list-hosted-zones
                - aws route53 get-hosted-zone --id <zone-id>
                - aws route53 list-health-checks --query 'HealthChecks[*].[Id,HealthCheckConfig.Type,HealthCheckConfig.FullyQualifiedDomainName]' --output table
              console_path:
                aws: Route 53 → Hosted zones → Name servers
            cloud_checks:
              aws:
              - service: route53
                method: list_hosted_zones
                assertion: dns_fault_tolerance_configured
        SC-23:
          title: Session Authenticity
          description: Protect the authenticity of communications sessions.
          checks:
          - id: SC-23.a
            description: Verify session authenticity protections are in place
            evidence_type: config_check
            remediation:
              summary: Implement session authenticity controls including anti-hijacking measures and secure session tokens.
              steps:
                aws:
                - aws elbv2 describe-listeners --load-balancer-arn <lb-arn> --query 'Listeners[*].[Protocol,Port,SslPolicy]' --output table
                - aws cloudfront list-distributions --query 'DistributionList.Items[*].[Id,DomainName,ViewerCertificate.SSLSupportMethod]' --output table
                - aws apigateway get-rest-apis --query 'items[*].[id,name]' --output table
              console_path:
                aws: CloudFront → Distributions → Security settings
            cloud_checks:
              aws:
              - service: elbv2
                method: describe_listeners
                assertion: https_listeners_configured
              - service: cloudfront
                method: list_distributions
                assertion: viewer_certificate_configured
        SC-24:
          title: Fail in Known State
          description: Fail to a known secure state in the event of a failure of a system component while preserving system state information.
          checks:
          - id: SC-24.a
            description: Verify systems fail to a known secure state
            evidence_type: config_check
            remediation:
              summary: Configure systems to fail securely, defaulting to a deny-all state and preserving audit logs on failure.
              steps:
                aws:
                - aws ec2 describe-network-acls --query 'NetworkAcls[*].[NetworkAclId,Entries[?RuleAction==`deny` && RuleNumber==`32767`]]'
                - aws ec2 describe-security-groups --query 'SecurityGroups[?length(IpPermissions)==`0`].[GroupId,GroupName]' --output table
                - Verify default-deny network rules and application fail-safe configurations
              console_path:
                aws: VPC → Network ACLs → Default deny rules
            cloud_checks:
              aws:
              - service: ec2
                method: describe_network_acls
                assertion: default_deny_configured
        SC-26:
          title: Decoys
          description: Employ decoys or misdirection techniques to mislead adversaries attempting to compromise or disrupt the system.
          checks:
          - id: SC-26.a
            description: Verify deception technology or honeypots are deployed
            evidence_type: config_check
            remediation:
              summary: Deploy honeypots, honeytokens, or deception technologies to detect and mislead adversaries.
              steps:
                aws:
                - aws iam list-access-keys --user-name honeytoken-user
                - aws ec2 describe-instances --filters Name=tag:Purpose,Values=honeypot
                - Deploy canary tokens and honeypot resources to detect unauthorized access attempts
              console_path:
                aws: EC2 → Instances → Filter by honeypot tags
            cloud_checks:
              aws:
              - service: ec2
                method: describe_instances
                assertion: decoy_resources_deployed
        SC-27:
          title: Platform-Independent Applications
          description: Include within organizational systems platform-independent applications.
          checks:
          - id: SC-27.a
            description: Verify platform-independent application deployment
            evidence_type: architecture_doc
            remediation:
              summary: Use containerized and platform-independent application deployments to reduce platform-specific vulnerabilities.
              steps:
                aws:
                - aws ecs list-clusters
                - aws eks list-clusters
                - aws ecr describe-repositories --query 'repositories[*].[repositoryName,repositoryUri]' --output table
              console_path:
                aws: ECS → Clusters → Container deployments
            cloud_checks:
              aws:
              - service: ecs
                method: list_clusters
                assertion: container_deployments_exist
        SC-28:
          title: Protection of Information at Rest
          description: Protect the confidentiality and integrity of information at rest.
          checks:
          - id: SC-28.a
            description: Verify encryption at rest
            evidence_type: encryption_config
            remediation:
              summary: Enable encryption at rest for all data stores using KMS CMKs.
              steps:
                aws:
                - 'Enable default EBS encryption: aws ec2 enable-ebs-encryption-by-default'
                - 'Enable S3 default encryption: aws s3api put-bucket-encryption --bucket <bucket> --server-side-encryption-configuration ''{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"aws:kms","KMSMasterKeyID":"<key-arn>"}}]}'''
                - 'Enable RDS encryption: specify --storage-encrypted when creating instances'
                - 'Enable DynamoDB encryption: aws dynamodb update-table --table-name <table> --sse-specification Enabled=true'
              console_path:
                aws: EC2 → EBS → Encryption → Enable default encryption with CMK
            cloud_checks:
