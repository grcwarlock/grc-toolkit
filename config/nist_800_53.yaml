            cloud_checks:
              aws:
              - service: ec2
                method: describe_traffic_mirror_sessions
                assertion: traffic_mirroring_available
        SC-49:
          title: Hardware-Enforced Separation and Policy Enforcement
          description: Implement hardware-based mechanisms that enforce separation and policy enforcement.
          checks:
          - id: SC-49.a
            description: Verify hardware-enforced separation mechanisms
            evidence_type: config_check
            remediation:
              summary: Leverage hardware-based isolation including dedicated hosts and Nitro enclaves for sensitive workloads.
              steps:
                aws:
                - aws ec2 describe-hosts --query 'Hosts[*].[HostId,State,AvailabilityZone,HostProperties.InstanceType]' --output table
                - aws ec2 describe-instances --filters Name=enclave-options.enabled,Values=true --query 'Reservations[*].Instances[*].[InstanceId,EnclaveOptions]'
                - Verify dedicated hosts and Nitro Enclaves for hardware-enforced isolation
              console_path:
                aws: EC2 → Dedicated Hosts → Allocated hosts
            cloud_checks:
              aws:
              - service: ec2
                method: describe_hosts
                assertion: dedicated_hosts_allocated
        SC-50:
          title: Software-Enforced Separation and Policy Enforcement
          description: Implement software-based mechanisms that enforce separation and policy enforcement.
          checks:
          - id: SC-50.a
            description: Verify software-enforced separation mechanisms
            evidence_type: config_check
            remediation:
              summary: Implement software-based separation using VPCs, security groups, and container isolation.
              steps:
                aws:
                - aws ec2 describe-vpcs --query 'Vpcs[*].[VpcId,CidrBlock,Tags[?Key==`Name`].Value|[0]]' --output table
                - aws ec2 describe-security-groups --query 'SecurityGroups[*].[GroupId,GroupName,VpcId]' --output table
                - aws ecs describe-task-definition --task-definition <task-def> --query 'taskDefinition.networkMode'
              console_path:
                aws: VPC → Security Groups → Network isolation
            cloud_checks:
              aws:
              - service: ec2
                method: describe_vpcs
                assertion: vpc_separation_configured
              - service: ec2
                method: describe_security_groups
                assertion: security_group_isolation
        SC-51:
          title: Hardware-Based Protection
          description: Implement hardware-based mechanisms to protect against unauthorized introduction, modification, and deletion of information.
          checks:
          - id: SC-51.a
            description: Verify hardware-based protection mechanisms
            evidence_type: config_check
            remediation:
              summary: Leverage hardware-based security features including HSMs and TPMs for cryptographic protection.
              steps:
                aws:
                - aws cloudhsmv2 describe-clusters --query 'Clusters[*].[ClusterId,State,HsmType]' --output table
                - aws kms list-keys --query 'Keys[*].KeyId' --output table
                - aws kms describe-key --key-id <key-id> --query 'KeyMetadata.[KeyId,KeyManager,Origin]'
              console_path:
                aws: CloudHSM → Clusters → Hardware security modules
            cloud_checks:
              aws:
              - service: cloudhsmv2
                method: describe_clusters
                assertion: hsm_clusters_active
              - service: kms
                method: list_keys
                assertion: hsm_backed_keys_exist
    SI:
      name: System and Information Integrity
      controls:
        SI-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate system and information integrity policies and procedures.
          checks:
          - id: SI-1.a
            description: Verify system and information integrity policy exists and is current
            evidence_type: policy_doc
            remediation:
              summary: Create and maintain a system and information integrity policy addressing flaw remediation, malicious code protection, and monitoring.
              steps:
                aws:
                - aws organizations list-policies --filter SERVICE_CONTROL_POLICY
                - aws configservice describe-compliance-by-config-rule --query 'ComplianceByConfigRules[*].[ConfigRuleName,Compliance.ComplianceType]' --output table
                - Review integrity policies in GRC system for annual review compliance
              console_path:
                aws: AWS Config → Rules → Compliance status
            cloud_checks:
              aws:
              - service: configservice
                method: describe_compliance_by_config_rule
                assertion: integrity_rules_compliant
        SI-2:
          title: Flaw Remediation
          description: Identify, report, and correct system flaws in a timely manner.
          checks:
          - id: SI-2.a
            description: Verify flaw remediation process
            evidence_type: patch_records
            remediation:
              summary: Use Systems Manager Patch Manager for automated patching.
              steps:
                aws:
                - 'Configure Patch Manager: aws ssm create-patch-baseline --name production-baseline'
                - 'Schedule patching: aws ssm create-maintenance-window'
                - 'Verify patch compliance: aws ssm describe-instance-patch-states'
                - Review Inspector findings for unpatched vulnerabilities
              console_path:
                aws: Systems Manager → Patch Manager → Configure patching
            cloud_checks:
              aws:
              - service: ssm
                method: describe_instance_patch_states
                assertion: patches_current
        SI-3:
          title: Malicious Code Protection
          description: Implement malicious code protection at system entry and exit points.
          checks:
          - id: SI-3.a
            description: Verify malware protection is enabled
            evidence_type: av_config
            remediation:
              summary: Enable GuardDuty Malware Protection and deploy endpoint protection on EC2.
              steps:
                aws:
                - 'Enable GuardDuty Malware Protection: aws guardduty update-detector --detector-id <id> --features ''[{"Name":"EBS_MALWARE_PROTECTION","Status":"ENABLED"}]'''
                - Deploy endpoint protection agents on EC2 instances
                - Configure S3 malware scanning via GuardDuty
              console_path:
                aws: GuardDuty → Settings → Malware Protection → Enable
            cloud_checks:
              aws:
              - service: guardduty
                method: list_detectors
                assertion: malware_protection_enabled
        SI-4:
          title: System Monitoring
          description: Monitor the system to detect attacks, indicators of potential attacks, and unauthorized connections.
          checks:
          - id: SI-4.a
            description: Verify system monitoring is implemented
            evidence_type: monitoring_config
            remediation:
              summary: Enable GuardDuty, CloudWatch anomaly detection, and VPC Flow Logs monitoring.
              steps:
                aws:
                - 'Enable GuardDuty: aws guardduty create-detector --enable'
                - 'Configure CloudWatch anomaly detection: aws cloudwatch put-anomaly-detector'
                - 'Enable VPC Flow Logs: aws ec2 create-flow-logs'
                - 'Set up Security Hub: aws securityhub enable-security-hub'
              console_path:
                aws: GuardDuty → Enable; Security Hub → Enable; CloudWatch → Anomaly detection
            cloud_checks:
              aws:
              - service: guardduty
                method: list_detectors
                assertion: guardduty_enabled
        SI-5:
          title: Security Alerts, Advisories, and Directives
          description: Receive security alerts and advisories from external organizations.
          checks:
          - id: SI-5.a
            description: Verify security alert monitoring
            evidence_type: alert_config
            remediation:
              summary: Subscribe to AWS Security Bulletins and configure automated advisory monitoring.
              steps:
                aws:
                - Subscribe to AWS Security Bulletins via RSS or email
                - 'Enable AWS Health notifications: aws health describe-events'
                - 'Configure EventBridge for AWS Health events: aws events put-rule'
              console_path:
                aws: Health → Event log → Configure notifications
            cloud_checks:
              aws:
              - service: health
                method: describe_events
                assertion: health_monitoring_active
        SI-6:
          title: Security and Privacy Function Verification
          description: Verify the correct operation of security and privacy functions and notify system administrators upon discovery of anomalies.
          checks:
          - id: SI-6.a
            description: Verify security function verification is performed
            evidence_type: test_results
            remediation:
              summary: Implement automated verification of security function operations with alerting on anomalies.
              steps:
                aws:
                - aws configservice describe-config-rules --query 'ConfigRules[*].[ConfigRuleName,ConfigRuleState,Source.SourceIdentifier]' --output table
                - aws configservice get-compliance-summary-by-config-rule
                - aws cloudwatch describe-alarms --state-value ALARM --query 'MetricAlarms[*].[AlarmName,StateValue]' --output table
              console_path:
                aws: AWS Config → Rules → Verify all rules are active
            cloud_checks:
              aws:
              - service: configservice
                method: describe_config_rules
                assertion: security_rules_active
              - service: cloudwatch
                method: describe_alarms
                assertion: security_alarms_configured
        SI-7:
          title: Software, Firmware, and Information Integrity
          description: Employ integrity verification tools to detect unauthorized changes.
          checks:
          - id: SI-7.a
            description: Verify integrity verification mechanisms
            evidence_type: integrity_config
            remediation:
              summary: Use AWS Config for configuration drift detection and CloudTrail log file validation.
              steps:
                aws:
                - 'Enable CloudTrail log file validation: aws cloudtrail update-trail --name <trail> --enable-log-file-validation'
                - Configure AWS Config rules for drift detection
                - 'Use CloudFormation drift detection: aws cloudformation detect-stack-drift'
              console_path:
                aws: CloudFormation → Stacks → Detect drift
            cloud_checks:
              aws:
              - service: cloudtrail
                method: describe_trails
                assertion: log_file_validation_enabled
        SI-8:
          title: Spam Protection
          description: Employ spam protection mechanisms at system entry and exit points to detect and act on unsolicited messages.
          checks:
          - id: SI-8.a
            description: Verify spam protection mechanisms at email gateways
            evidence_type: config_check
            remediation:
              summary: Implement spam protection at email entry and exit points with automatic updates.
              steps:
                aws:
                - aws ses get-account --query 'EnforcementStatus'
                - aws ses list-receipt-rule-sets
                - aws ses describe-active-receipt-rule-set
                - Verify SES receipt rules include spam filtering and DKIM/SPF/DMARC are configured
              console_path:
                aws: SES → Email receiving → Rule sets
            cloud_checks:
              aws:
              - service: ses
                method: describe_active_receipt_rule_set
                assertion: spam_filtering_enabled
        SI-10:
          title: Information Input Validation
          description: Check the validity of information inputs to the system.
          checks:
          - id: SI-10.a
            description: Verify input validation controls
            evidence_type: app_config
            remediation:
              summary: Deploy WAF rules for input validation and implement application-level validation.
              steps:
                aws:
                - 'Configure WAF SQL injection rules: aws wafv2 create-rule-group with SqlInjectionMatchStatement'
                - 'Configure WAF XSS rules: XssMatchStatement'
                - 'Use API Gateway request validation: aws apigateway put-method --request-validator-id <id>'
              console_path:
                aws: WAF → Web ACLs → Create rule → SQL injection protection
            cloud_checks:
              aws:
              - service: wafv2
                method: list_web_acls
                assertion: waf_input_validation_active
        SI-11:
          title: Error Handling
          description: Generate error messages that provide information necessary for corrective actions without revealing information that could be exploited by adversaries.
          checks:
          - id: SI-11.a
            description: Verify error messages do not reveal exploitable information
            evidence_type: config_check
            remediation:
              summary: Configure applications to generate safe error messages that aid troubleshooting without exposing sensitive system details.
              steps:
                aws:
                - aws apigateway get-gateway-responses --rest-api-id <api-id>
                - aws elbv2 describe-target-group-attributes --target-group-arn <tg-arn>
                - aws cloudfront get-distribution-config --id <dist-id> --query 'DistributionConfig.CustomErrorResponses'
              console_path:
                aws: API Gateway → APIs → Gateway responses → Custom error messages
            cloud_checks:
              aws:
              - service: apigateway
                method: get_gateway_responses
                assertion: custom_error_responses_configured
        SI-12:
          title: Information Management and Retention
          description: Manage and retain information within the system and information output from the system in accordance with applicable laws, directives, policies, regulations, standards, and operational
            requirements.
          checks:
          - id: SI-12.a
            description: Verify information retention policies are implemented
            evidence_type: policy_doc
            remediation:
              summary: Implement data retention policies consistent with legal requirements and organizational policies.
              steps:
                aws:
                - aws s3api get-bucket-lifecycle-configuration --bucket <bucket-name>
                - aws logs describe-log-groups --query 'logGroups[*].[logGroupName,retentionInDays]' --output table
                - aws backup list-backup-plans --query 'BackupPlansList[*].[BackupPlanName,BackupPlanId]' --output table
              console_path:
                aws: S3 → Bucket → Management → Lifecycle rules
            cloud_checks:
              aws:
              - service: logs
                method: describe_log_groups
                assertion: retention_policies_set
              - service: s3
                method: get_bucket_lifecycle_configuration
                assertion: lifecycle_rules_configured
        SI-13:
          title: Predictable Failure Prevention
          description: Determine mean time to failure for system components and take action to mitigate failures.
          checks:
          - id: SI-13.a
            description: Verify predictable failure prevention mechanisms
            evidence_type: monitoring_report
            remediation:
              summary: Monitor system component health and implement predictive failure prevention including proactive replacement.
              steps:
                aws:
                - aws health describe-events --filter eventStatusCodes=open --query 'events[*].[arn,service,eventTypeCode,statusCode]' --output table
                - aws ec2 describe-instance-status --query 'InstanceStatuses[?SystemStatus.Status!=`ok`].[InstanceId,SystemStatus]' --output table
                - aws cloudwatch get-metric-statistics --namespace AWS/EC2 --metric-name StatusCheckFailed --period 86400 --statistics Sum --start-time $(date -u -v-7d +%Y-%m-%dT%H:%M:%S) --end-time $(date
                  -u +%Y-%m-%dT%H:%M:%S)
              console_path:
                aws: AWS Health Dashboard → Open events
            cloud_checks:
              aws:
              - service: health
                method: describe_events
                assertion: no_active_health_events
              - service: ec2
                method: describe_instance_status
                assertion: all_instances_healthy
        SI-14:
          title: Non-Persistence
          description: Implement non-persistent system components and services that are initiated in a known state and terminated periodically or at the end of sessions.
          checks:
          - id: SI-14.a
            description: Verify non-persistent system components are used
            evidence_type: config_check
            remediation:
              summary: Deploy ephemeral infrastructure that is rebuilt from known-good states rather than patched in place.
              steps:
                aws:
                - aws autoscaling describe-auto-scaling-groups --query 'AutoScalingGroups[*].[AutoScalingGroupName,MaxInstanceLifetime]' --output table
                - aws lambda list-functions --query 'Functions[*].[FunctionName,Runtime]' --output table
                - aws ecs list-services --cluster <cluster-name>
                - Verify instance refresh policies and maximum instance lifetimes are configured
              console_path:
                aws: EC2 → Auto Scaling Groups → Instance refresh settings
            cloud_checks:
              aws:
              - service: autoscaling
                method: describe_auto_scaling_groups
                assertion: instance_refresh_configured
        SI-15:
          title: Information Output Filtering
          description: Validate information output from software programs or applications to ensure the information is consistent with expected content.
          checks:
          - id: SI-15.a
            description: Verify information output filtering controls
            evidence_type: config_check
            remediation:
              summary: Implement output validation and filtering to prevent unauthorized information disclosure.
              steps:
                aws:
                - aws wafv2 list-web-acls --scope REGIONAL
                - aws apigateway get-models --rest-api-id <api-id>
                - aws macie2 list-findings --finding-criteria '{"criterion":{"category":{"eq":["CLASSIFICATION"]}}}'
              console_path:
                aws: API Gateway → Models → Response validation schemas
            cloud_checks:
              aws:
              - service: wafv2
                method: list_web_acls
                assertion: output_filtering_rules_configured
        SI-16:
          title: Memory Protection
          description: Implement controls to protect system memory from unauthorized code execution.
          checks:
          - id: SI-16.a
            description: Verify memory protection controls are enabled
            evidence_type: config_check
            remediation:
              summary: Enable memory protection mechanisms including DEP, ASLR, and stack canaries on system components.
              steps:
                aws:
                - aws ssm describe-instance-information --query 'InstanceInformationList[*].[InstanceId,PlatformName,PlatformVersion]' --output table
                - aws inspector2 list-findings --filter-criteria findingType=[{comparison=EQUALS,value=VULNERABILITY}] --query 'findings[?title.contains(@,`memory`)]'
                - Verify OS-level memory protections (ASLR, DEP, NX bit) are enabled via SSM compliance checks
              console_path:
                aws: Systems Manager → Compliance → Instance patch compliance
            cloud_checks:
              aws:
              - service: ssm
                method: describe_instance_information
                assertion: memory_protection_enabled
        SI-17:
          title: Fail-Safe Procedures
          description: Implement fail-safe procedures when a failure occurs in a system component.
          checks:
          - id: SI-17.a
            description: Verify fail-safe procedures are implemented
            evidence_type: procedure_doc
            remediation:
              summary: Implement fail-safe procedures that default to a secure state when system failures occur.
              steps:
                aws:
                - aws autoscaling describe-auto-scaling-groups --query 'AutoScalingGroups[*].[AutoScalingGroupName,HealthCheckType,HealthCheckGracePeriod]' --output table
                - aws elbv2 describe-target-health --target-group-arn <tg-arn>
                - aws route53 list-health-checks
              console_path:
                aws: EC2 → Auto Scaling Groups → Health check configuration
            cloud_checks:
              aws:
              - service: autoscaling
                method: describe_auto_scaling_groups
                assertion: health_checks_configured
        SI-18:
          title: Personally Identifiable Information Quality Operations
          description: Check the accuracy, relevance, timeliness, and completeness of personally identifiable information across the information life cycle.
          checks:
          - id: SI-18.a
            description: Verify PII quality operations and validation
            evidence_type: data_quality_report
            remediation:
              summary: Implement data quality checks for PII including accuracy validation, deduplication, and currency verification.
              steps:
                aws:
                - aws macie2 get-macie-session
                - aws macie2 list-classification-jobs --query 'items[*].[jobId,name,jobStatus]' --output table
                - aws glue get-data-quality-ruleset --name <ruleset-name>
              console_path:
                aws: Macie → Jobs → PII discovery jobs
            cloud_checks:
              aws:
              - service: macie2
                method: list_classification_jobs
                assertion: pii_classification_active
        SI-19:
          title: De-Identification
          description: Remove personally identifiable information from datasets designated for public release or sharing.
          checks:
          - id: SI-19.a
            description: Verify de-identification processes for PII in shared datasets
            evidence_type: data_processing_doc
            remediation:
              summary: Implement de-identification techniques to remove or mask PII before data sharing or public release.
              steps:
                aws:
                - aws macie2 list-findings --finding-criteria '{"criterion":{"category":{"eq":["CLASSIFICATION"]}}}' --query 'findings[*].[id,title,severity.description]' --output table
                - aws glue get-jobs --query 'Jobs[?Name.contains(@,`deidentif`) || Name.contains(@,`mask`)].[Name,Command]' --output table
                - Verify de-identification pipelines exist for datasets shared externally
              console_path:
                aws: Glue → ETL Jobs → De-identification pipelines
            cloud_checks:
              aws:
              - service: macie2
                method: list_findings
                assertion: no_unprotected_pii
        SI-20:
          title: Tainting
          description: Embed data or capabilities in the following systems or system components to determine if organizational data has been exfiltrated or improperly removed.
          checks:
          - id: SI-20.a
            description: Verify data tainting capabilities for exfiltration detection
            evidence_type: config_check
            remediation:
              summary: Implement data tainting or watermarking to detect unauthorized data exfiltration.
              steps:
                aws:
                - aws s3api get-object-tagging --bucket <bucket-name> --key <object-key>
                - aws macie2 get-macie-session
                - Implement data watermarking and canary files to detect unauthorized data access or exfiltration
              console_path:
                aws: S3 → Objects → Tags → Tracking tags
            cloud_checks:
              aws:
              - service: macie2
                method: get_macie_session
                assertion: data_monitoring_active
        SI-21:
          title: Information Refresh
          description: Refresh information at defined frequencies to ensure freshness and reduce the risk of using outdated data.
          checks:
          - id: SI-21.a
            description: Verify information refresh processes are in place
            evidence_type: config_check
            remediation:
              summary: Implement automated data refresh mechanisms to ensure information currency and accuracy.
              steps:
                aws:
                - aws ssm describe-parameters --query 'Parameters[*].[Name,LastModifiedDate,Version]' --output table
                - aws secretsmanager list-secrets --query 'SecretList[*].[Name,LastRotatedDate,RotationEnabled]' --output table
                - aws config describe-configuration-recorder-status
              console_path:
                aws: Secrets Manager → Secrets → Rotation configuration
            cloud_checks:
              aws:
              - service: secretsmanager
                method: list_secrets
                assertion: secrets_rotation_enabled
        SI-22:
          title: Information Diversity
          description: Identify and employ alternative sources of information for essential system functions.
          checks:
          - id: SI-22.a
            description: Verify alternative information sources are identified
            evidence_type: architecture_doc
            remediation:
              summary: Identify and maintain alternative information sources to ensure continued operations during compromise or disruption.
              steps:
                aws:
                - aws rds describe-db-instances --query 'DBInstances[*].[DBInstanceIdentifier,ReadReplicaDBInstanceIdentifiers,MultiAZ]' --output table
                - aws s3api get-bucket-replication --bucket <bucket-name>
                - Verify alternative data sources and cross-region replication for critical information
              console_path:
                aws: RDS → Databases → Read replicas and replication
            cloud_checks:
              aws:
              - service: rds
                method: describe_db_instances
                assertion: read_replicas_configured
        SI-23:
          title: Information Fragmentation
          description: Fragment information based on organization-defined circumstances to reduce the likelihood of unauthorized access or disclosure.
          checks:
          - id: SI-23.a
            description: Verify information fragmentation controls
            evidence_type: architecture_doc
            remediation:
              summary: Implement data fragmentation to distribute sensitive information across multiple locations reducing single-point exposure risk.
              steps:
                aws:
                - aws dynamodb describe-table --table-name <table-name> --query 'Table.[TableName,KeySchema,GlobalSecondaryIndexes]'
                - aws s3api list-buckets --query 'Buckets[*].Name' --output table
                - Verify sensitive data is partitioned across multiple storage locations with separate access controls
              console_path:
                aws: DynamoDB → Tables → Partition strategy
            cloud_checks:
              aws:
              - service: dynamodb
                method: describe_table
                assertion: data_partitioning_configured
    SR:
      name: Supply Chain Risk Management
      controls:
        SR-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate supply chain risk management policy.
          checks:
          - id: SR-1.a
            description: Verify supply chain risk management policy exists
            evidence_type: policy_doc
            remediation:
              summary: Create SCRM policy covering vendor assessment and component provenance.
              steps:
                aws:
                - Document SCRM policy including AWS shared responsibility model
                - Track software supply chain via AWS CodeArtifact and ECR scanning
              console_path:
                aws: CodeArtifact → Repositories → View package provenance
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: scrm_policy_documented
        SR-2:
          title: Supply Chain Risk Management Plan
          description: Develop a supply chain risk management plan.
          checks:
          - id: SR-2.a
            description: Verify SCRM plan is developed
            evidence_type: scrm_plan
            remediation:
              summary: Create SCRM plan identifying critical suppliers and risk mitigations.
              steps:
                aws:
                - Identify all third-party services and dependencies
                - Use AWS Marketplace for vetted software
                - 'Enable ECR image scanning: aws ecr put-image-scanning-configuration'
              console_path:
                aws: ECR → Repository → Image scanning → Enable scan on push
            cloud_checks:
              aws:
              - service: ecr
                method: describe_repositories
                assertion: ecr_scanning_enabled
        SR-3:
          title: Supply Chain Controls and Processes
          description: Establish controls and processes to protect against supply chain risks.
          checks:
          - id: SR-3.a
            description: Verify supply chain controls are implemented
            evidence_type: scrm_controls
            remediation:
              summary: Implement software composition analysis and container image scanning.
              steps:
                aws:
                - Enable Inspector for Lambda and ECR scanning
                - 'Use CodeGuru for code analysis: aws codeguru-reviewer create-code-review'
                - Implement SBOM generation in CI/CD pipeline
              console_path:
                aws: Inspector → Coverage → Verify ECR and Lambda scanning
            cloud_checks:
              aws:
              - service: inspector2
                method: batch_get_account_status
                assertion: supply_chain_scanning_active
        SR-4:
          title: Provenance
          description: Document, monitor, and maintain valid provenance of systems, system components, and associated data.
          checks:
          - id: SR-4.a
            description: Verify provenance tracking for system components
            evidence_type: inventory_report
            remediation:
              summary: Implement provenance tracking to document the origin, custody, and integrity of system components.
              steps:
                aws:
                - aws ecr describe-images --repository-name <repo-name> --query 'imageDetails[*].[imageTags,imageDigest,imagePushedAt]' --output table
                - aws ecr describe-image-scan-findings --repository-name <repo-name> --image-id imageTag=latest
                - aws signer list-signing-jobs --query 'jobs[*].[jobId,status,source]' --output table
              console_path:
                aws: ECR → Repositories → Image details → Scan results
            cloud_checks:
              aws:
              - service: ecr
                method: describe_images
                assertion: image_provenance_tracked
        SR-5:
          title: Acquisition Strategies, Tools, and Methods
          description: Employ acquisition strategies, contract tools, and procurement methods to protect against, identify, and mitigate supply chain risks.
          checks:
          - id: SR-5.a
            description: Verify acquisition strategies address supply chain risk
            evidence_type: procurement_doc
            remediation:
              summary: Implement supply chain risk-aware acquisition strategies with security requirements in procurement.
              steps:
                aws:
                - aws marketplace-catalog list-entities --catalog AWSMarketplace --entity-type ContainerProduct
                - aws organizations list-policies --filter SERVICE_CONTROL_POLICY
                - Verify vendor risk assessments are conducted before procurement and documented
              console_path:
                aws: AWS Marketplace → Manage subscriptions → Vendor compliance
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: procurement_policies_exist
        SR-6:
          title: Supplier Assessments and Reviews
          description: Assess and review the supply chain-related risks associated with suppliers or contractors and the system, system component, or system service they provide.
          checks:
          - id: SR-6.a
            description: Verify supplier risk assessments are conducted
            evidence_type: assessment_report
            remediation:
              summary: Conduct regular supplier assessments and reviews of supply chain security risks.
              steps:
                aws:
                - aws audit-manager list-assessments --query 'assessmentMetadata[*].[name,id,status]' --output table
                - aws artifact list-reports
                - Review third-party SOC reports and compliance certifications for all critical suppliers
              console_path:
                aws: Audit Manager → Assessments → Vendor assessments
            cloud_checks:
              aws:
              - service: auditmanager
                method: list_assessments
                assertion: supplier_assessments_conducted
        SR-7:
          title: Supply Chain Operations Security
          description: Employ operations security controls to protect supply chain-related information.
          checks:
          - id: SR-7.a
            description: Verify OPSEC controls protect supply chain information
            evidence_type: policy_doc
            remediation:
              summary: Implement OPSEC measures to prevent adversaries from identifying and exploiting supply chain vulnerabilities.
              steps:
                aws:
                - aws organizations list-policies --filter TAG_POLICY
                - aws s3api get-bucket-policy --bucket <supply-chain-bucket>
                - Verify supply chain documentation access is restricted and monitored
              console_path:
                aws: S3 → Buckets → Supply chain data → Permissions
            cloud_checks:
              aws:
              - service: s3
                method: get_bucket_policy
                assertion: supply_chain_data_protected
        SR-8:
          title: Notification Agreements
          description: Establish agreements and procedures with entities involved in the supply chain for notification of supply chain compromises and results of assessments or audits.
          checks:
          - id: SR-8.a
            description: Verify notification agreements exist with supply chain partners
            evidence_type: agreement_doc
            remediation:
              summary: Establish formal notification agreements with suppliers for reporting security incidents and compromise events.
              steps:
                aws:
                - aws sns list-topics --query 'Topics[*].TopicArn' --output table
                - aws securityhub get-findings --filters '{"Type":[{"Value":"Software and Configuration Checks","Comparison":"PREFIX"}]}' --query 'Findings[*].[Title,Severity.Label]' --output table
                - Document vendor notification agreements and incident communication procedures
              console_path:
                aws: Security Hub → Findings → Third-party integrations
            cloud_checks:
              aws:
              - service: securityhub
                method: get_findings
                assertion: vendor_notification_tracking
        SR-9:
          title: Tamper Resistance and Detection
          description: Implement a tamper protection program for the system, system component, or system service.
          checks:
          - id: SR-9.a
            description: Verify tamper resistance and detection mechanisms
            evidence_type: config_check
            remediation:
              summary: Implement tamper detection controls including integrity verification and anti-tamper mechanisms.
              steps:
                aws:
                - aws ecr describe-image-scan-findings --repository-name <repo-name> --image-id imageTag=latest
                - aws signer list-signing-profiles --query 'profiles[*].[profileName,status,platformId]' --output table
                - aws ssm describe-instance-patches-for-patch-group --patch-group production
              console_path:
                aws: ECR → Repositories → Image scanning → Integrity verification
            cloud_checks:
              aws:
              - service: ecr
                method: describe_image_scan_findings
                assertion: image_integrity_verified
              - service: signer
                method: list_signing_profiles
                assertion: code_signing_active
        SR-10:
          title: Inspection of Systems or Components
          description: Inspect systems or system components to detect tampering.
          checks:
          - id: SR-10.a
            description: Verify inspection processes for systems and components
            evidence_type: inspection_report
            remediation:
              summary: Conduct periodic inspections of systems and components to detect signs of tampering or unauthorized modifications.
              steps:
                aws:
                - aws inspector2 list-findings --filter-criteria findingType=[{comparison=EQUALS,value=VULNERABILITY}] --query 'findings[*].[title,severity,status]' --output table
                - aws configservice get-compliance-details-by-config-rule --config-rule-name <rule-name>
                - aws ssm list-compliance-items --resource-ids <instance-id> --resource-types ManagedInstance
              console_path:
                aws: Inspector → Findings → All findings
            cloud_checks:
              aws:
              - service: inspector2
                method: list_findings
                assertion: component_inspection_completed
        SR-11:
          title: Component Authenticity
          description: Develop and implement anti-counterfeit policy and procedures to detect and prevent counterfeit components.
          checks:
          - id: SR-11.a
            description: Verify component authenticity verification processes
            evidence_type: verification_report
            remediation:
              summary: Implement component authenticity verification including software signing and hash validation.
              steps:
                aws:
                - aws signer list-signing-profiles --query 'profiles[*].[profileName,status]' --output table
                - aws ecr batch-get-image --repository-name <repo-name> --image-ids imageTag=latest --query 'images[*].imageManifest'
                - aws lambda get-function --function-name <function-name> --query 'Configuration.CodeSha256'
              console_path:
                aws: Signer → Signing profiles → Active profiles
            cloud_checks:
              aws:
              - service: signer
                method: list_signing_profiles
                assertion: signing_profiles_active
              - service: lambda
                method: get_function
                assertion: code_hash_verified
        SR-12:
          title: Component Disposal
          description: Dispose of system components using organization-defined techniques and methods.
          checks:
          - id: SR-12.a
            description: Verify secure component disposal processes
            evidence_type: disposal_doc
            remediation:
              summary: Implement secure disposal procedures for system components including data sanitization and resource deletion.
              steps:
                aws:
                - aws ec2 describe-volumes --filters Name=status,Values=available --query 'Volumes[*].[VolumeId,Size,CreateTime,Encrypted]' --output table
                - aws ec2 describe-snapshots --owner-ids self --query 'Snapshots[?StartTime<`2024-01-01`].[SnapshotId,VolumeId,StartTime]' --output table
                - aws s3api list-buckets --query 'Buckets[*].[Name,CreationDate]' --output table
                - Verify decommissioned resources are properly deleted and storage is sanitized
              console_path:
                aws: EC2 → Volumes → Available (unattached) volumes for disposal
            cloud_checks:
              aws:
              - service: ec2
                method: describe_volumes
                assertion: no_orphaned_volumes
              - service: ec2
                method: describe_snapshots
                assertion: no_stale_snapshots
fedramp_moderate:
  name: FedRAMP Moderate Baseline
  inherits: nist_800_53
  additional_requirements:
    AC-2:
      frequency: monthly
      evidence_retention_days: 365
      additional_checks:
      - id: AC-2.fedramp.1
        description: Automated account management notifications
        assertion: account_changes_trigger_alerts
    CA:
      name: Assessment, Authorization, and Monitoring
      controls:
        CA-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate assessment, authorization, and monitoring policy and procedures.
          checks:
          - id: CA-1.a
            description: Develop assessment and authorization policy
            evidence_type: policy_document
            remediation:
              summary: Document and publish security assessment and authorization policies using centralized policy management.
              steps:
                aws:
                - 'Use AWS Audit Manager to create assessment frameworks: aws auditmanager create-assessment --name NIST-Assessment --framework-id <framework-id> --roles <roles> --scope <scope>'
                - Store authorization documentation in S3 with versioning enabled
                azure:
                - Use Microsoft Purview Compliance Manager for assessment tracking
                - 'Create compliance policies: az policy definition create --name ca-policy --rules @ca-rules.json'
                gcp:
                - Use Security Command Center for continuous assessment
                - Store authorization packages in GCS with object versioning
              console_path:
                aws: AWS Audit Manager → Assessments → Create assessment
                azure: Compliance Manager → Assessments → Add assessment
                gcp: Security Command Center → Overview
            cloud_checks:
              aws:
              - service: auditmanager
                method: list_assessments
                assertion: active_assessments_exist
        CA-2:
          title: Control Assessments
          description: Select an assessor or assessment team and develop a control assessment plan that describes the scope, roles, and assessment procedures.
          checks:
          - id: CA-2.a
            description: Develop control assessment plan
            evidence_type: assessment_plan
            remediation:
              summary: Establish automated and manual assessment processes using cloud-native assessment tools.
              steps:
                aws:
                - 'Create Audit Manager assessment: aws auditmanager create-assessment --name Annual-Assessment --framework-id <nist-framework-id> --assessment-reports-destination s3://<bucket>/reports/'
                - 'Enable AWS Config conformance packs: aws configservice put-conformance-pack --conformance-pack-name Operational-Best-Practices-for-NIST-800-53 --template-s3-uri s3://<bucket>/nist-conformance-pack.yaml'
                - 'Schedule regular assessments via EventBridge: aws events put-rule --name quarterly-assessment --schedule-expression ''rate(90 days)'''
                azure:
                - Create regulatory compliance assessment in Microsoft Defender for Cloud
                - 'Review compliance score: az security regulatory-compliance-standards list'
                gcp:
                - 'Enable Security Health Analytics: gcloud services enable securitycenter.googleapis.com'
                - 'Run SCC compliance scan: gcloud scc findings list <org-id> --filter ''category="COMPLIANCE"'''
              console_path:
                aws: Audit Manager → Assessments → Create assessment → Select NIST 800-53 framework
                azure: Defender for Cloud → Regulatory compliance → Add standard
                gcp: Security Command Center → Compliance
            cloud_checks:
              aws:
              - service: auditmanager
                method: list_assessments
                assertion: nist_assessment_active
              - service: configservice
                method: describe_conformance_packs
                assertion: nist_conformance_pack_deployed
        CA-3:
          title: Information Exchange
          description: Approve and manage the exchange of information between the system and other systems using interconnection security agreements.
          checks:
          - id: CA-3.a
            description: Approve information exchange with interconnected systems
            evidence_type: network_config
            remediation:
              summary: Document and enforce interconnection agreements with technical controls for data exchange.
              steps:
                aws:
                - 'Review VPC peering connections: aws ec2 describe-vpc-peering-connections --query ''VpcPeeringConnections[*].[VpcPeeringConnectionId,Status.Code]'''
                - 'Review RAM resource shares: aws ram get-resource-shares --resource-owner SELF'
                - 'Audit cross-account IAM roles: aws iam list-roles --query ''Roles[?contains(AssumeRolePolicyDocument,`sts:AssumeRole`)]'''
                azure:
                - 'Review VNet peerings: az network vnet peering list --vnet-name <vnet> --resource-group <rg>'
                - 'Review Private Link connections: az network private-endpoint-connection list --name <resource> --resource-group <rg> --type <type>'
                gcp:
                - 'Review VPC peerings: gcloud compute networks peerings list --network <network>'
                - 'Review Shared VPC connections: gcloud compute shared-vpc list-associated-resources <host-project>'
              console_path:
                aws: VPC → Peering connections; RAM → Resource shares
                azure: Virtual networks → Peerings
                gcp: VPC network → VPC network peering
            cloud_checks:
              aws:
              - service: ec2
                method: describe_vpc_peering_connections
                assertion: peering_connections_documented
              - service: ram
                method: get_resource_shares
                assertion: resource_shares_authorized
        CA-7:
          title: Continuous Monitoring
          description: Develop a system-level continuous monitoring strategy and implement continuous monitoring in accordance with the organizational strategy.
          checks:
          - id: CA-7.a
            description: Develop and implement continuous monitoring strategy
            evidence_type: monitoring_config
            remediation:
              summary: Implement continuous monitoring using cloud-native security monitoring services.
              steps:
                aws:
                - 'Enable Security Hub with all standards: aws securityhub enable-security-hub --enable-default-standards'
                - 'Enable AWS Config with all resource types: aws configservice put-configuration-recorder --configuration-recorder name=default,roleARN=<role-arn>,recordingGroup={allSupported=true,includeGlobalResourceTypes=true}'
                - 'Enable GuardDuty across all accounts: aws guardduty create-detector --enable'
                - 'Create Security Hub custom insights: aws securityhub create-insight --name ''Critical Findings'' --filters ''{"SeverityLabel":[{"Value":"CRITICAL","Comparison":"EQUALS"}]}'' --group-by-attribute
                  ResourceType'
                - 'Configure EventBridge for automated response: aws events put-rule --name security-findings --event-pattern ''{"source":["aws.securityhub"],"detail-type":["Security Hub Findings - Imported"]}'''
                azure:
                - 'Enable Microsoft Defender for Cloud: az security pricing create --name VirtualMachines --tier Standard'
                - 'Enable continuous export: az security automation create --name export-to-sentinel --resource-group <rg>'
                gcp:
                - 'Enable Security Command Center Premium: gcloud scc settings update --organization <org-id> --enable-asset-discovery'
                - 'Configure notifications: gcloud scc notifications create <config-name> --organization <org-id> --pubsub-topic projects/<project>/topics/<topic> --filter ''severity="CRITICAL"'''
              console_path:
                aws: Security Hub → Settings → Enable all standards; GuardDuty → Enable
                azure: Defender for Cloud → Environment settings → Enable all plans
                gcp: Security Command Center → Settings → Enable Premium
            cloud_checks:
              aws:
              - service: securityhub
                method: describe_hub
                assertion: security_hub_enabled
              - service: guardduty
                method: list_detectors
                assertion: guardduty_enabled
              - service: configservice
                method: describe_configuration_recorders
                assertion: config_recording_enabled
        CA-9:
          title: Internal System Connections
          description: Authorize internal connections of system components and document for each connection the interface characteristics, security requirements, and nature of information communicated.
          checks:
          - id: CA-9.a
            description: Authorize and document internal system connections
            evidence_type: network_config
            remediation:
              summary: Document and control internal network connections between system components.
              steps:
                aws:
                - 'Map VPC subnets and route tables: aws ec2 describe-subnets --query ''Subnets[*].[SubnetId,VpcId,CidrBlock,Tags[?Key==`Name`].Value|[0]]'''
                - 'Review security group rules for internal traffic: aws ec2 describe-security-groups --filters Name=vpc-id,Values=<vpc-id>'
                - 'Document Transit Gateway attachments: aws ec2 describe-transit-gateway-attachments'
                azure:
                - 'Map VNet and subnet topology: az network vnet list --output table'
                - 'Review internal NSG rules: az network nsg list --output table'
                gcp:
                - 'Map VPC networks and subnets: gcloud compute networks subnets list'
                - 'Review firewall rules for internal traffic: gcloud compute firewall-rules list --filter ''direction=INGRESS AND disabled=false'''
              console_path:
                aws: VPC → Subnets; VPC → Route tables; VPC → Transit Gateway
                azure: Virtual networks → Topology
                gcp: VPC network → VPC networks → Subnets
            cloud_checks:
              aws:
              - service: ec2
                method: describe_subnets
                assertion: subnets_documented
              - service: ec2
                method: describe_transit_gateway_attachments
                assertion: transit_gateway_connections_authorized
    CM:
      name: Configuration Management
      controls:
        CM-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate configuration management policy and procedures.
          checks:
          - id: CM-1.a
            description: Develop configuration management policy
            evidence_type: policy_document
            remediation:
              summary: Establish configuration management policies enforced through infrastructure as code and change management processes.
              steps:
                aws:
                - 'Use AWS Config to enforce configuration baselines: aws configservice put-config-rule --config-rule file://config-rule.json'
                - 'Store infrastructure as code in CodeCommit: aws codecommit create-repository --repository-name infra-configs'
                - 'Enable CloudFormation drift detection: aws cloudformation detect-stack-drift --stack-name <stack-name>'
                azure:
                - 'Use Azure Policy for configuration enforcement: az policy assignment create --name enforce-configs --policy <policy-id>'
                - Store IaC in Azure Repos with branch protection policies
                gcp:
                - Use Config Controller for policy enforcement
                - 'Store IaC in Cloud Source Repositories: gcloud source repos create infra-configs'
              console_path:
                aws: AWS Config → Rules → Add rule
                azure: Azure Policy → Assignments → Assign policy
                gcp: Config Controller → Policies
            cloud_checks:
              aws:
              - service: configservice
                method: describe_config_rules
                assertion: config_rules_active
        CM-2:
          title: Baseline Configuration
          description: Develop, document, and maintain a current baseline configuration of the system under configuration control.
          checks:
          - id: CM-2.a
            description: Develop and maintain baseline configuration
            evidence_type: system_config
            remediation:
              summary: Establish system baselines using golden AMIs, container images, and infrastructure as code templates.
              steps:
                aws:
                - 'Create golden AMI with EC2 Image Builder: aws imagebuilder create-image-pipeline --name golden-ami-pipeline --image-recipe-arn <recipe-arn> --infrastructure-configuration-arn <infra-arn>'
                - 'Store CloudFormation templates as baselines: aws s3 cp baseline-template.yaml s3://<config-bucket>/baselines/'
                - 'Enable AWS Config recording for all resources: aws configservice start-configuration-recorder --configuration-recorder-name default'
                - 'Track configuration changes: aws configservice get-resource-config-history --resource-type AWS::EC2::Instance --resource-id <instance-id>'
                azure:
                - 'Create VM image gallery: az sig create --gallery-name GoldenImages --resource-group <rg>'
                - Use ARM/Bicep templates as configuration baselines
                gcp:
                - 'Create custom images: gcloud compute images create golden-image --source-disk <disk> --source-disk-zone <zone>'
                - Use Deployment Manager or Terraform for configuration baselines
              console_path:
                aws: EC2 Image Builder → Image pipelines → Create pipeline
                azure: Azure Compute Gallery → Create gallery
                gcp: Compute Engine → Images → Create image
            cloud_checks:
              aws:
              - service: configservice
                method: describe_configuration_recorders
                assertion: all_resource_types_recorded
              - service: imagebuilder
                method: list_image_pipelines
                assertion: golden_ami_pipeline_exists
        CM-3:
          title: Configuration Change Control
          description: Determine and document the types of changes to the system that are configuration-controlled.
          checks:
          - id: CM-3.a
            description: Determine types of configuration-controlled changes
            evidence_type: change_management
            remediation:
              summary: Implement change control processes using CI/CD pipelines with approval gates and drift detection.
              steps:
                aws:
                - 'Use CodePipeline with manual approval stages: aws codepipeline create-pipeline --pipeline file://pipeline-with-approval.json'
                - 'Enable CloudFormation change sets for review before deployment: aws cloudformation create-change-set --stack-name <stack> --template-body file://template.yaml --change-set-name review-changes'
                - 'Configure AWS Config rules for drift detection: aws configservice put-config-rule --config-rule ''{"ConfigRuleName":"cloudformation-stack-drift-detection-check","Source":{"Owner":"AWS","SourceIdentifier":"CLOUDFORMATION_STACK_DRIFT_DETECTION_CHECK"}}'''
                azure:
                - Use Azure DevOps with environment approvals and gates
                - 'Enable Azure Policy for change tracking: az policy assignment create --name track-changes --policy <policy-definition-id>'
                gcp:
                - Use Cloud Build with approval requirements
                - Enable Config Connector for declarative configuration management
              console_path:
                aws: CodePipeline → Pipelines → Edit → Add approval action
                azure: Azure DevOps → Pipelines → Environments → Approvals
                gcp: Cloud Build → Triggers → Add approval
            cloud_checks:
              aws:
              - service: codepipeline
                method: list_pipelines
                assertion: pipelines_have_approval_stages
              - service: cloudformation
                method: list_stacks
                assertion: no_drifted_stacks
        CM-6:
          title: Configuration Settings
          description: Establish and document configuration settings for components employed within the system that reflect the most restrictive mode consistent with operational requirements.
          checks:
          - id: CM-6.a
            description: Establish and document configuration settings
            evidence_type: system_config
            remediation:
              summary: Apply CIS Benchmarks and security best practices using automated configuration management tools.
              steps:
                aws:
                - 'Apply CIS benchmark via SSM: aws ssm create-association --name AWS-RunPatchBaseline --targets Key=tag:Environment,Values=Production --parameters Operation=Scan'
                - 'Use AWS Config conformance packs for CIS: aws configservice put-conformance-pack --conformance-pack-name CIS-AWS-Foundations --template-s3-uri s3://<bucket>/cis-conformance-pack.yaml'
                - 'Enable Systems Manager State Manager for desired state: aws ssm create-association --name AWS-GatherSoftwareInventory --targets Key=instanceids,Values=*'
                azure:
                - 'Apply Azure Security Benchmark: az security setting update --name MCAS --setting-name enabled'
                - 'Use Azure Automanage for best practices: az automanage configuration-profile-assignment create --vm-name <vm>'
                gcp:
                - 'Apply CIS benchmarks via Security Command Center: gcloud scc sources list --organization <org-id>'
                - 'Use OS Config for patch management: gcloud compute os-config patch-deployments create <deployment-name> --instance-filter-names <instances>'
              console_path:
                aws: Systems Manager → State Manager → Create association
                azure: Defender for Cloud → Recommendations → Apply CIS benchmark
                gcp: Security Command Center → Findings → CIS benchmark
            cloud_checks:
              aws:
              - service: configservice
                method: describe_conformance_pack_compliance
                assertion: cis_benchmark_compliant
              - service: ssm
                method: list_associations
                assertion: state_manager_associations_active
        CM-7:
          title: Least Functionality
          description: Configure the system to provide only mission-essential capabilities and prohibit or restrict the use of non-essential functions, ports, protocols, and services.
          checks:
          - id: CM-7.a
            description: Configure system for least functionality
            evidence_type: system_config
            remediation:
              summary: Disable unnecessary services, close unused ports, and remove non-essential software packages.
              steps:
                aws:
                - 'Audit open ports on security groups: aws ec2 describe-security-groups --query ''SecurityGroups[*].IpPermissions[?IpRanges[?CidrIp==`0.0.0.0/0`]]'''
                - 'Restrict security group rules to required ports only: aws ec2 revoke-security-group-ingress --group-id <sg-id> --protocol tcp --port <unused-port> --cidr 0.0.0.0/0'
                - 'Use SSM to audit installed packages: aws ssm list-inventory-entries --instance-id <id> --type-name AWS:Application'
                - 'Remove unnecessary packages via SSM Run Command: aws ssm send-command --instance-ids <id> --document-name AWS-RunShellScript --parameters commands=[''yum remove -y <package>'']'
                azure:
                - 'Review open ports: az vm list-ip-addresses --output table'
                - 'Use JIT VM access: az security jit-policy create --resource-group <rg> --location <location> --jit-policy-name <name>'
                gcp:
                - 'Audit firewall rules: gcloud compute firewall-rules list --filter=''allowed[].ports:*'' --format=''table(name,allowed[].ports,sourceRanges)'''
                - 'Remove overly permissive rules: gcloud compute firewall-rules delete <rule-name>'
              console_path:
                aws: EC2 → Security Groups → Review inbound rules → Remove unnecessary ports
                azure: Defender for Cloud → Just-in-time VM access
                gcp: VPC network → Firewall → Review and remove unnecessary rules
            cloud_checks:
              aws:
              - service: ec2
                method: describe_security_groups
                assertion: no_unnecessary_open_ports
              - service: ssm
                method: list_inventory_entries
                assertion: no_unauthorized_software
        CM-8:
          title: System Component Inventory
          description: Develop and document an inventory of system components that accurately reflects the system and is at a level of granularity deemed necessary for tracking and reporting.
          checks:
          - id: CM-8.a
            description: Develop and document system component inventory
            evidence_type: asset_inventory
            remediation:
              summary: Maintain automated asset inventory using cloud-native discovery and inventory services.
              steps:
                aws:
                - 'Enable AWS Config for resource inventory: aws configservice put-configuration-recorder --configuration-recorder name=default,roleARN=<role-arn>,recordingGroup={allSupported=true}'
                - 'Use SSM Inventory for detailed instance data: aws ssm create-association --name AWS-GatherSoftwareInventory --targets Key=instanceids,Values=*'
                - 'Query resource inventory: aws configservice list-discovered-resources --resource-type AWS::EC2::Instance'
                - 'Use Resource Groups for tagging: aws resource-groups create-group --name AllResources --resource-query ''{"Type":"TAG_FILTERS_1_0","Query":"{\"ResourceTypeFilters\":[\"AWS::AllSupported\"]}"}}'''
                azure:
                - 'Use Azure Resource Graph: az graph query -q ''Resources | summarize count() by type'''
                - Enable Azure Resource Inventory export
                gcp:
                - 'Enable Cloud Asset Inventory: gcloud asset search-all-resources --scope organizations/<org-id>'
                - 'Export asset inventory: gcloud asset export --organization <org-id> --output-path gs://<bucket>/asset-inventory.json --content-type resource'
              console_path:
                aws: AWS Config → Resources → Resource inventory
                azure: Resource Graph Explorer → Run query
                gcp: Cloud Asset Inventory → Search resources
            cloud_checks:
              aws:
              - service: configservice
                method: list_discovered_resources
                assertion: resource_inventory_complete
              - service: ssm
                method: describe_instance_information
                assertion: all_instances_in_inventory
    CP:
      name: Contingency Planning
      controls:
        CP-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate contingency planning policy and procedures.
          checks:
          - id: CP-1.a
            description: Develop contingency planning policy
            evidence_type: policy_document
            remediation:
              summary: Document contingency planning policies including BCP/DR requirements and procedures.
              steps:
                aws:
                - 'Store contingency plans in S3 with versioning: aws s3 cp contingency-plan.pdf s3://<policy-bucket>/contingency/'
                - 'Use AWS Resilience Hub to assess application resilience: aws resiliencehub create-app --name <app-name> --assessment-schedule Daily'
                azure:
                - Use Azure Site Recovery for DR planning documentation
                - Store plans in SharePoint or Azure Blob Storage
                gcp:
                - 'Store DR documentation in GCS: gsutil cp dr-plan.pdf gs://<policy-bucket>/contingency/'
              console_path:
                aws: AWS Resilience Hub → Applications → Create application
                azure: Recovery Services vault → Overview
                gcp: Cloud Storage → Contingency plans bucket
            cloud_checks:
              aws:
              - service: resiliencehub
                method: list_apps
                assertion: resilience_apps_configured
        CP-2:
          title: Contingency Plan
          description: Develop a contingency plan for the system that identifies essential mission and business functions, provides recovery objectives and restoration priorities.
          checks:
          - id: CP-2.a
            description: Develop contingency plan with recovery objectives
            evidence_type: dr_plan
            remediation:
              summary: Establish RTO/RPO targets and implement automated backup and recovery capabilities.
              steps:
                aws:
                - 'Define resilience policy with RTO/RPO: aws resiliencehub create-resiliency-policy --policy-name production-policy --tier MissionCritical --policy ''{"AZ":{"rtoInSecs":3600,"rpoInSecs":3600},"Hardware":{"rtoInSecs":3600,"rpoInSecs":3600},"Region":{"rtoInSecs":86400,"rpoInSecs":86400},"Software":{"rtoInSecs":3600,"rpoInSecs":3600}}'''
                - 'Run resilience assessment: aws resiliencehub start-app-assessment --app-arn <app-arn> --app-version release --assessment-name quarterly-assessment'
                - 'Review recommendations: aws resiliencehub list-app-assessment-compliance-drifts --assessment-arn <assessment-arn>'
                azure:
                - 'Configure Azure Site Recovery replication: az backup protection enable-for-vm --resource-group <rg> --vault-name <vault> --vm <vm-name> --policy-name DefaultPolicy'
                gcp:
                - 'Configure cross-region replication for Cloud SQL: gcloud sql instances create <replica> --master-instance-name <master> --region <dr-region>'
              console_path:
                aws: Resilience Hub → Resiliency policies → Create policy
                azure: Recovery Services vault → Backup policies
                gcp: Cloud SQL → Replicas → Create read replica
            cloud_checks:
              aws:
              - service: resiliencehub
                method: list_resiliency_policies
                assertion: resilience_policies_defined
        CP-6:
          title: Alternate Storage Site
          description: Establish an alternate storage site including necessary agreements to permit the storage and retrieval of system backup information.
          checks:
          - id: CP-6.a
            description: Establish alternate storage site
            evidence_type: storage_config
            remediation:
              summary: Configure cross-region replication for backups and critical data.
              steps:
                aws:
                - 'Enable S3 cross-region replication: aws s3api put-bucket-replication --bucket <source-bucket> --replication-configuration file://replication-config.json'
                - 'Create cross-region RDS read replica: aws rds create-db-instance-read-replica --db-instance-identifier <replica-id> --source-db-instance-identifier <source-id> --source-region <source-region>'
                - 'Copy EBS snapshots to DR region: aws ec2 copy-snapshot --source-region <source-region> --source-snapshot-id <snap-id> --destination-region <dr-region>'
                azure:
                - 'Enable geo-redundant storage: az storage account update --name <account> --sku Standard_GRS'
                - Configure Azure Site Recovery for cross-region replication
                gcp:
                - 'Create dual-region or multi-region GCS bucket: gsutil mb -l <dual-region> -c STANDARD gs://<dr-bucket>'
                - 'Enable cross-region backup for Cloud SQL: gcloud sql instances patch <instance> --backup-location <dr-region>'
              console_path:
                aws: S3 → Bucket → Management → Replication rules → Create replication rule
                azure: Storage account → Geo-replication
                gcp: Cloud Storage → Create bucket → Multi-region
            cloud_checks:
              aws:
              - service: s3
                method: get_bucket_replication
                assertion: cross_region_replication_enabled
              - service: rds
                method: describe_db_instances
                assertion: cross_region_replicas_exist
        CP-9:
          title: System Backup
          description: Conduct backups of user-level information, system-level information, and system documentation at a defined frequency consistent with recovery time and recovery point objectives.
          checks:
          - id: CP-9.a
            description: Conduct regular system backups
            evidence_type: backup_config
            remediation:
              summary: Implement automated backup using AWS Backup, Azure Backup, or GCP backup services.
              steps:
                aws:
                - 'Create AWS Backup plan: aws backup create-backup-plan --backup-plan ''{"BackupPlanName":"DailyBackups","Rules":[{"RuleName":"DailyRule","TargetBackupVaultName":"Default","ScheduleExpression":"cron(0
                  5 ? * * *)","Lifecycle":{"DeleteAfterDays":90}}]}'''
                - 'Assign resources to backup plan: aws backup create-backup-selection --backup-plan-id <plan-id> --backup-selection ''{"SelectionName":"AllTaggedResources","IamRoleArn":"<role-arn>","ListOfTags":[{"ConditionType":"STRINGEQUALS","ConditionKey":"Backup","ConditionValue":"true"}]}'''
                - 'Verify backup jobs: aws backup list-backup-jobs --by-state COMPLETED'
                - 'Enable RDS automated backups: aws rds modify-db-instance --db-instance-identifier <id> --backup-retention-period 30'
                azure:
                - 'Create backup policy: az backup policy create --resource-group <rg> --vault-name <vault> --name DailyBackup --policy @backup-policy.json'
                - 'Enable VM backup: az backup protection enable-for-vm --resource-group <rg> --vault-name <vault> --vm <vm-name> --policy-name DailyBackup'
                gcp:
                - 'Create snapshot schedule: gcloud compute resource-policies create snapshot-schedule daily-snapshots --start-time 04:00 --daily-schedule --max-retention-days 90 --region <region>'
                - 'Attach to disks: gcloud compute disks add-resource-policies <disk> --resource-policies daily-snapshots --zone <zone>'
              console_path:
                aws: AWS Backup → Backup plans → Create backup plan
                azure: Recovery Services vault → Backup → Configure backup
                gcp: Compute Engine → Snapshots → Snapshot schedules → Create
            cloud_checks:
              aws:
              - service: backup
                method: list_backup_plans
                assertion: backup_plans_active
              - service: rds
                method: describe_db_instances
                assertion: automated_backups_enabled
        CP-10:
          title: System Recovery and Reconstitution
          description: Provide for the recovery and reconstitution of the system to a known state within a defined time period after a disruption, compromise, or failure.
          checks:
          - id: CP-10.a
            description: Provide for system recovery and reconstitution
            evidence_type: dr_config
            remediation:
              summary: Implement and test disaster recovery procedures with automated failover capabilities.
              steps:
                aws:
                - 'Test backup restoration: aws backup start-restore-job --recovery-point-arn <arn> --iam-role-arn <role-arn> --metadata file://restore-metadata.json'
                - 'Set up Route 53 health checks for failover: aws route53 create-health-check --caller-reference <ref> --health-check-config IPAddress=<ip>,Port=443,Type=HTTPS,ResourcePath=/health'
                - 'Configure Route 53 failover routing: aws route53 change-resource-record-sets --hosted-zone-id <zone-id> --change-batch file://failover-records.json'
                - 'Use Elastic Disaster Recovery for automated failover: aws drs initialize-service'
                azure:
                - 'Test failover: az site-recovery failover-commit --fabric-name <fabric> --network-id <network> --protection-container <container>'
                - 'Configure Traffic Manager for failover: az network traffic-manager profile create --name <profile> --routing-method Priority'
                gcp:
                - 'Promote Cloud SQL replica: gcloud sql instances promote-replica <replica-name>'
                - Configure Cloud DNS failover routing
              console_path:
                aws: Route 53 → Health checks → Create; Elastic Disaster Recovery → Source servers
                azure: Site Recovery → Replicated items → Test failover
                gcp: Cloud SQL → Replicas → Promote replica
            cloud_checks:
              aws:
              - service: route53
                method: list_health_checks
                assertion: health_checks_configured
              - service: backup
                method: list_restore_jobs
                assertion: restore_tests_completed
    IA:
      name: Identification and Authentication
      controls:
        IA-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate identification and authentication policy and procedures.
          checks:
          - id: IA-1.a
            description: Develop identification and authentication policy
            evidence_type: policy_document
            remediation:
              summary: Document identification and authentication policies covering all system access methods.
              steps:
                aws:
                - 'Enable IAM password policy: aws iam update-account-password-policy --minimum-password-length 14 --require-symbols --require-numbers --require-uppercase-characters --require-lowercase-characters
                  --max-password-age 90 --password-reuse-prevention 24'
                - 'Document authentication requirements in AWS SSM: aws ssm create-document --name AuthenticationPolicy --content file://auth-policy.json --document-type Policy'
                azure:
                - 'Configure authentication methods policy in Entra ID: az rest --method PATCH --uri https://graph.microsoft.com/v1.0/policies/authenticationMethodsPolicy --body @auth-methods.json'
                gcp:
                - 'Configure authentication settings: gcloud identity platform config update --project <project-id>'
              console_path:
                aws: IAM → Account settings → Password policy → Edit
                azure: Entra ID → Security → Authentication methods
                gcp: Identity Platform → Settings
            cloud_checks:
              aws:
              - service: iam
                method: get_account_password_policy
                assertion: strong_password_policy_configured
        IA-2:
          title: Identification and Authentication (Organizational Users)
          description: Uniquely identify and authenticate organizational users and associate that unique identification with processes acting on behalf of those users.
          checks:
          - id: IA-2.a
            description: Uniquely identify and authenticate organizational users
            evidence_type: auth_config
            remediation:
              summary: Enforce unique user identification with MFA for all interactive access.
              steps:
                aws:
                - 'Enforce MFA for all IAM users: aws iam generate-credential-report && aws iam get-credential-report to identify users without MFA'
                - 'Create IAM policy requiring MFA: aws iam create-policy --policy-name RequireMFA --policy-document file://require-mfa-policy.json'
                - 'Enable SSO with AWS IAM Identity Center: aws sso-admin create-instance'
                - 'Configure identity provider federation: aws iam create-saml-provider --saml-metadata-document file://metadata.xml --name CorporateIDP'
                azure:
                - 'Require MFA via Conditional Access: az ad conditional-access policy create --display-name RequireMFA --conditions @conditions.json --grant-controls @grant-mfa.json --state enabled'
                - 'Enforce unique user accounts: az ad user list --query ''[?userType==`Member`]'' to audit'
                gcp:
                - 'Enforce 2-Step Verification via Admin Console: gcloud identity groups memberships list to audit'
                - 'Configure Workforce Identity Federation: gcloud iam workforce-pools create <pool-name> --organization <org-id> --location global'
              console_path:
                aws: IAM Identity Center → Settings → Enable; IAM → Users → Security credentials → MFA
                azure: Entra ID → Security → Conditional Access → New policy
                gcp: Admin Console → Security → 2-Step Verification → Enforcement
            cloud_checks:
              aws:
              - service: iam
                method: get_credential_report
                assertion: all_users_have_mfa
              - service: sso-admin
                method: list_instances
                assertion: sso_enabled
        IA-4:
          title: Identifier Management
          description: Manage system identifiers by receiving authorization to assign an individual, group, role, service, or device identifier.
          checks:
          - id: IA-4.a
            description: Manage system identifiers with authorization
            evidence_type: iam_config
            remediation:
              summary: Implement identifier lifecycle management with naming conventions and automated provisioning.
              steps:
                aws:
                - 'Enforce tagging for all IAM users: aws iam tag-user --user-name <user> --tags Key=Department,Value=<dept> Key=CreatedBy,Value=<admin>'
                - 'Audit IAM users and roles for naming compliance: aws iam list-users --query ''Users[*].[UserName,CreateDate]'''
                - 'Remove inactive identifiers: aws iam delete-user --user-name <inactive-user> (after removing dependencies)'
                azure:
                - 'Enforce naming conventions with Azure Policy: az policy definition create --name naming-convention --rules @naming-rules.json'
                - 'Review stale identities: az ad user list --filter "accountEnabled eq false"'
                gcp:
                - 'Audit service accounts: gcloud iam service-accounts list --filter=''disabled:true'''
                - 'Delete unused service accounts: gcloud iam service-accounts delete <sa-email>'
              console_path:
                aws: IAM → Users → Review user list and tags
                azure: Entra ID → Users → Filter by status
                gcp: IAM & Admin → Service accounts → Review
            cloud_checks:
              aws:
              - service: iam
                method: list_users
                assertion: all_users_properly_tagged
              - service: iam
                method: get_credential_report
                assertion: no_inactive_users
        IA-5:
          title: Authenticator Management
          description: Manage system authenticators by verifying the identity of the individual, group, role, service, or device receiving the authenticator as part of initial authenticator distribution.
          checks:
          - id: IA-5.a
            description: Manage system authenticators
            evidence_type: auth_config
            remediation:
              summary: Enforce strong authenticator policies including password complexity, key rotation, and certificate management.
              steps:
                aws:
                - 'Enforce password policy: aws iam update-account-password-policy --minimum-password-length 14 --require-symbols --require-numbers --require-uppercase-characters --require-lowercase-characters
                  --max-password-age 90 --password-reuse-prevention 24 --allow-users-to-change-password'
                - 'Rotate access keys: aws iam list-access-keys --user-name <user> to check age; aws iam create-access-key --user-name <user> then deactivate old key'
                - 'Use Secrets Manager for automated rotation: aws secretsmanager rotate-secret --secret-id <secret-id>'
                - 'Manage certificates with ACM: aws acm request-certificate --domain-name <domain> --validation-method DNS'
                azure:
                - 'Configure password protection: az ad password-protection-policy update --enable-banned-passwords --lockout-threshold 5'
                - 'Use Key Vault for secret management: az keyvault secret set --vault-name <vault> --name <secret-name> --value <value>'
                gcp:
                - 'Rotate service account keys: gcloud iam service-accounts keys create key.json --iam-account <sa-email> && gcloud iam service-accounts keys delete <old-key-id> --iam-account <sa-email>'
                - 'Use Secret Manager: gcloud secrets create <secret-name> --replication-policy automatic && echo -n ''<value>'' | gcloud secrets versions add <secret-name> --data-file=-'
              console_path:
                aws: IAM → Account settings → Password policy; Secrets Manager → Secrets → Rotation
                azure: Entra ID → Security → Password protection; Key Vault → Secrets
                gcp: IAM → Service accounts → Keys; Secret Manager → Secrets
            cloud_checks:
              aws:
              - service: iam
                method: get_account_password_policy
                assertion: strong_password_policy
              - service: iam
                method: get_credential_report
                assertion: no_access_keys_over_90_days
              - service: secretsmanager
                method: list_secrets
                assertion: secrets_rotation_enabled
        IA-6:
          title: Authentication Feedback
          description: Obscure feedback of authentication information during the authentication process to protect the information from possible exploitation by unauthorized individuals.
          checks:
          - id: IA-6.a
            description: Obscure authentication feedback
            evidence_type: auth_config
            remediation:
              summary: Ensure authentication interfaces obscure passwords and provide generic error messages.
              steps:
                aws:
                - 'Review CloudFront custom error pages to ensure generic authentication errors: aws cloudfront get-distribution-config --id <dist-id>'
                - 'Configure API Gateway to return generic auth errors: aws apigateway put-gateway-response --rest-api-id <api-id> --response-type UNAUTHORIZED --response-templates ''{"application/json":"{\"message\":\"Authentication
                  failed\"}"}'''
                azure:
                - Configure Azure AD B2C custom error pages with generic messages
                - Review Azure Front Door WAF rules for authentication endpoint protection
                gcp:
                - Configure Identity Platform error handling to obscure specific failure reasons
              console_path:
                aws: API Gateway → REST API → Gateway Responses → Edit UNAUTHORIZED
                azure: Entra ID → User flows → Customize error pages
                gcp: Identity Platform → Settings → Error handling
            cloud_checks:
              aws:
              - service: apigateway
                method: get_gateway_responses
                assertion: generic_auth_error_messages
        IA-8:
          title: Identification and Authentication (Non-Organizational Users)
          description: Uniquely identify and authenticate non-organizational users or processes acting on behalf of non-organizational users.
          checks:
          - id: IA-8.a
            description: Identify and authenticate non-organizational users
            evidence_type: auth_config
            remediation:
              summary: Implement external user authentication via federation, API keys, or temporary credentials.
              steps:
                aws:
                - 'Configure Cognito user pools for external users: aws cognito-idp create-user-pool --pool-name ExternalUsers --policies ''{"PasswordPolicy":{"MinimumLength":14,"RequireUppercase":true,"RequireLowercase":true,"RequireNumbers":true,"RequireSymbols":true}}'''
                - 'Set up external identity federation: aws cognito-idp create-identity-provider --user-pool-id <pool-id> --provider-name Google --provider-type Google --provider-details file://google-provider.json'
                - 'Use STS for temporary credentials: aws sts assume-role-with-web-identity'
                azure:
                - 'Configure Azure AD B2C for external users: az ad b2c create --domain-name <domain> --resource-group <rg>'
                - Set up external identity providers in B2C
                gcp:
                - 'Configure Workforce Identity Federation for external users: gcloud iam workforce-pools create <pool> --organization <org-id> --location global'
                - 'Create external identity provider: gcloud iam workforce-pools providers create-oidc <provider> --workforce-pool <pool> --issuer-uri <uri> --client-id <id>'
              console_path:
                aws: Cognito → User pools → Create user pool
                azure: Azure AD B2C → Identity providers → Add
                gcp: IAM → Workforce Identity Federation → Create pool
            cloud_checks:
              aws:
              - service: cognito-idp
                method: list_user_pools
                assertion: external_user_pools_configured
    IR:
      name: Incident Response
      controls:
        IR-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate incident response policy and procedures.
          checks:
          - id: IR-1.a
            description: Develop incident response policy
            evidence_type: policy_document
            remediation:
              summary: Document incident response policies, procedures, and communication plans.
              steps:
                aws:
                - 'Store IR plans in S3: aws s3 cp incident-response-plan.pdf s3://<policy-bucket>/ir/'
                - 'Create Systems Manager Incident Manager response plan: aws ssm-incidents create-response-plan --name SecurityIncidentPlan --incident-template ''{"title":"Security Incident","impact":1}'''
                - 'Configure SNS for incident notifications: aws sns create-topic --name SecurityIncidents && aws sns subscribe --topic-arn <topic-arn> --protocol email --notification-endpoint security-team@company.com'
                azure:
                - Configure Microsoft Sentinel playbooks for automated response
                - Document IR procedures in Azure DevOps Wiki or SharePoint
                gcp:
                - Store IR documentation in GCS with access controls
                - Configure Cloud Functions for automated incident response
              console_path:
                aws: Systems Manager → Incident Manager → Response plans → Create
                azure: Microsoft Sentinel → Automation → Playbooks
                gcp: Cloud Storage → IR documentation bucket
            cloud_checks:
              aws:
              - service: ssm-incidents
                method: list_response_plans
                assertion: response_plans_exist
              - service: sns
                method: list_topics
                assertion: incident_notification_topic_exists
        IR-2:
          title: Incident Response Training
          description: Provide incident response training to system users consistent with assigned roles and responsibilities.
          checks:
          - id: IR-2.a
            description: Provide incident response training
            evidence_type: training_records
            remediation:
              summary: Conduct regular incident response training and tabletop exercises.
              steps:
                aws:
                - Use AWS GameDay for incident response simulation exercises
                - 'Document tabletop exercises and lessons learned in S3: aws s3 cp tabletop-results.pdf s3://<training-bucket>/ir-training/'
                - Track IR training completion in DynamoDB or training management system
                azure:
                - Use Microsoft Sentinel hunting exercises for SOC training
                - Conduct red team/blue team exercises using Microsoft Defender simulation
                gcp:
                - Use Security Command Center for security operations training scenarios
              console_path:
                aws: AWS Training → Incident response learning path
                azure: Microsoft Learn → Security operations training
                gcp: Cloud Skills Boost → Security training
            cloud_checks:
              aws:
              - service: dynamodb
                method: query
                assertion: ir_training_records_current
        IR-4:
          title: Incident Handling
          description: Implement an incident handling capability for incidents that is consistent with the incident response plan.
          checks:
          - id: IR-4.a
            description: Implement incident handling capability
            evidence_type: ir_config
            remediation:
              summary: Configure automated incident detection, triage, and response capabilities.
              steps:
                aws:
                - 'Enable GuardDuty for automated threat detection: aws guardduty create-detector --enable'
                - 'Configure Security Hub automated response: aws securityhub create-automation-rule --rule-name AutoRemediateCritical --criteria ''{"SeverityLabel":[{"Value":"CRITICAL","Comparison":"EQUALS"}]}''
                  --actions ''[{"Type":"FINDING_FIELDS_UPDATE","FindingFieldsUpdate":{"Workflow":{"Status":"NEW"}}}]'''
                - 'Set up Incident Manager runbooks: aws ssm-incidents create-response-plan --name AutoResponse --actions ''[{"ssmAutomation":{"documentName":"AWS-IsolateEC2Instance","roleArn":"<role-arn>"}}]'''
                - 'Create EventBridge rule for GuardDuty findings: aws events put-rule --name guardduty-findings --event-pattern ''{"source":["aws.guardduty"],"detail-type":["GuardDuty Finding"]}'''
                azure:
                - 'Enable Microsoft Sentinel: az sentinel alert-rule create --name ThreatDetection --resource-group <rg> --workspace-name <ws>'
                - 'Configure automated playbooks for incident response: az sentinel automation-rule create'
                gcp:
                - 'Enable Security Command Center Event Threat Detection: gcloud scc settings update --organization <org-id>'
                - 'Configure Cloud Functions for automated remediation: gcloud functions deploy ir-handler --trigger-topic security-findings --runtime python310'
              console_path:
                aws: GuardDuty → Findings; Incident Manager → Response plans
                azure: Microsoft Sentinel → Incidents → Investigate
                gcp: Security Command Center → Findings → Take action
            cloud_checks:
              aws:
              - service: guardduty
                method: list_detectors
                assertion: guardduty_enabled
              - service: ssm-incidents
                method: list_response_plans
                assertion: automated_response_plans_configured
        IR-5:
          title: Incident Monitoring
          description: Track and document incidents on an ongoing basis.
          checks:
          - id: IR-5.a
            description: Track and document incidents
            evidence_type: monitoring_config
            remediation:
              summary: Implement centralized incident tracking and monitoring dashboards.
              steps:
                aws:
                - 'Configure Security Hub for centralized findings: aws securityhub enable-security-hub'
                - 'Create CloudWatch dashboard for security metrics: aws cloudwatch put-dashboard --dashboard-name SecurityIncidents --dashboard-body file://dashboard.json'
                - 'Track incidents in Incident Manager: aws ssm-incidents list-incident-records to review all incidents'
                azure:
                - Use Microsoft Sentinel workbooks for incident dashboards
                - 'Configure incident tracking: az sentinel incident list --resource-group <rg> --workspace-name <ws>'
                gcp:
                - Use Chronicle SIEM for incident tracking
                - 'Create Cloud Monitoring dashboards: gcloud monitoring dashboards create --config-from-file=security-dashboard.json'
              console_path:
                aws: Security Hub → Findings; Incident Manager → Incidents
                azure: Microsoft Sentinel → Incidents → Dashboard
                gcp: Security Command Center → Dashboard
            cloud_checks:
              aws:
              - service: securityhub
                method: get_findings
                assertion: findings_tracked_and_resolved
        IR-6:
          title: Incident Reporting
          description: Require personnel to report suspected incidents to the organizational incident response capability within a defined time period.
          checks:
          - id: IR-6.a
            description: Report incidents within required time period
            evidence_type: ir_config
            remediation:
              summary: Configure automated incident reporting and notification channels.
              steps:
                aws:
                - 'Configure SNS notifications for security findings: aws sns subscribe --topic-arn <incident-topic> --protocol email --notification-endpoint security@company.com'
                - 'Set up EventBridge for automated reporting: aws events put-rule --name incident-report --event-pattern ''{"source":["aws.securityhub"],"detail":{"findings":{"Severity":{"Label":["CRITICAL","HIGH"]}}}}'''
                - Create PagerDuty or Slack integration via SNS and Lambda for immediate notification
                azure:
                - 'Configure Sentinel automated notifications: az sentinel action create --resource-group <rg> --workspace-name <ws>'
                - Set up Logic Apps for incident reporting workflows
                gcp:
                - 'Configure Pub/Sub for SCC notifications: gcloud scc notifications create <config> --organization <org-id> --pubsub-topic <topic>'
              console_path:
                aws: EventBridge → Rules → Create rule for SecurityHub findings
                azure: Microsoft Sentinel → Analytics → Create rule with notification
                gcp: Security Command Center → Settings → Notifications
            cloud_checks:
              aws:
              - service: events
                method: list_rules
                assertion: incident_reporting_rules_configured
              - service: sns
                method: list_subscriptions_by_topic
                assertion: incident_topic_has_subscribers
        IR-8:
          title: Incident Response Plan
          description: Develop an incident response plan that provides the organization with a roadmap for implementing its incident response capability.
          checks:
          - id: IR-8.a
            description: Develop incident response plan
            evidence_type: ir_plan
            remediation:
              summary: Create comprehensive IR plan with roles, communication procedures, and recovery steps.
              steps:
                aws:
                - 'Create Incident Manager response plan with escalation: aws ssm-incidents create-response-plan --name ComprehensiveIRPlan --chat-channel ''{"chatbotSns":["<sns-arn>"]}'' --engagements
                  ''["<contact-arn>"]'''
                - 'Define escalation contacts: aws ssm-contacts create-contact --alias ir-lead --type PERSONAL --plan ''{"Stages":[{"DurationInMinutes":5,"Targets":[{"ChannelTargetInfo":{"ContactChannelId":"<channel-id>","RetryIntervalInMinutes":2}}]}]}'''
                - 'Store IR playbooks as SSM documents: aws ssm create-document --name IR-Playbook --content file://ir-playbook.json --document-type Automation'
                azure:
                - Create Sentinel playbooks with Logic Apps for structured response procedures
                - Document IR plan in Azure DevOps Wiki with version control
                gcp:
                - Document IR plan and store in GCS with access controls and versioning
                - Create Cloud Workflows for automated IR procedures
              console_path:
                aws: Incident Manager → Response plans → Create comprehensive plan
                azure: Microsoft Sentinel → Automation → Create playbook
                gcp: Cloud Storage → IR documentation bucket
            cloud_checks:
              aws:
              - service: ssm-incidents
                method: list_response_plans
                assertion: comprehensive_ir_plan_exists
              - service: ssm-contacts
                method: list_contacts
                assertion: ir_contacts_configured
    MA:
      name: Maintenance
      controls:
        MA-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate system maintenance policy and procedures.
          checks:
          - id: MA-1.a
            description: Develop system maintenance policy
            evidence_type: policy_document
            remediation:
              summary: Document maintenance policies covering patching schedules, maintenance windows, and authorized personnel.
              steps:
                aws:
                - 'Configure SSM maintenance windows: aws ssm create-maintenance-window --name PatchWindow --schedule ''cron(0 2 ? * SUN *)'' --duration 4 --cutoff 1 --allow-unassociated-targets'
                - 'Register targets: aws ssm register-target-with-maintenance-window --window-id <mw-id> --resource-type INSTANCE --targets Key=tag:PatchGroup,Values=Production'
                azure:
                - 'Configure Update Management: az automation software-update-configuration create --automation-account-name <account> --resource-group <rg>'
                gcp:
                - 'Configure OS Patch Management: gcloud compute os-config patch-deployments create weekly-patches --instance-filter-all --recurring-schedule-frequency weekly --recurring-schedule-time-of-day-hours
                  2 --recurring-schedule-time-zone America/New_York'
              console_path:
                aws: Systems Manager → Maintenance Windows → Create maintenance window
                azure: Automation → Update management
                gcp: Compute Engine → OS patch management
            cloud_checks:
              aws:
              - service: ssm
                method: describe_maintenance_windows
                assertion: maintenance_windows_configured
        MA-2:
          title: Controlled Maintenance
          description: Schedule, document, and review records of maintenance, repair, and replacement on system components.
          checks:
          - id: MA-2.a
            description: Schedule and document system maintenance
            evidence_type: maintenance_records
            remediation:
              summary: Implement automated patch management with scheduling, tracking, and compliance reporting.
              steps:
                aws:
                - 'Create patch baseline: aws ssm create-patch-baseline --name ProductionBaseline --operating-system AMAZON_LINUX_2 --approval-rules ''{"PatchRules":[{"PatchFilterGroup":{"PatchFilters":[{"Key":"SEVERITY","Values":["Critical","Important"]}]},"ApproveAfterDays":7}]}'''
                - 'Register task for maintenance window: aws ssm register-task-with-maintenance-window --window-id <mw-id> --task-type RUN_COMMAND --task-arn AWS-RunPatchBaseline --targets Key=WindowTargetIds,Values=<target-id>'
                - 'View patch compliance: aws ssm describe-instance-patch-states --instance-ids <id>'
                azure:
                - 'Deploy patches via Update Management: az automation software-update-configuration runs list --automation-account-name <account>'
                gcp:
                - 'View patch deployment status: gcloud compute os-config patch-deployments describe <deployment-name>'
                - 'List patch job results: gcloud compute os-config patch-jobs list'
              console_path:
                aws: Systems Manager → Patch Manager → Configure patching
                azure: Automation → Update management → Schedule update deployment
                gcp: OS patch management → Patch deployments
            cloud_checks:
              aws:
              - service: ssm
                method: describe_instance_patch_states
                assertion: all_instances_patched
              - service: ssm
                method: describe_maintenance_windows
                assertion: maintenance_schedules_active
        MA-3:
          title: Maintenance Tools
          description: Approve, control, and monitor the use of system maintenance tools.
          checks:
          - id: MA-3.a
            description: Approve and control maintenance tools
            evidence_type: system_config
            remediation:
              summary: Restrict and audit the use of system maintenance tools and remote access methods.
              steps:
                aws:
                - 'Use SSM Session Manager instead of SSH for maintenance: aws ssm start-session --target <instance-id>'
                - 'Enable Session Manager logging: aws ssm update-document --name SSM-SessionManagerRunShell --content ''{"schemaVersion":"1.0","description":"Session Manager","sessionType":"Standard_Stream","inputs":{"s3BucketName":"<log-bucket>","cloudWatchLogGroupName":"/ssm/sessions"}}'''
                - 'Audit SSM sessions: aws ssm describe-sessions --state Active'
                azure:
                - 'Use Azure Bastion for maintenance access: az network bastion create --name <bastion> --resource-group <rg> --vnet-name <vnet>'
                - 'Enable JIT VM access for maintenance: az security jit-policy create'
                gcp:
                - 'Use IAP TCP forwarding: gcloud compute start-iap-tunnel <instance> 22 --local-host-port=localhost:2222'
              console_path:
                aws: Systems Manager → Session Manager → Preferences → Edit
                azure: Virtual machines → Connect → Bastion
                gcp: Compute Engine → VM → SSH (via IAP)
            cloud_checks:
              aws:
              - service: ssm
                method: describe_sessions
                assertion: session_logging_enabled
        MA-5:
          title: Maintenance Personnel
          description: Establish a process for maintenance personnel authorization and maintain a list of authorized maintenance organizations or personnel.
          checks:
          - id: MA-5.a
            description: Authorize maintenance personnel
            evidence_type: personnel_records
            remediation:
              summary: Control and monitor access for maintenance personnel using temporary credentials and audit trails.
              steps:
                aws:
                - 'Create time-limited IAM roles for maintenance: aws iam create-role --role-name MaintenanceRole --max-session-duration 3600 --assume-role-policy-document file://maintenance-trust.json'
                - 'Attach minimal permissions: aws iam attach-role-policy --role-name MaintenanceRole --policy-arn <scoped-policy-arn>'
                - 'Monitor maintenance sessions via CloudTrail: filter for AssumeRole events with MaintenanceRole'
                azure:
                - 'Use Privileged Identity Management for time-limited access: az ad pim role-assignment create'
                - Require approval for maintenance role activation
                gcp:
                - 'Grant temporary access via IAM Conditions: gcloud projects add-iam-policy-binding <project> --member=<user> --role=roles/compute.admin --condition=''expression=request.time < timestamp("2024-01-01T00:00:00Z"),title=TempAccess'''
              console_path:
                aws: IAM → Roles → MaintenanceRole → Trust relationships
                azure: Entra ID → Privileged Identity Management → Roles
                gcp: IAM → Manage resources → Add conditional role binding
            cloud_checks:
              aws:
              - service: iam
                method: list_roles
                assertion: maintenance_roles_time_limited
    MP:
      name: Media Protection
      controls:
        MP-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate media protection policy and procedures.
          checks:
          - id: MP-1.a
            description: Develop media protection policy
            evidence_type: policy_document
            remediation:
              summary: Document media protection policies covering encryption, access controls, and sanitization requirements.
              steps:
                aws:
                - 'Enable default EBS encryption: aws ec2 enable-ebs-encryption-by-default'
                - 'Enable default S3 encryption: aws s3api put-bucket-encryption --bucket <bucket> --server-side-encryption-configuration ''{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"aws:kms","KMSMasterKeyID":"<key-id>"}}]}'''
                azure:
                - 'Enable Azure Disk Encryption: az vm encryption enable --resource-group <rg> --name <vm> --disk-encryption-keyvault <vault>'
                - Enable Storage Service Encryption (enabled by default)
                gcp:
                - 'Enable CMEK for persistent disks: gcloud compute disks create <disk> --kms-key projects/<project>/locations/<location>/keyRings/<ring>/cryptoKeys/<key>'
              console_path:
                aws: EC2 → EBS → Settings → Always encrypt new EBS volumes
                azure: Virtual machines → Disks → Encryption
                gcp: Compute Engine → Disks → Encryption
            cloud_checks:
              aws:
              - service: ec2
                method: get_ebs_encryption_by_default
                assertion: ebs_encryption_enabled_by_default
        MP-2:
          title: Media Access
          description: Restrict access to digital and non-digital media to authorized individuals using defined security controls.
          checks:
          - id: MP-2.a
            description: Restrict access to digital media
            evidence_type: storage_config
            remediation:
              summary: Implement access controls on all storage media including S3 buckets, EBS volumes, and databases.
              steps:
                aws:
                - 'Block public S3 access at account level: aws s3control put-public-access-block --account-id <account-id> --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'
                - 'Review S3 bucket policies: aws s3api get-bucket-policy --bucket <bucket>'
                - 'Enable S3 Access Points for granular access control: aws s3control create-access-point --account-id <account-id> --name <ap-name> --bucket <bucket> --vpc-configuration VpcId=<vpc-id>'
                azure:
                - 'Configure storage account network rules: az storage account network-rule add --account-name <account> --vnet-name <vnet> --subnet <subnet>'
                - 'Disable public blob access: az storage account update --name <account> --allow-blob-public-access false'
                gcp:
                - 'Set uniform bucket-level access: gsutil uniformbucketlevelaccess set on gs://<bucket>'
                - 'Configure VPC Service Controls: gcloud access-context-manager perimeters create <perimeter> --resources projects/<project-number>'
              console_path:
                aws: S3 → Block Public Access settings → Edit
                azure: Storage account → Networking → Firewalls and virtual networks
                gcp: Cloud Storage → Bucket → Permissions → Access control
            cloud_checks:
              aws:
              - service: s3control
                method: get_public_access_block
                assertion: account_public_access_blocked
              - service: s3
                method: list_buckets
                assertion: no_public_buckets
        MP-6:
          title: Media Sanitization
          description: Sanitize system media prior to disposal, release out of organizational control, or release for reuse.
          checks:
          - id: MP-6.a
            description: Sanitize media prior to disposal or reuse
            evidence_type: media_handling
            remediation:
              summary: Ensure proper data sanitization using cloud provider media destruction processes and encryption-based sanitization.
              steps:
                aws:
                - AWS handles physical media destruction per SOC 2 and ISO 27001 certifications
                - 'For EBS volumes, delete snapshots when no longer needed: aws ec2 delete-snapshot --snapshot-id <snap-id>'
                - 'Delete S3 objects with versioning cleanup: aws s3api delete-objects --bucket <bucket> --delete file://objects-to-delete.json'
                - 'Use KMS key deletion for crypto-shredding: aws kms schedule-key-deletion --key-id <key-id> --pending-window-in-days 7'
                azure:
                - Azure handles physical media destruction per compliance certifications
                - 'Use Key Vault soft-delete and purge for crypto-shredding: az keyvault key delete --vault-name <vault> --name <key>'
                gcp:
                - GCP handles physical media destruction per compliance certifications
                - 'Use Cloud KMS key destruction for crypto-shredding: gcloud kms keys versions destroy <version> --key <key> --keyring <ring> --location <location>'
              console_path:
                aws: KMS → Customer managed keys → Schedule key deletion
                azure: Key Vault → Keys → Delete
                gcp: KMS → Key rings → Key → Destroy key version
            cloud_checks:
              aws:
              - service: kms
                method: list_keys
                assertion: no_abandoned_encryption_keys
              - service: ec2
                method: describe_snapshots
                assertion: no_orphaned_snapshots
    PE:
      name: Physical and Environmental Protection
      controls:
        PE-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate physical and environmental protection policy and procedures.
          checks:
          - id: PE-1.a
            description: Develop physical and environmental protection policy
            evidence_type: policy_document
            remediation:
              summary: Document physical security policies and leverage cloud provider physical security certifications.
              steps:
                aws:
                - 'Download AWS SOC 2 and ISO 27001 reports from AWS Artifact: access via AWS Artifact console'
                - Review AWS shared responsibility model for physical security obligations
                - Document physical security controls for on-premises components connected to cloud
                azure:
                - Download Azure compliance reports from Service Trust Portal
                - Review Microsoft data center physical security documentation
                gcp:
                - Download GCP compliance reports from Compliance Reports Manager
                - Review Google infrastructure security whitepaper
              console_path:
                aws: AWS Artifact → Reports → SOC 2 → Download
                azure: Service Trust Portal → Compliance Reports
                gcp: Compliance Reports Manager → Download reports
            cloud_checks:
              aws:
              - service: artifact
                method: list_reports
                assertion: compliance_reports_available
        PE-2:
          title: Physical Access Authorizations
          description: Develop, approve, and maintain a list of individuals with authorized access to the facility where the system resides.
          checks:
          - id: PE-2.a
            description: Maintain authorized physical access list
            evidence_type: access_list
            remediation:
              summary: Maintain physical access authorization lists for on-premises and colocation facilities.
              steps:
                aws:
                - For AWS Outposts, manage physical access via AWS Outposts rack access controls
                - Document authorized personnel for any on-premises networking equipment connecting to AWS
                - Review AWS Direct Connect location access requirements
                azure:
                - For Azure Stack Hub, manage physical access controls for on-premises Azure resources
                - Document authorized personnel for Azure ExpressRoute connection points
                gcp:
                - For Google Distributed Cloud, manage physical access to on-premises nodes
                - Document authorized personnel for Cloud Interconnect connection points
              console_path:
