                - aws ec2 describe-images --owners self --query 'Images[*].[ImageId,Name,State]' --output table
                - aws ecs describe-task-definition --task-definition <task-def> --query 'taskDefinition.containerDefinitions[*].[name,readonlyRootFilesystem]'
