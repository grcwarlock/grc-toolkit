                azure: Azure Monitor → Logs → Physical access queries
                gcp: Cloud Logging → Physical access log entries
            cloud_checks:
              aws:
              - service: logs
                method: describe_log_groups
                assertion: physical_access_logging_configured
    PL:
      name: Planning
      controls:
        PL-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate security and privacy planning policy and procedures.
          checks:
          - id: PL-1.a
            description: Develop security planning policy
            evidence_type: policy_document
            remediation:
              summary: Document system security plans and privacy plans covering all organizational systems.
              steps:
                aws:
                - 'Use AWS Audit Manager for assessment documentation: aws auditmanager create-assessment --name SystemSecurityPlan --framework-id <framework-id>'
                - 'Store system security plans in S3 with versioning: aws s3 cp ssp.pdf s3://<policy-bucket>/plans/'
                azure:
                - Use Compliance Manager for security plan documentation
                - Store plans in Azure Blob Storage with access controls
                gcp:
                - Store security plans in GCS with IAM access controls
              console_path:
                aws: Audit Manager → Assessments → System security plan assessment
                azure: Compliance Manager → Assessments
                gcp: Cloud Storage → Security plans bucket
            cloud_checks:
              aws:
              - service: auditmanager
                method: list_assessments
                assertion: security_plan_assessments_exist
        PL-2:
          title: System Security and Privacy Plans
          description: Develop security and privacy plans for the system that describe the controls in place or planned and the rules of behavior for individuals accessing the system.
          checks:
          - id: PL-2.a
            description: Develop system security and privacy plans
            evidence_type: security_plan
            remediation:
              summary: Create comprehensive system security plans documenting all implemented and planned controls.
              steps:
                aws:
                - 'Use Audit Manager with NIST 800-53 framework: aws auditmanager create-assessment --name SSP-Assessment --framework-id <nist-framework-id>'
                - 'Generate evidence reports: aws auditmanager get-evidence-folder --assessment-id <id> --control-set-id <cs-id> --evidence-folder-id <folder-id>'
                - 'Export assessment report: aws auditmanager create-assessment-report --name SSP-Report --assessment-id <id>'
                azure:
                - 'Use Defender for Cloud regulatory compliance: az security regulatory-compliance-standards list'
                - Export compliance report from Compliance Manager
                gcp:
                - Use Security Command Center compliance reports
                - 'Export compliance findings: gcloud scc findings list <org-id> --filter ''category="COMPLIANCE"'''
              console_path:
                aws: Audit Manager → Assessment reports → Generate report
                azure: Defender for Cloud → Regulatory compliance → Download report
                gcp: Security Command Center → Compliance → Export
            cloud_checks:
              aws:
              - service: auditmanager
                method: list_assessment_reports
                assertion: current_ssp_report_exists
        PL-4:
          title: Rules of Behavior
          description: Establish and provide to individuals requiring access to the system the rules that describe their responsibilities and expected behavior for information and system usage.
          checks:
          - id: PL-4.a
            description: Establish rules of behavior
            evidence_type: policy_document
            remediation:
              summary: Document and distribute acceptable use policies and rules of behavior.
              steps:
                aws:
                - 'Configure IAM login banner with rules of behavior: use custom IAM console sign-in page'
                - 'Store rules of behavior documentation: aws s3 cp rules-of-behavior.pdf s3://<policy-bucket>/policies/'
                - 'Track acknowledgment via DynamoDB: aws dynamodb put-item --table-name RulesOfBehavior --item ''{"UserId":{"S":"<user>"},"AcknowledgedDate":{"S":"<date>"},"Version":{"S":"1.0"}}'''
                azure:
                - 'Configure Terms of Use in Entra ID: create terms of use policy in Entra ID Conditional Access'
                - Require acceptance via Conditional Access policy
                gcp:
                - Configure custom login messages in Google Workspace Admin Console
                - Track acknowledgments via Google Forms or custom application
              console_path:
                aws: IAM → Account settings → IAM console sign-in page customization
                azure: Entra ID → Conditional Access → Terms of use
                gcp: Admin Console → Settings → Custom messages
            cloud_checks:
              aws:
              - service: dynamodb
                method: scan
                assertion: all_users_acknowledged_rules
    PM:
      name: Program Management
      controls:
        PM-1:
          title: Information Security Program Plan
          description: Develop and disseminate an organization-wide information security program plan.
          checks:
          - id: PM-1.a
            description: Develop information security program plan
            evidence_type: policy_document
            remediation:
              summary: Establish an organization-wide information security program with governance structure and resource allocation.
              steps:
                aws:
                - 'Use AWS Organizations for governance: aws organizations describe-organization'
                - 'Enable AWS Control Tower for multi-account governance: set up via Control Tower console'
                - 'Document program plan and store in S3: aws s3 cp security-program-plan.pdf s3://<policy-bucket>/program/'
                azure:
                - 'Use Azure Management Groups for governance hierarchy: az account management-group create --name SecurityGovernance'
                - Configure Azure Lighthouse for multi-tenant management
                gcp:
                - 'Use Resource Manager for organization structure: gcloud organizations list'
                - 'Configure Organization Policy Service: gcloud org-policies list --organization <org-id>'
              console_path:
                aws: AWS Control Tower → Dashboard → Governance overview
                azure: Management groups → Create management group hierarchy
                gcp: Resource Manager → Organizations → Settings
            cloud_checks:
              aws:
              - service: organizations
                method: describe_organization
                assertion: organization_configured
              - service: controltower
                method: list_landing_zones
                assertion: control_tower_enabled
        PM-2:
          title: Information Security Program Leadership Role
          description: Appoint a senior agency information security officer with the mission and resources to coordinate, develop, implement, and maintain an organization-wide information security program.
          checks:
          - id: PM-2.a
            description: Appoint senior information security officer
            evidence_type: organizational
            remediation:
              summary: Designate security leadership with appropriate access and permissions in cloud environments.
              steps:
                aws:
                - 'Create security admin role in Organizations: aws organizations create-account --email security-admin@company.com --account-name SecurityAdmin'
                - 'Delegate Security Hub administrator: aws securityhub enable-organization-admin-account --admin-account-id <account-id>'
                - 'Delegate GuardDuty administrator: aws guardduty enable-organization-admin-account --admin-account-id <account-id>'
                azure:
                - 'Assign Global Security Administrator role: az role assignment create --assignee <ciso-upn> --role ''Security Administrator'' --scope /'
                gcp:
                - 'Assign Organization Security Admin role: gcloud organizations add-iam-policy-binding <org-id> --member=user:<ciso-email> --role=roles/iam.securityAdmin'
              console_path:
                aws: Security Hub → Settings → Delegated administrator
                azure: Entra ID → Roles → Security Administrator → Assign
                gcp: IAM → Organization → Add security admin
            cloud_checks:
              aws:
              - service: securityhub
                method: describe_organization_configuration
                assertion: delegated_admin_configured
        PM-5:
          title: System Inventory
          description: Develop and update an inventory of organizational systems.
          checks:
          - id: PM-5.a
            description: Develop and maintain system inventory
            evidence_type: asset_inventory
            remediation:
              summary: Maintain a comprehensive inventory of all organizational systems and cloud resources.
              steps:
                aws:
                - 'Use AWS Config aggregator for multi-account inventory: aws configservice put-configuration-aggregator --configuration-aggregator-name OrgAggregator --organization-aggregation-source ''{"RoleArn":"<role-arn>","AllAwsRegions":true}'''
                - 'Use AWS Resource Explorer: aws resource-explorer-2 create-index --type AGGREGATOR'
                - 'Export inventory: aws configservice select-aggregate-resource-counts --configuration-aggregator-name OrgAggregator --group-by-key RESOURCE_TYPE'
                azure:
                - 'Use Azure Resource Graph for cross-subscription inventory: az graph query -q ''Resources | summarize count() by subscriptionId, type'''
                gcp:
                - 'Use Cloud Asset Inventory: gcloud asset search-all-resources --scope organizations/<org-id> --asset-types compute.googleapis.com/Instance'
              console_path:
                aws: Resource Explorer → Search all resources
                azure: Resource Graph Explorer → Query resources
                gcp: Cloud Asset Inventory → Search
            cloud_checks:
              aws:
              - service: configservice
                method: describe_configuration_aggregators
                assertion: config_aggregator_exists
              - service: resource-explorer-2
                method: list_indexes
                assertion: resource_explorer_enabled
        PM-9:
          title: Risk Management Strategy
          description: Develop a comprehensive strategy to manage risk to organizational operations and assets, individuals, other organizations, and the Nation.
          checks:
          - id: PM-9.a
            description: Develop risk management strategy
            evidence_type: risk_assessment
            remediation:
              summary: Implement risk management using cloud-native security assessment and compliance tools.
              steps:
                aws:
                - 'Enable Security Hub with compliance standards: aws securityhub batch-enable-standards --standards-subscription-requests ''[{"StandardsArn":"arn:aws:securityhub:::ruleset/cis-aws-foundations-benchmark/v/1.4.0"}]'''
                - 'Use AWS Audit Manager for risk assessments: aws auditmanager create-assessment --name RiskAssessment --framework-id <risk-framework-id>'
                - 'Configure Inspector for vulnerability assessments: aws inspector2 enable --resource-types EC2 ECR LAMBDA'
                azure:
                - 'Use Microsoft Defender for Cloud Secure Score: az security secure-score list'
                - 'Enable regulatory compliance assessments: az security regulatory-compliance-standards list'
                gcp:
                - Enable Security Command Center Premium for risk analysis
                - 'Run Security Health Analytics: gcloud scc findings list <org-id>'
              console_path:
                aws: Security Hub → Compliance standards; Inspector → Dashboard
                azure: Defender for Cloud → Secure Score → Recommendations
                gcp: Security Command Center → Risk overview
            cloud_checks:
              aws:
              - service: securityhub
                method: get_enabled_standards
                assertion: compliance_standards_enabled
              - service: inspector2
                method: batch_get_account_status
                assertion: inspector_enabled
    PS:
      name: Personnel Security
      controls:
        PS-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate personnel security policy and procedures.
          checks:
          - id: PS-1.a
            description: Develop personnel security policy
            evidence_type: policy_document
            remediation:
              summary: Document personnel security policies covering screening, termination, and transfer procedures.
              steps:
                aws:
                - 'Store personnel security policies: aws s3 cp personnel-security-policy.pdf s3://<policy-bucket>/ps/'
                - 'Use IAM to enforce access based on employment status: implement automated deprovisioning via Lambda'
                azure:
                - Use Entra ID lifecycle workflows for automated provisioning/deprovisioning
                - 'Configure access reviews: az ad access-review create'
                gcp:
                - Use Google Workspace user lifecycle management
                - Configure IAM access reviews
              console_path:
                aws: IAM → Users → Review active users
                azure: Entra ID → Identity Governance → Lifecycle workflows
                gcp: Admin Console → Users → User lifecycle
            cloud_checks:
              aws:
              - service: iam
                method: list_users
                assertion: all_users_active_employees
        PS-3:
          title: Personnel Screening
          description: Screen individuals prior to authorizing access to the system and rescreen individuals per a defined frequency.
          checks:
          - id: PS-3.a
            description: Screen individuals prior to access authorization
            evidence_type: personnel_records
            remediation:
              summary: Implement screening verification before granting system access.
              steps:
                aws:
                - 'Implement approval workflow for IAM user creation: use Service Catalog with approval steps'
                - 'Tag users with screening status: aws iam tag-user --user-name <user> --tags Key=ScreeningStatus,Value=Cleared Key=ScreeningDate,Value=<date>'
                - 'Audit unscreened users: aws iam list-users and cross-reference with screening database'
                azure:
                - Use Entra ID entitlement management with access packages requiring screening verification
                - Configure custom security attributes for screening status
                gcp:
                - Use Google Workspace custom attributes for screening status tracking
              console_path:
                aws: IAM → Users → Tags → Verify ScreeningStatus tag
                azure: Entra ID → Identity Governance → Entitlement management
                gcp: Admin Console → Users → Custom attributes
            cloud_checks:
              aws:
              - service: iam
                method: list_user_tags
                assertion: all_users_screening_verified
        PS-4:
          title: Personnel Termination
          description: Upon termination of individual employment, disable system access within a defined time period and retrieve all credentials.
          checks:
          - id: PS-4.a
            description: Disable access upon personnel termination
            evidence_type: iam_config
            remediation:
              summary: Implement automated deprovisioning to immediately revoke all access upon termination.
              steps:
                aws:
                - 'Disable console access: aws iam delete-login-profile --user-name <terminated-user>'
                - 'Deactivate access keys: aws iam update-access-key --access-key-id <key-id> --status Inactive --user-name <terminated-user>'
                - 'Remove from all groups: for group in $(aws iam list-groups-for-user --user-name <user> --query ''Groups[*].GroupName'' --output text); do aws iam remove-user-from-group --group-name $group
                  --user-name <user>; done'
                - 'Delete MFA devices: aws iam deactivate-mfa-device --user-name <user> --serial-number <mfa-arn>'
                - 'Automate with Lambda: trigger on HR system webhook to execute deprovisioning steps'
                azure:
                - 'Disable user account: az ad user update --id <user-id> --account-enabled false'
                - 'Revoke all sessions: az ad user revoke-sessions --id <user-id>'
                - Use Lifecycle Workflows for automated offboarding
                gcp:
                - 'Suspend user: gcloud identity groups memberships modify-membership-roles --group-email <group> --member-email <user> --remove-roles=MEMBER'
                - 'Disable service account: gcloud iam service-accounts disable <sa-email>'
              console_path:
                aws: IAM → Users → Select terminated user → Delete user
                azure: Entra ID → Users → Select user → Block sign-in
                gcp: Admin Console → Users → Suspend user
            cloud_checks:
              aws:
              - service: iam
                method: get_credential_report
                assertion: no_terminated_user_active_credentials
        PS-5:
          title: Personnel Transfer
          description: Review and confirm ongoing operational need for current logical and physical access authorizations when individuals are reassigned or transferred.
          checks:
          - id: PS-5.a
            description: Review access upon personnel transfer
            evidence_type: iam_config
            remediation:
              summary: Review and adjust access permissions when personnel transfer to new roles.
              steps:
                aws:
                - 'Review current permissions: aws iam list-attached-user-policies --user-name <user> && aws iam list-groups-for-user --user-name <user>'
                - 'Remove old role permissions and assign new: aws iam remove-user-from-group --group-name <old-group> --user-name <user> && aws iam add-user-to-group --group-name <new-group> --user-name
                  <user>'
                - 'Use IAM Access Advisor to identify unused permissions: aws iam generate-service-last-accessed-details --arn <user-arn>'
                azure:
                - 'Use Access Reviews to validate permissions: az ad access-review create'
                - Update group memberships to reflect new role
                gcp:
                - 'Review and update IAM bindings: gcloud projects get-iam-policy <project-id>'
                - Update group memberships in Google Workspace
              console_path:
                aws: IAM → Users → Select user → Groups → Modify group membership
                azure: Entra ID → Users → Groups → Update memberships
                gcp: Admin Console → Groups → Update membership
            cloud_checks:
              aws:
              - service: iam
                method: get_service_last_accessed_details
                assertion: access_aligned_with_current_role
    PT:
      name: PII Processing and Transparency
      controls:
        PT-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate PII processing and transparency policy and procedures.
          checks:
          - id: PT-1.a
            description: Develop PII processing and transparency policy
            evidence_type: policy_document
            remediation:
              summary: Document PII processing policies and implement technical controls for data privacy.
              steps:
                aws:
                - 'Enable Amazon Macie for PII discovery: aws macie2 enable-macie'
                - 'Create Macie classification job: aws macie2 create-classification-job --job-type SCHEDULED --s3-job-definition ''{"bucketDefinitions":[{"accountId":"<account-id>","buckets":["<bucket>"]}]}''
                  --schedule-frequency-expression ''cron(0 0 ? * MON *)'''
                - 'Store privacy policy documentation: aws s3 cp privacy-policy.pdf s3://<policy-bucket>/privacy/'
                azure:
                - Use Microsoft Purview for data discovery and classification
                - 'Configure sensitivity labels: az purview account create --resource-group <rg> --name <account>'
                gcp:
                - 'Enable DLP API: gcloud services enable dlp.googleapis.com'
                - 'Create DLP inspection job: gcloud dlp jobs create --project <project-id> --inspect-config @inspect-config.json --storage-config @storage-config.json'
              console_path:
                aws: Amazon Macie → Get started → Enable Macie
                azure: Microsoft Purview → Data Map → Classification
                gcp: DLP → Inspection → Create job
            cloud_checks:
              aws:
              - service: macie2
                method: get_macie_session
                assertion: macie_enabled
        PT-2:
          title: Authority to Process Personally Identifiable Information
          description: Determine and document the legal authority that permits the collection, use, maintenance, and sharing of PII.
          checks:
          - id: PT-2.a
            description: Document authority to process PII
            evidence_type: policy_document
            remediation:
              summary: Document legal basis for PII processing and implement consent management.
              steps:
                aws:
                - 'Tag S3 buckets containing PII: aws s3api put-bucket-tagging --bucket <bucket> --tagging ''{"TagSet":[{"Key":"DataClassification","Value":"PII"},{"Key":"LegalBasis","Value":"Consent"}]}'''
                - Implement data processing agreements in AWS Marketplace
                - 'Use Lake Formation for fine-grained data access: aws lakeformation grant-permissions --principal ''{"DataLakePrincipalIdentifier":"<arn>"}'' --resource ''{"Table":{"DatabaseName":"<db>","Name":"<table>"}}''
                  --permissions SELECT'
                azure:
                - Use Purview data governance for PII classification and lineage tracking
                - Configure Microsoft Priva for privacy risk management
                gcp:
                - 'Tag BigQuery datasets containing PII: bq update --set_label data_classification:pii <dataset>'
                - 'Use Data Catalog for metadata management: gcloud data-catalog tags create --entry <entry> --tag-template <template>'
              console_path:
                aws: S3 → Bucket → Properties → Tags → DataClassification
                azure: Microsoft Purview → Data estate insights
                gcp: Data Catalog → Tag templates → Create
            cloud_checks:
              aws:
              - service: s3
                method: get_bucket_tagging
                assertion: pii_buckets_tagged
              - service: macie2
                method: list_classification_jobs
                assertion: pii_classification_jobs_active
        PT-3:
          title: Personally Identifiable Information Processing Purposes
          description: Identify and document the purposes for processing PII.
          checks:
          - id: PT-3.a
            description: Document purposes for PII processing
            evidence_type: policy_document
            remediation:
              summary: Document and enforce purpose limitation for PII processing activities.
              steps:
                aws:
                - 'Tag resources with processing purpose: aws resourcegroupstaggingapi tag-resources --resource-arn-list <arn> --tags ProcessingPurpose=<purpose>'
                - 'Implement Lake Formation column-level access: aws lakeformation grant-permissions with column-level restrictions'
                - Create S3 Access Points with purpose-specific policies for data access segregation
                azure:
                - Use Purview data policies to enforce purpose limitation
                - Configure sensitivity labels with usage restrictions
                gcp:
                - 'Use BigQuery column-level security: bq update --set_label processing_purpose:<purpose> <dataset>.<table>'
                - Configure DLP de-identification for purpose-limited access
              console_path:
                aws: Resource Groups → Tag Editor → Tag resources with ProcessingPurpose
                azure: Microsoft Purview → Data policies
                gcp: BigQuery → Dataset → Labels
            cloud_checks:
              aws:
              - service: resourcegroupstaggingapi
                method: get_tag_values
                assertion: processing_purposes_documented
    RA:
      name: Risk Assessment
      controls:
        RA-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate risk assessment policy and procedures.
          checks:
          - id: RA-1.a
            description: Develop risk assessment policy
            evidence_type: policy_document
            remediation:
              summary: Document risk assessment policies and implement automated vulnerability scanning.
              steps:
                aws:
                - 'Enable AWS Inspector for vulnerability assessment: aws inspector2 enable --resource-types EC2 ECR LAMBDA'
                - 'Use Audit Manager for risk assessment framework: aws auditmanager create-assessment --name RiskAssessment --framework-id <framework-id>'
                - 'Store risk assessment documentation: aws s3 cp risk-assessment-policy.pdf s3://<policy-bucket>/ra/'
                azure:
                - Enable Microsoft Defender for Cloud vulnerability scanning
                - 'Use Defender Vulnerability Management: az security va sql results list'
                gcp:
                - Enable Security Command Center for vulnerability detection
                - 'Enable Web Security Scanner: gcloud web-security-scanner scan-configs create --display-name <name> --starting-urls <url>'
              console_path:
                aws: Inspector → Dashboard → Enable Inspector
                azure: Defender for Cloud → Recommendations → Vulnerability assessment
                gcp: Security Command Center → Vulnerabilities
            cloud_checks:
              aws:
              - service: inspector2
                method: batch_get_account_status
                assertion: inspector_enabled
        RA-3:
          title: Risk Assessment
          description: Conduct a risk assessment to identify threats, vulnerabilities, and the resulting risk to organizational operations.
          checks:
          - id: RA-3.a
            description: Conduct risk assessment
            evidence_type: risk_assessment
            remediation:
              summary: Perform comprehensive risk assessments using vulnerability scanning and threat intelligence.
              steps:
                aws:
                - 'Run Inspector assessment: aws inspector2 list-findings --filter-criteria ''{"findingStatus":[{"comparison":"EQUALS","value":"ACTIVE"}]}'''
                - 'Review Security Hub findings by severity: aws securityhub get-findings --filters ''{"SeverityLabel":[{"Value":"CRITICAL","Comparison":"EQUALS"}]}'''
                - 'Assess account with Trusted Advisor: aws support describe-trusted-advisor-checks --language en'
                - 'Generate risk report from Audit Manager: aws auditmanager create-assessment-report --name RiskReport --assessment-id <id>'
                azure:
                - 'Review Defender for Cloud Secure Score: az security secure-score list'
                - 'List vulnerability findings: az security sub-assessment list --assessed-resource-id <resource-id>'
                gcp:
                - 'List SCC findings: gcloud scc findings list <org-id> --filter ''state="ACTIVE" AND severity="CRITICAL"'''
                - 'Run Security Health Analytics: gcloud scc sources list --organization <org-id>'
              console_path:
                aws: Inspector → Findings → Filter by severity; Security Hub → Findings
                azure: Defender for Cloud → Secure Score → Recommendations
                gcp: Security Command Center → Findings → Active
            cloud_checks:
              aws:
              - service: inspector2
                method: list_findings
                assertion: no_critical_unresolved_findings
              - service: securityhub
                method: get_findings
                assertion: critical_findings_addressed
        RA-5:
          title: Vulnerability Monitoring and Scanning
          description: Monitor and scan for vulnerabilities in the system and hosted applications at a defined frequency and when new vulnerabilities potentially affecting the system are identified.
          checks:
          - id: RA-5.a
            description: Monitor and scan for vulnerabilities
            evidence_type: vulnerability_scan
            remediation:
              summary: Enable continuous vulnerability scanning across compute, container, and serverless workloads.
              steps:
                aws:
                - 'Enable Inspector for EC2: aws inspector2 enable --resource-types EC2'
                - 'Enable Inspector for ECR: aws inspector2 enable --resource-types ECR'
                - 'Enable Inspector for Lambda: aws inspector2 enable --resource-types LAMBDA'
                - 'Review findings: aws inspector2 list-findings --sort-criteria ''{"field":"SEVERITY","sortOrder":"DESC"}'''
                - 'Set up automated remediation with SSM: aws ssm create-association --name AWS-RunPatchBaseline --targets Key=tag:AutoPatch,Values=true --parameters Operation=Install'
                - 'Enable ECR image scanning: aws ecr put-image-scanning-configuration --repository-name <repo> --image-scanning-configuration scanOnPush=true'
                azure:
                - 'Enable Defender for Servers: az security pricing create --name VirtualMachines --tier Standard'
                - 'Enable Defender for Containers: az security pricing create --name Containers --tier Standard'
                - 'Review vulnerability findings: az security sub-assessment list'
                gcp:
                - 'Enable Container Analysis: gcloud services enable containeranalysis.googleapis.com'
                - 'Enable on-demand scanning: gcloud artifacts docker images scan <image>'
                - 'Enable VM Manager for OS vulnerability scanning: gcloud compute os-config os-policy-assignments create <assignment> --file os-policy.yaml'
              console_path:
                aws: Inspector → Dashboard → Findings by severity
                azure: Defender for Cloud → Recommendations → Remediate vulnerabilities
                gcp: Artifact Registry → Vulnerabilities; Security Command Center → Vulnerabilities
            cloud_checks:
              aws:
              - service: inspector2
                method: list_findings
                assertion: vulnerability_scanning_active
              - service: ecr
                method: describe_image_scan_findings
                assertion: ecr_scan_on_push_enabled
              azure:
              - service: security
                method: list_pricings
                assertion: defender_for_servers_enabled
        RA-7:
          title: Risk Response
          description: Respond to findings from security and privacy assessments, monitoring, and audits in accordance with organizational risk tolerance.
          checks:
          - id: RA-7.a
            description: Respond to risk findings
            evidence_type: risk_response
            remediation:
              summary: Implement risk response workflows with automated remediation for common findings.
              steps:
                aws:
                - 'Configure Security Hub automated remediation: aws securityhub create-automation-rule --rule-name AutoRemediate --criteria ''{"SeverityLabel":[{"Value":"CRITICAL","Comparison":"EQUALS"}]}''
                  --actions ''[{"Type":"FINDING_FIELDS_UPDATE"}]'''
                - 'Create SSM Automation runbooks for common remediations: aws ssm create-document --name RemediateOpenSG --content file://remediate-sg.json --document-type Automation'
                - 'Track risk acceptance decisions: aws securityhub batch-update-findings to update workflow status'
                azure:
                - 'Use Defender for Cloud workflow automation: az security automation create'
                - Configure Logic Apps for automated response
                gcp:
                - Create Cloud Functions for automated remediation triggered by SCC findings
                - 'Use SCC mute rules for accepted risks: gcloud scc findings set-mute <finding> --organization <org-id> --mute MUTED'
              console_path:
                aws: Security Hub → Automations → Create rule
                azure: Defender for Cloud → Workflow automation → Add
                gcp: Security Command Center → Findings → Mute → Manage mute rules
            cloud_checks:
              aws:
              - service: securityhub
                method: list_automation_rules
                assertion: automated_remediation_configured
    SA:
      name: System and Services Acquisition
      controls:
        SA-1:
          title: Policy and Procedures
          description: Develop, document, and disseminate system and services acquisition policy and procedures.
          checks:
          - id: SA-1.a
            description: Develop system and services acquisition policy
            evidence_type: policy_document
            remediation:
              summary: Document acquisition policies covering security requirements for third-party services and systems.
              steps:
                aws:
                - 'Review AWS Marketplace subscriptions: aws marketplace-catalog list-entities --catalog AWSMarketplace --entity-type SaaSProduct'
                - 'Review third-party integrations: aws iam list-roles --query ''Roles[?contains(AssumeRolePolicyDocument,`sts:AssumeRole`)]'' to find cross-account access'
                - 'Store acquisition policies: aws s3 cp acquisition-policy.pdf s3://<policy-bucket>/sa/'
                azure:
                - Review Azure Marketplace purchases and third-party applications in Entra ID
                - 'Review enterprise applications: az ad sp list --filter "tags/any(t: t eq ''WindowsAzureActiveDirectoryIntegratedApp'')"'
                gcp:
                - Review Cloud Marketplace subscriptions
                - 'Audit third-party service accounts: gcloud iam service-accounts list'
              console_path:
                aws: AWS Marketplace → Manage subscriptions
                azure: Entra ID → Enterprise applications → All applications
                gcp: Cloud Marketplace → Orders
            cloud_checks:
              aws:
              - service: iam
                method: list_roles
                assertion: third_party_roles_documented
        SA-3:
          title: System Development Life Cycle
          description: Acquire, develop, and manage the system using a system development life cycle methodology that incorporates information security and privacy considerations.
          checks:
          - id: SA-3.a
            description: Manage systems using SDLC with security considerations
            evidence_type: sdlc_documentation
            remediation:
              summary: Integrate security into SDLC using DevSecOps practices and automated security testing.
              steps:
                aws:
                - 'Enable CodeGuru for code review: aws codeguru-reviewer create-code-review --name SecurityReview --repository-association-arn <arn> --type ''{"RepositoryAnalysis":{"RepositoryHead":{"BranchName":"main"}}}'''
                - 'Add CodePipeline security scanning stage: integrate with Inspector, Snyk, or SonarQube in build pipeline'
                - 'Enable CodeBuild image scanning: include trivy or grype in buildspec.yaml'
                azure:
                - Enable Azure DevOps Advanced Security for GHAS-equivalent scanning
                - 'Configure Microsoft Defender for DevOps: connect Azure DevOps repos to Defender for Cloud'
                gcp:
                - 'Enable Binary Authorization: gcloud container binauthz policy import policy.yaml'
                - Use Cloud Build with security scanning steps
              console_path:
                aws: CodePipeline → Edit pipeline → Add security scanning stage
                azure: Azure DevOps → Project settings → Advanced Security
                gcp: Binary Authorization → Configure policy
            cloud_checks:
              aws:
              - service: codeguru-reviewer
                method: list_code_reviews
                assertion: code_reviews_active
              - service: codepipeline
                method: list_pipelines
                assertion: security_scanning_in_pipeline
        SA-4:
          title: Acquisition Process
          description: Include security and privacy requirements in the acquisition contract for the system, component, or service.
          checks:
          - id: SA-4.a
            description: Include security requirements in acquisition contracts
            evidence_type: procurement_docs
            remediation:
              summary: Verify third-party service compliance through certifications and security assessments.
              steps:
                aws:
                - 'Review vendor compliance via AWS Artifact: download third-party audit reports'
                - Evaluate Marketplace products for compliance certifications
                - Review shared responsibility documentation for each AWS service used
                azure:
                - Review vendor compliance via Service Trust Portal
                - Evaluate Marketplace applications for security certifications
                gcp:
                - Review vendor compliance via Compliance Reports Manager
                - Evaluate Marketplace solutions for security certifications
              console_path:
                aws: AWS Artifact → Third-party reports
                azure: Service Trust Portal → Compliance offerings
                gcp: Compliance Reports Manager → Reports
            cloud_checks:
              aws:
              - service: artifact
                method: list_reports
                assertion: vendor_compliance_reports_current
        SA-8:
          title: Security and Privacy Engineering Principles
          description: Apply systems security and privacy engineering principles in the specification, design, development, implementation, and modification of the system and system components.
          checks:
          - id: SA-8.a
            description: Apply security engineering principles
            evidence_type: architecture_docs
            remediation:
              summary: Implement defense in depth, least privilege, and secure defaults in cloud architecture.
              steps:
                aws:
                - 'Use AWS Well-Architected Tool: aws wellarchitected create-workload --workload-name <name> --lenses wellarchitected --environment PRODUCTION'
                - 'Run Well-Architected Review: aws wellarchitected create-milestone --workload-id <id> --milestone-name QuarterlyReview'
                - 'Review security pillar findings: aws wellarchitected list-answers --workload-id <id> --lens-alias wellarchitected --pillar-id security'
                azure:
                - 'Use Azure Advisor for architecture recommendations: az advisor recommendation list --category Security'
                - Follow Azure Well-Architected Framework assessments
                gcp:
                - Use Architecture Framework security review
                - 'Run Active Assist recommendations: gcloud recommender recommendations list --recommender google.iam.policy.Recommender --project <project>'
              console_path:
                aws: Well-Architected Tool → Workloads → Create workload
                azure: Azure Advisor → Security recommendations
                gcp: Recommender → IAM recommendations
            cloud_checks:
              aws:
              - service: wellarchitected
                method: list_workloads
                assertion: workloads_reviewed
        SA-11:
          title: Developer Testing and Evaluation
          description: Require the developer of the system to create a security and privacy assessment plan, implement the plan, and document the results.
          checks:
          - id: SA-11.a
            description: Implement developer security testing
            evidence_type: test_results
            remediation:
              summary: Implement security testing in CI/CD pipelines including SAST, DAST, and dependency scanning.
              steps:
                aws:
                - 'Enable CodeGuru Security for SAST: aws codeguru-security create-scan --scan-name SecurityScan --resource-id <repo-arn>'
                - 'Configure ECR image scanning: aws ecr put-image-scanning-configuration --repository-name <repo> --image-scanning-configuration scanOnPush=true'
                - 'Add Inspector SBOM generation: aws inspector2 create-sbom-export --report-format SPDX_2_3 --s3-destination ''{"bucketName":"<bucket>","kmsKeyArn":"<key>"}'''
                azure:
                - Enable GitHub Advanced Security for Azure DevOps
                - 'Configure container scanning in Azure Container Registry: az acr task create --name scan-task'
                gcp:
                - 'Enable Artifact Analysis for container scanning: gcloud services enable containeranalysis.googleapis.com'
                - 'Configure Cloud Build with security testing: include security scan steps in cloudbuild.yaml'
              console_path:
                aws: CodeGuru → Security → Scans; ECR → Repositories → Scan settings
                azure: Azure DevOps → Advanced Security → Code scanning
                gcp: Artifact Registry → Settings → Vulnerability scanning
            cloud_checks:
              aws:
              - service: codeguru-security
                method: list_scans
                assertion: security_scans_active
              - service: ecr
                method: describe_repositories
                assertion: scan_on_push_enabled
