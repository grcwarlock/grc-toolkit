            description: Verify system time synchronization with authoritative source
            evidence_type: config_check
            remediation:
              summary: Configure system time synchronization using Amazon Time Sync Service or NTP from authoritative sources.
              steps:
                aws:
                - aws ec2 describe-instances --query 'Reservations[*].Instances[*].[InstanceId,LaunchTime]' --output table
                - Verify instances use Amazon Time Sync Service (169.254.169.123) or chrony for NTP
                - aws logs describe-log-groups --query 'logGroups[*].[logGroupName]' --output table
