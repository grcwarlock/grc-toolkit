        SC-48:
          title: Sensor Relocation
          description: Relocate sensors and monitoring capabilities to optimize detection of adversary activities.
          checks:
          - id: SC-48.a
            description: Verify ability to relocate monitoring sensors
            evidence_type: config_check
            remediation:
              summary: Implement the capability to dynamically reposition monitoring sensors to enhance threat detection.
              steps:
                aws:
                - aws guardduty list-detectors
                - aws ec2 describe-flow-logs
                - aws ec2 create-traffic-mirror-session --network-interface-id <eni> --traffic-mirror-target-id <target> --traffic-mirror-filter-id <filter> --session-number 1
              console_path:
