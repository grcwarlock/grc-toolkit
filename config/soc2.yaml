# soc2.yaml
# SOC 2 Type II Trust Services Criteria — Codified control requirements
# Based on AICPA 2022 Trust Services Criteria (TSC)

soc2:
  name: "SOC 2 Type II"
  version: "2022"

  control_families:

    # =========================================================================
    # CC1: Control Environment (COSO Principles 1–5)
    # =========================================================================
    CC1:
      name: "Control Environment"
      controls:

        CC1.1:
          title: "COSO Principle 1: Demonstrates Commitment to Integrity and Ethical Values"
          description: >
            The entity demonstrates a commitment to integrity and ethical values
            through a code of conduct, ethics training, and management oversight
            that sets the tone at the top for internal controls.
          checks:
            - id: "CC1.1.a"
              description: "Verify a code of conduct or ethics policy exists, is current, and has been acknowledged by all personnel"
              evidence_type: "policy_doc"
              remediation:
                summary: "Establish and distribute a code of conduct with annual employee acknowledgment tracking."
                steps:
                  aws:
                    - "Store the code of conduct in a versioned S3 bucket: aws s3 cp code-of-conduct.pdf s3://<policy-bucket>/policies/code-of-conduct.pdf"
                    - "Enable versioning on the bucket: aws s3api put-bucket-versioning --bucket <policy-bucket> --versioning-configuration Status=Enabled"
                    - "Use AWS WorkDocs or an HRIS system to track employee acknowledgments"
                    - "Create an EventBridge scheduled rule to trigger annual re-acknowledgment reminders"
                console_path:
                  aws: "S3 → <policy-bucket> → policies/ → Upload code-of-conduct.pdf"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "head_object"
                    assertion: "code_of_conduct_document_exists"

            - id: "CC1.1.b"
              description: "Verify ethics training is completed annually by all employees"
              evidence_type: "training_records"
              remediation:
                summary: "Implement annual ethics training with completion tracking via LMS or HR system."
                steps:
                  aws:
                    - "Store training completion records in DynamoDB: aws dynamodb put-item --table-name TrainingRecords --item '{\"employee_id\":{\"S\":\"<id>\"},\"training\":{\"S\":\"ethics\"},\"completed_date\":{\"S\":\"<date>\"}}'"
                    - "Query incomplete trainings: aws dynamodb scan --table-name TrainingRecords --filter-expression 'completed_date < :cutoff' --expression-attribute-values '{\":cutoff\":{\"S\":\"<one-year-ago>\"}}'"
                console_path:
                  aws: "DynamoDB → Tables → TrainingRecords → Explore items"
              cloud_checks:
                aws:
                  - service: "dynamodb"
                    method: "scan"
                    assertion: "all_employees_completed_ethics_training"

        CC1.2:
          title: "COSO Principle 2: Exercises Oversight Responsibility"
          description: >
            The board of directors demonstrates independence from management and
            exercises oversight of the development and performance of internal
            controls through governance structures such as audit committees.
          checks:
            - id: "CC1.2.a"
              description: "Verify board or audit committee charter exists with defined oversight responsibilities"
              evidence_type: "policy_doc"
              remediation:
                summary: "Maintain a board or audit committee charter documenting oversight responsibilities and meeting cadence."
                steps:
                  aws:
                    - "Store governance documents in versioned S3: aws s3 cp audit-committee-charter.pdf s3://<policy-bucket>/governance/audit-committee-charter.pdf"
                    - "Tag with review date: aws s3api put-object-tagging --bucket <policy-bucket> --key governance/audit-committee-charter.pdf --tagging 'TagSet=[{Key=ReviewDate,Value=<date>}]'"
                console_path:
                  aws: "S3 → <policy-bucket> → governance/"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "head_object"
                    assertion: "audit_committee_charter_exists"

            - id: "CC1.2.b"
              description: "Verify regular board or audit committee meetings are held and documented"
              evidence_type: "meeting_minutes"
              remediation:
                summary: "Document quarterly board and audit committee meetings with minutes stored centrally."
                steps:
                  aws:
                    - "Upload meeting minutes: aws s3 cp meeting-minutes-Q1.pdf s3://<policy-bucket>/governance/minutes/"
                    - "List available minutes: aws s3 ls s3://<policy-bucket>/governance/minutes/ --recursive"
                console_path:
                  aws: "S3 → <policy-bucket> → governance → minutes/"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "list_objects_v2"
                    assertion: "quarterly_meeting_minutes_exist"

        CC1.3:
          title: "COSO Principle 3: Establishes Structure, Authority, and Responsibility"
          description: >
            Management establishes, with board oversight, structures, reporting
            lines, and appropriate authorities and responsibilities in the pursuit
            of objectives.
          checks:
            - id: "CC1.3.a"
              description: "Verify organizational chart with defined reporting lines and security responsibilities exists"
              evidence_type: "org_chart"
              remediation:
                summary: "Maintain an up-to-date organizational chart with clearly defined security roles and reporting lines."
                steps:
                  aws:
                    - "Store org chart in S3: aws s3 cp org-chart.pdf s3://<policy-bucket>/governance/org-chart.pdf"
                    - "Use AWS IAM to mirror organizational structure with groups: aws iam create-group --group-name SecurityTeam"
                    - "List IAM groups to verify structure: aws iam list-groups --query 'Groups[*].GroupName'"
                console_path:
                  aws: "IAM → User groups → Verify groups mirror organizational structure"
              cloud_checks:
                aws:
                  - service: "iam"
                    method: "list_groups"
                    assertion: "security_groups_defined"

            - id: "CC1.3.b"
              description: "Verify roles and responsibilities for security functions are documented and assigned"
              evidence_type: "raci_matrix"
              remediation:
                summary: "Create and maintain a RACI matrix for security responsibilities."
                steps:
                  aws:
                    - "Store RACI matrix: aws s3 cp raci-matrix.xlsx s3://<policy-bucket>/governance/raci-matrix.xlsx"
                    - "Verify IAM roles match documented responsibilities: aws iam list-roles --query 'Roles[*].[RoleName,Description]'"
                console_path:
                  aws: "S3 → <policy-bucket> → governance → raci-matrix.xlsx"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "head_object"
                    assertion: "raci_matrix_exists"

        CC1.4:
          title: "COSO Principle 4: Demonstrates Commitment to Competence"
          description: >
            The entity demonstrates a commitment to attract, develop, and retain
            competent individuals in alignment with objectives, including security
            awareness training and professional development programs.
          checks:
            - id: "CC1.4.a"
              description: "Verify security awareness training program exists and completion records are maintained"
              evidence_type: "training_records"
              remediation:
                summary: "Implement a security awareness training program with tracked completion and annual refresher."
                steps:
                  aws:
                    - "Track training in DynamoDB: aws dynamodb create-table --table-name SecurityTraining --attribute-definitions AttributeName=employee_id,AttributeType=S --key-schema AttributeName=employee_id,KeyType=HASH --billing-mode PAY_PER_REQUEST"
                    - "Record completion: aws dynamodb put-item --table-name SecurityTraining --item '{\"employee_id\":{\"S\":\"<id>\"},\"module\":{\"S\":\"security-awareness\"},\"completed\":{\"S\":\"<date>\"},\"score\":{\"N\":\"<score>\"}}'"
                    - "Audit overdue trainings: aws dynamodb scan --table-name SecurityTraining --filter-expression 'completed < :cutoff' --expression-attribute-values '{\":cutoff\":{\"S\":\"<one-year-ago>\"}}'"
                console_path:
                  aws: "DynamoDB → Tables → SecurityTraining → Explore items"
              cloud_checks:
                aws:
                  - service: "dynamodb"
                    method: "scan"
                    assertion: "all_employees_completed_security_training"

            - id: "CC1.4.b"
              description: "Verify job descriptions include security responsibilities"
              evidence_type: "policy_doc"
              remediation:
                summary: "Ensure all job descriptions include relevant security responsibilities and are stored centrally."
                steps:
                  aws:
                    - "Store job descriptions: aws s3 sync ./job-descriptions/ s3://<policy-bucket>/hr/job-descriptions/"
                    - "List stored descriptions: aws s3 ls s3://<policy-bucket>/hr/job-descriptions/"
                console_path:
                  aws: "S3 → <policy-bucket> → hr → job-descriptions/"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "list_objects_v2"
                    assertion: "job_descriptions_with_security_responsibilities_exist"

        CC1.5:
          title: "COSO Principle 5: Enforces Accountability"
          description: >
            The entity holds individuals accountable for their internal control
            responsibilities in the pursuit of objectives through performance
            evaluations, disciplinary processes, and escalation procedures.
          checks:
            - id: "CC1.5.a"
              description: "Verify performance evaluation process includes security accountability metrics"
              evidence_type: "policy_doc"
              remediation:
                summary: "Include security accountability metrics in performance evaluations and document the process."
                steps:
                  aws:
                    - "Store performance review policy: aws s3 cp performance-review-policy.pdf s3://<policy-bucket>/hr/performance-review-policy.pdf"
                    - "Tag with effective date: aws s3api put-object-tagging --bucket <policy-bucket> --key hr/performance-review-policy.pdf --tagging 'TagSet=[{Key=EffectiveDate,Value=<date>}]'"
                console_path:
                  aws: "S3 → <policy-bucket> → hr → performance-review-policy.pdf"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "head_object"
                    assertion: "performance_review_policy_exists"

            - id: "CC1.5.b"
              description: "Verify disciplinary process for security policy violations is documented"
              evidence_type: "policy_doc"
              remediation:
                summary: "Document and maintain a disciplinary action policy for security violations."
                steps:
                  aws:
                    - "Store disciplinary policy: aws s3 cp disciplinary-policy.pdf s3://<policy-bucket>/hr/disciplinary-policy.pdf"
                    - "Verify policy exists: aws s3api head-object --bucket <policy-bucket> --key hr/disciplinary-policy.pdf"
                console_path:
                  aws: "S3 → <policy-bucket> → hr → disciplinary-policy.pdf"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "head_object"
                    assertion: "disciplinary_policy_exists"

    # =========================================================================
    # CC2: Communication and Information (COSO Principles 13–15)
    # =========================================================================
    CC2:
      name: "Communication and Information"
      controls:

        CC2.1:
          title: "COSO Principle 13: Obtains or Generates Relevant Information"
          description: >
            The entity obtains or generates and uses relevant, quality information
            to support the functioning of internal controls, including information
            about security events, incidents, and system changes.
          checks:
            - id: "CC2.1.a"
              description: "Verify centralized logging and monitoring captures relevant security information"
              evidence_type: "logging_config"
              remediation:
                summary: "Enable centralized logging via CloudTrail, CloudWatch, and Security Hub to capture security-relevant information."
                steps:
                  aws:
                    - "Enable CloudTrail: aws cloudtrail create-trail --name soc2-trail --s3-bucket-name <bucket> --is-multi-region-trail --enable-log-file-validation"
                    - "Start logging: aws cloudtrail start-logging --name soc2-trail"
                    - "Enable Security Hub: aws securityhub enable-security-hub --enable-default-standards"
                    - "Create CloudWatch log group: aws logs create-log-group --log-group-name /soc2/security-events --retention-in-days 365"
                    - "Verify trail status: aws cloudtrail get-trail-status --name soc2-trail"
                console_path:
                  aws: "CloudTrail → Trails → Create trail → Multi-region → Enable"
              cloud_checks:
                aws:
                  - service: "cloudtrail"
                    method: "describe_trails"
                    assertion: "cloudtrail_enabled_all_regions"
                  - service: "securityhub"
                    method: "describe_hub"
                    assertion: "security_hub_enabled"

            - id: "CC2.1.b"
              description: "Verify information quality controls are in place for security data"
              evidence_type: "logging_config"
              remediation:
                summary: "Enable CloudTrail log file validation and S3 object lock for log integrity."
                steps:
                  aws:
                    - "Verify log validation: aws cloudtrail get-trail --name soc2-trail --query 'Trail.LogFileValidationEnabled'"
                    - "Enable S3 object lock on log bucket: aws s3api put-object-lock-configuration --bucket <log-bucket> --object-lock-configuration '{\"ObjectLockEnabled\":\"Enabled\",\"Rule\":{\"DefaultRetention\":{\"Mode\":\"COMPLIANCE\",\"Days\":365}}}'"
                    - "Validate log digest: aws cloudtrail validate-logs --trail-arn <trail-arn> --start-time <start>"
                console_path:
                  aws: "CloudTrail → Trails → soc2-trail → Log file validation → Enabled"
              cloud_checks:
                aws:
                  - service: "cloudtrail"
                    method: "get_trail"
                    assertion: "log_file_validation_enabled"

        CC2.2:
          title: "COSO Principle 14: Communicates Internally"
          description: >
            The entity internally communicates information, including objectives and
            responsibilities for internal control, necessary to support the functioning
            of internal controls.
          checks:
            - id: "CC2.2.a"
              description: "Verify internal communication of security policies, responsibilities, and incidents"
              evidence_type: "policy_doc"
              remediation:
                summary: "Establish internal communication channels for security policies, responsibilities, and incident notifications."
                steps:
                  aws:
                    - "Create SNS topic for internal security communications: aws sns create-topic --name security-announcements"
                    - "Subscribe stakeholders: aws sns subscribe --topic-arn <topic-arn> --protocol email --notification-endpoint <email>"
                    - "Store communication policy: aws s3 cp internal-comms-policy.pdf s3://<policy-bucket>/policies/internal-comms-policy.pdf"
                console_path:
                  aws: "SNS → Topics → security-announcements → Subscriptions"
              cloud_checks:
                aws:
                  - service: "sns"
                    method: "list_topics"
                    assertion: "security_announcement_topic_exists"

            - id: "CC2.2.b"
              description: "Verify security policy acknowledgment process exists for employees"
              evidence_type: "training_records"
              remediation:
                summary: "Track employee acknowledgment of security policies with dated records."
                steps:
                  aws:
                    - "Record acknowledgments: aws dynamodb put-item --table-name PolicyAcknowledgments --item '{\"employee_id\":{\"S\":\"<id>\"},\"policy\":{\"S\":\"information-security\"},\"acknowledged_date\":{\"S\":\"<date>\"}}'"
                    - "Audit missing acknowledgments: aws dynamodb scan --table-name PolicyAcknowledgments --filter-expression 'acknowledged_date < :cutoff' --expression-attribute-values '{\":cutoff\":{\"S\":\"<one-year-ago>\"}}'"
                console_path:
                  aws: "DynamoDB → Tables → PolicyAcknowledgments"
              cloud_checks:
                aws:
                  - service: "dynamodb"
                    method: "scan"
                    assertion: "all_employees_acknowledged_security_policy"

        CC2.3:
          title: "COSO Principle 15: Communicates Externally"
          description: >
            The entity communicates with external parties regarding matters affecting
            the functioning of internal controls, including commitments, system
            descriptions, and security incident notifications.
          checks:
            - id: "CC2.3.a"
              description: "Verify external communication processes for security incidents and obligations"
              evidence_type: "policy_doc"
              remediation:
                summary: "Document external communication procedures for security incidents, breaches, and regulatory notifications."
                steps:
                  aws:
                    - "Store incident communication plan: aws s3 cp external-comms-plan.pdf s3://<policy-bucket>/policies/external-comms-plan.pdf"
                    - "Create SNS topic for external notifications: aws sns create-topic --name security-external-notifications"
                    - "Configure SES for incident notification emails: aws ses verify-email-identity --email-address security@<domain>"
                console_path:
                  aws: "S3 → <policy-bucket> → policies → external-comms-plan.pdf"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "head_object"
                    assertion: "external_communication_plan_exists"

    # =========================================================================
    # CC3: Risk Assessment (COSO Principles 6–9)
    # =========================================================================
    CC3:
      name: "Risk Assessment"
      controls:

        CC3.1:
          title: "COSO Principle 6: Specifies Suitable Objectives"
          description: >
            The entity specifies objectives with sufficient clarity to enable the
            identification and assessment of risks relating to objectives, including
            security, availability, processing integrity, confidentiality, and privacy.
          checks:
            - id: "CC3.1.a"
              description: "Verify documented security objectives aligned with business goals"
              evidence_type: "policy_doc"
              remediation:
                summary: "Document and maintain security objectives that align with business goals and Trust Services Criteria."
                steps:
                  aws:
                    - "Store security objectives document: aws s3 cp security-objectives.pdf s3://<policy-bucket>/governance/security-objectives.pdf"
                    - "Tag with review period: aws s3api put-object-tagging --bucket <policy-bucket> --key governance/security-objectives.pdf --tagging 'TagSet=[{Key=ReviewDate,Value=<date>},{Key=Owner,Value=CISO}]'"
                console_path:
                  aws: "S3 → <policy-bucket> → governance → security-objectives.pdf"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "head_object"
                    assertion: "security_objectives_document_exists"

        CC3.2:
          title: "COSO Principle 7: Identifies and Analyzes Risk"
          description: >
            The entity identifies risks to the achievement of its objectives across
            the entity and analyzes risks as a basis for determining how the risks
            should be managed, including threats and vulnerabilities.
          checks:
            - id: "CC3.2.a"
              description: "Verify a formal risk assessment has been performed and documented"
              evidence_type: "risk_register"
              remediation:
                summary: "Conduct annual risk assessments and maintain a risk register with identified threats and vulnerabilities."
                steps:
                  aws:
                    - "Store risk register: aws s3 cp risk-register.xlsx s3://<policy-bucket>/risk/risk-register.xlsx"
                    - "Enable AWS Inspector for vulnerability assessment: aws inspector2 enable --resource-types EC2 ECR LAMBDA"
                    - "List Inspector findings: aws inspector2 list-findings --filter-criteria '{\"findingStatus\":[{\"comparison\":\"EQUALS\",\"value\":\"ACTIVE\"}]}'"
                    - "Enable Trusted Advisor checks: aws support describe-trusted-advisor-checks --language en"
                console_path:
                  aws: "Inspector → Get started → Enable; S3 → <policy-bucket> → risk/"
              cloud_checks:
                aws:
                  - service: "inspector2"
                    method: "batch_get_account_status"
                    assertion: "inspector_enabled"
                  - service: "s3"
                    method: "head_object"
                    assertion: "risk_register_exists"

            - id: "CC3.2.b"
              description: "Verify vulnerability scanning is performed regularly"
              evidence_type: "scan_report"
              remediation:
                summary: "Enable continuous vulnerability scanning via AWS Inspector and review findings weekly."
                steps:
                  aws:
                    - "Verify Inspector is enabled: aws inspector2 batch-get-account-status"
                    - "List active findings: aws inspector2 list-findings --filter-criteria '{\"severity\":[{\"comparison\":\"EQUALS\",\"value\":\"HIGH\"},{\"comparison\":\"EQUALS\",\"value\":\"CRITICAL\"}]}'"
                    - "Export findings to S3: aws inspector2 create-findings-report --report-format CSV --s3-destination '{\"bucketName\":\"<bucket>\",\"keyPrefix\":\"inspector-reports/\"}'"
                console_path:
                  aws: "Inspector → Findings → Filter by severity"
              cloud_checks:
                aws:
                  - service: "inspector2"
                    method: "list_findings"
                    assertion: "no_critical_unresolved_findings"

        CC3.3:
          title: "COSO Principle 8: Assesses Fraud Risk"
          description: >
            The entity considers the potential for fraud in assessing risks to the
            achievement of objectives, including unauthorized access, data manipulation,
            and misappropriation of assets.
          checks:
            - id: "CC3.3.a"
              description: "Verify fraud risk assessment is performed and documented"
              evidence_type: "risk_register"
              remediation:
                summary: "Include fraud risk scenarios in the risk register and enable anomaly detection controls."
                steps:
                  aws:
                    - "Store fraud risk assessment: aws s3 cp fraud-risk-assessment.pdf s3://<policy-bucket>/risk/fraud-risk-assessment.pdf"
                    - "Enable GuardDuty for anomaly detection: aws guardduty create-detector --enable --finding-publishing-frequency FIFTEEN_MINUTES"
                    - "Enable CloudTrail Insights: aws cloudtrail put-insight-selectors --trail-name soc2-trail --insight-selectors '[{\"InsightType\":\"ApiCallRateInsight\"},{\"InsightType\":\"ApiErrorRateInsight\"}]'"
                console_path:
                  aws: "GuardDuty → Settings → Enable; CloudTrail → Trails → Insights → Enable"
              cloud_checks:
                aws:
                  - service: "guardduty"
                    method: "list_detectors"
                    assertion: "guardduty_enabled"
                  - service: "cloudtrail"
                    method: "get_insight_selectors"
                    assertion: "insight_selectors_enabled"

        CC3.4:
          title: "COSO Principle 9: Identifies and Analyzes Significant Change"
          description: >
            The entity identifies and assesses changes that could significantly
            impact the system of internal controls, including infrastructure changes,
            personnel changes, and regulatory changes.
          checks:
            - id: "CC3.4.a"
              description: "Verify change impact assessment process is documented and followed"
              evidence_type: "policy_doc"
              remediation:
                summary: "Document change management procedures that include impact assessment for significant changes."
                steps:
                  aws:
                    - "Store change management policy: aws s3 cp change-management-policy.pdf s3://<policy-bucket>/policies/change-management-policy.pdf"
                    - "Enable AWS Config to track configuration changes: aws configservice put-configuration-recorder --configuration-recorder name=default,roleARN=<role-arn> --recording-group allSupported=true"
                    - "Start recorder: aws configservice start-configuration-recorder --configuration-recorder-name default"
                console_path:
                  aws: "AWS Config → Settings → Turn on recording"
              cloud_checks:
                aws:
                  - service: "config"
                    method: "describe_configuration_recorders"
                    assertion: "config_recorder_enabled"

    # =========================================================================
    # CC4: Monitoring Activities (COSO Principles 16–17)
    # =========================================================================
    CC4:
      name: "Monitoring Activities"
      controls:

        CC4.1:
          title: "COSO Principle 16: Selects, Develops, and Performs Ongoing and Separate Evaluations"
          description: >
            The entity selects, develops, and performs ongoing and/or separate
            evaluations to ascertain whether the components of internal control are
            present and functioning, including continuous monitoring and periodic assessments.
          checks:
            - id: "CC4.1.a"
              description: "Verify continuous monitoring controls are implemented and operational"
              evidence_type: "monitoring_config"
              remediation:
                summary: "Implement continuous monitoring via AWS Config rules, Security Hub, and CloudWatch alarms."
                steps:
                  aws:
                    - "Enable Security Hub with CIS benchmark: aws securityhub enable-security-hub --enable-default-standards"
                    - "Create Config rules for compliance: aws configservice put-config-rule --config-rule '{\"ConfigRuleName\":\"iam-password-policy\",\"Source\":{\"Owner\":\"AWS\",\"SourceIdentifier\":\"IAM_PASSWORD_POLICY\"}}'"
                    - "Create CloudWatch alarm for unauthorized API calls: aws cloudwatch put-metric-alarm --alarm-name unauthorized-api-calls --metric-name UnauthorizedAttemptCount --namespace CloudTrailMetrics --statistic Sum --period 300 --threshold 5 --comparison-operator GreaterThanThreshold --alarm-actions <sns-arn>"
                    - "Verify Security Hub compliance: aws securityhub get-findings --filters '{\"ComplianceStatus\":[{\"Value\":\"FAILED\",\"Comparison\":\"EQUALS\"}]}'"
                console_path:
                  aws: "Security Hub → Security standards → Enable CIS AWS Foundations"
              cloud_checks:
                aws:
                  - service: "securityhub"
                    method: "describe_hub"
                    assertion: "security_hub_enabled"
                  - service: "config"
                    method: "describe_config_rules"
                    assertion: "config_rules_active"

            - id: "CC4.1.b"
              description: "Verify periodic internal assessments or audits are performed"
              evidence_type: "audit_report"
              remediation:
                summary: "Schedule and document periodic internal audits of security controls."
                steps:
                  aws:
                    - "Store audit reports: aws s3 cp internal-audit-report.pdf s3://<policy-bucket>/audits/internal-audit-<date>.pdf"
                    - "Run AWS Audit Manager assessment: aws auditmanager create-assessment --name soc2-assessment --framework-id <framework-id> --assessment-reports-destination '{\"destinationType\":\"S3\",\"destination\":\"s3://<bucket>/audit-reports/\"}' --roles '[{\"roleType\":\"PROCESS_OWNER\",\"roleArn\":\"<role-arn>\"}]' --scope '{\"awsAccounts\":[{\"id\":\"<account-id>\"}]}'"
                console_path:
                  aws: "Audit Manager → Assessments → Create assessment → SOC 2"
              cloud_checks:
                aws:
                  - service: "auditmanager"
                    method: "list_assessments"
                    assertion: "active_assessment_exists"

        CC4.2:
          title: "COSO Principle 17: Evaluates and Communicates Deficiencies"
          description: >
            The entity evaluates and communicates internal control deficiencies in
            a timely manner to those parties responsible for taking corrective action,
            including senior management and the board of directors.
          checks:
            - id: "CC4.2.a"
              description: "Verify deficiency tracking and remediation process is documented and followed"
              evidence_type: "risk_register"
              remediation:
                summary: "Track control deficiencies in a centralized system with assigned owners and remediation timelines."
                steps:
                  aws:
                    - "Export Security Hub findings as deficiency list: aws securityhub get-findings --filters '{\"ComplianceStatus\":[{\"Value\":\"FAILED\",\"Comparison\":\"EQUALS\"}],\"SeverityLabel\":[{\"Value\":\"HIGH\",\"Comparison\":\"EQUALS\"},{\"Value\":\"CRITICAL\",\"Comparison\":\"EQUALS\"}]}'"
                    - "Store deficiency tracking spreadsheet: aws s3 cp deficiency-tracker.xlsx s3://<policy-bucket>/risk/deficiency-tracker.xlsx"
                    - "Set up SNS notification for new critical findings: aws events put-rule --name critical-deficiency-alert --event-pattern '{\"source\":[\"aws.securityhub\"],\"detail\":{\"findings\":{\"Severity\":{\"Label\":[\"CRITICAL\",\"HIGH\"]}}}}'"
                console_path:
                  aws: "Security Hub → Findings → Filter: Compliance Status = FAILED"
              cloud_checks:
                aws:
                  - service: "securityhub"
                    method: "get_findings"
                    assertion: "critical_findings_have_remediation_plan"

    # =========================================================================
    # CC5: Control Activities (COSO Principles 10–12)
    # =========================================================================
    CC5:
      name: "Control Activities"
      controls:

        CC5.1:
          title: "COSO Principle 10: Selects and Develops Control Activities"
          description: >
            The entity selects and develops control activities that contribute to
            the mitigation of risks to the achievement of objectives to acceptable
            levels, including IT general controls and application controls.
          checks:
            - id: "CC5.1.a"
              description: "Verify IT general controls are documented and mapped to identified risks"
              evidence_type: "policy_doc"
              remediation:
                summary: "Document IT general controls and map them to risks in the risk register."
                steps:
                  aws:
                    - "Store ITGC documentation: aws s3 cp itgc-control-matrix.xlsx s3://<policy-bucket>/controls/itgc-control-matrix.xlsx"
                    - "Enable AWS Config conformance packs: aws configservice put-conformance-pack --conformance-pack-name Operational-Best-Practices-for-SOC2 --template-s3-uri s3://aws-config-conformance-pack-templates/Operational-Best-Practices-for-SOC2.yaml"
                console_path:
                  aws: "AWS Config → Conformance packs → Deploy → SOC 2"
              cloud_checks:
                aws:
                  - service: "config"
                    method: "describe_conformance_packs"
                    assertion: "soc2_conformance_pack_deployed"

            - id: "CC5.1.b"
              description: "Verify automated controls are implemented where feasible"
              evidence_type: "automation_config"
              remediation:
                summary: "Implement automated controls using AWS Config rules and remediation actions."
                steps:
                  aws:
                    - "List active Config rules: aws configservice describe-config-rules --query 'ConfigRules[*].[ConfigRuleName,ConfigRuleState]'"
                    - "Create auto-remediation: aws configservice put-remediation-configurations --remediation-configurations '[{\"ConfigRuleName\":\"<rule>\",\"TargetType\":\"SSM_DOCUMENT\",\"TargetId\":\"<ssm-doc>\",\"Automatic\":true}]'"
                console_path:
                  aws: "AWS Config → Rules → Add rule → Set remediation action"
              cloud_checks:
                aws:
                  - service: "config"
                    method: "describe_config_rules"
                    assertion: "automated_config_rules_active"

        CC5.2:
          title: "COSO Principle 11: Selects and Develops General Controls over Technology"
          description: >
            The entity selects and develops general control activities over
            technology to support the achievement of objectives, including
            access management, change management, and operations controls.
          checks:
            - id: "CC5.2.a"
              description: "Verify technology controls cover access management, change management, and operations"
              evidence_type: "policy_doc"
              remediation:
                summary: "Implement technology general controls across access management, change management, and operations."
                steps:
                  aws:
                    - "Verify IAM password policy: aws iam get-account-password-policy"
                    - "Enforce strong password policy: aws iam update-account-password-policy --minimum-password-length 14 --require-symbols --require-numbers --require-uppercase-characters --require-lowercase-characters --max-password-age 90 --password-reuse-prevention 24"
                    - "Enable AWS Config rules for technology controls: aws configservice put-config-rule --config-rule '{\"ConfigRuleName\":\"iam-password-policy\",\"Source\":{\"Owner\":\"AWS\",\"SourceIdentifier\":\"IAM_PASSWORD_POLICY\"}}'"
                console_path:
                  aws: "IAM → Account settings → Password policy → Edit"
              cloud_checks:
                aws:
                  - service: "iam"
                    method: "get_account_password_policy"
                    assertion: "password_policy_meets_requirements"

        CC5.3:
          title: "COSO Principle 12: Deploys Through Policies and Procedures"
          description: >
            The entity deploys control activities through policies that establish
            what is expected and procedures that put policies into action, with
            regular review and updates.
          checks:
            - id: "CC5.3.a"
              description: "Verify security policies are documented, approved, and reviewed on a regular cadence"
              evidence_type: "policy_doc"
              remediation:
                summary: "Maintain a policy library with version control, approval records, and annual review dates."
                steps:
                  aws:
                    - "List all policies in S3: aws s3 ls s3://<policy-bucket>/policies/ --recursive"
                    - "Check policy metadata for review dates: aws s3api get-object-tagging --bucket <policy-bucket> --key policies/<policy-name>"
                    - "Enable S3 versioning for policy change tracking: aws s3api put-bucket-versioning --bucket <policy-bucket> --versioning-configuration Status=Enabled"
                console_path:
                  aws: "S3 → <policy-bucket> → policies/ → View object tags"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "list_objects_v2"
                    assertion: "policy_documents_exist_and_current"

    # =========================================================================
    # CC6: Logical and Physical Access Controls
    # =========================================================================
    CC6:
      name: "Logical and Physical Access Controls"
      controls:

        CC6.1:
          title: "Logical Access Security Software, Infrastructure, and Architectures"
          description: >
            The entity implements logical access security software, infrastructure,
            and architectures over protected information assets to protect them from
            security events to meet the entity's objectives.
          checks:
            - id: "CC6.1.a"
              description: "Verify identity provider and SSO are configured for centralized authentication"
              evidence_type: "iam_policy"
              remediation:
                summary: "Implement centralized identity management with SSO and federated access."
                steps:
                  aws:
                    - "Enable AWS IAM Identity Center (SSO): aws sso-admin list-instances"
                    - "List permission sets: aws sso-admin list-permission-sets --instance-arn <instance-arn>"
                    - "Verify SAML providers: aws iam list-saml-providers"
                    - "Ensure no console passwords for service accounts: aws iam get-credential-report"
                  azure:
                    - "Verify Entra ID SSO apps: az ad app list --query '[].{Name:displayName,SignOnUrl:web.homePageUrl}'"
                    - "List conditional access policies: az rest --method get --url 'https://graph.microsoft.com/v1.0/identity/conditionalAccess/policies'"
                  gcp:
                    - "List identity-aware proxy settings: gcloud iap web get-iam-policy"
                    - "Verify workspace SSO: gcloud identity groups list"
                console_path:
                  aws: "IAM Identity Center → Settings → Identity source"
                  azure: "Entra ID → Enterprise applications → All applications"
                  gcp: "Security → Identity-Aware Proxy"
              cloud_checks:
                aws:
                  - service: "sso-admin"
                    method: "list_instances"
                    assertion: "sso_instance_configured"
                  - service: "iam"
                    method: "list_saml_providers"
                    assertion: "identity_federation_configured"
                azure:
                  - service: "entra_id"
                    method: "list_applications"
                    assertion: "sso_configured"
                gcp:
                  - service: "iap"
                    method: "list_tunnel_instances"
                    assertion: "identity_aware_proxy_enabled"

            - id: "CC6.1.b"
              description: "Verify MFA is enforced for all user access"
              evidence_type: "iam_policy"
              remediation:
                summary: "Enforce MFA for all IAM users and console access."
                steps:
                  aws:
                    - "Generate credential report: aws iam generate-credential-report && sleep 5 && aws iam get-credential-report --output text --query Content | base64 -d"
                    - "Identify users without MFA and enable it: aws iam create-virtual-mfa-device --virtual-mfa-device-name <user>-mfa --outfile qr.png --bootstrap-method QRCodePNG"
                    - "Enable MFA device: aws iam enable-mfa-device --user-name <user> --serial-number <mfa-arn> --authentication-code1 <code1> --authentication-code2 <code2>"
                    - "Create Config rule: aws configservice put-config-rule --config-rule '{\"ConfigRuleName\":\"iam-user-mfa-enabled\",\"Source\":{\"Owner\":\"AWS\",\"SourceIdentifier\":\"IAM_USER_MFA_ENABLED\"}}'"
                console_path:
                  aws: "IAM → Users → Select user → Security credentials → Assign MFA"
              cloud_checks:
                aws:
                  - service: "iam"
                    method: "get_credential_report"
                    assertion: "all_users_have_mfa"
                  - service: "iam"
                    method: "get_account_summary"
                    assertion: "no_root_access_keys"

        CC6.2:
          title: "User Registration and Authorization"
          description: >
            Prior to issuing system credentials and granting system access, the
            entity registers and authorizes new internal and external users whose
            access is administered by the entity.
          checks:
            - id: "CC6.2.a"
              description: "Verify user provisioning process requires approval prior to access grant"
              evidence_type: "iam_policy"
              remediation:
                summary: "Implement an access request and approval workflow for user provisioning."
                steps:
                  aws:
                    - "List all IAM users: aws iam list-users --query 'Users[*].[UserName,CreateDate]' --output table"
                    - "Check for users created without tagging (approval evidence): aws iam list-user-tags --user-name <user>"
                    - "Tag users with approval ticket: aws iam tag-user --user-name <user> --tags Key=ApprovalTicket,Value=<ticket-id>"
                    - "Create SCP to require tags on user creation: aws organizations create-policy --name require-approval-tag --type SERVICE_CONTROL_POLICY --content '{\"Version\":\"2012-10-17\",\"Statement\":[]}'"
                console_path:
                  aws: "IAM → Users → Select user → Tags → Verify ApprovalTicket tag"
              cloud_checks:
                aws:
                  - service: "iam"
                    method: "list_users"
                    assertion: "all_users_have_approval_tags"

            - id: "CC6.2.b"
              description: "Verify access reviews are performed periodically"
              evidence_type: "access_review"
              remediation:
                summary: "Perform quarterly access reviews and document findings and remediation actions."
                steps:
                  aws:
                    - "Generate credential report for review: aws iam generate-credential-report && sleep 5 && aws iam get-credential-report --output text --query Content | base64 -d > access-review.csv"
                    - "List all user policies: for user in $(aws iam list-users --query 'Users[*].UserName' --output text); do echo \"=== $user ===\"; aws iam list-attached-user-policies --user-name $user; done"
                    - "Identify stale access keys (>90 days): aws iam get-credential-report --output text --query Content | base64 -d | awk -F, '$10 != \"N/A\" && $10 < \"<90-days-ago>\"'"
                    - "Store access review: aws s3 cp access-review.csv s3://<policy-bucket>/audits/access-reviews/access-review-<date>.csv"
                console_path:
                  aws: "IAM → Credential report → Download report"
              cloud_checks:
                aws:
                  - service: "iam"
                    method: "get_credential_report"
                    assertion: "no_stale_access_keys"

        CC6.3:
          title: "Role-Based Access and Least Privilege"
          description: >
            The entity authorizes, modifies, or removes access to data, software,
            functions, and other protected information assets based on roles,
            responsibilities, or the system design and changes, giving
            consideration to the concepts of least privilege and segregation of duties.
          checks:
            - id: "CC6.3.a"
              description: "Verify role-based access control (RBAC) is implemented"
              evidence_type: "iam_roles"
              remediation:
                summary: "Implement RBAC using IAM groups and roles instead of direct user policy attachments."
                steps:
                  aws:
                    - "Identify users with inline or directly attached policies: aws iam list-users --query 'Users[*].UserName' --output text | xargs -I{} sh -c 'echo \"User: {}\"; aws iam list-user-policies --user-name {}; aws iam list-attached-user-policies --user-name {}'"
                    - "Create IAM groups for roles: aws iam create-group --group-name Developers && aws iam create-group --group-name Operators && aws iam create-group --group-name ReadOnly"
                    - "Attach scoped policies to groups: aws iam attach-group-policy --group-name ReadOnly --policy-arn arn:aws:iam::aws:policy/ReadOnlyAccess"
                    - "Move users from direct policies to groups: aws iam add-user-to-group --user-name <user> --group-name <group>"
                    - "Use IAM Access Analyzer to generate least-privilege policies: aws accessanalyzer start-policy-generation --policy-generation-details '{\"principalArn\":\"<user-arn>\"}'"
                console_path:
                  aws: "IAM → User groups → Create group → Attach policies → Add users"
              cloud_checks:
                aws:
                  - service: "iam"
                    method: "list_users"
                    assertion: "no_direct_user_policies"
                  - service: "iam"
                    method: "list_groups"
                    assertion: "rbac_groups_defined"

            - id: "CC6.3.b"
              description: "Verify segregation of duties is enforced for critical functions"
              evidence_type: "iam_policy"
              remediation:
                summary: "Enforce segregation of duties by separating admin, developer, and audit roles."
                steps:
                  aws:
                    - "Verify no user has both admin and audit roles: aws iam list-groups-for-user --user-name <user>"
                    - "Create SCP to prevent role conflicts: aws organizations create-policy --name sod-policy --type SERVICE_CONTROL_POLICY --content <policy-json>"
                    - "Use permission boundaries: aws iam put-user-permissions-boundary --user-name <user> --permissions-boundary arn:aws:iam::<account>:policy/DeveloperBoundary"
                console_path:
                  aws: "IAM → Users → Permissions boundary → Set boundary"
              cloud_checks:
                aws:
                  - service: "iam"
                    method: "list_users"
                    assertion: "segregation_of_duties_enforced"

        CC6.4:
          title: "Physical Access Restrictions"
          description: >
            The entity restricts physical access to facilities and protected
            information assets to authorized personnel to meet the entity's objectives.
          checks:
            - id: "CC6.4.a"
              description: "Verify physical access controls are documented and cloud provider compliance is validated"
              evidence_type: "policy_doc"
              remediation:
                summary: "Document physical security controls and validate cloud provider SOC 2 compliance for data centers."
                steps:
                  aws:
                    - "Download AWS SOC 2 report via Artifact: aws artifact get-report-metadata (or access via console)"
                    - "Store physical security policy: aws s3 cp physical-security-policy.pdf s3://<policy-bucket>/policies/physical-security-policy.pdf"
                    - "Document data center locations: aws ec2 describe-regions --query 'Regions[*].RegionName'"
                console_path:
                  aws: "AWS Artifact → Reports → SOC 2 Type II → Download"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "head_object"
                    assertion: "physical_security_policy_exists"

        CC6.5:
          title: "Logical Access Disposal"
          description: >
            The entity discontinues logical and physical protections over physical
            assets only after the ability to read or recover data and software from
            those assets has been diminished and is no longer required to meet the
            entity's objectives.
          checks:
            - id: "CC6.5.a"
              description: "Verify data disposal and media sanitization procedures are documented and followed"
              evidence_type: "policy_doc"
              remediation:
                summary: "Implement data disposal procedures including encryption key destruction and media sanitization."
                steps:
                  aws:
                    - "Store data disposal policy: aws s3 cp data-disposal-policy.pdf s3://<policy-bucket>/policies/data-disposal-policy.pdf"
                    - "Verify EBS volumes are encrypted: aws ec2 describe-volumes --query 'Volumes[?!Encrypted].[VolumeId,State]'"
                    - "Schedule KMS key deletion for disposed data: aws kms schedule-key-deletion --key-id <key-id> --pending-window-in-days 7"
                    - "Verify S3 bucket lifecycle rules for data expiration: aws s3api get-bucket-lifecycle-configuration --bucket <bucket>"
                console_path:
                  aws: "KMS → Customer managed keys → Schedule key deletion"
              cloud_checks:
                aws:
                  - service: "ec2"
                    method: "describe_volumes"
                    assertion: "all_volumes_encrypted"
                  - service: "kms"
                    method: "list_keys"
                    assertion: "key_rotation_enabled"

        CC6.6:
          title: "Security Measures Against Threats Outside System Boundaries"
          description: >
            The entity implements logical access security measures to protect
            against threats from sources outside its system boundaries, including
            firewalls, intrusion detection, and DDoS protection.
          checks:
            - id: "CC6.6.a"
              description: "Verify network perimeter security controls are implemented"
              evidence_type: "network_config"
              remediation:
                summary: "Implement WAF, Shield, and network firewalls to protect against external threats."
                steps:
                  aws:
                    - "List WAF web ACLs: aws wafv2 list-web-acls --scope REGIONAL"
                    - "Create WAF web ACL: aws wafv2 create-web-acl --name soc2-waf --scope REGIONAL --default-action '{\"Block\":{}}' --visibility-config '{\"SampledRequestsEnabled\":true,\"CloudWatchMetricsEnabled\":true,\"MetricName\":\"soc2-waf\"}' --rules '[]'"
                    - "Enable Shield Advanced: aws shield create-subscription"
                    - "Enable GuardDuty: aws guardduty create-detector --enable"
                    - "Check for open security groups: aws ec2 describe-security-groups --filters Name=ip-permission.cidr,Values=0.0.0.0/0 --query 'SecurityGroups[*].[GroupId,GroupName]'"
                  azure:
                    - "List WAF policies: az network application-gateway waf-policy list"
                    - "Enable DDoS protection: az network ddos-protection create --name ddos-plan --resource-group <rg>"
                  gcp:
                    - "List Cloud Armor policies: gcloud compute security-policies list"
                    - "Create security policy: gcloud compute security-policies create soc2-policy"
                console_path:
                  aws: "WAF & Shield → Web ACLs → Create web ACL"
                  azure: "WAF → Policies → Create"
                  gcp: "Network Security → Cloud Armor → Create policy"
              cloud_checks:
                aws:
                  - service: "wafv2"
                    method: "list_web_acls"
                    assertion: "waf_web_acl_configured"
                  - service: "shield"
                    method: "describe_subscription"
                    assertion: "shield_advanced_enabled"
                  - service: "ec2"
                    method: "describe_security_groups"
                    assertion: "no_unrestricted_ingress"

            - id: "CC6.6.b"
              description: "Verify intrusion detection and prevention systems are active"
              evidence_type: "network_config"
              remediation:
                summary: "Enable GuardDuty and Network Firewall for intrusion detection and prevention."
                steps:
                  aws:
                    - "Verify GuardDuty is enabled: aws guardduty list-detectors"
                    - "Check GuardDuty findings: aws guardduty list-findings --detector-id <detector-id> --finding-criteria '{\"Criterion\":{\"severity\":{\"Gte\":7}}}'"
                    - "Create Network Firewall: aws network-firewall create-firewall --firewall-name soc2-firewall --vpc-id <vpc-id> --subnet-mappings '[{\"SubnetId\":\"<subnet-id>\"}]' --firewall-policy-arn <policy-arn>"
                console_path:
                  aws: "GuardDuty → Findings → Filter by severity"
              cloud_checks:
                aws:
                  - service: "guardduty"
                    method: "list_detectors"
                    assertion: "guardduty_enabled"
                  - service: "network-firewall"
                    method: "list_firewalls"
                    assertion: "network_firewall_deployed"

        CC6.7:
          title: "Restrict Data Transmission, Movement, and Removal"
          description: >
            The entity restricts the transmission, movement, and removal of
            information to authorized internal and external users and processes,
            and protects it during transmission to meet the entity's objectives.
          checks:
            - id: "CC6.7.a"
              description: "Verify encryption in transit is enforced for all data transmissions"
              evidence_type: "encryption_config"
              remediation:
                summary: "Enforce TLS/SSL for all data in transit using ACM certificates and security policies."
                steps:
                  aws:
                    - "List ACM certificates: aws acm list-certificates --query 'CertificateSummaryList[*].[DomainName,Status]'"
                    - "Verify ALB uses HTTPS: aws elbv2 describe-listeners --load-balancer-arn <alb-arn> --query 'Listeners[*].[Protocol,SslPolicy]'"
                    - "Enforce S3 bucket policy requiring TLS: aws s3api put-bucket-policy --bucket <bucket> --policy '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Deny\",\"Principal\":\"*\",\"Action\":\"s3:*\",\"Resource\":[\"arn:aws:s3:::<bucket>\",\"arn:aws:s3:::<bucket>/*\"],\"Condition\":{\"Bool\":{\"aws:SecureTransport\":\"false\"}}}]}'"
                    - "Create Config rule: aws configservice put-config-rule --config-rule '{\"ConfigRuleName\":\"s3-bucket-ssl-requests-only\",\"Source\":{\"Owner\":\"AWS\",\"SourceIdentifier\":\"S3_BUCKET_SSL_REQUESTS_ONLY\"}}'"
                console_path:
                  aws: "Certificate Manager → Certificates → Request certificate; ELB → Listeners → HTTPS"
              cloud_checks:
                aws:
                  - service: "elbv2"
                    method: "describe_listeners"
                    assertion: "all_listeners_use_https"
                  - service: "s3"
                    method: "get_bucket_policy"
                    assertion: "ssl_required_on_all_buckets"

            - id: "CC6.7.b"
              description: "Verify data loss prevention controls restrict unauthorized data movement"
              evidence_type: "dlp_config"
              remediation:
                summary: "Implement DLP controls using Macie, S3 Block Public Access, and VPC endpoints."
                steps:
                  aws:
                    - "Enable Macie: aws macie2 enable-macie"
                    - "Create Macie classification job: aws macie2 create-classification-job --job-type SCHEDULED --s3-job-definition '{\"bucketDefinitions\":[{\"accountId\":\"<account-id>\",\"buckets\":[\"<bucket>\"]}]}' --schedule-frequency-expression 'cron(0 12 ? * MON *)' --name sensitive-data-scan"
                    - "Enable S3 Block Public Access: aws s3control put-public-access-block --account-id <account-id> --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
                    - "Create VPC endpoint for S3: aws ec2 create-vpc-endpoint --vpc-id <vpc-id> --service-name com.amazonaws.<region>.s3 --route-table-ids <rtb-id>"
                console_path:
                  aws: "Macie → Get started → Enable Macie; S3 → Block Public Access"
              cloud_checks:
                aws:
                  - service: "macie2"
                    method: "get_macie_session"
                    assertion: "macie_enabled"
                  - service: "s3control"
                    method: "get_public_access_block"
                    assertion: "public_access_blocked"

        CC6.8:
          title: "Prevention and Detection of Unauthorized or Malicious Software"
          description: >
            The entity implements controls to prevent or detect and act upon the
            introduction of unauthorized or malicious software to meet the entity's
            objectives.
          checks:
            - id: "CC6.8.a"
              description: "Verify malware protection and endpoint security controls are deployed"
              evidence_type: "endpoint_config"
              remediation:
                summary: "Deploy GuardDuty malware protection and SSM for endpoint management."
                steps:
                  aws:
                    - "Enable GuardDuty malware protection: aws guardduty update-detector --detector-id <id> --features '[{\"Name\":\"EBS_MALWARE_PROTECTION\",\"Status\":\"ENABLED\"}]'"
                    - "Verify SSM agent on all instances: aws ssm describe-instance-information --query 'InstanceInformationList[*].[InstanceId,PingStatus,PlatformType]'"
                    - "Run SSM patch compliance scan: aws ssm start-automation-execution --document-name AWS-RunPatchBaseline --parameters '{\"Operation\":[\"Scan\"]}'"
                    - "Check ECR image scan findings: aws ecr describe-image-scan-findings --repository-name <repo> --image-id imageTag=latest"
                console_path:
                  aws: "GuardDuty → Settings → Malware Protection → Enable; Systems Manager → Managed instances"
              cloud_checks:
                aws:
                  - service: "guardduty"
                    method: "get_detector"
                    assertion: "malware_protection_enabled"
                  - service: "ssm"
                    method: "describe_instance_information"
                    assertion: "all_instances_managed_by_ssm"

    # =========================================================================
    # CC7: System Operations
    # =========================================================================
    CC7:
      name: "System Operations"
      controls:

        CC7.1:
          title: "Detection and Monitoring of Security Events"
          description: >
            To meet its objectives, the entity uses detection and monitoring
            procedures to identify changes to configurations that result in the
            introduction of new vulnerabilities and susceptibilities to newly
            discovered vulnerabilities.
          checks:
            - id: "CC7.1.a"
              description: "Verify continuous security monitoring and alerting is configured"
              evidence_type: "monitoring_config"
              remediation:
                summary: "Implement security monitoring using GuardDuty, Security Hub, and CloudWatch alarms."
                steps:
                  aws:
                    - "Enable GuardDuty: aws guardduty create-detector --enable --finding-publishing-frequency FIFTEEN_MINUTES"
                    - "Enable Security Hub: aws securityhub enable-security-hub --enable-default-standards"
                    - "Create CloudWatch alarm for root login: aws cloudwatch put-metric-alarm --alarm-name root-login --namespace CloudTrailMetrics --metric-name RootLoginEventCount --statistic Sum --period 300 --threshold 1 --comparison-operator GreaterThanOrEqualToThreshold --alarm-actions <sns-arn>"
                    - "Create metric filter for unauthorized API calls: aws logs put-metric-filter --log-group-name CloudTrail/logs --filter-name UnauthorizedAPICalls --filter-pattern '{($.errorCode=\"*UnauthorizedAccess*\")||($.errorCode=\"AccessDenied*\")}' --metric-transformations metricName=UnauthorizedAttemptCount,metricNamespace=CloudTrailMetrics,metricValue=1"
                  azure:
                    - "Enable Microsoft Defender for Cloud: az security pricing create --name VirtualMachines --tier Standard"
                    - "Enable Azure Sentinel: az sentinel alert-rule list --workspace-name <ws>"
                console_path:
                  aws: "GuardDuty → Enable; Security Hub → Enable; CloudWatch → Alarms"
                  azure: "Microsoft Defender for Cloud → Environment settings → Enable"
              cloud_checks:
                aws:
                  - service: "guardduty"
                    method: "list_detectors"
                    assertion: "guardduty_enabled"
                  - service: "securityhub"
                    method: "describe_hub"
                    assertion: "security_hub_enabled"
                  - service: "cloudwatch"
                    method: "describe_alarms"
                    assertion: "security_alarms_configured"

            - id: "CC7.1.b"
              description: "Verify configuration change detection is enabled"
              evidence_type: "monitoring_config"
              remediation:
                summary: "Enable AWS Config to detect and record configuration changes."
                steps:
                  aws:
                    - "Enable Config recorder: aws configservice put-configuration-recorder --configuration-recorder name=default,roleARN=<role-arn> --recording-group allSupported=true"
                    - "Start recording: aws configservice start-configuration-recorder --configuration-recorder-name default"
                    - "Set delivery channel: aws configservice put-delivery-channel --delivery-channel '{\"name\":\"default\",\"s3BucketName\":\"<config-bucket>\",\"snsTopicARN\":\"<sns-arn>\",\"configSnapshotDeliveryProperties\":{\"deliveryFrequency\":\"Six_Hours\"}}'"
                    - "Verify status: aws configservice describe-configuration-recorder-status"
                console_path:
                  aws: "AWS Config → Settings → Recording → Turn on"
              cloud_checks:
                aws:
                  - service: "config"
                    method: "describe_configuration_recorder_status"
                    assertion: "config_recorder_active"

        CC7.2:
          title: "Monitoring System Components for Anomalous Behavior"
          description: >
            The entity monitors system components and the operation of those
            components for anomalies that are indicative of malicious acts, natural
            disasters, and errors affecting the entity's ability to meet its objectives.
          checks:
            - id: "CC7.2.a"
              description: "Verify anomaly detection is enabled for system components"
              evidence_type: "monitoring_config"
              remediation:
                summary: "Enable anomaly detection using CloudWatch Anomaly Detection and GuardDuty."
                steps:
                  aws:
                    - "Enable CloudWatch anomaly detection: aws cloudwatch put-anomaly-detector --namespace AWS/EC2 --metric-name CPUUtilization --stat Average"
                    - "Create anomaly alarm: aws cloudwatch put-metric-alarm --alarm-name cpu-anomaly --namespace AWS/EC2 --metric-name CPUUtilization --threshold-metric-id ad1 --comparison-operator LessThanLowerOrGreaterThanUpperThreshold --evaluation-periods 3 --alarm-actions <sns-arn> --metrics '[{\"Id\":\"m1\",\"MetricStat\":{\"Metric\":{\"Namespace\":\"AWS/EC2\",\"MetricName\":\"CPUUtilization\"},\"Period\":300,\"Stat\":\"Average\"}},{\"Id\":\"ad1\",\"Expression\":\"ANOMALY_DETECTION_BAND(m1,2)\"}]'"
                    - "Review GuardDuty anomaly findings: aws guardduty list-findings --detector-id <id> --finding-criteria '{\"Criterion\":{\"type\":{\"Eq\":[\"UnauthorizedAccess:IAMUser/InstanceCredentialExfiltration.OutsideAWS\"]}}}'"
                console_path:
                  aws: "CloudWatch → Alarms → Create alarm → Anomaly detection"
              cloud_checks:
                aws:
                  - service: "cloudwatch"
                    method: "describe_anomaly_detectors"
                    assertion: "anomaly_detection_configured"

        CC7.3:
          title: "Incident Response Procedures"
          description: >
            The entity evaluates security events to determine whether they could
            or have resulted in a failure of the entity to meet its objectives
            (security incidents) and, if so, takes actions to prevent or address
            such failures.
          checks:
            - id: "CC7.3.a"
              description: "Verify incident response plan is documented, tested, and current"
              evidence_type: "policy_doc"
              remediation:
                summary: "Maintain an incident response plan with defined roles, escalation procedures, and annual testing."
                steps:
                  aws:
                    - "Store incident response plan: aws s3 cp incident-response-plan.pdf s3://<policy-bucket>/policies/incident-response-plan.pdf"
                    - "Create incident response SNS topic: aws sns create-topic --name incident-response"
                    - "Subscribe on-call team: aws sns subscribe --topic-arn <topic-arn> --protocol email --notification-endpoint oncall@<domain>"
                    - "Create EventBridge rule for critical events: aws events put-rule --name critical-security-events --event-pattern '{\"source\":[\"aws.guardduty\"],\"detail\":{\"severity\":[{\"numeric\":[\">\",7]}]}}'"
                    - "Set rule target to SNS: aws events put-targets --rule critical-security-events --targets '[{\"Id\":\"ir-notify\",\"Arn\":\"<sns-topic-arn>\"}]'"
                console_path:
                  aws: "S3 → <policy-bucket> → policies → incident-response-plan.pdf"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "head_object"
                    assertion: "incident_response_plan_exists"
                  - service: "sns"
                    method: "list_topics"
                    assertion: "incident_response_topic_exists"

            - id: "CC7.3.b"
              description: "Verify incident detection and triage procedures are automated"
              evidence_type: "automation_config"
              remediation:
                summary: "Automate incident detection and triage using GuardDuty and EventBridge."
                steps:
                  aws:
                    - "List GuardDuty findings by severity: aws guardduty list-findings --detector-id <id> --sort-criteria '{\"AttributeName\":\"severity\",\"OrderBy\":\"DESC\"}'"
                    - "Create automated remediation via SSM: aws ssm create-document --name IsolateCompromisedInstance --document-type Automation --content '{\"schemaVersion\":\"0.3\",\"mainSteps\":[{\"name\":\"isolateInstance\",\"action\":\"aws:changeInstanceState\",\"inputs\":{\"InstanceIds\":[\"{{InstanceId}}\"],\"DesiredState\":\"stopped\"}}]}'"
                console_path:
                  aws: "GuardDuty → Findings; EventBridge → Rules → Create rule"
              cloud_checks:
                aws:
                  - service: "events"
                    method: "list_rules"
                    assertion: "incident_response_rules_configured"

        CC7.4:
          title: "Incident Response and Recovery"
          description: >
            The entity responds to identified security incidents by executing a
            defined incident response program to understand, contain, remediate,
            and communicate security incidents, as appropriate.
          checks:
            - id: "CC7.4.a"
              description: "Verify incident containment, eradication, and recovery procedures are defined and tested"
              evidence_type: "policy_doc"
              remediation:
                summary: "Document and test incident containment, eradication, and recovery procedures at least annually."
                steps:
                  aws:
                    - "Store IR playbooks: aws s3 sync ./playbooks/ s3://<policy-bucket>/incident-response/playbooks/"
                    - "Create isolation security group: aws ec2 create-security-group --group-name incident-isolation --description 'No inbound/outbound for incident isolation' --vpc-id <vpc-id>"
                    - "Revoke all rules from isolation SG: aws ec2 revoke-security-group-egress --group-id <sg-id> --ip-permissions '[{\"IpProtocol\":\"-1\",\"IpRanges\":[{\"CidrIp\":\"0.0.0.0/0\"}]}]'"
                    - "Create forensic snapshot automation: aws ssm create-document --name CreateForensicSnapshot --document-type Automation --content <automation-doc>"
                console_path:
                  aws: "S3 → <policy-bucket> → incident-response → playbooks/"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "list_objects_v2"
                    assertion: "ir_playbooks_exist"
                  - service: "ec2"
                    method: "describe_security_groups"
                    assertion: "isolation_security_group_exists"

        CC7.5:
          title: "Post-Incident Analysis and Improvement"
          description: >
            The entity identifies, develops, and implements activities to recover
            from identified security incidents and uses information from the
            incidents to learn and improve.
          checks:
            - id: "CC7.5.a"
              description: "Verify post-incident review (lessons learned) process is documented and followed"
              evidence_type: "policy_doc"
              remediation:
                summary: "Conduct post-incident reviews within 72 hours and store lessons learned for continuous improvement."
                steps:
                  aws:
                    - "Store post-incident reports: aws s3 cp post-incident-report-<incident-id>.pdf s3://<policy-bucket>/incident-response/post-incident/"
                    - "List historical incident reports: aws s3 ls s3://<policy-bucket>/incident-response/post-incident/"
                    - "Track improvement actions in DynamoDB: aws dynamodb put-item --table-name IncidentImprovements --item '{\"incident_id\":{\"S\":\"<id>\"},\"improvement\":{\"S\":\"<action>\"},\"status\":{\"S\":\"open\"},\"due_date\":{\"S\":\"<date>\"}}'"
                console_path:
                  aws: "S3 → <policy-bucket> → incident-response → post-incident/"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "list_objects_v2"
                    assertion: "post_incident_reports_exist"

    # =========================================================================
    # CC8: Change Management
    # =========================================================================
    CC8:
      name: "Change Management"
      controls:

        CC8.1:
          title: "Changes to Infrastructure, Data, Software, and Procedures"
          description: >
            The entity authorizes, designs, develops or acquires, configures,
            documents, tests, approves, and implements changes to infrastructure,
            data, software, and procedures to meet its objectives.
          checks:
            - id: "CC8.1.a"
              description: "Verify change management process with documented approval workflows"
              evidence_type: "policy_doc"
              remediation:
                summary: "Implement a formal change management process with approval, testing, and rollback procedures."
                steps:
                  aws:
                    - "Store change management policy: aws s3 cp change-management-policy.pdf s3://<policy-bucket>/policies/change-management-policy.pdf"
                    - "Enable AWS Config for change tracking: aws configservice start-configuration-recorder --configuration-recorder-name default"
                    - "Use CodePipeline for approved deployments: aws codepipeline list-pipelines"
                    - "Add manual approval stage: aws codepipeline update-pipeline --pipeline '{\"name\":\"<pipeline>\",\"stages\":[{\"name\":\"Approval\",\"actions\":[{\"name\":\"ManualApproval\",\"actionTypeId\":{\"category\":\"Approval\",\"owner\":\"AWS\",\"provider\":\"Manual\",\"version\":\"1\"},\"configuration\":{\"NotificationArn\":\"<sns-arn>\"}}]}]}'"
                console_path:
                  aws: "CodePipeline → Pipelines → Edit → Add approval stage"
              cloud_checks:
                aws:
                  - service: "codepipeline"
                    method: "list_pipelines"
                    assertion: "deployment_pipelines_exist"
                  - service: "config"
                    method: "describe_configuration_recorder_status"
                    assertion: "config_recorder_active"

            - id: "CC8.1.b"
              description: "Verify changes are tested prior to deployment to production"
              evidence_type: "deployment_config"
              remediation:
                summary: "Implement pre-production testing stages in CI/CD pipelines."
                steps:
                  aws:
                    - "List CodeBuild projects: aws codebuild list-projects"
                    - "Verify test stage in pipeline: aws codepipeline get-pipeline --name <pipeline> --query 'pipeline.stages[?name==`Test`]'"
                    - "Create CodeBuild test project: aws codebuild create-project --name unit-tests --source '{\"type\":\"CODEPIPELINE\"}' --artifacts '{\"type\":\"CODEPIPELINE\"}' --environment '{\"type\":\"LINUX_CONTAINER\",\"image\":\"aws/codebuild/standard:7.0\",\"computeType\":\"BUILD_GENERAL1_SMALL\"}'"
                    - "Verify separate staging environment: aws ec2 describe-instances --filters Name=tag:Environment,Values=staging --query 'Reservations[*].Instances[*].[InstanceId,Tags]'"
                console_path:
                  aws: "CodePipeline → Pipelines → Edit → Add test stage"
              cloud_checks:
                aws:
                  - service: "codepipeline"
                    method: "get_pipeline"
                    assertion: "test_stage_in_pipeline"
                  - service: "codebuild"
                    method: "list_projects"
                    assertion: "test_projects_exist"

            - id: "CC8.1.c"
              description: "Verify rollback procedures exist and are tested"
              evidence_type: "deployment_config"
              remediation:
                summary: "Implement automated rollback capabilities in deployment pipelines."
                steps:
                  aws:
                    - "Verify CloudFormation rollback: aws cloudformation describe-stacks --query 'Stacks[*].[StackName,RollbackConfiguration]'"
                    - "Enable CodeDeploy automatic rollback: aws deploy update-deployment-group --application-name <app> --deployment-group-name <group> --auto-rollback-configuration '{\"enabled\":true,\"events\":[\"DEPLOYMENT_FAILURE\",\"DEPLOYMENT_STOP_ON_ALARM\"]}'"
                    - "List RDS automated backups for database rollback: aws rds describe-db-instances --query 'DBInstances[*].[DBInstanceIdentifier,BackupRetentionPeriod]'"
                console_path:
                  aws: "CodeDeploy → Applications → Deployment groups → Edit → Rollbacks → Enable"
              cloud_checks:
                aws:
                  - service: "deploy"
                    method: "get_deployment_group"
                    assertion: "auto_rollback_enabled"

    # =========================================================================
    # CC9: Risk Mitigation
    # =========================================================================
    CC9:
      name: "Risk Mitigation"
      controls:

        CC9.1:
          title: "Risk Identification and Mitigation"
          description: >
            The entity identifies, selects, and develops risk mitigation activities
            for risks arising from potential business disruptions, including vendor
            and business partner dependencies.
          checks:
            - id: "CC9.1.a"
              description: "Verify risk mitigation strategies are documented and implemented"
              evidence_type: "risk_register"
              remediation:
                summary: "Document risk mitigation strategies in the risk register and implement technical controls."
                steps:
                  aws:
                    - "Store risk treatment plan: aws s3 cp risk-treatment-plan.xlsx s3://<policy-bucket>/risk/risk-treatment-plan.xlsx"
                    - "Review Security Hub compliance score: aws securityhub get-findings --filters '{\"ComplianceStatus\":[{\"Value\":\"FAILED\",\"Comparison\":\"EQUALS\"}]}' --query 'Findings | length(@)'"
                    - "Enable AWS Backup for data protection: aws backup create-backup-plan --backup-plan '{\"BackupPlanName\":\"soc2-backup\",\"Rules\":[{\"RuleName\":\"daily-backup\",\"TargetBackupVaultName\":\"Default\",\"ScheduleExpression\":\"cron(0 5 ? * * *)\",\"Lifecycle\":{\"DeleteAfterDays\":90}}]}'"
                console_path:
                  aws: "S3 → <policy-bucket> → risk → risk-treatment-plan.xlsx"
              cloud_checks:
                aws:
                  - service: "backup"
                    method: "list_backup_plans"
                    assertion: "backup_plan_exists"
                  - service: "s3"
                    method: "head_object"
                    assertion: "risk_treatment_plan_exists"

        CC9.2:
          title: "Vendor and Business Partner Risk Management"
          description: >
            The entity assesses and manages risks associated with vendors and
            business partners, including due diligence, contractual requirements,
            and ongoing monitoring.
          checks:
            - id: "CC9.2.a"
              description: "Verify vendor risk management program with due diligence and ongoing monitoring"
              evidence_type: "policy_doc"
              remediation:
                summary: "Maintain a vendor risk management program with documented assessments and contractual security requirements."
                steps:
                  aws:
                    - "Store vendor management policy: aws s3 cp vendor-management-policy.pdf s3://<policy-bucket>/policies/vendor-management-policy.pdf"
                    - "Store vendor risk assessments: aws s3 sync ./vendor-assessments/ s3://<policy-bucket>/risk/vendor-assessments/"
                    - "List third-party IAM roles (vendor access): aws iam list-roles --query 'Roles[?contains(AssumeRolePolicyDocument | to_string(@), `arn:aws:iam::`) && !contains(Arn, `aws-service-role`)].[RoleName,Description]'"
                    - "Review cross-account access: aws iam get-role --role-name <vendor-role> --query 'Role.AssumeRolePolicyDocument'"
                console_path:
                  aws: "S3 → <policy-bucket> → risk → vendor-assessments/"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "list_objects_v2"
                    assertion: "vendor_assessments_exist"
                  - service: "iam"
                    method: "list_roles"
                    assertion: "vendor_roles_have_conditions"

    # =========================================================================
    # A1: Availability
    # =========================================================================
    A1:
      name: "Availability"
      controls:

        A1.1:
          title: "Availability Commitments and System Performance Monitoring"
          description: >
            The entity maintains, monitors, and evaluates current processing
            capacity and use of system components (infrastructure, data, and
            software) to manage capacity demand and to enable the implementation
            of additional capacity to help meet its availability commitments.
          checks:
            - id: "A1.1.a"
              description: "Verify capacity monitoring and auto-scaling is configured"
              evidence_type: "monitoring_config"
              remediation:
                summary: "Implement capacity monitoring and auto-scaling to meet availability commitments."
                steps:
                  aws:
                    - "List Auto Scaling groups: aws autoscaling describe-auto-scaling-groups --query 'AutoScalingGroups[*].[AutoScalingGroupName,MinSize,MaxSize,DesiredCapacity]'"
                    - "Create scaling policy: aws autoscaling put-scaling-policy --auto-scaling-group-name <asg> --policy-name cpu-scale-out --policy-type TargetTrackingScaling --target-tracking-configuration '{\"TargetValue\":70.0,\"PredefinedMetricSpecification\":{\"PredefinedMetricType\":\"ASGAverageCPUUtilization\"}}'"
                    - "Create CloudWatch alarms for capacity: aws cloudwatch put-metric-alarm --alarm-name high-cpu --namespace AWS/EC2 --metric-name CPUUtilization --statistic Average --period 300 --threshold 85 --comparison-operator GreaterThanThreshold --alarm-actions <sns-arn>"
                    - "Check RDS capacity: aws rds describe-db-instances --query 'DBInstances[*].[DBInstanceIdentifier,DBInstanceClass,AllocatedStorage]'"
                  azure:
                    - "List VM scale sets: az vmss list --query '[].{Name:name,Capacity:sku.capacity}'"
                    - "Enable autoscale: az monitor autoscale create --resource-group <rg> --resource <vmss-id> --resource-type Microsoft.Compute/virtualMachineScaleSets --min-count 2 --max-count 10 --count 2"
                  gcp:
                    - "List instance groups: gcloud compute instance-groups managed list"
                    - "Set autoscaling: gcloud compute instance-groups managed set-autoscaling <group> --max-num-replicas 10 --target-cpu-utilization 0.7 --zone <zone>"
                console_path:
                  aws: "EC2 → Auto Scaling Groups → Select group → Scaling policies"
                  azure: "Virtual Machine Scale Sets → Scaling → Custom autoscale"
                  gcp: "Compute Engine → Instance groups → Autoscaling"
              cloud_checks:
                aws:
                  - service: "autoscaling"
                    method: "describe_auto_scaling_groups"
                    assertion: "auto_scaling_configured"
                  - service: "cloudwatch"
                    method: "describe_alarms"
                    assertion: "capacity_alarms_configured"
                azure:
                  - service: "compute"
                    method: "list_virtual_machine_scale_sets"
                    assertion: "autoscale_configured"

            - id: "A1.1.b"
              description: "Verify SLA and availability targets are documented and monitored"
              evidence_type: "policy_doc"
              remediation:
                summary: "Document SLA commitments and implement uptime monitoring dashboards."
                steps:
                  aws:
                    - "Store SLA documentation: aws s3 cp sla-commitments.pdf s3://<policy-bucket>/policies/sla-commitments.pdf"
                    - "Create CloudWatch dashboard: aws cloudwatch put-dashboard --dashboard-name availability-dashboard --dashboard-body '{\"widgets\":[{\"type\":\"metric\",\"properties\":{\"metrics\":[[\"AWS/ELB\",\"HealthyHostCount\"],[\"AWS/ELB\",\"UnHealthyHostCount\"]],\"period\":300,\"title\":\"Load Balancer Health\"}}]}'"
                    - "Create Route 53 health check: aws route53 create-health-check --caller-reference <ref> --health-check-config '{\"IPAddress\":\"<ip>\",\"Port\":443,\"Type\":\"HTTPS\",\"ResourcePath\":\"/health\",\"RequestInterval\":30,\"FailureThreshold\":3}'"
                console_path:
                  aws: "CloudWatch → Dashboards → Create dashboard"
              cloud_checks:
                aws:
                  - service: "route53"
                    method: "list_health_checks"
                    assertion: "health_checks_configured"
                  - service: "cloudwatch"
                    method: "list_dashboards"
                    assertion: "availability_dashboard_exists"

        A1.2:
          title: "Environmental Protections and Recovery Infrastructure"
          description: >
            The entity authorizes, designs, develops or acquires, implements,
            operates, approves, maintains, and monitors environmental protections,
            software, data back-up processes, and recovery infrastructure to meet
            its objectives.
          checks:
            - id: "A1.2.a"
              description: "Verify backup and recovery procedures are implemented and tested"
              evidence_type: "backup_config"
              remediation:
                summary: "Implement automated backup with cross-region replication and regular recovery testing."
                steps:
                  aws:
                    - "Create backup plan: aws backup create-backup-plan --backup-plan '{\"BackupPlanName\":\"soc2-backup\",\"Rules\":[{\"RuleName\":\"daily\",\"TargetBackupVaultName\":\"Default\",\"ScheduleExpression\":\"cron(0 5 ? * * *)\",\"StartWindowMinutes\":60,\"CompletionWindowMinutes\":180,\"Lifecycle\":{\"DeleteAfterDays\":90},\"CopyActions\":[{\"DestinationBackupVaultArn\":\"arn:aws:backup:<dr-region>:<account>:backup-vault:Default\",\"Lifecycle\":{\"DeleteAfterDays\":90}}]}]}'"
                    - "Assign resources to backup plan: aws backup create-backup-selection --backup-plan-id <plan-id> --backup-selection '{\"SelectionName\":\"all-tagged\",\"IamRoleArn\":\"<role-arn>\",\"ListOfTags\":[{\"ConditionType\":\"STRINGEQUALS\",\"ConditionKey\":\"Backup\",\"ConditionValue\":\"true\"}]}'"
                    - "List recovery points: aws backup list-recovery-points-by-backup-vault --backup-vault-name Default --query 'RecoveryPoints[*].[ResourceArn,CreationDate,Status]'"
                    - "Verify RDS automated backups: aws rds describe-db-instances --query 'DBInstances[*].[DBInstanceIdentifier,BackupRetentionPeriod,MultiAZ]'"
                  azure:
                    - "Create Recovery Services vault: az backup vault create --name soc2-vault --resource-group <rg> --location <loc>"
                    - "Enable VM backup: az backup protection enable-for-vm --resource-group <rg> --vault-name soc2-vault --vm <vm-name> --policy-name DefaultPolicy"
                  gcp:
                    - "Create snapshot schedule: gcloud compute resource-policies create snapshot-schedule soc2-schedule --max-retention-days 90 --daily-schedule --start-time 04:00"
                console_path:
                  aws: "AWS Backup → Backup plans → Create plan"
                  azure: "Recovery Services vaults → Create → Backup policies"
                  gcp: "Compute Engine → Snapshots → Create snapshot schedule"
              cloud_checks:
                aws:
                  - service: "backup"
                    method: "list_backup_plans"
                    assertion: "backup_plan_exists"
                  - service: "rds"
                    method: "describe_db_instances"
                    assertion: "automated_backups_enabled"
                azure:
                  - service: "recoveryservices"
                    method: "list_vaults"
                    assertion: "recovery_vault_exists"

            - id: "A1.2.b"
              description: "Verify multi-AZ or multi-region deployment for critical systems"
              evidence_type: "architecture_config"
              remediation:
                summary: "Deploy critical systems across multiple availability zones or regions for resilience."
                steps:
                  aws:
                    - "Check RDS Multi-AZ: aws rds describe-db-instances --query 'DBInstances[*].[DBInstanceIdentifier,MultiAZ,AvailabilityZone]'"
                    - "Enable Multi-AZ for RDS: aws rds modify-db-instance --db-instance-identifier <db-id> --multi-az --apply-immediately"
                    - "Check ELB cross-zone: aws elbv2 describe-load-balancers --query 'LoadBalancers[*].[LoadBalancerName,AvailabilityZones[*].ZoneName]'"
                    - "Verify ASG spans multiple AZs: aws autoscaling describe-auto-scaling-groups --query 'AutoScalingGroups[*].[AutoScalingGroupName,AvailabilityZones]'"
                console_path:
                  aws: "RDS → Databases → Modify → Multi-AZ deployment → Yes"
              cloud_checks:
                aws:
                  - service: "rds"
                    method: "describe_db_instances"
                    assertion: "critical_databases_multi_az"
                  - service: "elbv2"
                    method: "describe_load_balancers"
                    assertion: "load_balancers_multi_az"

        A1.3:
          title: "Business Continuity and Disaster Recovery"
          description: >
            The entity tests recovery plan procedures supporting system recovery
            to meet its objectives, including BCP and DR plan testing on at least
            an annual basis.
          checks:
            - id: "A1.3.a"
              description: "Verify business continuity and disaster recovery plans are documented and tested"
              evidence_type: "policy_doc"
              remediation:
                summary: "Maintain BCP/DR plans and conduct annual testing with documented results."
                steps:
                  aws:
                    - "Store BCP/DR plan: aws s3 cp bcp-dr-plan.pdf s3://<policy-bucket>/policies/bcp-dr-plan.pdf"
                    - "Store DR test results: aws s3 cp dr-test-results-<date>.pdf s3://<policy-bucket>/audits/dr-tests/"
                    - "Use AWS Resilience Hub for resilience assessment: aws resiliencehub create-app --name soc2-app --assessment-schedule Disabled"
                    - "Run resilience assessment: aws resiliencehub start-app-assessment --app-arn <app-arn> --app-version <version> --assessment-name annual-dr-test"
                    - "List assessment results: aws resiliencehub list-app-assessments --app-arn <app-arn>"
                console_path:
                  aws: "Resilience Hub → Applications → Create → Run assessment"
              cloud_checks:
                aws:
                  - service: "resiliencehub"
                    method: "list_apps"
                    assertion: "resilience_assessment_exists"
                  - service: "s3"
                    method: "list_objects_v2"
                    assertion: "dr_test_results_exist"

    # =========================================================================
    # C1: Confidentiality
    # =========================================================================
    C1:
      name: "Confidentiality"
      controls:

        C1.1:
          title: "Identification and Maintenance of Confidential Information"
          description: >
            The entity identifies and maintains confidential information to meet
            the entity's objectives related to confidentiality, including data
            classification, labeling, and handling procedures.
          checks:
            - id: "C1.1.a"
              description: "Verify data classification policy and confidential data identification procedures exist"
              evidence_type: "policy_doc"
              remediation:
                summary: "Implement data classification policy and use Macie for automated sensitive data discovery."
                steps:
                  aws:
                    - "Store data classification policy: aws s3 cp data-classification-policy.pdf s3://<policy-bucket>/policies/data-classification-policy.pdf"
                    - "Enable Macie for sensitive data discovery: aws macie2 enable-macie"
                    - "Create classification job: aws macie2 create-classification-job --job-type ONE_TIME --s3-job-definition '{\"bucketDefinitions\":[{\"accountId\":\"<account>\",\"buckets\":[\"<bucket>\"]}]}' --name data-classification-scan"
                    - "List Macie findings: aws macie2 list-findings --finding-criteria '{\"criterion\":{\"severity.description\":{\"eq\":[\"High\"]}}}'"
                    - "Tag S3 buckets with classification level: aws s3api put-bucket-tagging --bucket <bucket> --tagging 'TagSet=[{Key=DataClassification,Value=Confidential}]'"
                  azure:
                    - "Create sensitivity labels: az security setting list"
                    - "Enable Azure Purview for data classification: az purview account create --name <account> --resource-group <rg>"
                  gcp:
                    - "Enable DLP API: gcloud services enable dlp.googleapis.com"
                    - "Run DLP scan: gcloud dlp content inspect --content '<sample>' --info-types CREDIT_CARD_NUMBER EMAIL_ADDRESS"
                console_path:
                  aws: "Macie → Get started → Enable Macie → Create job"
                  azure: "Microsoft Purview → Information protection → Labels"
                  gcp: "Security → Data Loss Prevention → Create job trigger"
              cloud_checks:
                aws:
                  - service: "macie2"
                    method: "get_macie_session"
                    assertion: "macie_enabled"
                  - service: "macie2"
                    method: "list_classification_jobs"
                    assertion: "classification_jobs_active"
                azure:
                  - service: "purview"
                    method: "list_accounts"
                    assertion: "purview_enabled"

            - id: "C1.1.b"
              description: "Verify encryption at rest is enabled for all confidential data stores"
              evidence_type: "encryption_config"
              remediation:
                summary: "Enable encryption at rest for all data stores containing confidential information."
                steps:
                  aws:
                    - "Check S3 bucket encryption: aws s3api get-bucket-encryption --bucket <bucket>"
                    - "Enable default S3 encryption: aws s3api put-bucket-encryption --bucket <bucket> --server-side-encryption-configuration '{\"Rules\":[{\"ApplyServerSideEncryptionByDefault\":{\"SSEAlgorithm\":\"aws:kms\",\"KMSMasterKeyID\":\"<key-id>\"},\"BucketKeyEnabled\":true}]}'"
                    - "Check RDS encryption: aws rds describe-db-instances --query 'DBInstances[?!StorageEncrypted].[DBInstanceIdentifier]'"
                    - "Check EBS encryption: aws ec2 describe-volumes --query 'Volumes[?!Encrypted].[VolumeId,State]'"
                    - "Enable default EBS encryption: aws ec2 enable-ebs-encryption-by-default"
                    - "Create Config rule: aws configservice put-config-rule --config-rule '{\"ConfigRuleName\":\"encrypted-volumes\",\"Source\":{\"Owner\":\"AWS\",\"SourceIdentifier\":\"ENCRYPTED_VOLUMES\"}}'"
                console_path:
                  aws: "S3 → Bucket → Properties → Default encryption → Edit → SSE-KMS"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "get_bucket_encryption"
                    assertion: "all_buckets_encrypted"
                  - service: "rds"
                    method: "describe_db_instances"
                    assertion: "all_databases_encrypted"
                  - service: "ec2"
                    method: "describe_volumes"
                    assertion: "all_volumes_encrypted"

        C1.2:
          title: "Disposal of Confidential Information"
          description: >
            The entity disposes of confidential information to meet the entity's
            objectives related to confidentiality, including secure deletion,
            media sanitization, and key destruction.
          checks:
            - id: "C1.2.a"
              description: "Verify confidential data disposal procedures and retention policies"
              evidence_type: "policy_doc"
              remediation:
                summary: "Implement data retention and disposal policies with automated lifecycle management."
                steps:
                  aws:
                    - "Store data retention policy: aws s3 cp data-retention-policy.pdf s3://<policy-bucket>/policies/data-retention-policy.pdf"
                    - "Configure S3 lifecycle rules for data expiration: aws s3api put-bucket-lifecycle-configuration --bucket <bucket> --lifecycle-configuration '{\"Rules\":[{\"ID\":\"expire-confidential\",\"Status\":\"Enabled\",\"Filter\":{\"Tag\":{\"Key\":\"DataClassification\",\"Value\":\"Confidential\"}},\"Expiration\":{\"Days\":365}}]}'"
                    - "Schedule KMS key deletion for disposed data: aws kms schedule-key-deletion --key-id <key-id> --pending-window-in-days 30"
                    - "Verify no unencrypted snapshots: aws ec2 describe-snapshots --owner-ids self --query 'Snapshots[?!Encrypted].[SnapshotId,StartTime]'"
                console_path:
                  aws: "S3 → Bucket → Management → Lifecycle rules → Create rule"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "get_bucket_lifecycle_configuration"
                    assertion: "lifecycle_rules_configured"
                  - service: "ec2"
                    method: "describe_snapshots"
                    assertion: "all_snapshots_encrypted"

    # =========================================================================
    # PI1: Processing Integrity
    # =========================================================================
    PI1:
      name: "Processing Integrity"
      controls:

        PI1.1:
          title: "Accurate and Complete Processing"
          description: >
            The entity implements policies and procedures over system processing
            to result in products, services, and reporting to meet the entity's
            objectives related to processing integrity.
          checks:
            - id: "PI1.1.a"
              description: "Verify input validation and data integrity controls are implemented"
              evidence_type: "application_config"
              remediation:
                summary: "Implement input validation, API schema enforcement, and data integrity checks in application code."
                steps:
                  aws:
                    - "Enable API Gateway request validation: aws apigateway update-rest-api --rest-api-id <api-id> --patch-operations op=replace,path=/minimumCompressionSize,value=0"
                    - "Create API Gateway request validator: aws apigateway create-request-validator --rest-api-id <api-id> --name validate-body --validate-request-body --validate-request-parameters"
                    - "Enable WAF SQL injection protection: aws wafv2 create-web-acl --name api-protection --scope REGIONAL --default-action '{\"Allow\":{}}' --rules '[{\"Name\":\"SQLiProtection\",\"Priority\":1,\"Statement\":{\"SqliMatchStatement\":{\"FieldToMatch\":{\"Body\":{}},\"TextTransformations\":[{\"Priority\":0,\"Type\":\"NONE\"}]}},\"Action\":{\"Block\":{}},\"VisibilityConfig\":{\"SampledRequestsEnabled\":true,\"CloudWatchMetricsEnabled\":true,\"MetricName\":\"sqli\"}}]' --visibility-config '{\"SampledRequestsEnabled\":true,\"CloudWatchMetricsEnabled\":true,\"MetricName\":\"api-waf\"}'"
                console_path:
                  aws: "API Gateway → APIs → Select API → Request validators"
              cloud_checks:
                aws:
                  - service: "apigateway"
                    method: "get_request_validators"
                    assertion: "request_validation_enabled"
                  - service: "wafv2"
                    method: "list_web_acls"
                    assertion: "waf_protects_apis"

        PI1.2:
          title: "System Inputs and Outputs"
          description: >
            The entity implements policies and procedures over system inputs to
            result in products, services, and reporting to meet the entity's objectives,
            ensuring completeness, accuracy, and timeliness.
          checks:
            - id: "PI1.2.a"
              description: "Verify data input completeness and accuracy controls"
              evidence_type: "application_config"
              remediation:
                summary: "Implement data validation rules, checksums, and reconciliation procedures for system inputs."
                steps:
                  aws:
                    - "Enable DynamoDB stream for audit trail: aws dynamodb update-table --table-name <table> --stream-specification StreamEnabled=true,StreamViewType=NEW_AND_OLD_IMAGES"
                    - "Create Lambda function for input validation: aws lambda create-function --function-name input-validator --runtime python3.12 --handler index.handler --role <role-arn> --zip-file fileb://validator.zip"
                    - "Set up dead-letter queue for failed validations: aws sqs create-queue --queue-name validation-failures-dlq"
                console_path:
                  aws: "DynamoDB → Tables → Select table → Exports and streams → DynamoDB stream details"
              cloud_checks:
                aws:
                  - service: "dynamodb"
                    method: "describe_table"
                    assertion: "stream_enabled_for_audit"

        PI1.3:
          title: "Processing Accuracy and Timeliness"
          description: >
            The entity implements policies and procedures over processing activities
            to result in products, services, and reporting to meet the entity's
            objectives, ensuring processing is accurate, complete, and timely.
          checks:
            - id: "PI1.3.a"
              description: "Verify processing monitoring and SLA tracking for timeliness"
              evidence_type: "monitoring_config"
              remediation:
                summary: "Monitor processing latency and accuracy with CloudWatch metrics and alarms."
                steps:
                  aws:
                    - "Create custom CloudWatch metric for processing time: aws cloudwatch put-metric-data --namespace Application --metric-name ProcessingLatency --value <ms> --unit Milliseconds"
                    - "Create alarm for slow processing: aws cloudwatch put-metric-alarm --alarm-name slow-processing --namespace Application --metric-name ProcessingLatency --statistic Average --period 300 --threshold 5000 --comparison-operator GreaterThanThreshold --alarm-actions <sns-arn>"
                    - "Monitor Step Functions execution: aws stepfunctions list-executions --state-machine-arn <arn> --status-filter FAILED"
                console_path:
                  aws: "CloudWatch → Metrics → Application → ProcessingLatency"
              cloud_checks:
                aws:
                  - service: "cloudwatch"
                    method: "describe_alarms"
                    assertion: "processing_latency_alarms_configured"

        PI1.4:
          title: "Output Completeness, Accuracy, and Distribution"
          description: >
            The entity implements policies and procedures to make available or
            deliver output completely, accurately, and timely in accordance with
            specifications to meet the entity's objectives.
          checks:
            - id: "PI1.4.a"
              description: "Verify output validation and distribution controls"
              evidence_type: "application_config"
              remediation:
                summary: "Implement output validation checksums and secure distribution channels."
                steps:
                  aws:
                    - "Enable S3 object integrity checking: aws s3api put-object --bucket <bucket> --key <key> --body <file> --checksum-algorithm SHA256"
                    - "Verify object checksums: aws s3api head-object --bucket <bucket> --key <key> --checksum-mode ENABLED"
                    - "Create CloudWatch metric for output validation: aws cloudwatch put-metric-data --namespace Application --metric-name OutputValidationFailures --value 0 --unit Count"
                    - "Set up alarm: aws cloudwatch put-metric-alarm --alarm-name output-validation-failures --namespace Application --metric-name OutputValidationFailures --statistic Sum --period 300 --threshold 0 --comparison-operator GreaterThanThreshold --alarm-actions <sns-arn>"
                console_path:
                  aws: "S3 → Upload → Additional checksums → SHA-256"
              cloud_checks:
                aws:
                  - service: "cloudwatch"
                    method: "describe_alarms"
                    assertion: "output_validation_alarms_configured"

        PI1.5:
          title: "Error Handling and Correction"
          description: >
            The entity implements policies and procedures to store inputs, items
            in processing, and outputs completely, accurately, and timely to meet
            the entity's objectives, including error handling and correction procedures.
          checks:
            - id: "PI1.5.a"
              description: "Verify error handling, dead-letter queues, and error correction procedures"
              evidence_type: "application_config"
              remediation:
                summary: "Implement dead-letter queues, error logging, and automated retry mechanisms."
                steps:
                  aws:
                    - "List SQS queues with DLQ: aws sqs list-queues --queue-name-prefix dlq"
                    - "Configure DLQ on Lambda: aws lambda update-function-configuration --function-name <func> --dead-letter-config '{\"TargetArn\":\"arn:aws:sqs:<region>:<account>:<dlq-name>\"}'"
                    - "Check Lambda error metrics: aws cloudwatch get-metric-statistics --namespace AWS/Lambda --metric-name Errors --dimensions Name=FunctionName,Value=<func> --start-time <start> --end-time <end> --period 3600 --statistics Sum"
                    - "Create CloudWatch alarm for errors: aws cloudwatch put-metric-alarm --alarm-name lambda-errors --namespace AWS/Lambda --metric-name Errors --dimensions Name=FunctionName,Value=<func> --statistic Sum --period 300 --threshold 1 --comparison-operator GreaterThanOrEqualToThreshold --alarm-actions <sns-arn>"
                console_path:
                  aws: "Lambda → Functions → Select function → Configuration → Asynchronous invocation → DLQ"
              cloud_checks:
                aws:
                  - service: "lambda"
                    method: "get_function_configuration"
                    assertion: "dead_letter_queue_configured"
                  - service: "sqs"
                    method: "list_queues"
                    assertion: "dlq_queues_exist"

    # =========================================================================
    # P1: Privacy
    # =========================================================================
    P1:
      name: "Privacy"
      controls:

        P1.1:
          title: "Privacy Notice and Communication"
          description: >
            The entity provides notice to data subjects about its privacy practices
            to meet the entity's objectives related to privacy. The notice is updated
            and communicated to data subjects in a timely manner for changes to the
            entity's privacy practices.
          checks:
            - id: "P1.1.a"
              description: "Verify privacy notice exists, is current, and is accessible to data subjects"
              evidence_type: "policy_doc"
              remediation:
                summary: "Publish and maintain a privacy notice accessible to all data subjects."
                steps:
                  aws:
                    - "Store privacy notice: aws s3 cp privacy-notice.html s3://<website-bucket>/privacy-notice.html --content-type text/html"
                    - "Verify public accessibility via CloudFront: aws cloudfront list-distributions --query 'DistributionList.Items[*].[DomainName,Origins.Items[0].DomainName]'"
                    - "Store internal privacy policy: aws s3 cp privacy-policy.pdf s3://<policy-bucket>/policies/privacy-policy.pdf"
                    - "Tag with review date: aws s3api put-object-tagging --bucket <policy-bucket> --key policies/privacy-policy.pdf --tagging 'TagSet=[{Key=ReviewDate,Value=<date>},{Key=Owner,Value=DPO}]'"
                console_path:
                  aws: "S3 → <website-bucket> → privacy-notice.html"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "head_object"
                    assertion: "privacy_notice_exists"

        P1.2:
          title: "Choice and Consent"
          description: >
            The entity communicates choices available regarding the collection,
            use, retention, disclosure, and disposal of personal information to
            data subjects and obtains consent.
          checks:
            - id: "P1.2.a"
              description: "Verify consent management mechanisms are implemented"
              evidence_type: "application_config"
              remediation:
                summary: "Implement consent management with documented opt-in/opt-out mechanisms."
                steps:
                  aws:
                    - "Create DynamoDB table for consent records: aws dynamodb create-table --table-name ConsentRecords --attribute-definitions AttributeName=user_id,AttributeType=S --key-schema AttributeName=user_id,KeyType=HASH --billing-mode PAY_PER_REQUEST"
                    - "Record consent: aws dynamodb put-item --table-name ConsentRecords --item '{\"user_id\":{\"S\":\"<id>\"},\"consent_type\":{\"S\":\"marketing\"},\"granted\":{\"BOOL\":true},\"timestamp\":{\"S\":\"<iso-date>\"},\"ip_address\":{\"S\":\"<ip>\"}}'"
                    - "Query consent status: aws dynamodb get-item --table-name ConsentRecords --key '{\"user_id\":{\"S\":\"<id>\"}}'"
                console_path:
                  aws: "DynamoDB → Tables → ConsentRecords → Explore items"
              cloud_checks:
                aws:
                  - service: "dynamodb"
                    method: "describe_table"
                    assertion: "consent_records_table_exists"

        P1.3:
          title: "Collection of Personal Information"
          description: >
            The entity collects personal information only for the purposes identified
            in the notice and limits collection to that which is necessary for the
            purposes identified.
          checks:
            - id: "P1.3.a"
              description: "Verify data collection is limited to documented purposes with data minimization"
              evidence_type: "policy_doc"
              remediation:
                summary: "Document data collection purposes and implement data minimization controls."
                steps:
                  aws:
                    - "Store data inventory: aws s3 cp data-inventory.xlsx s3://<policy-bucket>/privacy/data-inventory.xlsx"
                    - "Enable Macie for PII detection: aws macie2 enable-macie"
                    - "Create Macie classification job: aws macie2 create-classification-job --job-type ONE_TIME --s3-job-definition '{\"bucketDefinitions\":[{\"accountId\":\"<account>\",\"buckets\":[\"<bucket>\"]}]}' --name pii-discovery --managed-data-identifier-selector ALL"
                    - "Review findings: aws macie2 list-findings --sort-criteria '{\"attributeName\":\"severity.score\",\"orderBy\":\"DESC\"}'"
                console_path:
                  aws: "Macie → Jobs → Create job → PII detection"
              cloud_checks:
                aws:
                  - service: "macie2"
                    method: "list_classification_jobs"
                    assertion: "pii_classification_jobs_active"

        P1.4:
          title: "Use, Retention, and Disposal of Personal Information"
          description: >
            The entity limits the use of personal information to the purposes
            identified in the notice and retains it only for as long as necessary.
          checks:
            - id: "P1.4.a"
              description: "Verify data retention schedules and automated disposal for personal information"
              evidence_type: "policy_doc"
              remediation:
                summary: "Implement data retention schedules with automated disposal mechanisms."
                steps:
                  aws:
                    - "Store retention schedule: aws s3 cp data-retention-schedule.pdf s3://<policy-bucket>/privacy/data-retention-schedule.pdf"
                    - "Configure DynamoDB TTL for automatic expiration: aws dynamodb update-time-to-live --table-name <table> --time-to-live-specification Enabled=true,AttributeName=ttl"
                    - "Configure S3 lifecycle for PII data expiration: aws s3api put-bucket-lifecycle-configuration --bucket <pii-bucket> --lifecycle-configuration '{\"Rules\":[{\"ID\":\"expire-pii\",\"Status\":\"Enabled\",\"Filter\":{\"Prefix\":\"pii/\"},\"Expiration\":{\"Days\":730}}]}'"
                console_path:
                  aws: "DynamoDB → Tables → Settings → TTL → Manage TTL"
              cloud_checks:
                aws:
                  - service: "dynamodb"
                    method: "describe_time_to_live"
                    assertion: "ttl_enabled_for_pii_tables"
                  - service: "s3"
                    method: "get_bucket_lifecycle_configuration"
                    assertion: "pii_lifecycle_rules_configured"

        P1.5:
          title: "Access to Personal Information"
          description: >
            The entity grants identified and authenticated data subjects the
            ability to access their stored personal information for review and,
            upon request, provides physical or electronic copies.
          checks:
            - id: "P1.5.a"
              description: "Verify data subject access request (DSAR) procedures are documented and operational"
              evidence_type: "policy_doc"
              remediation:
                summary: "Implement DSAR procedures with automated data retrieval capabilities."
                steps:
                  aws:
                    - "Store DSAR procedure: aws s3 cp dsar-procedure.pdf s3://<policy-bucket>/privacy/dsar-procedure.pdf"
                    - "Create DSAR tracking table: aws dynamodb create-table --table-name DSARRequests --attribute-definitions AttributeName=request_id,AttributeType=S --key-schema AttributeName=request_id,KeyType=HASH --billing-mode PAY_PER_REQUEST"
                    - "Track DSAR: aws dynamodb put-item --table-name DSARRequests --item '{\"request_id\":{\"S\":\"<id>\"},\"requester\":{\"S\":\"<email>\"},\"status\":{\"S\":\"pending\"},\"requested_date\":{\"S\":\"<date>\"},\"due_date\":{\"S\":\"<date+30>\"}}'"
                console_path:
                  aws: "DynamoDB → Tables → DSARRequests"
              cloud_checks:
                aws:
                  - service: "dynamodb"
                    method: "describe_table"
                    assertion: "dsar_tracking_table_exists"

        P1.6:
          title: "Correction of Personal Information"
          description: >
            The entity corrects, amends, or appends personal information based on
            information provided by data subjects and communicates such corrections
            to third parties as committed or required.
          checks:
            - id: "P1.6.a"
              description: "Verify data correction request procedures are documented and tracked"
              evidence_type: "policy_doc"
              remediation:
                summary: "Document data correction procedures and maintain an audit trail of corrections."
                steps:
                  aws:
                    - "Store correction procedure: aws s3 cp data-correction-procedure.pdf s3://<policy-bucket>/privacy/data-correction-procedure.pdf"
                    - "Enable DynamoDB streams for correction audit trail: aws dynamodb update-table --table-name <user-data-table> --stream-specification StreamEnabled=true,StreamViewType=NEW_AND_OLD_IMAGES"
                    - "Archive stream to S3 via Kinesis: aws kinesis create-stream --stream-name data-corrections-audit --shard-count 1"
                console_path:
                  aws: "DynamoDB → Tables → <user-data-table> → Exports and streams"
              cloud_checks:
                aws:
                  - service: "dynamodb"
                    method: "describe_table"
                    assertion: "stream_enabled_for_correction_audit"

        P1.7:
          title: "Disclosure and Notification of Personal Information"
          description: >
            The entity discloses personal information to third parties with the
            consent of the data subject only for the purposes identified in the
            notice, and notifies data subjects in the event of a breach.
          checks:
            - id: "P1.7.a"
              description: "Verify third-party data sharing agreements and breach notification procedures"
              evidence_type: "policy_doc"
              remediation:
                summary: "Maintain data processing agreements with third parties and document breach notification procedures."
                steps:
                  aws:
                    - "Store DPAs: aws s3 sync ./data-processing-agreements/ s3://<policy-bucket>/privacy/dpas/"
                    - "Store breach notification plan: aws s3 cp breach-notification-plan.pdf s3://<policy-bucket>/privacy/breach-notification-plan.pdf"
                    - "Create SNS topic for breach notifications: aws sns create-topic --name breach-notification"
                    - "Subscribe legal and compliance team: aws sns subscribe --topic-arn <topic-arn> --protocol email --notification-endpoint legal@<domain>"
                console_path:
                  aws: "S3 → <policy-bucket> → privacy → dpas/"
              cloud_checks:
                aws:
                  - service: "s3"
                    method: "list_objects_v2"
                    assertion: "data_processing_agreements_exist"
                  - service: "sns"
                    method: "list_topics"
                    assertion: "breach_notification_topic_exists"

        P1.8:
          title: "Quality of Personal Information"
          description: >
            The entity collects and maintains accurate, up-to-date, complete,
            and relevant personal information for the purposes identified in the
            notice.
          checks:
            - id: "P1.8.a"
              description: "Verify data quality controls and validation procedures for personal information"
              evidence_type: "application_config"
              remediation:
                summary: "Implement data quality controls including validation rules, deduplication, and accuracy checks."
                steps:
                  aws:
                    - "Create Glue data quality rules: aws glue create-data-quality-ruleset --name pii-quality-rules --ruleset '{\"Rules\":[{\"Name\":\"email_format\",\"Expression\":\"ColumnValues['email'] matches '[a-zA-Z0-9+_.-]+@[a-zA-Z0-9.-]+'\"}]}' --target-table '{\"TableName\":\"<table>\",\"DatabaseName\":\"<db>\"}'"
                    - "Run data quality evaluation: aws glue start-data-quality-ruleset-evaluation-run --data-source '{\"GlueTable\":{\"DatabaseName\":\"<db>\",\"TableName\":\"<table>\"}}' --role <role-arn> --ruleset-names pii-quality-rules"
                    - "Check results: aws glue get-data-quality-result --result-id <result-id>"
                console_path:
                  aws: "Glue → Data quality → Rule sets → Create rule set"
              cloud_checks:
                aws:
                  - service: "glue"
                    method: "list_data_quality_rulesets"
                    assertion: "data_quality_rules_exist"
