# unified_controls.yaml
# Unified Control Framework (UCF)
# Maps common security domains to specific controls in each framework.
# Use this for multi-framework compliance reporting and gap analysis.

unified_controls:
  name: "Unified Control Framework"
  version: "1.0"
  description: "A normalized set of security control domains that map across NIST 800-53, ISO 27001, SOC 2, CMMC L2, and HIPAA"

  domains:
    # ─────────────────────────────────────────────────────────────────
    # 1. GOVERNANCE & RISK MANAGEMENT
    # ─────────────────────────────────────────────────────────────────
    GOV:
      name: "Governance & Risk Management"
      description: "Policies, procedures, roles, risk assessment, and program management"
      controls:
        GOV-1:
          title: "Information Security Program"
          description: "Establish and maintain an information security program with defined scope, objectives, and management support."
          framework_mappings:
            nist_800_53: ["PM-1", "PL-1", "PL-2"]
            iso27001: ["A.5.1", "A.5.2"]
            soc2: ["CC1.1", "CC1.2", "CC1.3"]
            cmmc_l2: []
            hipaa: ["164.308(a)(1)(i)"]

        GOV-2:
          title: "Risk Assessment"
          description: "Identify, analyze, and evaluate information security risks on a regular basis."
          framework_mappings:
            nist_800_53: ["RA-1", "RA-2", "RA-3"]
            iso27001: ["A.5.12"]
            soc2: ["CC3.1", "CC3.2", "CC3.3", "CC3.4"]
            cmmc_l2: ["RA.L2-3.11.1"]
            hipaa: ["164.308(a)(1)(ii)(A)"]

        GOV-3:
          title: "Risk Treatment & Acceptance"
          description: "Define and implement risk treatment plans, accept residual risk with documented justification."
          framework_mappings:
            nist_800_53: ["RA-7", "CA-6"]
            iso27001: ["A.5.1"]
            soc2: ["CC3.4", "CC9.1"]
            cmmc_l2: []
            hipaa: ["164.308(a)(1)(ii)(B)"]

        GOV-4:
          title: "Roles & Responsibilities"
          description: "Define and assign information security roles, responsibilities, and authorities."
          framework_mappings:
            nist_800_53: ["PM-2", "PM-11"]
            iso27001: ["A.5.2", "A.5.4"]
            soc2: ["CC1.3", "CC1.5"]
            cmmc_l2: []
            hipaa: ["164.308(a)(2)"]

        GOV-5:
          title: "Compliance Management"
          description: "Identify and monitor applicable legal, regulatory, and contractual obligations."
          framework_mappings:
            nist_800_53: ["PM-9", "PL-4"]
            iso27001: ["A.5.31", "A.5.34", "A.5.36"]
            soc2: ["CC5.2", "CC5.3"]
            cmmc_l2: []
            hipaa: ["164.308(a)(1)(i)"]

        GOV-6:
          title: "Independent Assessment"
          description: "Conduct periodic independent assessments and audits of security controls."
          framework_mappings:
            nist_800_53: ["CA-2", "CA-7", "CA-8"]
            iso27001: ["A.5.35"]
            soc2: ["CC4.1", "CC4.2"]
            cmmc_l2: ["CA.L2-3.12.1", "CA.L2-3.12.3"]
            hipaa: ["164.308(a)(8)"]

    # ─────────────────────────────────────────────────────────────────
    # 2. ACCESS CONTROL
    # ─────────────────────────────────────────────────────────────────
    ACC:
      name: "Access Control"
      description: "Identity management, authentication, authorization, and access enforcement"
      controls:
        ACC-1:
          title: "Access Control Policy"
          description: "Establish and enforce access control policies based on business and security requirements."
          framework_mappings:
            nist_800_53: ["AC-1", "AC-3"]
            iso27001: ["A.5.15"]
            soc2: ["CC6.1"]
            cmmc_l2: ["AC.L2-3.1.1", "AC.L2-3.1.2"]
            hipaa: ["164.312(a)(1)"]

        ACC-2:
          title: "Account Management"
          description: "Manage the lifecycle of user accounts including creation, modification, review, and termination."
          framework_mappings:
            nist_800_53: ["AC-2"]
            iso27001: ["A.5.16", "A.5.18"]
            soc2: ["CC6.1", "CC6.2"]
            cmmc_l2: ["AC.L2-3.1.1"]
            hipaa: ["164.312(a)(2)(i)"]

        ACC-3:
          title: "Least Privilege"
          description: "Grant only the minimum access necessary to perform assigned duties."
          framework_mappings:
            nist_800_53: ["AC-6"]
            iso27001: ["A.8.2"]
            soc2: ["CC6.1", "CC6.3"]
            cmmc_l2: ["AC.L2-3.1.5"]
            hipaa: ["164.312(a)(1)"]

        ACC-4:
          title: "Separation of Duties"
          description: "Divide critical functions among different individuals to prevent fraud and errors."
          framework_mappings:
            nist_800_53: ["AC-5"]
            iso27001: ["A.5.3"]
            soc2: ["CC6.1"]
            cmmc_l2: ["AC.L2-3.1.4"]
            hipaa: []

        ACC-5:
          title: "Multi-Factor Authentication"
          description: "Require multi-factor authentication for privileged accounts and remote access."
          framework_mappings:
            nist_800_53: ["IA-2"]
            iso27001: ["A.8.5"]
            soc2: ["CC6.1"]
            cmmc_l2: ["IA.L2-3.5.3"]
            hipaa: ["164.312(d)"]

        ACC-6:
          title: "Remote Access"
          description: "Control and monitor remote access to organizational systems."
          framework_mappings:
            nist_800_53: ["AC-17"]
            iso27001: ["A.6.7", "A.8.5"]
            soc2: ["CC6.1", "CC6.6"]
            cmmc_l2: ["AC.L2-3.1.12"]
            hipaa: ["164.312(e)(1)"]

        ACC-7:
          title: "Session Management"
          description: "Manage session locks, timeouts, and termination controls."
          framework_mappings:
            nist_800_53: ["AC-11", "AC-12"]
            iso27001: ["A.8.1"]
            soc2: ["CC6.1"]
            cmmc_l2: ["AC.L2-3.1.10", "AC.L2-3.1.11"]
            hipaa: ["164.312(a)(2)(iii)"]

        ACC-8:
          title: "Credential Management"
          description: "Manage authenticators including passwords, tokens, keys, and certificates."
          framework_mappings:
            nist_800_53: ["IA-5"]
            iso27001: ["A.5.17"]
            soc2: ["CC6.1"]
            cmmc_l2: ["IA.L2-3.5.2"]
            hipaa: ["164.312(d)"]

    # ─────────────────────────────────────────────────────────────────
    # 3. ASSET MANAGEMENT
    # ─────────────────────────────────────────────────────────────────
    AST:
      name: "Asset Management"
      description: "Inventory, classification, and lifecycle management of information assets"
      controls:
        AST-1:
          title: "Asset Inventory"
          description: "Maintain an accurate and up-to-date inventory of all information assets."
          framework_mappings:
            nist_800_53: ["CM-8", "PM-5"]
            iso27001: ["A.5.9"]
            soc2: ["CC6.1"]
            cmmc_l2: ["CM.L2-3.4.1"]
            hipaa: ["164.310(d)(1)"]

        AST-2:
          title: "Information Classification"
          description: "Classify information based on sensitivity, criticality, and legal requirements."
          framework_mappings:
            nist_800_53: ["RA-2"]
            iso27001: ["A.5.12", "A.5.13"]
            soc2: ["C1.1"]
            cmmc_l2: []
            hipaa: []

        AST-3:
          title: "Media Protection"
          description: "Protect and control removable media and storage devices."
          framework_mappings:
            nist_800_53: ["MP-1", "MP-2", "MP-4", "MP-5", "MP-6"]
            iso27001: ["A.7.10", "A.7.14"]
            soc2: ["CC6.7"]
            cmmc_l2: ["MP.L2-3.8.1", "MP.L2-3.8.2", "MP.L2-3.8.3"]
            hipaa: ["164.310(d)(1)"]

        AST-4:
          title: "Secure Disposal"
          description: "Ensure secure disposal or reuse of equipment and media containing sensitive data."
          framework_mappings:
            nist_800_53: ["MP-6"]
            iso27001: ["A.7.14", "A.8.10"]
            soc2: ["CC6.5"]
            cmmc_l2: ["MP.L2-3.8.3"]
            hipaa: ["164.310(d)(2)(i)"]

    # ─────────────────────────────────────────────────────────────────
    # 4. DATA PROTECTION
    # ─────────────────────────────────────────────────────────────────
    DAT:
      name: "Data Protection"
      description: "Encryption, data loss prevention, privacy, and information handling"
      controls:
        DAT-1:
          title: "Encryption in Transit"
          description: "Encrypt sensitive data during transmission across networks."
          framework_mappings:
            nist_800_53: ["SC-8", "SC-13"]
            iso27001: ["A.8.24"]
            soc2: ["CC6.1", "C1.1"]
            cmmc_l2: ["SC.L2-3.13.8"]
            hipaa: ["164.312(e)(2)(ii)"]

        DAT-2:
          title: "Encryption at Rest"
          description: "Encrypt sensitive data stored on systems and media."
          framework_mappings:
            nist_800_53: ["SC-28"]
            iso27001: ["A.8.24"]
            soc2: ["C1.1"]
            cmmc_l2: ["SC.L2-3.13.16"]
            hipaa: ["164.312(a)(2)(iv)"]

        DAT-3:
          title: "Key Management"
          description: "Establish and manage cryptographic keys throughout their lifecycle."
          framework_mappings:
            nist_800_53: ["SC-12"]
            iso27001: ["A.8.24"]
            soc2: ["CC6.1"]
            cmmc_l2: ["SC.L2-3.13.10"]
            hipaa: ["164.312(e)(2)(ii)"]

        DAT-4:
          title: "Data Loss Prevention"
          description: "Implement controls to prevent unauthorized exfiltration of sensitive data."
          framework_mappings:
            nist_800_53: ["AC-4", "SI-4"]
            iso27001: ["A.8.11", "A.8.12"]
            soc2: ["C1.1"]
            cmmc_l2: ["AC.L2-3.1.3"]
            hipaa: ["164.312(e)(1)"]

        DAT-5:
          title: "Privacy"
          description: "Protect personally identifiable information per applicable regulations."
          framework_mappings:
            nist_800_53: ["PT-1", "PT-2", "PT-3"]
            iso27001: ["A.5.34"]
            soc2: ["P1.1", "P1.2"]
            cmmc_l2: []
            hipaa: ["164.502(a)", "164.514"]

        DAT-6:
          title: "Data Retention & Disposal"
          description: "Define and enforce data retention periods and secure destruction."
          framework_mappings:
            nist_800_53: ["SI-12"]
            iso27001: ["A.5.33", "A.8.10"]
            soc2: ["C1.2"]
            cmmc_l2: []
            hipaa: ["164.530(j)"]

    # ─────────────────────────────────────────────────────────────────
    # 5. NETWORK SECURITY
    # ─────────────────────────────────────────────────────────────────
    NET:
      name: "Network Security"
      description: "Boundary protection, network monitoring, segmentation, and firewall management"
      controls:
        NET-1:
          title: "Boundary Protection"
          description: "Monitor and control communications at system boundaries and network perimeters."
          framework_mappings:
            nist_800_53: ["SC-7"]
            iso27001: ["A.8.20", "A.8.21"]
            soc2: ["CC6.6"]
            cmmc_l2: ["SC.L2-3.13.1"]
            hipaa: ["164.312(e)(1)"]

        NET-2:
          title: "Network Segmentation"
          description: "Segment networks to isolate sensitive systems and limit lateral movement."
          framework_mappings:
            nist_800_53: ["SC-7", "AC-4"]
            iso27001: ["A.8.22"]
            soc2: ["CC6.6"]
            cmmc_l2: ["SC.L2-3.13.1"]
            hipaa: ["164.312(e)(1)"]

        NET-3:
          title: "Denial-of-Service Protection"
          description: "Protect against denial-of-service attacks affecting system availability."
          framework_mappings:
            nist_800_53: ["SC-5"]
            iso27001: ["A.8.6"]
            soc2: ["A1.1"]
            cmmc_l2: []
            hipaa: []

        NET-4:
          title: "DNS Security"
          description: "Secure DNS resolution and protect against DNS-based attacks."
          framework_mappings:
            nist_800_53: ["SC-20", "SC-21", "SC-22"]
            iso27001: ["A.8.20"]
            soc2: ["CC6.6"]
            cmmc_l2: []
            hipaa: []

    # ─────────────────────────────────────────────────────────────────
    # 6. SECURITY OPERATIONS
    # ─────────────────────────────────────────────────────────────────
    OPS:
      name: "Security Operations"
      description: "Logging, monitoring, threat detection, vulnerability management, and malware protection"
      controls:
        OPS-1:
          title: "Audit Logging"
          description: "Generate, collect, and protect audit logs for security-relevant events."
          framework_mappings:
            nist_800_53: ["AU-2", "AU-3", "AU-9", "AU-12"]
            iso27001: ["A.8.15"]
            soc2: ["CC7.1"]
            cmmc_l2: ["AU.L2-3.3.1", "AU.L2-3.3.2"]
            hipaa: ["164.312(b)"]

        OPS-2:
          title: "Security Monitoring"
          description: "Continuously monitor systems for security events and anomalies."
          framework_mappings:
            nist_800_53: ["SI-4", "AU-6"]
            iso27001: ["A.8.16"]
            soc2: ["CC7.1", "CC7.2"]
            cmmc_l2: ["SI.L2-3.14.6", "AU.L2-3.3.5"]
            hipaa: ["164.312(b)"]

        OPS-3:
          title: "Vulnerability Management"
          description: "Scan for, identify, and remediate system vulnerabilities."
          framework_mappings:
            nist_800_53: ["RA-5", "SI-2"]
            iso27001: ["A.8.8"]
            soc2: ["CC7.1"]
            cmmc_l2: ["RA.L2-3.11.2", "SI.L2-3.14.1"]
            hipaa: ["164.308(a)(1)(ii)(A)"]

        OPS-4:
          title: "Malware Protection"
          description: "Protect systems against malicious software through prevention, detection, and response."
          framework_mappings:
            nist_800_53: ["SI-3"]
            iso27001: ["A.8.7"]
            soc2: ["CC6.8"]
            cmmc_l2: ["SI.L2-3.14.2"]
            hipaa: ["164.308(a)(5)(ii)(B)"]

        OPS-5:
          title: "Threat Intelligence"
          description: "Collect and use threat intelligence to inform security decisions."
          framework_mappings:
            nist_800_53: ["SI-5"]
            iso27001: ["A.5.7"]
            soc2: ["CC7.2"]
            cmmc_l2: ["SI.L2-3.14.3"]
            hipaa: []

        OPS-6:
          title: "Log Retention"
          description: "Retain audit logs for the required period and ensure availability."
          framework_mappings:
            nist_800_53: ["AU-11", "AU-4"]
            iso27001: ["A.8.15"]
            soc2: ["CC7.1"]
            cmmc_l2: []
            hipaa: ["164.312(b)"]

    # ─────────────────────────────────────────────────────────────────
    # 7. INCIDENT RESPONSE
    # ─────────────────────────────────────────────────────────────────
    INC:
      name: "Incident Response"
      description: "Incident detection, response, containment, recovery, and lessons learned"
      controls:
        INC-1:
          title: "Incident Response Plan"
          description: "Develop and maintain an incident response plan with defined roles and procedures."
          framework_mappings:
            nist_800_53: ["IR-1", "IR-8"]
            iso27001: ["A.5.24"]
            soc2: ["CC7.3"]
            cmmc_l2: ["IR.L2-3.6.1"]
            hipaa: ["164.308(a)(6)(i)"]

        INC-2:
          title: "Incident Detection & Reporting"
          description: "Detect security incidents through monitoring and enable reporting channels."
          framework_mappings:
            nist_800_53: ["IR-4", "IR-5", "IR-6"]
            iso27001: ["A.5.25", "A.5.26"]
            soc2: ["CC7.3", "CC7.4"]
            cmmc_l2: ["IR.L2-3.6.2"]
            hipaa: ["164.308(a)(6)(ii)"]

        INC-3:
          title: "Incident Response Training & Testing"
          description: "Train personnel on incident response and test the IR plan periodically."
          framework_mappings:
            nist_800_53: ["IR-2", "IR-3"]
            iso27001: ["A.5.24"]
            soc2: ["CC7.3"]
            cmmc_l2: ["IR.L2-3.6.1"]
            hipaa: ["164.308(a)(6)(i)"]

        INC-4:
          title: "Lessons Learned"
          description: "Conduct post-incident reviews and incorporate lessons into future planning."
          framework_mappings:
            nist_800_53: ["IR-4"]
            iso27001: ["A.5.27"]
            soc2: ["CC7.3"]
            cmmc_l2: []
            hipaa: []

    # ─────────────────────────────────────────────────────────────────
    # 8. BUSINESS CONTINUITY
    # ─────────────────────────────────────────────────────────────────
    BCN:
      name: "Business Continuity"
      description: "Backup, disaster recovery, contingency planning, and availability"
      controls:
        BCN-1:
          title: "Business Continuity Plan"
          description: "Develop, test, and maintain a business continuity and disaster recovery plan."
          framework_mappings:
            nist_800_53: ["CP-1", "CP-2", "CP-4"]
            iso27001: ["A.5.29", "A.5.30"]
            soc2: ["A1.1", "A1.2"]
            cmmc_l2: []
            hipaa: ["164.308(a)(7)(i)"]

        BCN-2:
          title: "Data Backup"
          description: "Perform regular backups and verify backup integrity."
          framework_mappings:
            nist_800_53: ["CP-9"]
            iso27001: ["A.8.13"]
            soc2: ["A1.2"]
            cmmc_l2: []
            hipaa: ["164.308(a)(7)(ii)(A)"]

        BCN-3:
          title: "System Recovery"
          description: "Define and meet recovery time and recovery point objectives."
          framework_mappings:
            nist_800_53: ["CP-10"]
            iso27001: ["A.5.29"]
            soc2: ["A1.2", "A1.3"]
            cmmc_l2: []
            hipaa: ["164.308(a)(7)(ii)(B)"]

        BCN-4:
          title: "Redundancy"
          description: "Implement system redundancy to ensure availability of critical services."
          framework_mappings:
            nist_800_53: ["CP-6", "CP-7"]
            iso27001: ["A.8.14"]
            soc2: ["A1.1"]
            cmmc_l2: []
            hipaa: []

    # ─────────────────────────────────────────────────────────────────
    # 9. CONFIGURATION & CHANGE MANAGEMENT
    # ─────────────────────────────────────────────────────────────────
    CCM:
      name: "Configuration & Change Management"
      description: "Baseline configuration, change control, patch management, and hardening"
      controls:
        CCM-1:
          title: "Baseline Configuration"
          description: "Establish and maintain secure baseline configurations for systems."
          framework_mappings:
            nist_800_53: ["CM-2", "CM-6"]
            iso27001: ["A.8.9"]
            soc2: ["CC8.1"]
            cmmc_l2: ["CM.L2-3.4.1", "CM.L2-3.4.2"]
            hipaa: []

        CCM-2:
          title: "Change Control"
          description: "Control changes to systems through a formal review and approval process."
          framework_mappings:
            nist_800_53: ["CM-3", "CM-4", "CM-5"]
            iso27001: ["A.8.32"]
            soc2: ["CC8.1"]
            cmmc_l2: []
            hipaa: []

        CCM-3:
          title: "Least Functionality"
          description: "Restrict system capabilities to only those required for operations."
          framework_mappings:
            nist_800_53: ["CM-7"]
            iso27001: ["A.8.19"]
            soc2: ["CC6.8"]
            cmmc_l2: ["CM.L2-3.4.6"]
            hipaa: []

        CCM-4:
          title: "Patch Management"
          description: "Identify, test, and apply security patches in a timely manner."
          framework_mappings:
            nist_800_53: ["SI-2"]
            iso27001: ["A.8.8"]
            soc2: ["CC7.1"]
            cmmc_l2: ["SI.L2-3.14.1"]
            hipaa: []

    # ─────────────────────────────────────────────────────────────────
    # 10. HUMAN RESOURCES SECURITY
    # ─────────────────────────────────────────────────────────────────
    HRS:
      name: "Human Resources Security"
      description: "Screening, onboarding, training, separation, and personnel security"
      controls:
        HRS-1:
          title: "Personnel Screening"
          description: "Conduct background checks on personnel before granting access."
          framework_mappings:
            nist_800_53: ["PS-3"]
            iso27001: ["A.6.1"]
            soc2: ["CC1.4"]
            cmmc_l2: ["PS.L2-3.9.1"]
            hipaa: ["164.308(a)(3)(ii)(B)"]

        HRS-2:
          title: "Security Awareness Training"
          description: "Provide regular security awareness training to all personnel."
          framework_mappings:
            nist_800_53: ["AT-2", "AT-3"]
            iso27001: ["A.6.3"]
            soc2: ["CC1.4"]
            cmmc_l2: ["AT.L2-3.2.1", "AT.L2-3.2.2"]
            hipaa: ["164.308(a)(5)(i)"]

        HRS-3:
          title: "Termination & Transfer"
          description: "Revoke access promptly upon termination and adjust access upon role changes."
          framework_mappings:
            nist_800_53: ["PS-4", "PS-5"]
            iso27001: ["A.6.5"]
            soc2: ["CC6.2"]
            cmmc_l2: ["PS.L2-3.9.2"]
            hipaa: ["164.308(a)(3)(ii)(C)"]

        HRS-4:
          title: "Access Agreements"
          description: "Require signed acceptable use and confidentiality agreements."
          framework_mappings:
            nist_800_53: ["PS-6", "PL-4"]
            iso27001: ["A.6.2", "A.6.6"]
            soc2: ["CC1.1"]
            cmmc_l2: []
            hipaa: ["164.308(a)(3)(ii)(A)"]

    # ─────────────────────────────────────────────────────────────────
    # 11. PHYSICAL SECURITY
    # ─────────────────────────────────────────────────────────────────
    PHY:
      name: "Physical Security"
      description: "Physical access controls, environmental protections, and facility security"
      controls:
        PHY-1:
          title: "Physical Access Control"
          description: "Control physical access to facilities and sensitive areas."
          framework_mappings:
            nist_800_53: ["PE-2", "PE-3"]
            iso27001: ["A.7.1", "A.7.2"]
            soc2: ["CC6.4"]
            cmmc_l2: ["PE.L2-3.10.1", "PE.L2-3.10.2"]
            hipaa: ["164.310(a)(1)"]

        PHY-2:
          title: "Physical Monitoring"
          description: "Monitor physical access through surveillance and logging."
          framework_mappings:
            nist_800_53: ["PE-6", "PE-8"]
            iso27001: ["A.7.4"]
            soc2: ["CC6.4"]
            cmmc_l2: ["PE.L2-3.10.3"]
            hipaa: ["164.310(a)(2)(iii)"]

        PHY-3:
          title: "Environmental Protection"
          description: "Protect systems from environmental threats (fire, flood, power, temperature)."
          framework_mappings:
            nist_800_53: ["PE-9", "PE-11", "PE-13", "PE-14", "PE-15"]
            iso27001: ["A.7.5", "A.7.11"]
            soc2: ["A1.1"]
            cmmc_l2: []
            hipaa: []

        PHY-4:
          title: "Equipment Maintenance"
          description: "Maintain equipment per manufacturer specs and security requirements."
          framework_mappings:
            nist_800_53: ["MA-2", "MA-4"]
            iso27001: ["A.7.13"]
            soc2: ["A1.1"]
            cmmc_l2: ["MA.L2-3.7.1"]
            hipaa: ["164.310(a)(2)(iv)"]

    # ─────────────────────────────────────────────────────────────────
    # 12. SECURE DEVELOPMENT
    # ─────────────────────────────────────────────────────────────────
    DEV:
      name: "Secure Development"
      description: "SDLC security, secure coding, testing, and software supply chain"
      controls:
        DEV-1:
          title: "Secure Development Lifecycle"
          description: "Integrate security into each phase of the software development lifecycle."
          framework_mappings:
            nist_800_53: ["SA-3", "SA-8"]
            iso27001: ["A.8.25", "A.8.27"]
            soc2: ["CC8.1"]
            cmmc_l2: []
            hipaa: []

        DEV-2:
          title: "Secure Coding"
          description: "Apply secure coding standards and perform code reviews."
          framework_mappings:
            nist_800_53: ["SA-11", "SI-10"]
