services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GRC_DATABASE_URL=postgresql://grc:grc_secret@db:5432/grc_toolkit
      - GRC_OPA_URL=http://opa:8181
    depends_on:
      db:
        condition: service_healthy
      opa:
        condition: service_started
    volumes:
      - ./evidence:/app/evidence
      - ./reports:/app/reports
      - ./config:/app/config

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: grc_toolkit
      POSTGRES_USER: grc
      POSTGRES_PASSWORD: grc_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  opa:
    image: openpolicyagent/opa:latest
    ports:
      - "8181:8181"
    command: run --server --bundle /policies
    volumes:
      - ./policies:/policies

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
