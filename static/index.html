<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRC Toolkit</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --orange: #f97316;
      --purple: #a855f7;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Layout */
    .app { display: flex; min-height: 100vh; }

    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      flex-shrink: 0;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-logo {
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .sidebar-logo h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .sidebar-logo span {
      color: var(--accent);
    }

    .sidebar-logo p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .nav-item.active {
      background: rgba(59, 130, 246, 0.1);
      color: var(--accent);
      border-left-color: var(--accent);
    }

    .nav-icon { font-size: 18px; width: 24px; text-align: center; }

    .main {
      margin-left: 240px;
      flex: 1;
      padding: 32px;
      max-width: 1200px;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 28px;
    }

    .page-header h2 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .page-header p {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 4px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Stat Grid */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      margin-top: 4px;
    }

    .stat-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      text-align: left;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(71, 85, 105, 0.4);
    }

    tr:hover td { background: rgba(59, 130, 246, 0.05); }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-green  { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-red    { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .badge-orange { background: rgba(249,115,22,0.15); color: var(--orange); }
    .badge-blue   { background: rgba(59,130,246,0.15); color: var(--accent); }
    .badge-purple { background: rgba(168,85,247,0.15); color: var(--purple); }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover { background: var(--border); }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn-primary:hover { background: var(--accent-hover); }

    /* Forms */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .form-group { display: flex; flex-direction: column; gap: 4px; }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .form-group input, .form-group select, .form-group textarea {
      padding: 8px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }

    .form-group textarea { resize: vertical; min-height: 60px; }

    /* Bar chart */
    .bar-chart { display: flex; gap: 8px; align-items: flex-end; height: 120px; margin-top: 8px; }

    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .bar {
      width: 100%;
      max-width: 48px;
      border-radius: 4px 4px 0 0;
      min-height: 4px;
      transition: height 0.3s;
    }

    .bar-label { font-size: 10px; color: var(--text-muted); }
    .bar-value { font-size: 11px; font-weight: 600; }

    /* Two col */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Status dot */
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .dot-green  { background: var(--green); }
    .dot-red    { background: var(--red); }
    .dot-yellow { background: var(--yellow); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      font-size: 13px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 1000;
      transition: opacity 0.3s;
    }

    .toast.error { border-color: var(--red); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* Health indicator */
    .health-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Settings area in sidebar */
    .sidebar-settings {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .sidebar-settings label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 6px;
    }

    .sidebar-settings input {
      width: 100%;
      padding: 6px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      font-family: monospace;
    }

    .sidebar-settings .hint {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 16px; }
      .two-col { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-logo">
        <h1><span>GRC</span> Toolkit</h1>
        <p>Governance, Risk & Compliance</p>
      </div>
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="nav-icon">&#9633;</span> Dashboard
      </div>
      <div class="nav-item" data-page="frameworks" onclick="navigate('frameworks')">
        <span class="nav-icon">&#9881;</span> Frameworks
      </div>
      <div class="nav-item" data-page="assessments" onclick="navigate('assessments')">
        <span class="nav-icon">&#10003;</span> Assessments
      </div>
      <div class="nav-item" data-page="risk" onclick="navigate('risk')">
        <span class="nav-icon">&#9888;</span> Risk Analysis
      </div>
      <div class="nav-item" data-page="vendors" onclick="navigate('vendors')">
        <span class="nav-icon">&#9862;</span> Vendors
      </div>
      <div class="nav-item" data-page="evidence" onclick="navigate('evidence')">
        <span class="nav-icon">&#128269;</span> Evidence
      </div>
      <div class="nav-item" data-page="exports" onclick="navigate('exports')">
        <span class="nav-icon">&#128230;</span> Exports
      </div>
      <div class="nav-item" data-page="policies" onclick="navigate('policies')">
        <span class="nav-icon">&#128220;</span> Policies
      </div>
      <div class="sidebar-settings">
        <label>API Key</label>
        <input type="password" id="api-key-input" placeholder="Enter API key" autocomplete="off" />
        <div class="hint">Stored in sessionStorage only</div>
      </div>
      <div class="health-bar" id="health-bar">
        <span class="status-dot dot-yellow"></span>
        Checking API...
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main" id="main-content">
    </main>
  </div>

  <script>
    // Same-origin API base URL — requests go to the host that served this page.
    // Change this if the API is hosted on a different origin.
    const API = '';

    // ── XSS Prevention ────────────────────────────────
    // Escape HTML entities to prevent XSS when inserting dynamic content into innerHTML.
    function esc(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── API Key (sessionStorage) ──────────────────────
    (function initApiKeyInput() {
      const input = document.getElementById('api-key-input');
      // Restore from sessionStorage on load
      const stored = sessionStorage.getItem('grc_api_key');
      if (stored) input.value = stored;
      input.addEventListener('input', function() {
        const val = this.value.trim();
        if (val) {
          sessionStorage.setItem('grc_api_key', val);
        } else {
          sessionStorage.removeItem('grc_api_key');
        }
      });
    })();

    // ── State ────────────────────────────────────────
    let currentPage = 'dashboard';

    // ── Navigation ───────────────────────────────────
    function navigate(page) {
      currentPage = page;
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.page === page);
      });
      renderPage();
    }

    function renderPage() {
      const main = document.getElementById('main-content');
      main.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
      const pages = { dashboard: renderDashboard, frameworks: renderFrameworks, assessments: renderAssessments, risk: renderRisk, vendors: renderVendors, evidence: renderEvidence, exports: renderExports, policies: renderPolicies };
      (pages[currentPage] || renderDashboard)();
    }

    // ── API helpers ──────────────────────────────────
    async function api(path, opts = {}) {
      const headers = { 'Content-Type': 'application/json', ...opts.headers };
      // Include API key from sessionStorage if set
      const apiKey = sessionStorage.getItem('grc_api_key');
      if (apiKey) {
        headers['X-API-Key'] = apiKey;
      }
      const resp = await fetch(API + path, {
        headers,
        ...opts,
      });
      if (!resp.ok) throw new Error(`API ${resp.status}: ${resp.statusText}`);
      return resp.json();
    }

    function toast(msg, isError = false) {
      const el = document.createElement('div');
      el.className = 'toast' + (isError ? ' error' : '');
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
    }

    function fmt$(n) {
      if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
      return '$' + n.toFixed(0);
    }

    function riskBadge(level) {
      const map = { Critical: 'badge-red', High: 'badge-orange', Medium: 'badge-yellow', Low: 'badge-green' };
      return `<span class="badge ${map[level] || 'badge-blue'}">${esc(level)}</span>`;
    }

    // ── Dashboard ────────────────────────────────────
    async function renderDashboard() {
      const main = document.getElementById('main-content');

      let frameworks = [], vendors = [], scenarios = [], health = {};
      try {
        [frameworks, vendors, scenarios, health] = await Promise.all([
          api('/api/v1/frameworks/').catch(() => []),
          api('/api/v1/vendors/').catch(() => []),
          api('/api/v1/risk/scenarios').catch(() => []),
          api('/health').catch(() => ({ status: 'unknown' })),
        ]);
      } catch(e) {}

      const totalControls = frameworks.reduce((s, f) => s + f.control_count, 0);

      main.innerHTML = `
        <div class="page-header">
          <h2>Dashboard</h2>
          <p>GRC Toolkit overview — ${esc(new Date().toLocaleDateString())}</p>
        </div>

        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label">Frameworks</div>
            <div class="stat-value">${esc(frameworks.length)}</div>
            <div class="stat-sub">${esc(totalControls)} total controls</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Vendors Tracked</div>
            <div class="stat-value">${esc(vendors.length)}</div>
            <div class="stat-sub">${esc(vendors.filter(v => v.risk_level === 'High' || v.risk_level === 'Critical').length)} high/critical risk</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Risk Scenarios</div>
            <div class="stat-value">${esc(scenarios.length)}</div>
            <div class="stat-sub">Monte Carlo simulation ready</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">API Status</div>
            <div class="stat-value" style="color: ${health.status === 'healthy' ? 'var(--green)' : 'var(--yellow)'}">
              ${health.status === 'healthy' ? '&#10003;' : '&#9888;'} ${esc(health.status || 'unknown')}
            </div>
            <div class="stat-sub">v${esc(health.version || '?')}</div>
          </div>
        </div>

        <div class="two-col">
          <div class="card">
            <div class="card-title">Frameworks</div>
            <table>
              <tr><th>Framework</th><th>Version</th><th>Controls</th></tr>
              ${frameworks.map(f => `
                <tr>
                  <td>${esc(f.display_name)}</td>
                  <td><span class="badge badge-blue">${esc(f.version)}</span></td>
                  <td>${esc(f.control_count)}</td>
                </tr>
              `).join('') || '<tr><td colspan="3" style="color:var(--text-muted)">No frameworks loaded</td></tr>'}
            </table>
          </div>
          <div class="card">
            <div class="card-title">Vendor Risk Overview</div>
            ${vendors.length > 0 ? `
              <table>
                <tr><th>Vendor</th><th>Risk</th><th>Criticality</th></tr>
                ${vendors.slice(0, 8).map(v => `
                  <tr>
                    <td>${esc(v.name)}</td>
                    <td>${riskBadge(v.risk_level || 'Medium')}</td>
                    <td>${esc(v.criticality)}</td>
                  </tr>
                `).join('')}
              </table>
            ` : '<div class="empty-state"><div class="icon">&#9862;</div><p>No vendors yet — add one in the Vendors tab</p></div>'}
          </div>
        </div>
      `;
    }

    // ── Frameworks ───────────────────────────────────
    async function renderFrameworks() {
      const main = document.getElementById('main-content');
      try {
        const frameworks = await api('/api/v1/frameworks/');
        main.innerHTML = `
          <div class="page-header">
            <h2>Frameworks</h2>
            <p>Compliance frameworks and control families</p>
          </div>
          <div class="card">
            <table>
              <tr><th>ID</th><th>Name</th><th>Version</th><th>Controls</th><th>Status</th><th></th></tr>
              ${frameworks.map(f => `
                <tr>
                  <td style="font-family:monospace">${esc(f.id)}</td>
                  <td>${esc(f.display_name)}</td>
                  <td>${esc(f.version)}</td>
                  <td>${esc(f.control_count)}</td>
                  <td><span class="badge badge-green">Active</span></td>
                  <td><button class="btn" data-framework-id="${esc(f.id)}" onclick="viewControls(this.dataset.frameworkId)">View Controls</button></td>
                </tr>
              `).join('') || '<tr><td colspan="6" class="empty-state">No frameworks loaded</td></tr>'}
            </table>
          </div>
          <div id="controls-detail"></div>

          <div class="card" style="margin-top:24px">
            <div class="card-title">Framework Crosswalk</div>
            <div class="form-grid">
              <div class="form-group">
                <label>Source Framework</label>
                <select id="cw-source">
                  ${frameworks.map(f => `<option value="${esc(f.id)}">${esc(f.display_name)}</option>`).join('')}
                </select>
              </div>
              <div class="form-group">
                <label>Control ID</label>
                <input id="cw-control" placeholder="e.g. AC-2" />
              </div>
              <div class="form-group">
                <label>Target Framework</label>
                <select id="cw-target">
                  <option value="soc2">SOC 2</option>
                  <option value="iso_27001">ISO 27001</option>
                  <option value="cmmc_l2">CMMC L2</option>
                  <option value="hipaa">HIPAA</option>
                </select>
              </div>
            </div>
            <button class="btn btn-primary" onclick="runCrosswalk()">Map Control</button>
            <div id="crosswalk-result" style="margin-top:16px"></div>
          </div>
        `;
      } catch(e) {
        main.innerHTML = '<div class="empty-state"><div class="icon">&#9881;</div><p>Could not load frameworks</p></div>';
      }
    }

    async function viewControls(frameworkId) {
      const el = document.getElementById('controls-detail');
      el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const controls = await api(`/api/v1/frameworks/${encodeURIComponent(frameworkId)}/controls`);
        el.innerHTML = `
          <div class="card">
            <div class="card-title">Controls — ${esc(frameworkId)}</div>
            <table>
              <tr><th>Family</th><th>Control ID</th><th>Title</th><th>Checks</th></tr>
              ${controls.map(c => `
                <tr>
                  <td><span class="badge badge-purple">${esc(c.family)}</span></td>
                  <td style="font-family:monospace">${esc(c.control_id)}</td>
                  <td>${esc(c.title)}</td>
                  <td>${esc(c.check_count)}</td>
                </tr>
              `).join('')}
            </table>
          </div>
        `;
      } catch(e) {
        el.innerHTML = '<p style="color:var(--red)">Failed to load controls</p>';
      }
    }

    async function runCrosswalk() {
      const el = document.getElementById('crosswalk-result');
      try {
        const result = await api('/api/v1/frameworks/crosswalk', {
          method: 'POST',
          body: JSON.stringify({
            source_framework: document.getElementById('cw-source').value,
            control_id: document.getElementById('cw-control').value,
            target_framework: document.getElementById('cw-target').value,
          }),
        });
        if (result.target_controls.length === 0) {
          el.innerHTML = '<p style="color:var(--text-muted)">No mappings found for this control.</p>';
        } else {
          el.innerHTML = `
            <table>
              <tr><th>Target Control</th><th>Title</th><th>Relationship</th></tr>
              ${result.target_controls.map(tc => `
                <tr>
                  <td style="font-family:monospace">${esc(tc.control_id || tc.id || JSON.stringify(tc))}</td>
                  <td>${esc(tc.title || '')}</td>
                  <td>${esc(tc.relationship || 'equivalent')}</td>
                </tr>
              `).join('')}
            </table>
          `;
        }
      } catch(e) {
        el.innerHTML = `<p style="color:var(--red)">${esc(e.message)}</p>`;
      }
    }

    // ── Assessments ──────────────────────────────────
    async function renderAssessments() {
      const main = document.getElementById('main-content');
      try {
        const runs = await api('/api/v1/assessments/runs');
        main.innerHTML = `
          <div class="page-header">
            <h2>Assessments</h2>
            <p>Compliance assessment runs and results</p>
          </div>
          <div style="margin-bottom:16px;display:flex;gap:12px;align-items:center">
            <select id="assess-framework" style="padding:8px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px">

    function loadScenario(s) {

      document.getElementById('risk-fmax').value = s.frequency.max;

            frequency_mode: +document.getElementById('risk-fmode').value,
            frequency_max: +document.getElementById('risk-fmax').value,
            impact_min: +document.getElementById('risk-imin').value,
            impact_mode: +document.getElementById('risk-imode').value,

    async function downloadExport(type, format) {
      const runId = document.getElementById('export-run')?.value;
      const targetFw = document.getElementById('export-framework')?.value;
      if (!runId) { toast('Select an assessment run first', true); return; }

      const apiKey = sessionStorage.getItem('grc_api_key');
      const headers = {};
      if (apiKey) headers['X-API-Key'] = apiKey;

      let url = API + '/api/v1/export/' + type + '?assessment_run_id=' + encodeURIComponent(runId);
      if (targetFw) url += '&target_framework=' + encodeURIComponent(targetFw);
      if (format) url += '&format=' + encodeURIComponent(format);

      toast('Downloading ' + type + '...');
      try {
        const resp = await fetch(url, { headers });
        if (!resp.ok) throw new Error('Export failed: ' + resp.status);
        const blob = await resp.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        const cd = resp.headers.get('content-disposition') || '';
        const match = cd.match(/filename="?([^"]+)"?/);
        a.download = match ? match[1] : type + '_export.' + (format || 'zip');
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(a.href);
        toast('Download complete');
      } catch(e) {
        toast('Export failed: ' + e.message, true);
      }
    }
